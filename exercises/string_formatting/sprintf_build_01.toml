common_mistake = "Buffer trop petit → overflow silencieux (sprintf n'a aucune protection de taille)"
description = """
NSY103 — snprintf écrit dans un buffer au lieu de stdout. C'est la façon C de construire des chaînes formatées. Attention au buffer overflow — toujours dimensionner suffisamment.

Construisez des chaînes formatées avec snprintf et affichez-les."""
difficulty = 2
exercise_type = "complete"
hints = [
    "snprintf(buf, size, format, ...) écrit dans buf au lieu de stdout",
    '''snprintf retourne le nombre de caractères écrits (sans le '\0')''',
    "On peut chaîner les snprintf — buf3 utilise buf1 et buf2",
]
id = "sprintf-build-01"
kc_ids = ["KC-C05"]
key_concept = "snprintf écrit dans un char[] au lieu de stdout — utile pour construire des chaînes formatées en mémoire"
lang = "c"
prerequisites = ["printf-precision-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

int build_messages(char *buf1, char *buf2, char *buf3, size_t sz) {
    int code = 404;
    char *status = "Not Found";
    double temp = 36.6;
    snprintf(buf1, sz, "Error %d: %s", code, status);
    snprintf(buf2, sz, "Temp: %.1f C", temp);
    snprintf(buf3, sz, "%s | %s", buf1, buf2);
    return strlen(buf1);
}

int main(void) {
    {
        char buf1[64], buf2[64], buf3[64];
        build_messages(buf1, buf2, buf3, 64);
        printf("%s\n", buf1);
    }
    {
        char buf1[64], buf2[64], buf3[64];
        build_messages(buf1, buf2, buf3, 64);
        printf("%s\n", buf2);
    }
    {
        char buf1[64], buf2[64], buf3[64];
        build_messages(buf1, buf2, buf3, 64);
        printf("%s\n", buf3);
    }
    {
        char buf1[64], buf2[64], buf3[64];
        int len = build_messages(buf1, buf2, buf3, 64);
        printf("%d\n", (int)(len));
    }
    return 0;
}
'''
