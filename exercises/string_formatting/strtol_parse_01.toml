common_mistake = "Utiliser atoi au lieu de strtol — atoi ne détecte pas les erreurs et retourne 0 silencieusement"
description = """
NSY103 — strtol est la méthode robuste pour convertir des chaînes en entiers. Contrairement à atoi, elle détecte les erreurs via endptr et gère les bases (10, 16, 8, 2). errno doit être vérifié pour détecter les dépassements.

Convertissez des chaînes en entiers avec strtol en vérifiant les erreurs."""
difficulty = 3
exercise_type = "complete"
hints = [
    "strtol(str, &endptr, base) — endptr pointe vers le premier caractère non parsé",
    "Si endptr == str, aucun chiffre n'a été lu (erreur)",
    "Base 16 pour l'hexadécimal, base 10 pour le décimal",
]
id = "strtol-parse-01"
kc_ids = ["KC-C05"]
key_concept = "strtol > atoi : endptr détecte les erreurs, base paramétrable, errno pour overflow"
lang = "c"
prerequisites = ["scanf-validate-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

int safe_strtol(const char *s, int base, long *out) {
    char *endptr;
    long val = strtol(s, &endptr, base);
    if (endptr == s) return 0;  /* No conversion */
    *out = val;
    return 1;  /* Success */
}

int main(void) {
    {
        long val;
        int res = safe_strtol("12345", 10, &val);
        printf("%d\n", (int)(res));
        printf("%d\n", (int)(val));
    }
    {
        long val;
        int res = safe_strtol("0xFF", 16, &val);
        printf("%d\n", (int)(res));
        printf("%d\n", (int)(val));
    }
    {
        long val;
        int res = safe_strtol("42abc", 10, &val);
        printf("%d\n", (int)(res));
        printf("%d\n", (int)(val));
    }
    {
        long val = 999;
        int res = safe_strtol("hello", 10, &val);
        printf("%d\n", (int)(res));
        printf("%d\n", (int)(val));
    }
    return 0;
}
'''
