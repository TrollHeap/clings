common_mistake = "Mauvais type dans va_arg (ex: float au lieu de double) → comportement indéfini"
description = """
NSY103 — Comprendre printf de l'intérieur en implémentant une version simplifiée. Utiliser va_list, va_start, va_arg, va_end pour traiter un nombre variable d'arguments. Supporter %d, %s, %x, %% et les caractères littéraux.

Implémentez my_printf qui supporte %d, %s, %x et %%."""
difficulty = 4
exercise_type = "complete"
hints = [
    "va_start(args, last_named_param) initialise la liste d'arguments variables",
    "va_arg(args, type) extrait le prochain argument du type spécifié",
    "va_end(args) termine le parcours — toujours l'appeler avant de retourner",
]
id = "format-custom-01"
kc_ids = ["KC-C05"]
key_concept = "va_list/va_start/va_arg/va_end — le mécanisme C pour les fonctions variadiques comme printf"
lang = "c"
prerequisites = ["snprintf-safe-01"]
solution_code = '''
#include <stdio.h>
#include <stdarg.h>
#include <string.h>

int my_sprintf(char *buf, size_t sz, const char *fmt, ...) {
    va_list args;
    va_start(args, fmt);
    size_t pos = 0;
    while (*fmt && pos < sz - 1) {
        if (*fmt == '%') {
            fmt++;
            switch (*fmt) {
            case 'd': {
                int val = va_arg(args, int);
                pos += snprintf(buf + pos, sz - pos, "%d", val);
                break;
            }
            case 's': {
                char *val = va_arg(args, char *);
                pos += snprintf(buf + pos, sz - pos, "%s", val);
                break;
            }
            case 'x': {
                unsigned int val = va_arg(args, unsigned int);
                pos += snprintf(buf + pos, sz - pos, "%x", val);
                break;
            }
            case '%':
                buf[pos++] = '%';
                break;
            }
        } else {
            buf[pos++] = *fmt;
        }
        fmt++;
    }
    buf[pos] = '\0';
    va_end(args);
    return pos;
}

int main(void) {
    {
        char buf[64];
        my_sprintf(buf, sizeof(buf), "%d", 42);
        printf("%s\n", buf);
    }
    {
        char buf[64];
        my_sprintf(buf, sizeof(buf), "Hello %s", "world");
        printf("%s\n", buf);
    }
    {
        char buf[64];
        my_sprintf(buf, sizeof(buf), "0x%x", 255);
        printf("%s\n", buf);
    }
    {
        char buf[64];
        my_sprintf(buf, sizeof(buf), "100%%");
        printf("%s\n", buf);
    }
    {
        char buf[128];
        my_sprintf(buf, sizeof(buf), "n=%d s=%s x=%x %%", 10, "test", 255);
        printf("%d\n", (strstr(buf, "n=10") != NULL) ? 1 : 0);
        printf("%d\n", (strstr(buf, "s=test") != NULL) ? 1 : 0);
        printf("%d\n", (strstr(buf, "x=ff") != NULL) ? 1 : 0);
    }
    return 0;
}
'''
