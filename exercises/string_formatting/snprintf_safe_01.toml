common_mistake = "Ignorer la valeur de retour de snprintf → ne pas détecter la troncature silencieuse"
description = '''
NSY103 — snprintf limite l'écriture à N-1 caractères + '\0'. Contrairement à sprintf, il ne peut pas déborder. La valeur de retour indique le nombre de caractères qui auraient été écrits (troncature si retour >= N).

Utilisez snprintf pour construire des chaînes en vérifiant la troncature.'''
difficulty = 4
exercise_type = "complete"
hints = [
    '''snprintf(buf, size, fmt, ...) écrit au max size-1 chars + '\0'''',
    '''Le retour de snprintf = nombre total de chars voulus (sans '\0'). Si ret >= size → troncature''',
    "Chaînage: snprintf(buf+written, remaining, ...) permet de construire incrémentalement",
]
id = "snprintf-safe-01"
kc_ids = ["KC-C05"]
key_concept = "snprintf est la version sûre de sprintf — toujours vérifier ret >= size pour détecter la troncature"
lang = "c"
prerequisites = ["format-table-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

void test_truncation(char *small, char *big) {
    int ret;
    ret = snprintf(small, 16, "Hello, %s! Score=%d", "clings", 100);
    ret = snprintf(big, 64, "Hello, %s! Score=%d", "clings", 100);
}

int build_path(char *path, size_t sz) {
    int written = 0;
    written += snprintf(path + written, sz - written, "/home/");
    written += snprintf(path + written, sz - written, "%s/", "user");
    written += snprintf(path + written, sz - written, "%s", "documents/files/report.txt");
    return written;
}

int main(void) {
    char small[16], big[64], path[32];
    /* Test truncation */
    int r1 = snprintf(small, 16, "Hello, %s! Score=%d", "clings", 100);
    int r2 = snprintf(big, 64, "Hello, %s! Score=%d", "clings", 100);
    printf("%d\n", (int)strlen(small));   /* 15 */
    printf("%s\n", big);
    /* Test build_path */
    int written = build_path(path, sizeof(path));
    printf("%d\n", written > 0 ? 1 : 0);
    printf("%d\n", strstr(path, "/home/") ? 1 : 0);
    return 0;
}
'''
