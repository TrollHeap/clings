common_mistake = "Mélanger les largeurs entre l'en-tête et les données → colonnes désalignées"
description = """
NSY103 — Combiner largeur, précision et alignement pour créer des tableaux lisibles. %-Ns aligne les chaînes à gauche, %Nd aligne les nombres à droite — essentiel pour les rapports et logs.

Affichez un tableau formaté de processus avec colonnes alignées."""
difficulty = 3
exercise_type = "complete"
hints = [
    "%4d aligne un entier à droite sur 4 caractères",
    "%-10s aligne une chaîne à gauche sur 10 caractères",
    "%6.1f affiche un float sur 6 caractères avec 1 décimale",
]
id = "format-table-01"
kc_ids = ["KC-C05"]
key_concept = "Combiner %Nd (droite), %-Ns (gauche) et %.Nf (précision) pour des tableaux proprement alignés"
lang = "c"
prerequisites = ["strtol-parse-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

typedef struct {
    int pid;
    char name[16];
    float cpu;
    int mem_kb;
} ProcInfo;

int format_proc_row(char *buf, size_t size, const ProcInfo *proc) {
    return snprintf(buf, size, "%4d|%-10s|%6.1f|%8d",
                    proc->pid, proc->name, proc->cpu, proc->mem_kb);
}

int main(void) {
    {
        char buf[64];
        ProcInfo proc = {1, "init", 0.1f, 2048};
        format_proc_row(buf, sizeof(buf), &proc);
        printf("%d\n", (strstr(buf, "1") != NULL) ? 1 : 0);
        printf("%d\n", (strstr(buf, "init") != NULL) ? 1 : 0);
    }
    {
        char buf[64];
        ProcInfo proc = {42, "bash", 1.5f, 8192};
        format_proc_row(buf, sizeof(buf), &proc);
        printf("%d\n", (strstr(buf, "42") != NULL) ? 1 : 0);
        printf("%d\n", (strstr(buf, "bash") != NULL) ? 1 : 0);
    }
    {
        char buf[64];
        ProcInfo proc = {1337, "gcc", 95.2f, 524288};
        format_proc_row(buf, sizeof(buf), &proc);
        printf("%d\n", (strstr(buf, "1337") != NULL) ? 1 : 0);
        printf("%d\n", (strstr(buf, "gcc") != NULL) ? 1 : 0);
    }
    {
        char buf[64];
        ProcInfo proc = {1, "init", 0.1f, 2048};
        format_proc_row(buf, sizeof(buf), &proc);
        /* Should be exactly: "   1|init      |   0.1|    2048" */
        printf("%s\n", buf);
    }
    return 0;
}
'''
