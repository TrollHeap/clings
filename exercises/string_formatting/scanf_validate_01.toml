common_mistake = "Ne pas vérifier le retour de sscanf → utiliser des variables non initialisées si le parsing échoue"
description = """
NSY103 — sscanf parse une chaîne avec un format, comme scanf mais depuis un buffer. La valeur de retour indique combien de champs ont été lus — essentiel pour la validation.

Parsez différentes chaînes avec sscanf et vérifiez les résultats."""
difficulty = 2
exercise_type = "complete"
hints = [
    "sscanf retourne le nombre de champs parsés avec succès",
    "Si le format ne matche pas, sscanf retourne 0 (aucun champ lu)",
    'Le format "%d-%d-%d" parse des entiers séparés par des tirets',
]
id = "scanf-validate-01"
kc_ids = ["KC-C05"]
key_concept = "sscanf retourne le nombre de champs parsés — toujours vérifier la valeur de retour pour valider l'entrée"
lang = "c"
prerequisites = ["sprintf-build-01"]
solution_code = '''
#include <stdio.h>

int parse_line1(int *n, float *f, char *word) {
    char *line1 = "42 3.14 hello";
    return sscanf(line1, "%d %f %s", n, f, word);
}

int parse_line2(int *n) {
    char *line2 = "abc def";
    return sscanf(line2, "%d", n);
}

int parse_date(int *y, int *m, int *d) {
    char *line3 = "2024-01-15";
    return sscanf(line3, "%d-%d-%d", y, m, d);
}

int main(void) {
    {
        int n;
        float f;
        char word[32];
        int ret = parse_line1(&n, &f, word);
        printf("%d\n", (int)(ret));
        printf("%d\n", (int)(n));
    }
    {
        int n;
        float f;
        char word[32];
        parse_line1(&n, &f, word);
        printf("%s\n", word);
    }
    {
        int n;
        int ret = parse_line2(&n);
        printf("%d\n", (int)(ret));
    }
    {
        int y, m, d;
        int ret = parse_date(&y, &m, &d);
        printf("%d\n", (int)(ret));
        printf("%d\n", (int)(y));
        printf("%d\n", (int)(m));
        printf("%d\n", (int)(d));
    }
    return 0;
}
'''
