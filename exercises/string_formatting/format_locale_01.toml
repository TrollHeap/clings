common_mistake = "Off-by-one dans le calcul des virgules: (len-1)/3 et non len/3 (sinon virgule avant le premier chiffre)"
description = """
NSY103 — Le formatage numérique varie selon les locales : séparateurs de milliers, décimales (virgule vs point). En C, setlocale + printf avec le flag apostrophe (%'d) active les séparateurs. Cet exercice implémente un formatage personnalisé sans dépendre de la locale système.

Implémentez un formateur qui ajoute des séparateurs de milliers et des unités human-readable."""
difficulty = 5
exercise_type = "complete"
hints = [
    "Séparateur tous les 3 chiffres: (len-1)/3 donne le nombre de virgules",
    "Remettre count à 0 après chaque virgule insérée",
    "1 KB = 1024 B, 1 MB = 1024 KB, 1 GB = 1024 MB",
]
id = "format-locale-01"
kc_ids = ["KC-C05"]
key_concept = "Formatage personnalisé: séparateurs de milliers par parcours inverse, unités human-readable par division successive"
lang = "c"
prerequisites = ["format-custom-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

void format_thousands(char *buf, size_t size, long val) {
    char tmp[32];
    snprintf(tmp, sizeof(tmp), "%ld", val);
    int len = strlen(tmp);
    int commas = (len - 1) / 3;
    int total = len + commas;
    if ((size_t)total >= size) { snprintf(buf, size, "%ld", val); return; }
    buf[total] = '\0';
    int src = len - 1, dst = total - 1, count = 0;
    while (src >= 0) {
        buf[dst--] = tmp[src--];
        count++;
        if (count == 3 && src >= 0) {
            buf[dst--] = ',';
            count = 0;
        }
    }
}

void format_size(char *buf, size_t size, long bytes) {
    const char *units[] = {"B", "KB", "MB", "GB"};
    double val = bytes;
    int u = 0;
    while (val >= 1024.0 && u < 3) {
        val /= 1024.0;
        u++;
    }
    snprintf(buf, size, "%.1f %s", val, units[u]);
}

int main(void) {
    char buf[64];
    format_thousands(buf, sizeof(buf), 1234567);
    printf("%s\n", buf);
    format_thousands(buf, sizeof(buf), 42);
    printf("%s\n", buf);
    format_thousands(buf, sizeof(buf), 1000000000);
    printf("%s\n", buf);
    format_size(buf, sizeof(buf), 1536);
    printf("%s\n", buf);
    format_size(buf, sizeof(buf), 2621440);
    printf("%s\n", buf);
    format_size(buf, sizeof(buf), 1073741824);
    printf("%s\n", buf);
    return 0;
}
'''
