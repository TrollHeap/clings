common_mistake = "Confondre %-10d (gauche) et %10d (droite) — le signe '-' inverse l'alignement"
description = """
NSY103 — La largeur minimale dans printf contrôle l'espace occupé par une valeur. %10d aligne à droite sur 10 caractères, %-10d aligne à gauche. %0Nd remplit de zéros.

Affichez des valeurs avec différentes largeurs et alignements."""
difficulty = 1
exercise_type = "complete"
hints = [
    "%10d → aligné à droite sur 10 caractères (espaces à gauche)",
    "%-10d → aligné à gauche sur 10 caractères (espaces à droite)",
    "%06d → rempli de zéros sur 6 chiffres",
]
id = "printf-width-01"
kc_ids = ["KC-C05"]
key_concept = "%Nd largeur minimale, %-Nd alignement gauche, %0Nd zero-fill — contrôle total de la mise en forme"
lang = "c"
prerequisites = ["printf-formats-01"]
solution_code = '''
#include <string.h>
#include <stdio.h>

void format_width(char *buf, size_t sz) {
    int a = 42, b = 1234, c = 7;
    snprintf(buf, sz, "[%10d]\n[%-10d]\n[%10d]\n[%-10d]\n[%06d]\n[%06d]\n",
             a, a, b, c, a, b);
}

int main(void) {
    {
        char buf[128];
        format_width(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "[        42]")) ? 1 : 0);
    }
    {
        char buf[128];
        format_width(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "[42        ]")) ? 1 : 0);
    }
    {
        char buf[128];
        format_width(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "[000042]")) ? 1 : 0);
        printf("%d\n", (strstr(buf, "[001234]")) ? 1 : 0);
    }
    {
        char buf[128];
        format_width(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "[      1234]")) ? 1 : 0);
    }
    return 0;
}
'''
