common_mistake = "Confondre largeur (%10f) et précision (%.10f) — le point fait toute la différence"
description = """
NSY103 — La précision contrôle les décimales des flottants (%.Nf) et la longueur max des chaînes (%.Ns). Combinée avec la largeur, elle offre un contrôle fin du formatage.

Affichez des flottants avec différentes précisions et tronquez des chaînes."""
difficulty = 1
exercise_type = "complete"
hints = [
    "%.Nf affiche N décimales pour un flottant",
    "%.0f affiche sans décimale (arrondi à l'entier)",
    "%.Ns tronque la chaîne à N caractères maximum",
]
id = "printf-precision-01"
kc_ids = ["KC-C05"]
key_concept = "%.Nf contrôle les décimales, %.Ns tronque les chaînes — la précision est le chiffre après le point"
lang = "c"
prerequisites = ["printf-width-01"]
solution_code = '''
#include <string.h>
#include <stdio.h>

void format_precision(char *buf, size_t sz) {
    double pi = 3.14159265358979;
    double e = 2.71828182845905;
    char *msg = "Hello, clings!";
    snprintf(buf, sz, "pi(0) = %.0f\npi(2) = %.2f\npi(6) = %.6f\ne(4)  = %.4f\ntrunc5= %.5s\ntrunc10= %.10s\n",
             pi, pi, pi, e, msg, msg);
}

int main(void) {
    {
        char buf[128];
        format_precision(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "pi(0) = 3")) ? 1 : 0);
    }
    {
        char buf[128];
        format_precision(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "pi(2) = 3.14")) ? 1 : 0);
    }
    {
        char buf[128];
        format_precision(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "pi(6) = 3.141593")) ? 1 : 0);
    }
    {
        char buf[128];
        format_precision(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "trunc5= Hello")) ? 1 : 0);
        printf("%d\n", (strstr(buf, "trunc10= Hello, cli")) ? 1 : 0);
    }
    return 0;
}
'''
