common_mistake = "Utiliser %d pour un float (affiche garbage) ou %f pour un int"
description = """
NSY103 — printf utilise des spécificateurs pour formater différents types.
Maîtriser %d, %f, %s, %x, %p, %05d (largeur/zéro-fill).

Affichez chaque type avec son spécificateur approprié."""
difficulty = 1
exercise_type = "complete"
hints = [
    "%05d affiche avec 0-fill sur 5 chiffres",
    "%x affiche en hexadécimal minuscule, %X en majuscule",
    "%.2f affiche avec 2 décimales",
]
id = "printf-formats-01"
kc_ids = ["KC-C05"]
key_concept = "%d entier, %f flottant, %s chaîne, %x hexadécimal, largeur avec %05d"
lang = "c"
prerequisites = []
solution_code = '''
#include <string.h>
#include <stdio.h>

void format_values(char *buf, size_t sz) {
    int n = 42;
    float f = 3.14159f;
    char *s = "clings";
    unsigned int h = 0xDEAD;
    snprintf(buf, sz, "Int     : %d\nFloat   : %.2f\nString  : %s\nHex     : 0x%04X\nPadded  : %08d\nNeg pad : %-10d|\n",
             n, f, s, h, n, n);
}

int main(void) {
    {
        char buf[128];
        format_values(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "Int     : 42")) ? 1 : 0);
    }
    {
        char buf[128];
        format_values(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "Float   : 3.14")) ? 1 : 0);
    }
    {
        char buf[128];
        format_values(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "String  : clings")) ? 1 : 0);
    }
    {
        char buf[128];
        format_values(buf, sizeof(buf));
        printf("%d\n", (strstr(buf, "Hex     : 0xDEAD")) ? 1 : 0);
    }
    return 0;
}
'''
