common_mistake = "Vérifier la troncature : si snprintf >= size, le buffer est insuffisant"
description = """
NSY103 — snprintf(buf, size, fmt, ...) écrit au maximum size-1 octets et garantit le null-terminator. Préférer snprintf à sprintf pour éviter les dépassements de tampon.

Constituez un message d'erreur formaté : '[ERR-404] Not found: /proc/42/status (pid=42)'"""
difficulty = 2
exercise_type = "complete"
hints = [
    "char buf[128]; int written = snprintf(buf, sizeof(buf), fmt, ...);",
    "if (written >= (int)sizeof(buf)) { /* troncature */ }",
    "Construire progressivement : snprintf(buf + offset, remaining, ...)",
]
id = "snprintf-builder-01"
kc_ids = ["KC-C05"]
key_concept = "snprintf retourne le nombre de chars VOULUS (pas écrits) — si ≥ size, la chaîne a été tronquée"
lang = "c"
prerequisites = ["printf-formats-01"]
solution_code = '''
#include <string.h>
#include <stdio.h>

int build_error_msg(char *buf, size_t sz) {
    int code = 404;
    char *path = "/proc/42/status";
    int pid = 42;
    return snprintf(buf, sz, "[ERR-%d] Not found: %s (pid=%d)", code, path, pid);
}

int build_small_error(char *buf, size_t sz) {
    int pid = 42;
    return snprintf(buf, sz, "pid=%d cmd=%s", pid, "very_long_name_here");
}

int main(void) {
    {
        char buf[128];
        build_error_msg(buf, sizeof(buf));
        printf("%s\n", buf);
    }
    {
        char buf[128];
        int ret = build_error_msg(buf, sizeof(buf));
        printf("%d\n", (int)(ret));
    }
    {
        char buf[20];
        int ret = build_small_error(buf, sizeof(buf));
        printf("%d\n", (ret >= (int)sizeof(buf)) ? 1 : 0);
    }
    {
        char buf[20];
        build_small_error(buf, sizeof(buf));
        printf("%d\n", (int)(strlen(buf)));
    }
    return 0;
}
'''
