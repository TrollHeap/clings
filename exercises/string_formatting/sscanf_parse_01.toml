solution_code = '''
#include <stdio.h>

int parse_log(const char *log, int *year, int *month, int *day,
              int *hour, int *min, int *sec, int *pid, int *cpu) {
    return sscanf(log, "%d-%d-%d %d:%d:%d %*s pid=%d cpu=%d",
                  year, month, day, hour, min, sec, pid, cpu);
}

int main(void) {
    {
        char *log = "2026-03-02 14:30:05 [INFO] pid=42 cpu=87";
        int year, month, day, hour, min, sec, pid, cpu;
        int n = parse_log(log, &year, &month, &day, &hour, &min, &sec, &pid, &cpu);
        printf("%d\n", (int)(n));
        printf("%d\n", (int)(year));
        printf("%d\n", (int)(month));
    }
    {
        char *log = "2026-03-02 14:30:05 [INFO] pid=42 cpu=87";
        int year, month, day, hour, min, sec, pid, cpu;
        int n = parse_log(log, &year, &month, &day, &hour, &min, &sec, &pid, &cpu);
        printf("%d\n", (int)(n));
        printf("%d\n", (int)(day));
        printf("%d\n", (int)(hour));
    }
    {
        char *log = "2026-03-02 14:30:05 [INFO] pid=42 cpu=87";
        int year, month, day, hour, min, sec, pid, cpu;
        int n = parse_log(log, &year, &month, &day, &hour, &min, &sec, &pid, &cpu);
        printf("%d\n", (int)(min));
        printf("%d\n", (int)(sec));
        printf("%d\n", (int)(n));
    }
    {
        char *log = "2026-03-02 14:30:05 [INFO] pid=42 cpu=87";
        int year, month, day, hour, min, sec, pid, cpu;
        int n = parse_log(log, &year, &month, &day, &hour, &min, &sec, &pid, &cpu);
        printf("%d\n", (int)(pid));
        printf("%d\n", (int)(cpu));
        printf("%d\n", (int)(n));
    }
    return 0;
}
'''
