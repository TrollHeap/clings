solution_code = '''
#include <stdio.h>
#define N 4

void simulate_rr_gantt(int burst[], int n, int quantum, int response[]) {
    int remaining[N];
    int time = 0, done = 0;
    for (int i = 0; i < n; i++) {
        remaining[i] = burst[i];
        response[i] = -1;
    }
    while (done < n) {
        for (int i = 0; i < n; i++) {
            if (remaining[i] > 0) {
                int run = (remaining[i] < quantum) ? remaining[i] : quantum;
                time += run;
                remaining[i] -= run;
                if (remaining[i] == 0) {
                    response[i] = time;
                    done++;
                }
            }
        }
    }
}

int main(void) {
    int burst[]    = {12, 8, 4, 10};
    int remaining[N];
    int response[N];
    int quantum    = 2;
    int time       = 0;
    int done       = 0;

    for (int i = 0; i < N; i++) {
        remaining[i] = burst[i];
        response[i]  = -1;
    }

    while (done < N) {
        for (int i = 0; i < N; i++) {
            if (remaining[i] > 0) {
                int run = (remaining[i] < quantum) ? remaining[i] : quantum;
                time += run;
                remaining[i] -= run;
                if (remaining[i] == 0) {
                    response[i] = time;
                    done++;
                }
            }
        }
    }

    for (int i = 0; i < N; i++)
        printf("Response time P%d: %d\n", i + 1, response[i]);

    float avg = (float)(response[0] + response[1] + response[2] + response[3]) / N;
    printf("Average response time: %.2f\n", avg);
    return 0;
}
'''
