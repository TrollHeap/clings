common_mistake = "Oublier d'initialiser l'attribut du mutex avec pthread_mutexattr_init() avant d'appeler pthread_mutexattr_setprotocol()"
description = """
NSY103 — L'inversion de priorité se produit quand une tâche haute priorité est bloquée par une tâche basse priorité qui détient un mutex, et qu'une tâche moyenne priorité préempte la tâche basse priorité.

Le code ci-dessous crée 3 threads :
- HIGH (prio=99, SCHED_FIFO) : tente d'acquérir le mutex
- MEDIUM (prio=50) : s'exécute librement et retarde LOW
- LOW (prio=1) : détient le mutex pendant 100ms

Sans héritage de priorité, MEDIUM peut bloquer indirectement HIGH.
Corrigez en utilisant `pthread_mutexattr_setprotocol(attr, PTHREAD_PRIO_INHERIT)`."""
difficulty = 4
exercise_type = "fix_bug"
files = []
hints = [
    "Déclarez pthread_mutexattr_t attr; et appelez pthread_mutexattr_init(&attr) avant d'utiliser l'attribut",
    "Appelez pthread_mutexattr_setprotocol(&attr, PTHREAD_PRIO_INHERIT) pour activer l'héritage de priorité",
    "Passez &attr comme deuxième argument de pthread_mutex_init(&mtx, &attr), puis détruisez l'attr avec pthread_mutexattr_destroy(&attr)",
]
id = "sched-priority-inversion-01"
kc_ids = ["KC-C6"]
key_concept = "PTHREAD_PRIO_INHERIT booste temporairement la priorité de LOW au niveau de HIGH pour éviter que MEDIUM l'interrompe"
lang = "c"
prerequisites = ["sched-rt-01"]
solution_code = '''
#define _GNU_SOURCE
#include <stdio.h>
#include <pthread.h>
#include <unistd.h>

static pthread_mutex_t mtx;

static void *thread_low(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mtx);
    printf("LOW: acquired mutex\n");
    usleep(100000);
    printf("LOW: released mutex\n");
    pthread_mutex_unlock(&mtx);
    return NULL;
}

static void *thread_high(void *arg) {
    (void)arg;
    usleep(10000);
    printf("HIGH: waiting for mutex\n");
    pthread_mutex_lock(&mtx);
    printf("HIGH: acquired mutex\n");
    pthread_mutex_unlock(&mtx);
    printf("HIGH: done\n");
    return NULL;
}

static void *thread_medium(void *arg) {
    (void)arg;
    usleep(20000);
    for (volatile int i = 0; i < 50000000; i++);
    return NULL;
}

int main(void) {
    pthread_mutexattr_t attr;
    pthread_mutexattr_init(&attr);
    pthread_mutexattr_setprotocol(&attr, PTHREAD_PRIO_INHERIT);
    pthread_mutex_init(&mtx, &attr);
    pthread_mutexattr_destroy(&attr);

    pthread_t tl, th, tm;
    pthread_create(&tl, NULL, thread_low, NULL);
    pthread_create(&th, NULL, thread_high, NULL);
    pthread_create(&tm, NULL, thread_medium, NULL);

    pthread_join(tl, NULL);
    pthread_join(th, NULL);
    pthread_join(tm, NULL);

    pthread_mutex_destroy(&mtx);
    return 0;
}'''
