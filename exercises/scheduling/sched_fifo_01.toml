common_mistake = "Oublier que le premier processus a un temps d'attente de 0, pas burst[0]"
description = """
NSY103 — L'ordonnancement FCFS (First Come First Served) exécute les processus dans l'ordre d'arrivée. Avec 3 processus arrivant tous à t=0 (P1=6, P2=3, P3=9 unités de burst), calculez les temps d'attente et de complétion.

Affichez la moyenne des temps d'attente et de rotation (turnaround)."""
difficulty = 2
exercise_type = "complete"
hints = [
    "En FCFS, le premier processus attend 0 ; chaque processus attend la somme des burst précédents",
    "wait[i] = wait[i-1] + burst[i-1] — le temps d'attente s'accumule",
    "turnaround[i] = wait[i] + burst[i] — temps de rotation = attente + exécution",
]
id = "sched-fifo-01"
kc_ids = ["KC-C6"]
key_concept = "FCFS : wait[0]=0, wait[i]=wait[i-1]+burst[i-1] ; turnaround=wait+burst"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#define N 3

void compute_waiting_times_fcfs(int burst[], int n, int wait[]) {
    wait[0] = 0;
    for (int i = 1; i < n; i++)
        wait[i] = wait[i-1] + burst[i-1];
}

void compute_turnaround_times(int burst[], int wait[], int n, int turnaround[]) {
    for (int i = 0; i < n; i++)
        turnaround[i] = wait[i] + burst[i];
}

float compute_average(int array[], int n) {
    float total = 0;
    for (int i = 0; i < n; i++)
        total += array[i];
    return total / n;
}

int main(void) {
    {
        int burst[] = {5};
        int wait[1];
        compute_waiting_times_fcfs(burst, 1, wait);
        printf("%d\n", (int)(wait[0]));
    }
    {
        int burst[] = {3, 2};
        int wait[2];
        compute_waiting_times_fcfs(burst, 2, wait);
        printf("%d\n", (int)(wait[0]));
        printf("%d\n", (int)(wait[1]));
    }
    {
        int burst[] = {6, 3, 9};
        int wait[3];
        compute_waiting_times_fcfs(burst, 3, wait);
        printf("%d\n", (int)(wait[0]));
        printf("%d\n", (int)(wait[1]));
        printf("%d\n", (int)(wait[2]));
    }
    {
        int burst[] = {6, 3, 9};
        int wait[] = {0, 6, 9};
        int turnaround[3];
        compute_turnaround_times(burst, wait, 3, turnaround);
        printf("%d\n", (int)(turnaround[0]));
        printf("%d\n", (int)(turnaround[1]));
        printf("%d\n", (int)(turnaround[2]));
    }
    {
        int wait[] = {0, 6, 9};
        int avg_int = (int)(compute_average(wait, 3) * 100);
        printf("%d\n", (int)(avg_int));
    }
    {
        int turnaround[] = {6, 9, 18};
        int avg_int = (int)(compute_average(turnaround, 3) * 100);
        printf("%d\n", (int)(avg_int));
    }
    return 0;
}
'''
