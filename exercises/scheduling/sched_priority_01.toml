key_concept = "Trier des indices order[] par priorité permet d'accéder aux données dans l'ordre d'exécution sans les déplacer"
lang = "c"
prerequisites = ["sched-sjf-01"]
solution_code = '''
#include <stdio.h>
#define N 3

void simulate_priority(int burst[], int priority[], int n, int wait[], int turnaround[]) {
    int order[N];
    for (int i = 0; i < n; i++) order[i] = i;
    for (int i = 0; i < n - 1; i++)
        for (int j = 0; j < n - 1 - i; j++)
            if (priority[order[j]] > priority[order[j+1]]) {
                int tmp = order[j]; order[j] = order[j+1]; order[j+1] = tmp;
            }
    wait[order[0]] = 0;
    for (int i = 1; i < n; i++)
        wait[order[i]] = wait[order[i-1]] + burst[order[i-1]];
    for (int i = 0; i < n; i++)
        turnaround[i] = wait[i] + burst[i];
}

int main(void) {
    {
        int burst[] = {4};
        int priority[] = {1};
        int wait[1], ta[1];
        simulate_priority(burst, priority, 1, wait, ta);
        printf("%d\n", (int)(wait[0]));
        printf("%d\n", (int)(ta[0]));
    }
    {
        int burst[] = {2, 3};
        int priority[] = {2, 1};
        int wait[2], ta[2];
        simulate_priority(burst, priority, 2, wait, ta);
        /* P2 (prio=1) executes first */
        printf("%d\n", (int)(wait[0]));
        printf("%d\n", (int)(wait[1]));
    }
    {
        int burst[] = {3, 6, 3};
        int priority[] = {2, 1, 3};
        int wait[3], ta[3];
        simulate_priority(burst, priority, 3, wait, ta);
        /* Order: P2 (prio=1), P1 (prio=2), P3 (prio=3) */
        /* wait: P1=6, P2=0, P3=9 */
        printf("%d\n", (int)(wait[0]));
        printf("%d\n", (int)(wait[1]));
        printf("%d\n", (int)(wait[2]));
    }
    {
        int burst[] = {2, 2, 2};
        int priority[] = {1, 1, 1};
        int wait[3], ta[3];
        simulate_priority(burst, priority, 3, wait, ta);
        printf("%d\n", (int)(wait[0]));
        printf("%d\n", (int)(wait[1]));
        printf("%d\n", (int)(wait[2]));
    }
    return 0;
}
'''
