common_mistake = "Croire qu'on traite Q1 après le round-robin complet de Q0 — en MLFQ, Q0 est toujours servi en premier à chaque round (goto next_round repart de q=0)"
description = """
NSY103 — Le MLFQ (Multi-Level Feedback Queue) est l'algorithme utilisé dans la plupart des OS modernes (Linux CFS en est une variante). Règles : Q0 (prio haute, quantum=1), Q1 (prio moyenne, quantum=2), Q2 (FCFS). Un processus démarre en Q0 ; s'il utilise tout son quantum, il descend d'une file.

Simulez le MLFQ avec 3 processus (P1 burst=4, P2 burst=2, P3 burst=1). Affichez l'ordre d'exécution final."""
difficulty = 5
exercise_type = "complete"
hints = [
    "MLFQ : Q0 a la priorité la plus haute. On traite toujours Q0 avant Q1 avant Q2 — la boucle externe sur q garantit cela",
    "Si un processus utilise tout son quantum Q0 (quantum=1), il passe en Q1 (procs[i].queue++) ; s'il utilise Q1 entier (quantum=2), il passe en Q2",
    "P3 burst=1 : utilise 1 unité en Q0 et termine (burst<=0 donc done++, pas de dégradation)",
    "Le goto next_round relance la boucle externe depuis q=0 après chaque exécution — Q0 est toujours servi en priorité",
]
id = "sched-mlfq-01"
kc_ids = ["KC-C10"]
key_concept = "MLFQ : haute priorité = quantum court ; processus CPU-bound descend vers files de prio inférieure"
lang = "c"
prerequisites = ["sched-fifo-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define NPROC 3

typedef struct { int pid; int burst; int queue; } Proc;

void simulate_mlfq(Proc procs[], int nproc, int quantum[]) {
    int time = 0, done = 0;
    while (done < nproc) {
        for (int q = 0; q <= 2; q++) {
            for (int i = 0; i < nproc; i++) {
                if (procs[i].burst <= 0 || procs[i].queue != q) continue;
                int run = (q < 2 && quantum[q] < procs[i].burst) ? quantum[q] : procs[i].burst;
                time += run;
                procs[i].burst -= run;
                if (procs[i].burst <= 0) done++;
                else if (q < 2) procs[i].queue++;
                goto next_round;
            }
        }
        break;
        next_round:;
    }
}

int main(void) {
    {
        Proc procs[1] = {{1, 3, 0}};
        int quantum[] = {1, 2, 0};
        simulate_mlfq(procs, 1, quantum);
        /* Single process: 3 units in Q0 with quantum=1 */
        /* T0(1) -> Q1, T1(1) -> Q1, T2(1) -> Q2 */
        printf("%d\n", (int)(procs[0].burst));
    }
    {
        Proc procs[2] = {{1, 1, 0}, {2, 1, 0}};
        int quantum[] = {1, 2, 0};
        simulate_mlfq(procs, 2, quantum);
        /* Both short, terminate in Q0 */
        printf("%d\n", (int)(procs[0].burst));
        printf("%d\n", (int)(procs[1].burst));
    }
    {
        Proc procs[3] = {
        {1, 4, 0},
        {2, 2, 0},
        {3, 1, 0}
        };
        int quantum[] = {1, 2, 0};
        simulate_mlfq(procs, 3, quantum);
        /* P1: Q0(1) Q1(2) Q2(1) = 4 */
        /* P2: Q0(1) Q1(1) = 2 */
        /* P3: Q0(1) = 1 */
        printf("%d\n", (int)(procs[0].burst));
        printf("%d\n", (int)(procs[1].burst));
        printf("%d\n", (int)(procs[2].burst));
    }
    {
        Proc procs[1] = {{1, 5, 0}};
        int quantum[] = {2, 2, 0};
        simulate_mlfq(procs, 1, quantum);
        /* Q0: 2 units (demoted) */
        /* Q1: 2 units (demoted) */
        /* Q2: 1 unit (done) */
        printf("%d\n", (int)(procs[0].burst));
    }
    return 0;
}
'''
