subject = "scheduling"
title = "Ordonnancement temps réel : SCHED_FIFO et priorités"

[validation]
expected_output = 'REGEX:^(sched_setscheduler: Operation not permitted\nPolicy: SCHED_OTHER \(prio=50 ignored\)|Policy: SCHED_FIFO prio=50)$'
mode = "output"

[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "sched_setscheduler() est un appel système qui demande au noyau de changer la politique d'ordonnancement du processus (PID=0 = processus courant). Le noyau vérifie immédiatement si le processus possède la capacité CAP_SYS_NICE ou s'exécute en root avant d'appliquer SCHED_FIFO."
label = "Appel sched_setscheduler : param → syscall → kernel"
step_label = "Étape 1 — sched_setscheduler : appel système vers le noyau"

[[visualizer.steps.edges]]
label = "&param"
source = "param"
target = "syscall"

[[visualizer.steps.edges]]
label = "syscall"
source = "syscall"
target = "kernel"

[[visualizer.steps.nodes]]
id = "param"
label = """
sched_param
prio=50"""

[[visualizer.steps.nodes]]
id = "syscall"
label = """
sched_setscheduler(0,
SCHED_FIFO, &param)"""

[[visualizer.steps.nodes]]
id = "kernel"
label = """
kernel
CAP check"""

[[visualizer.steps]]
explanation = "Sans CAP_SYS_NICE, le noyau refuse le changement et retourne -1 avec errno=EPERM. Il faut toujours vérifier la valeur de retour de sched_setscheduler : un échec silencieux laisserait le processus croire qu'il est temps-réel alors qu'il reste en SCHED_OTHER, ce qui peut causer des violations de deadline."
label = "Vérification errno : EPERM si non-root"
step_label = "Étape 2 — errno EPERM : CAP_SYS_NICE ou root requis"

[[visualizer.steps.edges]]
label = "non-root"
source = "ret"
target = "eperm"

[[visualizer.steps.edges]]
label = "root/CAP_SYS_NICE"
source = "ret"
target = "ok"

[[visualizer.steps.nodes]]
id = "ret"
label = "ret == -1"

[[visualizer.steps.nodes]]
id = "eperm"
label = """
errno == EPERM
(Operation not permitted)"""

[[visualizer.steps.nodes]]
id = "ok"
label = """
ret == 0
(succès si root)"""

[[visualizer.steps]]
explanation = "sched_getscheduler() lit la politique d'ordonnancement effective du processus. Après un échec EPERM, le processus reste en SCHED_OTHER (politique par défaut, time-sharing). SCHED_FIFO prio=50 signifie que le processus ne serait jamais préempté par un thread de priorité inférieure, même s'il boucle indéfiniment."
label = "sched_getscheduler : politique effective retournée"
step_label = "Étape 3 — sched_getscheduler : lecture de la politique effective"

