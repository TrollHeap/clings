key_concept = "RR : chaque processus tourne avec run=min(remaining,QUANTUM) ; completion quand remaining==0"
lang = "c"
prerequisites = ["sched-fifo-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define N 3
#define QUANTUM 2

void simulate_rr(int burst[], int n, int quantum, int completion[]) {
    int remaining[N];
    memcpy(remaining, burst, sizeof(int) * n);
    int time = 0, done = 0;
    while (done < n) {
        for (int i = 0; i < n; i++) {
            if (remaining[i] > 0) {
                int run = (remaining[i] < quantum) ? remaining[i] : quantum;
                time += run;
                remaining[i] -= run;
                if (remaining[i] == 0) {
                    completion[i] = time;
                    done++;
                }
            }
        }
    }
}

int main(void) {
    {
        int burst[] = {4};
        int completion[1];
        simulate_rr(burst, 1, 2, completion);
        printf("%d\n", (int)(completion[0]));
    }
    {
        int burst[] = {2, 2};
        int completion[2];
        simulate_rr(burst, 2, 2, completion);
        printf("%d\n", (int)(completion[0]));
        printf("%d\n", (int)(completion[1]));
    }
    {
        int burst[] = {4, 2, 6};
        int completion[3];
        simulate_rr(burst, 3, 2, completion);
        /* t=0-2: P1(rest=2) t=2-4: P2 done t=4-6: P3(rest=4) */
        /* t=6-8: P1 done t=8-10: P3(rest=2) t=10-12: P3 done */
        printf("%d\n", (int)(completion[0]));
        printf("%d\n", (int)(completion[1]));
        printf("%d\n", (int)(completion[2]));
    }
    {
        int burst[] = {2, 1};
        int completion[2];
        simulate_rr(burst, 2, 1, completion);
        /* t=0-1: P1(rest=1) t=1-2: P2 done t=2-3: P1 done */
        printf("%d\n", (int)(completion[0]));
        printf("%d\n", (int)(completion[1]));
    }
    return 0;
}
'''
