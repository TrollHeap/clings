solution_code = '''
#include <stdio.h>
#define N 4

typedef struct {
    int arrival;
    int burst;
    int priority;
    int remaining;
    int completion;
} Proc;

void simulate_priority_arrival(Proc p[], int n) {
    int time = 0, done = 0;
    while (done < n) {
        int elected = -1;
        for (int i = 0; i < n; i++) {
            if (p[i].arrival <= time && p[i].remaining > 0) {
                if (elected == -1 || p[i].priority < p[elected].priority)
                    elected = i;
            }
        }
        if (elected == -1) {
            time++;
            continue;
        }
        p[elected].remaining--;
        time++;
        if (p[elected].remaining == 0) {
            p[elected].completion = time;
            done++;
        }
    }
}

int main(void) {
    Proc p[N] = {
        {4, 6, 2, 6, 0},
        {0, 2, 1, 2, 0},
        {0, 4, 4, 4, 0},
        {8, 6, 3, 6, 0},
    };
    int time = 0, done = 0;

    while (done < N) {
        int elected = -1;
        for (int i = 0; i < N; i++) {
            if (p[i].arrival <= time && p[i].remaining > 0) {
                if (elected == -1 || p[i].priority < p[elected].priority)
                    elected = i;
            }
        }
        if (elected == -1) { time++; continue; }
        p[elected].remaining--;
        time++;
        if (p[elected].remaining == 0) {
            p[elected].completion = time;
            done++;
        }
    }

    for (int i = 0; i < N; i++)
        printf("Response time P%d: %d\n", i + 1, p[i].completion - p[i].arrival);
    return 0;
}
'''
