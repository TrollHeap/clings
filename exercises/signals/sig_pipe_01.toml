common_mistake = "Ne pas gérer SIGPIPE dans un serveur — une déconnexion client tue le serveur entier"
description = """
NSY103 — SIGPIPE est envoyé quand un processus écrit dans un pipe dont le lecteur a fermé son extrémité. Par défaut, SIGPIPE termine le processus. En l'ignorant ou en installant un handler, write() retourne -1 avec errno=EPIPE.

Démontrez le mécanisme SIGPIPE en fermant le côté lecture d'un pipe avant d'écrire."""
difficulty = 3
exercise_type = "complete"
hints = [
    "SIGPIPE arrive AVANT que write() retourne — le handler est appelé en premier",
    "Avec un handler installé, write() retourne -1 et errno = EPIPE",
    "Sans handler, SIGPIPE termine le processus (comportement par défaut)",
]
id = "sig-pipe-01"
kc_ids = ["KC-C08"]
key_concept = "SIGPIPE signale l'écriture dans un pipe sans lecteur — le handler empêche la terminaison"
lang = "c"
prerequisites = ["sig-child-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>
#include <unistd.h>
#include <errno.h>

volatile sig_atomic_t pipe_broken = 0;

void sigpipe_handler(int sig) {
    (void)sig;
    pipe_broken = 1;
}

int main(void) {
    int fd[2];
    if (pipe(fd) == -1) { perror("pipe"); return 1; }

    /* Installer le handler SIGPIPE */
    struct sigaction sa;
    memset(&sa, 0, sizeof(sa));
    sa.sa_handler = sigpipe_handler;
    sigemptyset(&sa.sa_mask);
    sigaction(SIGPIPE, &sa, NULL);
    printf("SIGPIPE handler installed\n");

    /* Fermer le cote lecture */
    close(fd[0]);
    printf("Read end closed\n");

    /* Ecrire dans le pipe casse */
    ssize_t n = write(fd[1], "hello", 5);
    printf("write returned: %zd\n", n);

    if (pipe_broken)
        printf("SIGPIPE caught!\n");
    if (n == -1 && errno == EPIPE)
        printf("errno = EPIPE\n");

    close(fd[1]);
    printf("Done\n");
    return 0;
}'''
