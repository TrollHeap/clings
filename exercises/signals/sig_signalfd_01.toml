common_mistake = "Oublier de bloquer les signaux avec sigprocmask — ils sont alors délivrés normalement et le fd reste vide"
description = """
NSY103 — signalfd() crée un descripteur de fichier qui permet de lire les signaux de façon synchrone avec read(), au lieu d'utiliser des handlers asynchrones. C'est idéal pour les boucles événementielles (select/poll/epoll). Les signaux doivent être bloqués avec sigprocmask pour être redirigés vers le fd.

Utilisez signalfd pour lire des signaux de façon synchrone dans une boucle."""
difficulty = 5
exercise_type = "complete"
hints = [
    "Les signaux DOIVENT être bloqués avec sigprocmask avant signalfd — sinon ils sont délivrés normalement",
    "signalfd(-1, &mask, 0) crée un nouveau fd — un fd existant peut être passé pour le modifier",
    "read() sur signalfd remplit struct signalfd_siginfo — champ ssi_signo pour le numéro",
]
id = "sig-signalfd-01"
kc_ids = ["KC-C08"]
key_concept = "signalfd transforme les signaux en événements lisibles sur un fd — idéal pour les boucles événementielles"
lang = "c"
prerequisites = ["sig-siginfo-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>
#include <unistd.h>
#include <sys/signalfd.h>

int main(void) {
    /* Bloquer les signaux pour les rediriger vers signalfd */
    sigset_t mask;
    sigemptyset(&mask);
    sigaddset(&mask, SIGUSR1);
    sigaddset(&mask, SIGUSR2);
    sigprocmask(SIG_BLOCK, &mask, NULL);
    printf("SIGUSR1 and SIGUSR2 blocked\n");

    /* Creer le signalfd */
    int sfd = signalfd(-1, &mask, 0);
    if (sfd == -1) { perror("signalfd"); return 1; }
    printf("signalfd created: fd=%d\n", sfd);

    /* Envoyer des signaux a soi-meme */
    raise(SIGUSR1);
    raise(SIGUSR2);
    raise(SIGUSR1);
    printf("Sent 3 signals\n");

    /* Lire les signaux via read() */
    struct signalfd_siginfo info;
    int count = 0;

    for (int i = 0; i < 2; i++) {
        ssize_t n = read(sfd, &info, sizeof(info));
        if (n != sizeof(info)) { perror("read"); break; }
        printf("Read signal: %d", info.ssi_signo);
        if (info.ssi_signo == SIGUSR1) printf(" (SIGUSR1)");
        if (info.ssi_signo == SIGUSR2) printf(" (SIGUSR2)");
        printf("\n");
        count++;
    }

    printf("Signals read synchronously: %d\n", count);
    close(sfd);
    printf("signalfd closed\n");
    return 0;
}'''
