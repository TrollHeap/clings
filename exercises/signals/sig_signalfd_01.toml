    '''
#include <stdio.h>
#include <signal.h>
#include <string.h>
#include <unistd.h>
#include <sys/signalfd.h>

/* == EXEMPLE =======================================
 * signalfd basique pour un seul signal
 * ================================================= */
void example_signalfd(void) {
    sigset_t mask;
    sigemptyset(&mask);
    sigaddset(&mask, SIGUSR1);
    sigprocmask(SIG_BLOCK, &mask, NULL);
    int sfd = signalfd(-1, &mask, 0);
    raise(SIGUSR1);
    struct signalfd_siginfo si;
    read(sfd, &si, sizeof(si));
    printf("example: read signal %d\n", si.ssi_signo);
    close(sfd);
}

