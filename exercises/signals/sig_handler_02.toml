common_mistake = "Confondre SIG_BLOCK (ajouter au masque) et SIG_SETMASK (remplacer le masque entier)"
description = """
NSY103 — sigprocmask() contrôle le masque de signaux du processus. Un signal masqué (bloqué) est retenu par le noyau mais pas délivré tant qu'il reste bloqué. sigpending() vérifie les signaux en attente.

Masquez SIGUSR1, envoyez-le, vérifiez qu'il est en attente, puis démasquez-le."""
difficulty = 1
exercise_type = "complete"
hints = [
    "SIG_BLOCK ajoute au masque, SIG_UNBLOCK retire, SIG_SETMASK remplace",
    "sigpending(&set) remplit le set avec les signaux en attente",
    "Un signal bloqué puis envoyé est délivré dès le déblocage",
]
id = "sig-handler-02"
kc_ids = ["KC-C08"]
key_concept = "sigprocmask contrôle la délivrance — un signal bloqué est retenu, pas perdu"
lang = "c"
prerequisites = ["sig-handler-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>

volatile sig_atomic_t got_signal = 0;

void handler(int sig) {
    (void)sig;
    got_signal = 1;
}

int main(void) {
    signal(SIGUSR1, handler);

    /* Masquer SIGUSR1 */
    sigset_t block_set, old_set;
    sigemptyset(&block_set);
    sigaddset(&block_set, SIGUSR1);
    sigprocmask(SIG_BLOCK, &block_set, &old_set);
    printf("SIGUSR1 blocked\n");

    /* Envoyer le signal (il sera retenu) */
    raise(SIGUSR1);
    printf("After raise: got_signal=%d\n", got_signal);

    /* Verifier qu'il est en attente */
    sigset_t pending;
    sigpending(&pending);
    if (sigismember(&pending, SIGUSR1))
        printf("SIGUSR1 is pending\n");

    /* Demasquer */
    sigprocmask(SIG_UNBLOCK, &block_set, NULL);
    printf("After unblock: got_signal=%d\n", got_signal);

    return 0;
}'''
