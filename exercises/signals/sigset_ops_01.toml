common_mistake = "Oublier sigemptyset() avant de commencer — sigset_t non initialisée a un contenu aléatoire"
description = """
NSY103 — sigset_t est un ensemble de signaux (bitmask). Les fonctions sigemptyset, sigfullset, sigaddset, sigdelset, sigismember permettent de manipuler cet ensemble.

Constituez un masque incluant SIGINT, SIGTERM, SIGCHLD, puis testez sigismember.

⚠ Note : cet exercice simule le comportement des appels système dans un environnement WASM. Les vrais syscalls (fork, signal, shmget, etc.) ne sont pas disponibles dans le sandbox."""
difficulty = 2
exercise_type = "complete"
hints = [
    "sigemptyset(&set); // initialise à vide — TOUJOURS faire en premier",
    "sigaddset(&set, SIGINT); // ajoute SIGINT",
    "sigismember(&set, SIGTERM) retourne 1 si présent, 0 sinon",
]
id = "sigset-ops-01"
kc_ids = ["KC-C08"]
key_concept = "sigemptyset vide l'ensemble, sigaddset ajoute, sigismember teste — ce sont des opérations bit à bit"
lang = "c"
prerequisites = ["signal-constants-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>

/* Test mode: sigset operations are tested directly */

int main(void) {
    {
        sigset_t s;
        sigemptyset(&s);
        printf("%d\n", (int)(sigismember(&s, SIGINT)));
        printf("%d\n", (int)(sigismember(&s, SIGTERM)));
    }
    {
        sigset_t s;
        sigemptyset(&s);
        sigaddset(&s, SIGINT);
        printf("%d\n", (int)(sigismember(&s, SIGINT)));
        printf("%d\n", (int)(sigismember(&s, SIGTERM)));
    }
    {
        sigset_t s;
        sigemptyset(&s);
        sigaddset(&s, SIGINT);
        sigaddset(&s, SIGTERM);
        sigaddset(&s, SIGCHLD);
        printf("%d\n", (int)(sigismember(&s, SIGINT)));
        printf("%d\n", (int)(sigismember(&s, SIGTERM)));
        printf("%d\n", (int)(sigismember(&s, SIGCHLD)));
        printf("%d\n", (int)(sigismember(&s, SIGKILL)));
    }
    {
        sigset_t s;
        sigemptyset(&s);
        sigaddset(&s, SIGINT);
        sigaddset(&s, SIGTERM);
        sigdelset(&s, SIGTERM);
        printf("%d\n", (int)(sigismember(&s, SIGINT)));
        printf("%d\n", (int)(sigismember(&s, SIGTERM)));
    }
    {
        sigset_t s;
        sigemptyset(&s);
        printf("%d\n", (int)(sigismember(&s, SIGUSR1)));
        printf("%d\n", (int)(sigismember(&s, SIGKILL)));
    }
    return 0;
}
'''
