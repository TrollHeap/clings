common_mistake = "Mélanger sa_handler et sa_sigaction dans la même struct sigaction — comportement indéfini"
description = """
NSY103 — Avec SA_SIGINFO, le handler reçoit un siginfo_t riche en informations : si_signo (numéro), si_code (origine : SI_USER, SI_QUEUE, SI_KERNEL), si_pid (PID émetteur), si_uid (UID émetteur). Ces métadonnées permettent de distinguer les sources d'un signal.

Installez un handler SA_SIGINFO et analysez les métadonnées de chaque signal reçu."""
difficulty = 4
exercise_type = "complete"
hints = [
    "sa_sigaction (pas sa_handler) pour le prototype à 3 arguments",
    "si_code distingue l'origine : SI_USER (raise/kill), SI_QUEUE (sigqueue), SI_KERNEL",
    "si_pid contient le PID de l'émetteur — utile pour identifier la source",
]
id = "sig-siginfo-01"
kc_ids = ["KC-C08"]
key_concept = "siginfo_t fournit si_code, si_pid, si_uid — permet de distinguer les sources de signaux"
lang = "c"
prerequisites = ["sig-realtime-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>
#include <unistd.h>

typedef struct {
    int signo;
    int code;
    pid_t sender_pid;
} SigRecord;

volatile int rec_count = 0;
SigRecord records[4];

void info_handler(int sig, siginfo_t *info, void *ctx) {
    (void)ctx;
    if (rec_count < 4) {
        records[rec_count].signo = sig;
        records[rec_count].code = info->si_code;
        records[rec_count].sender_pid = info->si_pid;
        rec_count++;
    }
}

const char *code_name(int code) {
    switch (code) {
        case SI_USER:  return "SI_USER";
        case SI_QUEUE: return "SI_QUEUE";
        default:       return "OTHER";
    }
}

int main(void) {
    pid_t my_pid = getpid();
    printf("My PID: reported\n");

    struct sigaction sa;
    memset(&sa, 0, sizeof(sa));
    sa.sa_sigaction = info_handler;
    sa.sa_flags = SA_SIGINFO;
    sigemptyset(&sa.sa_mask);
    sigaction(SIGUSR1, &sa, NULL);
    sigaction(SIGUSR2, &sa, NULL);
    printf("SA_SIGINFO handlers installed\n");

    /* raise() -> SI_USER (kill/raise) */
    raise(SIGUSR1);

    /* sigqueue() -> SI_QUEUE */
    union sigval val = {.sival_int = 42};
    sigqueue(my_pid, SIGUSR1, val);

    /* Deuxieme signal */
    raise(SIGUSR2);

    printf("Signals received: %d\n", rec_count);
    for (int i = 0; i < rec_count; i++) {
        printf("  sig=%d code=%s sender=self\n",
               records[i].signo, code_name(records[i].code));
    }
    return 0;
}'''
