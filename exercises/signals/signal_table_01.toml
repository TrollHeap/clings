common_mistake = "Croire que signal(SIGKILL, handler) fonctionne — retourne SIG_ERR sur Linux"
description = """
NSY103 — Chaque signal a une disposition par défaut : DFL (défaut), IGN (ignoré), ou un handler custom. Un processus peut modifier la disposition avec signal()/sigaction(), sauf SIGKILL et SIGSTOP.

Implémentez une table de disposition avec struct, recherche par numéro/nom, et affichage.

⚠ Note : cet exercice simule le comportement des appels système dans un environnement WASM. Les vrais syscalls (fork, signal, shmget, etc.) ne sont pas disponibles dans le sandbox."""
difficulty = 3
exercise_type = "complete"
hints = [
    "struct SigEntry { int num; char name[12]; char disp[8]; int catchable; }",
    "catchable=0 pour SIGKILL(9) et SIGSTOP(19)",
    "Recherche linéaire dans tableau de N éléments",
]
id = "signal-table-01"
kc_ids = ["KC-C08"]
key_concept = "SIGKILL et SIGSTOP ne peuvent JAMAIS être modifiés par un processus"
lang = "c"
prerequisites = ["sigset-ops-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <signal.h>

typedef struct { int num; char name[12]; char disp[8]; int catchable; } SigEntry;

static const SigEntry table[] = {
    {SIGINT,  "SIGINT",  "TERM", 1},
    {SIGQUIT, "SIGQUIT", "CORE", 1},
    {SIGKILL, "SIGKILL", "TERM", 0},
    {SIGSTOP, "SIGSTOP", "STOP", 0},
    {SIGCHLD, "SIGCHLD", "IGN",  1},
};

#define TABLE_SIZE (sizeof(table)/sizeof(table[0]))

const SigEntry *find_by_num(int num) {
    for (size_t i = 0; i < TABLE_SIZE; i++)
        if (table[i].num == num) return &table[i];
    return NULL;
}

int main(void) {
    const SigEntry *e;
    e = find_by_num(SIGINT);
    printf("%s %s %d\n", e->name, e->disp, e->catchable);
    e = find_by_num(SIGKILL);
    printf("%s %s %d\n", e->name, e->disp, e->catchable);
    e = find_by_num(SIGCHLD);
    printf("%s %s %d\n", e->name, e->disp, e->catchable);
    e = find_by_num(9999);
    printf("%d\n", e == NULL ? 1 : 0);
    return 0;
}
'''
