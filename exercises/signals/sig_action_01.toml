common_mistake = "Oublier sigemptyset(&sa.sa_mask) — le masque contiendrait des valeurs aléatoires"
description = """
NSY103 — sigaction() est l'interface moderne et portable pour les handlers de signaux. Contrairement à signal(), elle garantit que le handler n'est pas réinitialisé après chaque délivrance (pas de race condition). Elle permet aussi de contrôler le masque pendant le handler et les flags.

Utilisez sigaction pour installer un handler qui compte les signaux recus."""
difficulty = 2
exercise_type = "complete"
hints = [
    "struct sigaction { sa_handler, sa_mask, sa_flags } — sa_mask bloque des signaux pendant le handler",
    "sigemptyset(&sa.sa_mask) pour ne bloquer aucun signal supplémentaire",
    "SIG_DFL restaure le comportement par défaut, SIG_IGN ignore le signal",
]
id = "sig-action-01"
kc_ids = ["KC-C08"]
key_concept = "sigaction est portable et fiable — le handler n'est jamais réinitialisé automatiquement"
lang = "c"
prerequisites = ["sig-handler-02"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>

volatile sig_atomic_t count = 0;

void handler(int sig) {
    (void)sig;
    count++;
}

int main(void) {
    struct sigaction sa;
    memset(&sa, 0, sizeof(sa));
    sa.sa_handler = handler;
    sigemptyset(&sa.sa_mask);
    sa.sa_flags = 0;

    if (sigaction(SIGUSR1, &sa, NULL) == -1) {
        perror("sigaction");
        return 1;
    }
    printf("sigaction installed\n");

    /* Envoyer 3 fois */
    for (int i = 0; i < 3; i++)
        raise(SIGUSR1);

    printf("Signals received: %d\n", count);

    /* Restaurer le comportement par defaut */
    sa.sa_handler = SIG_DFL;
    sigaction(SIGUSR1, &sa, NULL);
    printf("Default restored\n");

    return 0;
}'''
