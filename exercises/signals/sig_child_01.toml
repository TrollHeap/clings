common_mistake = "Un seul waitpid par handler — si 2 enfants meurent simultanément, un seul SIGCHLD est délivré"
description = """
NSY103 — Quand un processus enfant se termine, le noyau envoie SIGCHLD au parent. Installer un handler SIGCHLD permet de récolter les enfants sans bloquer sur waitpid(). Avec WNOHANG, waitpid retourne immédiatement si aucun enfant n'est terminé.

Créez 3 enfants et récoltez-les via un handler SIGCHLD."""
difficulty = 3
exercise_type = "complete"
hints = [
    "WNOHANG fait que waitpid retourne 0 immédiatement si aucun enfant n'est terminé",
    "La boucle while(waitpid(..., WNOHANG) > 0) récolte tous les enfants terminés",
    "SA_RESTART relance automatiquement les appels système interrompus par le signal",
]
id = "sig-child-01"
kc_ids = ["KC-C08"]
key_concept = "SIGCHLD + waitpid(WNOHANG) dans une boucle récolte tous les zombies sans bloquer"
lang = "c"
prerequisites = ["sig-alarm-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <signal.h>
#include <string.h>
#include <unistd.h>
#include <sys/wait.h>

volatile sig_atomic_t child_done = 0;

void sigchld_handler(int sig) {
    (void)sig;
    int status;
    pid_t pid;
    while ((pid = waitpid(-1, &status, WNOHANG)) > 0) {
        child_done++;
    }
}

int main(void) {
    struct sigaction sa;
    memset(&sa, 0, sizeof(sa));
    sa.sa_handler = sigchld_handler;
    sa.sa_flags = SA_RESTART;
    sigemptyset(&sa.sa_mask);
    sigaction(SIGCHLD, &sa, NULL);
    printf("SIGCHLD handler installed\n");

    /* Creer 3 enfants */
    for (int i = 0; i < 3; i++) {
        pid_t p = fork();
        if (p == 0) {
            _exit(i);
        }
    }

    /* Attendre que tous soient recoltes */
    while (child_done < 3) {
        usleep(1000);
    }

    printf("Children reaped: %d\n", child_done);
    printf("No zombies left\n");
    return 0;
}'''
