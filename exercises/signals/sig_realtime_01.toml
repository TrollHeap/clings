common_mistake = "Utiliser sa_handler au lieu de sa_sigaction avec SA_SIGINFO — comportement indéfini"
description = """
NSY103 — Les signaux temps réel (SIGRTMIN à SIGRTMAX) ont des garanties supplémentaires par rapport aux signaux standard : ils sont mis en file (pas de perte si plusieurs arrivent), délivrés dans l'ordre, et peuvent transporter une valeur entière via sigqueue().

Utilisez sigqueue() pour envoyer des signaux temps réel avec des données."""
difficulty = 4
exercise_type = "complete"
hints = [
    "SA_SIGINFO active le prototype void handler(int, siginfo_t*, void*) au lieu de void handler(int)",
    "sigqueue(pid, sig, val) envoie un signal avec une union sigval (sival_int ou sival_ptr)",
    "Les signaux RT sont mis en file — 3 envois = 3 délivrances garanties",
]
id = "sig-realtime-01"
kc_ids = ["KC-C08"]
key_concept = "Les signaux RT sont mis en file (pas de perte), ordonnés, et transportent des données via sigqueue"
lang = "c"
prerequisites = ["sig-pipe-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>
#include <unistd.h>

volatile sig_atomic_t rt_count = 0;
volatile int last_value = 0;

void rt_handler(int sig, siginfo_t *info, void *ctx) {
    (void)sig; (void)ctx;
    last_value = info->si_value.sival_int;
    rt_count++;
}

int main(void) {
    int signo = SIGRTMIN + 1;
    printf("Using RT signal: %d\n", signo);
    printf("SIGRTMIN=%d SIGRTMAX=%d range=%d\n",
           SIGRTMIN, SIGRTMAX, SIGRTMAX - SIGRTMIN);

    struct sigaction sa;
    memset(&sa, 0, sizeof(sa));
    sa.sa_sigaction = rt_handler;
    sa.sa_flags = SA_SIGINFO;
    sigemptyset(&sa.sa_mask);
    sigaction(signo, &sa, NULL);
    printf("RT handler installed\n");

    /* Envoyer 3 signaux avec des valeurs differentes */
    union sigval val;
    for (int i = 1; i <= 3; i++) {
        val.sival_int = i * 10;
        sigqueue(getpid(), signo, val);
    }

    printf("RT signals received: %d\n", rt_count);
    printf("Last value: %d\n", last_value);
    return 0;
}'''
