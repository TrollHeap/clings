common_mistake = "Croire que alarm() empile les timers — un seul alarm actif par processus"
description = """
NSY103 — alarm(seconds) programme la délivrance de SIGALRM après le délai spécifié. alarm(0) annule une alarme en cours. alarm() retourne le nombre de secondes restantes de l'alarme précédente.

Installez un handler SIGALRM et utilisez alarm() pour mesurer le mécanisme. Pour un exercice déterministe, on simule le comportement avec raise()."""
difficulty = 2
exercise_type = "complete"
hints = [
    "alarm(n) programme SIGALRM dans n secondes — alarm(0) annule",
    "alarm() retourne le nombre de secondes restantes de l'alarme précédente",
    "Un seul timer alarm actif par processus — chaque appel remplace le précédent",
]
id = "sig-alarm-01"
kc_ids = ["KC-C08"]
key_concept = "alarm() programme un SIGALRM unique — chaque appel remplace le précédent, alarm(0) annule"
lang = "c"
prerequisites = ["sig-action-01"]
solution_code = '''
#include <stdio.h>
#include <signal.h>
#include <string.h>

volatile sig_atomic_t alarm_count = 0;

void alarm_handler(int sig) {
    (void)sig;
    alarm_count++;
}

int main(void) {
    struct sigaction sa;
    memset(&sa, 0, sizeof(sa));
    sa.sa_handler = alarm_handler;
    sigemptyset(&sa.sa_mask);
    sigaction(SIGALRM, &sa, NULL);
    printf("SIGALRM handler installed\n");

    /* Programmer une alarme (retourne 0 = pas d'alarme précédente) */
    unsigned int prev = alarm(5);
    printf("Previous alarm: %u\n", prev);

    /* Reprogrammer (retourne le temps restant) */
    prev = alarm(3);
    printf("Remaining from previous: %u (approx)\n", prev > 0 ? 1 : 0);

    /* Annuler */
    prev = alarm(0);
    printf("Cancelled, remaining: %u (approx)\n", prev > 0 ? 1 : 0);

    /* Simuler la réception pour le test */
    raise(SIGALRM);
    raise(SIGALRM);
    printf("Alarms received: %d\n", alarm_count);

    return 0;
}'''
