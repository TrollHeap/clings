common_mistake = "Initialiser barrier a 1 au lieu de 0 -> le premier processus passe sans attendre"
description = """
NSY103 — Une barriere bloque N processus jusqu'a ce que tous soient arrives. Avec les semaphores : chaque processus incremente un compteur partage (protege par mutex), puis le dernier arrive fait N-1 sem_post() sur un semaphore 'barrier' pour reveiller les autres.

Implementez une barriere pour 3 enfants. Chaque enfant affiche 'arrived' sequentiellement, puis le dernier reveille tout le monde et tous affichent 'passed'."""
difficulty = 3
exercise_type = "complete"
hints = [
    "barrier init=0 : tous les processus bloquent dessus sauf le dernier",
    "Le dernier arrive (count==N) fait N-1 sem_post pour reveiller les autres",
    "Le mutex protege le compteur d'arrivees contre les race conditions",
]
id = "sem-barrier-01"
kc_ids = ["KC-C11"]
key_concept = "Barriere : compteur protege par mutex + semaphore init=0 ; le dernier fait N-1 post()"
lang = "c"
prerequisites = ["sem-prodcons-01"]
solution_code = '''
#include <stdio.h>
#include <semaphore.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/wait.h>
#include <unistd.h>

#define N 3

int main(void) {
    int *count = (int *)mmap(NULL, sizeof(int),
        PROT_READ | PROT_WRITE, MAP_SHARED | MAP_ANONYMOUS, -1, 0);
    *count = 0;

    sem_t *mutex   = sem_open("/kf_sem_bmtx", O_CREAT | O_EXCL, 0644, 1);
    sem_t *barrier = sem_open("/kf_sem_barr", O_CREAT | O_EXCL, 0644, 0);

    for (int i = 0; i < N; i++) {
        if (fork() == 0) {
            sem_wait(mutex);
            (*count)++;
            int local = *count;
            sem_post(mutex);

            if (local == N) {
                for (int j = 0; j < N - 1; j++)
                    sem_post(barrier);
            } else {
                sem_wait(barrier);
            }
            _exit(0);
        }
    }

    for (int i = 0; i < N; i++)
        waitpid(-1, NULL, 0);

    printf("All %d passed barrier\n", *count);

    sem_close(mutex); sem_close(barrier);
    sem_unlink("/kf_sem_bmtx");
    sem_unlink("/kf_sem_barr");
    munmap(count, sizeof(int));
    return 0;
}'''
