common_mistake = "Inverser empty et full dans le producteur -> deadlock immediat (wait sur full=0)"
description = """
NSY103 — Le pattern producteur-consommateur utilise 2 semaphores : 'empty' (slots libres, init=N) et 'full' (slots pleins, init=0). Le producteur fait wait(empty)/post(full), le consommateur fait wait(full)/post(empty). Un mutex protege l'acces au buffer.

Implementez un producteur (enfant) qui envoie 3 messages dans un buffer circulaire de 4 slots, et un consommateur (parent) qui les lit apres wait()."""
difficulty = 3
exercise_type = "complete"
hints = [
    "empty init=CAP (tous les slots libres), full init=0 (aucun message)",
    "Producteur: wait(empty) puis post(full) — consomme un slot vide, produit un plein",
    "Consommateur: wait(full) puis post(empty) — consomme un plein, libere un vide",
]
id = "sem-prodcons-01"
kc_ids = ["KC-C11"]
key_concept = "Producteur-consommateur : 2 semaphores (empty=N, full=0) + mutex pour buffer circulaire"
lang = "c"
prerequisites = ["sem-count-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <semaphore.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/wait.h>
#include <unistd.h>

#define CAP 4
#define MSG_LEN 32

typedef struct {
    char buf[CAP][MSG_LEN];
    int head;
    int tail;
} ProdCons;

int main(void) {
    ProdCons *pc = (ProdCons *)mmap(NULL, sizeof(ProdCons),
        PROT_READ | PROT_WRITE, MAP_SHARED | MAP_ANONYMOUS, -1, 0);
    memset(pc, 0, sizeof(ProdCons));

    sem_t *empty = sem_open("/kf_sem_empty", O_CREAT | O_EXCL, 0644, CAP);
    sem_t *full  = sem_open("/kf_sem_full",  O_CREAT | O_EXCL, 0644, 0);
    sem_t *mutex = sem_open("/kf_sem_pcmtx", O_CREAT | O_EXCL, 0644, 1);

    if (fork() == 0) {
        const char *msgs[] = {"alpha", "beta", "gamma"};
        for (int i = 0; i < 3; i++) {
            sem_wait(empty);
            sem_wait(mutex);
            strncpy(pc->buf[pc->tail], msgs[i], MSG_LEN - 1);
            pc->tail = (pc->tail + 1) % CAP;
            sem_post(mutex);
            sem_post(full);
        }
        _exit(0);
    }
    wait(NULL);

    for (int i = 0; i < 3; i++) {
        sem_wait(full);
        sem_wait(mutex);
        printf("Consumed: %s\n", pc->buf[pc->head]);
        pc->head = (pc->head + 1) % CAP;
        sem_post(mutex);
        sem_post(empty);
    }

    sem_close(empty); sem_close(full); sem_close(mutex);
    sem_unlink("/kf_sem_empty");
    sem_unlink("/kf_sem_full");
    sem_unlink("/kf_sem_pcmtx");
    munmap(pc, sizeof(ProdCons));
    return 0;
}'''
