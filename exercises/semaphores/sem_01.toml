#include <stdio.h>
#include <semaphore.h>

/* == EXEMPLE ===============================================
 * Semaphore : init a 5, deux waits, un post
 * sem_wait decremente, sem_post incremente.
 * ========================================================= */
void example_sem_ops(void) {
    sem_t demo;
    sem_init(&demo, 0, 5);
    int v;
    sem_getvalue(&demo, &v);
    printf("demo init: %d\n", v);
    sem_wait(&demo);
    sem_wait(&demo);
    sem_getvalue(&demo, &v);
    printf("after 2 waits: %d\n", v);
    sem_post(&demo);
    sem_getvalue(&demo, &v);
    printf("after 1 post: %d\n", v);
    sem_destroy(&demo);
}
