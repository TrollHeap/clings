common_mistake = "Tous les philosophes prennent left puis right -> deadlock circulaire"
description = """
NSY103 — 5 philosophes autour d'une table, chacun a besoin de 2 fourchettes pour manger. Si chacun prend la fourchette gauche d'abord -> deadlock. Solution : le philosophe 4 prend la droite d'abord (asymetrie). Chaque fourchette est un semaphore binaire.

Implementez 3 philosophes sequentiels. Chacun prend 2 fourchettes, mange, et relache. Le philosophe 2 prend dans l'ordre inverse pour eviter le deadlock."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Chaque fourchette est un semaphore binaire (init=1)",
    "Le dernier philosophe prend right puis left (ordre inverse) pour briser le cycle",
    "Sans asymetrie : tous prennent left -> deadlock (cycle d'attente)",
]
id = "sem-dining-01"
kc_ids = ["KC-C11"]
key_concept = "Philosophes : N fourchettes = N semaphores binaires ; asymetrie du dernier brise le deadlock"
lang = "c"
prerequisites = ["sem-readers-01"]
solution_code = '''
#include <stdio.h>
#include <semaphore.h>
#include <fcntl.h>
#include <sys/wait.h>
#include <unistd.h>

#define N 3

int main(void) {
    sem_t *forks[N];
    char name[32];
    for (int i = 0; i < N; i++) {
        snprintf(name, sizeof(name), "/kf_fork_%d", i);
        sem_unlink(name);
        forks[i] = sem_open(name, O_CREAT | O_EXCL, 0644, 1);
    }

    for (int i = 0; i < N; i++) {
        pid_t pid = fork();
        if (pid == 0) {
            int left = i;
            int right = (i + 1) % N;

            if (i == N - 1) {
                sem_wait(forks[right]);
                sem_wait(forks[left]);
            } else {
                sem_wait(forks[left]);
                sem_wait(forks[right]);
            }

            printf("Philosopher %d eats\n", i);

            sem_post(forks[left]);
            sem_post(forks[right]);
            fflush(stdout);
            _exit(0);
        }
        waitpid(pid, NULL, 0);
    }

    for (int i = 0; i < N; i++) {
        snprintf(name, sizeof(name), "/kf_fork_%d", i);
        sem_close(forks[i]);
        sem_unlink(name);
    }
    return 0;
}'''
