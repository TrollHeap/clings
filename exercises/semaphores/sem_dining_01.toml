/* == EXEMPLE =======================================
 * 2 philosophes, 2 fourchettes, asymetrie
 * ================================================= */
void example_dining(void) {
    sem_t *f[2];
    f[0] = sem_open("/kf_ex_f0", O_CREAT|O_EXCL, 0644, 1);
    f[1] = sem_open("/kf_ex_f1", O_CREAT|O_EXCL, 0644, 1);
    /* P0: left then right */
    sem_wait(f[0]); sem_wait(f[1]);
    printf("P0 eats\n");
    sem_post(f[0]); sem_post(f[1]);
    /* P1: right then left (reversed) */
    sem_wait(f[0]); sem_wait(f[1]);
    printf("P1 eats\n");
    sem_post(f[0]); sem_post(f[1]);
    sem_close(f[0]); sem_close(f[1]);
