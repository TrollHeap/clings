common_mistake = "Utiliser un pointeur après arena_reset — la mémoire n'est pas effacée mais sera écrasée par les prochaines allocations"
description = """
NSY103 — Un arena allocator alloue séquentiellement dans un grand buffer pré-alloué. Les allocations individuelles ne sont pas libérées — on libère tout d'un coup en réinitialisant le curseur. Très rapide (pas de free list) et utilisé dans les compilateurs et parsers.

Implémentez un arena avec alloc, reset et stats."""
difficulty = 4
exercise_type = "complete"
hints = [
    "arena_alloc avance simplement le curseur `offset` — pas de métadonnées, pas de free list",
    "Vérifier `offset + size > ARENA_SIZE` avant d'allouer",
    "arena_reset remet offset à 0 — tout l'espace est réutilisable d'un coup",
]
id = "malloc-arena-01"
kc_ids = ["KC-C02"]
key_concept = "L'arena alloue séquentiellement (bump pointer) et libère tout d'un coup — O(1) alloc et O(1) free total"
lang = "c"
prerequisites = ["malloc-leak-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

#define ARENA_SIZE 256

typedef struct {
    char buf[ARENA_SIZE];
    size_t offset;
    int alloc_count;
} Arena;

void arena_init(Arena *a) {
    a->offset = 0;
    a->alloc_count = 0;
}

void *arena_alloc(Arena *a, size_t size) {
    if (a->offset + size > ARENA_SIZE) return NULL;
    void *ptr = &a->buf[a->offset];
    a->offset += size;
    a->alloc_count++;
    return ptr;
}

void arena_reset(Arena *a) {
    a->offset = 0;
    a->alloc_count = 0;
}

int main(void) {
    Arena arena;
    arena_init(&arena);

    int *nums = arena_alloc(&arena, 4 * sizeof(int));
    char *msg = arena_alloc(&arena, 32);
    double *val = arena_alloc(&arena, sizeof(double));

    if (!nums || !msg || !val) return 1;

    for (int i = 0; i < 4; i++) nums[i] = (i + 1) * 10;
    strcpy(msg, "arena alloc");
    *val = 3.14;

    printf("nums:");
    for (int i = 0; i < 4; i++) printf(" %d", nums[i]);
    printf("\n");
    printf("msg: %s\n", msg);
    printf("val: %.2f\n", *val);
    printf("used: %zu/%d octets\n", arena.offset, ARENA_SIZE);
    printf("allocs: %d\n", arena.alloc_count);

    arena_reset(&arena);
    printf("Apres reset: used=%zu allocs=%d\n", arena.offset, arena.alloc_count);
    return 0;
}
'''
