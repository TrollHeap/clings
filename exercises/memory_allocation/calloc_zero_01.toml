common_mistake = "Utiliser malloc sans initialiser la mémoire — les valeurs sont indéterminées, pas forcément 0"
description = """
NSY103 — `calloc(n, size)` alloue `n * size` octets et les initialise à zéro, contrairement à `malloc` qui laisse la mémoire non initialisée. calloc vérifie aussi le débordement de `n * size`.

Comparez le comportement de malloc et calloc sur un tableau d'entiers."""
difficulty = 1
exercise_type = "complete"
hints = [
    "`calloc(n, sizeof(int))` équivaut à `malloc(n * sizeof(int))` + `memset(ptr, 0, n * sizeof(int))`",
    "calloc protège contre le débordement de `n * size` (retourne NULL si overflow)",
    "Toujours free() chaque allocation, dans l'ordre inverse si possible",
]
id = "calloc-zero-01"
kc_ids = ["KC-C02"]
key_concept = "calloc = malloc + memset(0) en une opération, avec protection contre le débordement de n*size"
lang = "c"
prerequisites = ["malloc-string-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

int *alloc_zeros(int n) {
    return (int *)calloc(n, sizeof(int));
}

int main(void) {
    {
        int *arr = alloc_zeros(5);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        free(arr);
    }
    {
        int *arr = alloc_zeros(4);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[1]));
        printf("%d\n", (int)(arr[3]));
        free(arr);
    }
    {
        int *arr = alloc_zeros(3);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        arr[0] = 10; arr[1] = 20; arr[2] = 30;
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[1]));
        printf("%d\n", (int)(arr[2]));
        free(arr);
    }
    {
        int *arr = alloc_zeros(100);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        printf("%d\n", (int)(arr[50]));
        printf("%d\n", (int)(arr[99]));
        free(arr);
    }
    return 0;
}
'''
