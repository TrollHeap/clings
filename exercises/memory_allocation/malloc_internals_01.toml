common_mistake = "Confondre h+1 (données) et h (header) — retourner h au lieu de h+1 fait écraser les métadonnées"
description = """
NSY103 — Un allocateur mémoire simplifié utilise `sbrk` pour demander de la mémoire au noyau et maintient une liste chaînée de blocs libres. Chaque bloc a un header (taille + libre/occupé + pointeur suivant). `my_malloc` cherche un bloc libre assez grand (first fit), `my_free` marque le bloc comme libre.

Implémentez un mini-malloc avec header, first-fit et free."""
difficulty = 5
exercise_type = "complete"
hints = [
    "`h + 1` saute le header pour donner l'adresse des données utilisateur (avance de sizeof(Header) octets)",
    "`(Header *)ptr - 1` recule d'un header pour retrouver les métadonnées depuis le pointeur utilisateur",
    "find_free parcourt la liste libre et retourne le premier bloc libre assez grand (first fit)",
]
id = "malloc-internals-01"
kc_ids = ["KC-C02"]
key_concept = "malloc = sbrk (demander au noyau) + header (métadonnées) + free list (recyclage) — le pattern fondamental de tout allocateur"
lang = "c"
prerequisites = ["malloc-aligned-01"]
solution_code = '''
#define _DEFAULT_SOURCE
#include <stdio.h>
#include <unistd.h>
#include <string.h>

typedef struct Header {
    size_t size;
    int is_free;
    struct Header *next;
} Header;

#define HEADER_SIZE sizeof(Header)
static Header *free_list = NULL;

Header *find_free(size_t size) {
    Header *curr = free_list;
    while (curr) {
        if (curr->is_free && curr->size >= size) return curr;
        curr = curr->next;
    }
    return NULL;
}

void *my_malloc(size_t size) {
    if (size == 0) return NULL;
    Header *h = find_free(size);
    if (h) { h->is_free = 0; return (void *)(h + 1); }
    void *block = sbrk(HEADER_SIZE + size);
    if (block == (void *)-1) return NULL;
    h = (Header *)block;
    h->size = size; h->is_free = 0; h->next = free_list; free_list = h;
    return (void *)(h + 1);
}

void my_free(void *ptr) {
    if (!ptr) return;
    Header *h = (Header *)ptr - 1;
    h->is_free = 1;
}

int main(void) {
    int *a = my_malloc(4*sizeof(int));
    int *b = my_malloc(2*sizeof(int));
    char *c = my_malloc(16);
    for (int i = 0; i < 4; i++) a[i] = (i+1)*10;
    b[0] = 100; b[1] = 200; strcpy(c, "sbrk alloc");
    printf("a:"); for (int i = 0; i < 4; i++) printf(" %d", a[i]); printf("\n");
    printf("b: %d %d\n", b[0], b[1]);
    printf("c: %s\n", c);
    printf("HEADER_SIZE = %zu\n", HEADER_SIZE);
    my_free(b);
    int *d = my_malloc(2*sizeof(int));
    d[0] = 999;
    printf("d (reuse b): %d\n", d[0]);
    return 0;
}'''
