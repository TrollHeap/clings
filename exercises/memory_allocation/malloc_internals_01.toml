/* == EXEMPLE ================================================
 * sbrk basique : demander de la memoire au noyau
 * sbrk(n) avance le break de n octets et retourne l'ancien break.
 * =========================================================== */
void example_demo(void) {
    void *start = sbrk(0);  /* position actuelle */
    int *p = sbrk(sizeof(int));
    *p = 42;
    void *end = sbrk(0);
    printf("Allocated %d at break\n", *p);
    printf("Break moved by %td octets\n", (char *)end - (char *)start);
