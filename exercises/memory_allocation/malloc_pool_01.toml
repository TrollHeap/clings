common_mistake = "Oublier que le Block* next est stocké DANS les données du bloc libre — quand le bloc est alloué, le next est écrasé par les données utilisateur"
description = """
NSY103 — Un pool allocator pré-alloue un bloc de mémoire et distribue des objets de taille fixe sans appeler malloc à chaque fois. Il utilise une liste libre (free list) de blocs disponibles. C'est plus rapide que malloc pour des allocations fréquentes de même taille.

Implémentez un pool de 8 blocs de 16 octets avec alloc/free/stats."""
difficulty = 3
exercise_type = "complete"
hints = [
    "L'initialisation chaîne tous les blocs dans la free list : chaque Block* pointe vers le suivant",
    "pool_alloc détache le premier bloc de la free list : `b = free_list; free_list = b->next`",
    "pool_free réattache le bloc en tête de free list : `b->next = free_list; free_list = b`",
]
id = "malloc-pool-01"
kc_ids = ["KC-C02"]
key_concept = "Le pool allocator évite malloc/free répétés en pré-allouant et recyclant des blocs de taille fixe via une free list"
lang = "c"
prerequisites = ["malloc-2d-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

#define POOL_SIZE 8
#define BLOCK_SIZE 16

typedef struct Block {
    struct Block *next;
} Block;

typedef struct {
    char memory[POOL_SIZE * BLOCK_SIZE];
    Block *free_list;
    int alloc_count;
} Pool;

void pool_init(Pool *p) {
    p->free_list = NULL;
    p->alloc_count = 0;
    for (int i = POOL_SIZE - 1; i >= 0; i--) {
        Block *b = (Block *)&p->memory[i * BLOCK_SIZE];
        b->next = p->free_list;
        p->free_list = b;
    }
}

void *pool_alloc(Pool *p) {
    if (!p->free_list) return NULL;
    Block *b = p->free_list;
    p->free_list = b->next;
    p->alloc_count++;
    return (void *)b;
}

void pool_free(Pool *p, void *ptr) {
    if (!ptr) return;
    Block *b = (Block *)ptr;
    b->next = p->free_list;
    p->free_list = b;
    p->alloc_count--;
}

int main(void) {
    Pool pool; pool_init(&pool);
    printf("Pool: %d blocs de %d octets\n", POOL_SIZE, BLOCK_SIZE);
    printf("alloc_count = %d\n", pool.alloc_count);
    void *a = pool_alloc(&pool);
    void *b = pool_alloc(&pool);
    void *c = pool_alloc(&pool);
    printf("Apres 3 allocs: count = %d\n", pool.alloc_count);
    memset(a, 'A', BLOCK_SIZE); memset(b, 'B', BLOCK_SIZE);
    pool_free(&pool, b);
    printf("Apres 1 free: count = %d\n", pool.alloc_count);
    void *d = pool_alloc(&pool);
    printf("Reuse apres free: %d\n", d == b);
    printf("Final count = %d\n", pool.alloc_count);
    (void)a; (void)c; (void)d;
    return 0;
}
'''
