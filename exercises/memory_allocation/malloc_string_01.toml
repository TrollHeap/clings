common_mistake = '''Oublier le +1 dans malloc(len+1) — buffer overflow qui écrase le '\0''''
description = '''
NSY103 — `strdup` alloue de la mémoire avec `malloc` et y copie une chaîne. Bien que POSIX, elle n'est pas dans le standard C. Implémenter sa propre version enseigne le calcul de taille (`strlen+1` pour le '\0') et le pattern allocation+copie.

Implémentez `my_strdup` et démontrez que la copie est indépendante de l'original.'''
difficulty = 1
exercise_type = "complete"
hints = [
    '''`malloc(len + 1)` : le +1 est pour le terminateur '\0'''',
    '''`strcpy(dst, src)` copie la chaîne y compris le '\0'''',
    "La copie est indépendante : modifier copie[0] ne change pas original",
]
id = "malloc-string-01"
kc_ids = ["KC-C02"]
key_concept = '''strdup = malloc(strlen+1) + strcpy — le +1 pour le terminateur '\0' est essentiel'''
lang = "c"
prerequisites = ["malloc-array-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

char *my_strdup(const char *src) {
    size_t len = strlen(src);
    char *dst = malloc(len + 1);
    if (!dst) return NULL;
    strcpy(dst, src);
    return dst;
}

int main(void) {
    const char *original = "Bonjour";
    char *copie = my_strdup(original);
    if (!copie) return 1;
    printf("original : %s\n", original);
    printf("copie    : %s\n", copie);
    copie[0] = 'b';
    printf("Apres modif copie :\n");
    printf("original : %s\n", original);
    printf("copie    : %s\n", copie);
    printf("len = %zu\n", strlen(copie));
    free(copie);
    return 0;
}
'''
