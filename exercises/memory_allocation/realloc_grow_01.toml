common_mistake = "Stocker le retour de realloc directement dans v->data — si realloc échoue (NULL), on perd le pointeur original (fuite mémoire)"
description = """
NSY103 — Agrandir un buffer de 1 élément à chaque fois coûte O(n²) à cause des copies répétées. La stratégie de croissance géométrique (doubler la capacité) amène le coût amorti à O(1) par insertion.

Implémentez un vecteur dynamique avec croissance ×2 et suivez les réallocations."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Croissance ×2 : `new_cap = cap == 0 ? 4 : cap * 2`",
    "Toujours stocker le retour de realloc dans un temporaire — si NULL, l'ancien pointeur reste valide",
    "Insérer à `v->data[v->len]` puis incrémenter len",
]
id = "realloc-grow-01"
kc_ids = ["KC-C02"]
key_concept = "La croissance géométrique (×2) donne un coût amorti O(1) par insertion au lieu de O(n) avec croissance linéaire"
lang = "c"
prerequisites = ["realloc-buf-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>

typedef struct {
    int *data;
    int len;
    int cap;
} Vec;

Vec vec_new(void) {
    return (Vec){NULL, 0, 0};
}

void vec_push(Vec *v, int val) {
    if (v->len == v->cap) {
        int new_cap = v->cap == 0 ? 4 : v->cap * 2;
        int *tmp = realloc(v->data, new_cap * sizeof(int));
        if (!tmp) return;
        v->data = tmp;
        v->cap = new_cap;
    }
    v->data[v->len] = val;
    v->len++;
}

void vec_free(Vec *v) {
    free(v->data);
    v->data = NULL;
    v->len = v->cap = 0;
}

int main(void) {
    Vec v = vec_new();
    for (int i = 0; i < 10; i++) vec_push(&v, i*i);
    printf("len=%d cap=%d\n", v.len, v.cap);
    printf("contenu:");
    for (int i = 0; i < v.len; i++) printf(" %d", v.data[i]);
    printf("\n");
    vec_free(&v);
    return 0;
}
'''
