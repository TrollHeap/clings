common_mistake = "Libérer le tableau de pointeurs avant les lignes — on perd les adresses des lignes (fuite mémoire)"
description = """
NSY103 — Une matrice 2D dynamique s'alloue en deux étapes : d'abord un tableau de pointeurs de lignes (`int **`), puis chaque ligne individuellement. La libération se fait dans l'ordre inverse : les lignes d'abord, puis le tableau de pointeurs.

Allouez une matrice 3×4, remplissez-la, affichez-la et libérez-la proprement."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Premier malloc : `rows * sizeof(int *)` pour le tableau de pointeurs de lignes",
    "Chaque ligne : `cols * sizeof(int)` pour les données",
    "En cas d'échec partiel, libérer les lignes déjà allouées avant de retourner NULL",
]
id = "malloc-2d-01"
kc_ids = ["KC-C02"]
key_concept = "Une matrice 2D dynamique nécessite rows+1 allocations et autant de free — les lignes ne sont pas contiguës"
lang = "c"
prerequisites = ["realloc-grow-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>

int **alloc_matrix(int rows, int cols) {
    int **mat = malloc(rows * sizeof(int *));
    if (!mat) return NULL;
    for (int i = 0; i < rows; i++) {
        mat[i] = malloc(cols * sizeof(int));
        if (!mat[i]) {
            for (int j = 0; j < i; j++) free(mat[j]);
            free(mat);
            return NULL;
        }
    }
    return mat;
}

void free_matrix(int **mat, int rows) {
    for (int i = 0; i < rows; i++)
        free(mat[i]);
    free(mat);
}

int main(void) {
    {
        int **mat = alloc_matrix(3, 4);
        printf("%d\n", (mat) != NULL ? 1 : 0);
        free_matrix(mat, 3);
    }
    {
        int **mat = alloc_matrix(3, 4);
        printf("%d\n", (mat) != NULL ? 1 : 0);
        printf("%d\n", (mat[0]) != NULL ? 1 : 0);
        printf("%d\n", (mat[1]) != NULL ? 1 : 0);
        printf("%d\n", (mat[2]) != NULL ? 1 : 0);
        free_matrix(mat, 3);
    }
    {
        int **mat = alloc_matrix(3, 4);
        printf("%d\n", (mat) != NULL ? 1 : 0);
        mat[0][0] = 5; mat[1][2] = 10; mat[2][3] = 15;
        printf("%d\n", (int)(mat[0][0]));
        printf("%d\n", (int)(mat[1][2]));
        printf("%d\n", (int)(mat[2][3]));
        free_matrix(mat, 3);
    }
    {
        int **mat = alloc_matrix(2, 3);
        printf("%d\n", (mat) != NULL ? 1 : 0);
        for (int i = 0; i < 2; i++)
        for (int j = 0; j < 3; j++)
        mat[i][j] = i * 3 + j;
        printf("%d\n", (int)(mat[0][0]));
        printf("%d\n", (int)(mat[0][2]));
        printf("%d\n", (int)(mat[1][0]));
        printf("%d\n", (int)(mat[1][2]));
        free_matrix(mat, 2);
    }
    return 0;
}
'''
