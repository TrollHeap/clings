common_mistake = "Oublier free() → fuite mémoire. Ne pas vérifier NULL → segfault potentiel."
description = """
NSY103 — `malloc(n * sizeof(type))` alloue `n` éléments sur le tas. Toujours vérifier le retour (NULL si échec) et libérer avec `free()` en fin d'usage.

Implémentez `alloc_array(n)` qui retourne un tableau dynamique de `n` entiers, et `free_array(arr)` qui le libère."""
difficulty = 1
exercise_type = "complete"
hints = [
    "`int *arr = malloc(5 * sizeof(int));` puis vérifier `if (!arr) { ... }`",
    "Remplir avec `arr[i] = i + 1;` dans une boucle",
    "Libérer avec `free(arr);` après usage",
]
id = "malloc-array-01"
kc_ids = ["KC-C02"]
key_concept = "malloc retourne void*, toujours vérifier NULL et appeler free()"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <stdlib.h>

int *alloc_array(int n) {
    if (n <= 0) return NULL;
    return malloc((size_t)n * sizeof(int));
}

void free_array(int *arr) {
    free(arr);
}

int main(void) {
    {
        int *arr = alloc_array(5);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        free_array(arr);
    }
    {
        int *arr = alloc_array(5);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        arr[0] = 1; arr[1] = 2; arr[2] = 3; arr[3] = 4; arr[4] = 5;
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[4]));
        free_array(arr);
    }
    {
        int *arr = alloc_array(-5);
        printf("%d\n", (arr) == NULL ? 1 : 0);
    }
    {
        int *arr = alloc_array(0);
        printf("%d\n", (arr) == NULL ? 1 : 0);
    }
    {
        int *arr = alloc_array(100);
        printf("%d\n", (arr) != NULL ? 1 : 0);
        arr[0] = 999; arr[99] = 777;
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[99]));
        free_array(arr);
    }
    return 0;
}
'''
