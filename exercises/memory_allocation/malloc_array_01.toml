[validation]
mode = "test"
test_code = """
void test_alloc_array_basic(void) {
    int *arr = alloc_array(5);
    TEST_ASSERT_NOT_NULL(arr);
    free_array(arr);
}

void test_alloc_array_write_read(void) {
    int *arr = alloc_array(5);
    TEST_ASSERT_NOT_NULL(arr);
    arr[0] = 1;
    arr[1] = 2;
    arr[2] = 3;
    arr[3] = 4;
    arr[4] = 5;
    TEST_ASSERT_EQUAL_INT(1, arr[0]);
    TEST_ASSERT_EQUAL_INT(5, arr[4]);
    free_array(arr);
}

void test_alloc_array_negative(void) {
    int *arr = alloc_array(-5);
    TEST_ASSERT_NULL(arr);
}

void test_alloc_array_zero(void) {
    int *arr = alloc_array(0);
    TEST_ASSERT_NULL(arr);
}

void test_alloc_array_large(void) {
    int *arr = alloc_array(100);
    TEST_ASSERT_NOT_NULL(arr);
    arr[0] = 999;
    arr[99] = 777;
    TEST_ASSERT_EQUAL_INT(999, arr[0]);
    TEST_ASSERT_EQUAL_INT(777, arr[99]);
    free_array(arr);
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_alloc_array_basic);
    RUN_TEST(test_alloc_array_write_read);
    RUN_TEST(test_alloc_array_negative);
    RUN_TEST(test_alloc_array_zero);
    RUN_TEST(test_alloc_array_large);
    return UNITY_END();
}
"""

