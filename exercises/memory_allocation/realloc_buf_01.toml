common_mistake = "Faire `ptr = realloc(ptr, ...)` directement : si realloc retourne NULL, l'ancien ptr est perdu (fuite mémoire)"
description = """
NSY103 — `realloc(ptr, new_size)` redimensionne une allocation existante. Si le bloc ne peut pas être étendu en place, il est déplacé en mémoire.

Implémentez un buffer qui commence à 2 entiers, puis est étendu à 6 avec realloc."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Pattern safe : `int *tmp = realloc(arr, new_size); if (tmp) arr = tmp;`",
    "realloc(NULL, size) est équivalent à malloc(size)",
    "Après realloc, les anciennes données sont préservées jusqu'à min(old_size, new_size)",
]
id = "realloc-buf-01"
kc_ids = ["KC-C02"]
key_concept = "realloc peut déplacer le bloc — toujours réassigner le pointeur via une variable temporaire"
lang = "c"
prerequisites = ["malloc-array-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>

int *buffer_resize(int *buf, size_t old_size, size_t new_size) {
    (void)old_size;
    int *tmp = realloc(buf, new_size * sizeof(int));
    if (!tmp) { free(buf); return NULL; }
    return tmp;
}

int main(void) {
    {
        int *buf = malloc(2 * sizeof(int));
        printf("%d\n", (buf) != NULL ? 1 : 0);
        buf[0] = 10; buf[1] = 20;
        int *tmp = buffer_resize(buf, 2, 4);
        printf("%d\n", (tmp) != NULL ? 1 : 0);
        printf("%d\n", (int)(tmp[0]));
        printf("%d\n", (int)(tmp[1]));
        free(tmp);
    }
    {
        int *buf = malloc(3 * sizeof(int));
        buf[0] = 5; buf[1] = 10; buf[2] = 15;
        int *tmp = buffer_resize(buf, 3, 6);
        printf("%d\n", (int)(tmp[0]));
        printf("%d\n", (int)(tmp[1]));
        printf("%d\n", (int)(tmp[2]));
        free(tmp);
    }
    {
        int *buf = malloc(1 * sizeof(int));
        buf[0] = 1;
        int *tmp = buffer_resize(buf, 1, 3);
        printf("%d\n", (tmp) != NULL ? 1 : 0);
        tmp[1] = 2; tmp[2] = 3;
        printf("%d\n", (int)(tmp[0]));
        printf("%d\n", (int)(tmp[1]));
        printf("%d\n", (int)(tmp[2]));
        free(tmp);
    }
    return 0;
}
'''
