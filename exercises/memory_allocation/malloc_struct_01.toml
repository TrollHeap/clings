common_mistake = "free(student) sans free(student->name) : fuite mémoire du champ chaîne"
description = """
NSY103 — Les structs avec des champs `char *` nécessitent deux allocations : une pour la struct elle-même, une pour chaque chaîne.

Implémentez `Student` avec `char *name` (alloué dynamiquement) et `int grade`. Créez `make_student()`, `free_student()` et `print_student()`."""
difficulty = 3
exercise_type = "complete"
hints = [
    '''Utilisez `malloc(strlen(name) + 1)` pour allouer la chaîne (+1 pour le '\0')''',
    "free_student doit : `free(s->name); free(s);` dans cet ordre",
    "Vérifier le retour de chaque malloc — si le 2ème échoue, libérer le 1er",
]
id = "malloc-struct-01"
kc_ids = ["KC-C02"]
key_concept = "Chaque malloc correspond à exactement un free — libérer les champs avant la struct"
lang = "c"
prerequisites = ["malloc-array-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

typedef struct { char *name; int grade; } Student;

Student *make_student(const char *name, int grade) {
    Student *s = malloc(sizeof(Student));
    if (!s) return NULL;
    s->name = malloc(strlen(name) + 1);
    if (!s->name) { free(s); return NULL; }
    strcpy(s->name, name);
    s->grade = grade;
    return s;
}

void free_student(Student *s) {
    if (s) { free(s->name); free(s); }
}

int main(void) {
    {
        Student *s = make_student("Alice", 18);
        printf("%d\n", (s) != NULL ? 1 : 0);
        free_student(s);
    }
    {
        Student *s = make_student("Bob", 15);
        printf("%d\n", (s) != NULL ? 1 : 0);
        printf("%s\n", s->name);
        free_student(s);
    }
    {
        Student *s = make_student("Charlie", 20);
        printf("%d\n", (s) != NULL ? 1 : 0);
        printf("%d\n", (int)(s->grade));
        free_student(s);
    }
    {
        Student *alice = make_student("Alice", 18);
        Student *bob = make_student("Bob", 15);
        printf("%d\n", (alice) != NULL ? 1 : 0);
        printf("%d\n", (bob) != NULL ? 1 : 0);
        printf("%s\n", alice->name);
        printf("%s\n", bob->name);
        free_student(alice);
        free_student(bob);
    }
    {
        Student *s = make_student("Test", 10);
        printf("%d\n", (s) != NULL ? 1 : 0);
        free_student(s);
    }
    return 0;
}'''
