common_mistake = "Confondre fragmentation interne (padding dans un bloc) et externe (trous entre blocs) — cet exercice traite la fragmentation externe"
description = """
NSY103 — La fragmentation mémoire survient quand la mémoire libre est divisée en petits morceaux non contigus. Même si la mémoire totale libre suffit, aucun bloc contigu n'est assez grand. C'est un problème critique pour les systèmes embarqués et les allocateurs de longue durée.

Simulez la fragmentation avec un mini-allocateur et mesurez le taux de fragmentation."""
difficulty = 5
exercise_type = "complete"
hints = [
    "La fragmentation = 1 - (plus_grand_bloc_libre / total_libre). 0% = pas de fragmentation, 100% = totalement fragmenté",
    "Après free(b1) et free(b3), il y a 80 octets libres mais en 3 morceaux de 32+32+16 — aucun ne fait 48",
    "Les solutions : compaction (coûteux), coalescence (fusionner les blocs adjacents), ou arena (pas de free individuel)",
]
id = "malloc-fragment-01"
kc_ids = ["KC-C02"]
key_concept = "La fragmentation rend la mémoire inutilisable même si le total libre suffit — problème critique des allocateurs généralistes"
lang = "c"
prerequisites = ["malloc-internals-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define HEAP_SIZE 128
#define MAX_BLOCKS 16

typedef struct {
    int offset;
    int size;
    int used;
} Block;

typedef struct {
    char heap[HEAP_SIZE];
    Block blocks[MAX_BLOCKS];
    int nblocks;
} Allocator;

void alloc_init(Allocator *a) {
    memset(a, 0, sizeof(Allocator));
}

int alloc_malloc(Allocator *a, int size) {
    int offset = 0;
    for (int i = 0; i < a->nblocks; i++) {
        if (a->blocks[i].used)
            offset = a->blocks[i].offset + a->blocks[i].size;
    }
    if (offset + size > HEAP_SIZE) return -1;
    if (a->nblocks >= MAX_BLOCKS) return -1;
    int idx = a->nblocks++;
    a->blocks[idx].offset = offset;
    a->blocks[idx].size = size;
    a->blocks[idx].used = 1;
    return idx;
}

void alloc_free(Allocator *a, int idx) {
    if (idx >= 0 && idx < a->nblocks)
        a->blocks[idx].used = 0;
}

void alloc_stats(const Allocator *a) {
    int used = 0, free_total = 0, largest_free = 0;
    int pos = 0;
    for (int i = 0; i < a->nblocks; i++) {
        if (a->blocks[i].used) {
            int gap = a->blocks[i].offset - pos;
            if (gap > 0) { free_total += gap; if (gap > largest_free) largest_free = gap; }
            used += a->blocks[i].size;
            pos = a->blocks[i].offset + a->blocks[i].size;
        }
    }
    int tail = HEAP_SIZE - pos;
    free_total += tail;
    if (tail > largest_free) largest_free = tail;
    printf("Used: %d/%d octets\n", used, HEAP_SIZE);
    printf("Free total: %d octets\n", free_total);
    printf("Largest free: %d octets\n", largest_free);
    printf("Fragmentation: %.0f%%\n",
           free_total > 0 ? (1.0 - (double)largest_free / free_total) * 100.0 : 0.0);
}

int main(void) {
    Allocator a; alloc_init(&a);
    int b0=alloc_malloc(&a,16), b1=alloc_malloc(&a,32);
    int b2=alloc_malloc(&a,16), b3=alloc_malloc(&a,32);
    int b4=alloc_malloc(&a,16);
    printf("=== Apres 5 allocs ===\n"); alloc_stats(&a);
    alloc_free(&a,b1); alloc_free(&a,b3);
    printf("\n=== Apres free b1 et b3 ===\n"); alloc_stats(&a);
    int big = alloc_malloc(&a, 48);
    printf("\nAlloc 48 octets: %s\n", big >= 0 ? "OK" : "ECHEC (fragmentation!)");
    (void)b0; (void)b2; (void)b4;
    return 0;
}
'''
