key_concept = "Nullifier le pointeur après `free` (`*ptr = NULL`) est l'idiome C pour prévenir le double-free et le use-after-free. Un second appel à `free(NULL)` est défini par la norme C comme sans effet."
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <stdlib.h>

int *safe_alloc(int n) {
    if (n <= 0) return NULL;
    return malloc((size_t)n * sizeof(int));
}

void safe_free(int **pptr) {
    if (!pptr || !*pptr) return;
    free(*pptr);
    *pptr = NULL;
}

int sum_and_free(int *arr, int n) {
    int sum = 0;
    for (int i = 0; i < n; i++)
        sum += arr[i];
    safe_free(&arr);
    return sum;
}

int main(void) {
    int *a = safe_alloc(3);
    if (!a) return 1;
    a[0] = 10; a[1] = 20; a[2] = 30;
    printf("%d\n", sum_and_free(a, 3));
    return 0;
}
'''
