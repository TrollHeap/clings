common_mistake = "Oublier d'appeler free(ptr) dans tracked_free — le compteur augmente mais la mémoire n'est pas libérée"
description = """
NSY103 — Une technique simple de détection de fuites mémoire consiste à wrapper malloc/free avec des compteurs. Si `allocs != frees` à la fin du programme, il y a une fuite.

Implémentez `tracked_malloc` et `tracked_free` avec un compteur global, puis démontrez la détection d'une fuite intentionnelle."""
difficulty = 3
exercise_type = "complete"
hints = [
    "`tracked_malloc` : incrémenter `g_allocs++` après un malloc réussi",
    "`tracked_free` : appeler `free(ptr)` ET incrémenter `g_frees++`",
    "La différence `g_allocs - g_frees` donne le nombre de blocs non libérés",
]
id = "malloc-leak-01"
kc_ids = ["KC-C02"]
key_concept = "Wrapper malloc/free avec compteurs pour détecter les fuites — allocs != frees = fuite mémoire"
lang = "c"
prerequisites = ["malloc-pool-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

static int g_allocs = 0;
static int g_frees = 0;
static size_t g_total_bytes = 0;

void *tracked_malloc(size_t size) {
    void *ptr = malloc(size);
    if (ptr) {
        g_allocs++;
        g_total_bytes += size;
    }
    return ptr;
}

void tracked_free(void *ptr) {
    if (ptr) {
        free(ptr);
        g_frees++;
    }
}

void leak_report(void) {
    printf("=== Leak Report ===\n");
    printf("allocs: %d\n", g_allocs);
    printf("frees:  %d\n", g_frees);
    printf("total bytes: %zu\n", g_total_bytes);
    if (g_allocs == g_frees)
        printf("Status: OK\n");
    else
        printf("LEAK: %d bloc(s) non libere(s)\n", g_allocs - g_frees);
}

int main(void) {
    char *a = tracked_malloc(32);
    char *b = tracked_malloc(64);
    char *c = tracked_malloc(16);
    strcpy(a, "hello"); strcpy(b, "world"); strcpy(c, "leak");
    tracked_free(a); tracked_free(b);
    leak_report();
    free(c);
    return 0;
}
'''
