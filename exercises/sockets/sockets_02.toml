common_mistake = "Utiliser printf('%d', addr.sin_port) sans ntohs() → affiche la valeur big-endian (ex: 20480 au lieu de 80)"
description = """
NSY103 — ntohs() est l'inverse de htons() pour lire sin_port en format lisible. INET_ADDRSTRLEN (16) est la taille suffisante pour une adresse IPv4 dotted-decimal. Une fonction print_addr réutilisable simplifie l'affichage.

Créez deux adresses serveur/client et affichez-les avec une fonction dédiée.

⚠ Note : cet exercice simule le comportement des appels système dans un environnement WASM. Les vrais syscalls (fork, signal, shmget, etc.) ne sont pas disponibles dans le sandbox."""
difficulty = 2
exercise_type = "complete"
hints = [
    '''INET_ADDRSTRLEN = 16 : assez pour 'xxx.xxx.xxx.xxx\0' (15 chars + null)''',
    "ntohs(sin_port) reconvertit le port big-endian en valeur lisible (hôte)",
    "inet_ntop(AF_INET, &sin_addr, buf, INET_ADDRSTRLEN) — toujours utiliser pour afficher une IP",
]
id = "sockets-02"
kc_ids = ["KC-C14"]
key_concept = '''ntohs() pour lire sin_port ; INET_ADDRSTRLEN = 16 = taille max 'xxx.xxx.xxx.xxx\0' ; inet_ntop toujours pour afficher sin_addr'''
lang = "c"
prerequisites = ["sockets-01"]
solution_code = '''
#include <stdio.h>
#include <arpa/inet.h>
#include <netinet/in.h>
#include <string.h>

void print_addr(const char *label, struct sockaddr_in *a) {
    char ip[INET_ADDRSTRLEN];
    inet_ntop(AF_INET, &a->sin_addr, ip, sizeof(ip));
    printf("%s: %s:%d\n", label, ip, ntohs(a->sin_port));
}

int main(void) {
    struct sockaddr_in server, client;
    memset(&server, 0, sizeof(server));
    memset(&client, 0, sizeof(client));
    server.sin_family = AF_INET;
    server.sin_port = htons(8080);
    inet_pton(AF_INET, "192.168.1.1", &server.sin_addr);
    client.sin_family = AF_INET;
    client.sin_port = htons(3000);
    inet_pton(AF_INET, "10.0.0.1", &client.sin_addr);
    print_addr("Server", &server);
    print_addr("Client", &client);
    return 0;
}'''
