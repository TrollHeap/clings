common_mistake = "Oublier memset(&msg, 0, sizeof(msg)) → champs sin_zero[] garbage dans sockaddr_in → comportement indéfini"
description = """
NSY103 — Un datagramme réseau contient typiquement l'adresse source, l'adresse destination et un payload. La simulation sans socket() permet de pratiquer la construction et l'affichage de structures réseau complètes.

Constituez un NetMsg avec src=10.0.0.1:1234, dst=10.0.0.2:5678, payload='ping', et affichez le tout.

⚠ Note : cet exercice simule le comportement des appels système dans un environnement WASM. Les vrais syscalls (fork, signal, shmget, etc.) ne sont pas disponibles dans le sandbox."""
difficulty = 3
exercise_type = "complete"
hints = [
    "htons(1234) convertit le port source en big-endian réseau",
    "msg.payload est un champ char[64] dans la struct NetMsg",
    "ntohs(msg.src.sin_port) reconvertit pour l'affichage : htons(1234) → ntohs → 1234",
]
id = "sockets-03"
kc_ids = ["KC-C14"]
key_concept = "struct imbriquée {sockaddr_in src, dst; char payload[]} = représentation d'un datagramme UDP ; sendto/recvfrom transporteraient cette struct en vrai"
lang = "c"
prerequisites = ["sockets-02"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <arpa/inet.h>
#include <netinet/in.h>

typedef struct {
    struct sockaddr_in src;
    struct sockaddr_in dst;
    char payload[64];
} NetMsg;

int main(void) {
    NetMsg msg;
    memset(&msg, 0, sizeof(msg));
    msg.src.sin_family = AF_INET;
    msg.src.sin_port = htons(1234);
    inet_pton(AF_INET, "10.0.0.1", &msg.src.sin_addr);
    msg.dst.sin_family = AF_INET;
    msg.dst.sin_port = htons(5678);
    inet_pton(AF_INET, "10.0.0.2", &msg.dst.sin_addr);
    strncpy(msg.payload, "ping", sizeof(msg.payload) - 1);
    char src_ip[INET_ADDRSTRLEN], dst_ip[INET_ADDRSTRLEN];
    inet_ntop(AF_INET, &msg.src.sin_addr, src_ip, sizeof(src_ip));
    inet_ntop(AF_INET, &msg.dst.sin_addr, dst_ip, sizeof(dst_ip));
    printf("From: %s:%d -> To: %s:%d\n",
           src_ip, ntohs(msg.src.sin_port),
           dst_ip, ntohs(msg.dst.sin_port));
    printf("Payload: %s\n", msg.payload);
    return 0;
}'''
