common_mistake = "Ne pas vérifier errno après recv=-1 → confondre erreur réelle et EAGAIN"
description = """
NSY103 — fcntl(fd, F_SETFL, O_NONBLOCK) met un socket en mode non-bloquant. Les appels recv/accept retournent immédiatement avec EAGAIN/EWOULDBLOCK si pas de données.

Créez un socket non-bloquant, tentez recv (qui échoue avec EAGAIN), puis envoyez des données et retentez."""
difficulty = 3
exercise_type = "complete"
hints = [
    "F_SETFL avec O_NONBLOCK met le socket en mode non-bloquant",
    "recv retourne -1 avec errno=EAGAIN quand il n'y a pas de données",
    "socketpair crée deux sockets connectés — pratique pour les tests",
]
id = "sock-nonblock-01"
kc_ids = ["KC-C14"]
key_concept = "O_NONBLOCK fait que recv/accept retournent EAGAIN au lieu de bloquer — essentiel pour le multiplexage"
lang = "c"
prerequisites = ["sock-multi-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <errno.h>
#include <fcntl.h>
#include <sys/socket.h>
#include <netinet/in.h>
#include <arpa/inet.h>
#include <sys/wait.h>

int main(void) {
    int sv[2];
    socketpair(AF_UNIX, SOCK_STREAM, 0, sv);
    int flags = fcntl(sv[0], F_GETFL, 0);
    fcntl(sv[0], F_SETFL, flags | O_NONBLOCK);
    char buf[64];
    int n = recv(sv[0], buf, sizeof(buf), 0);
    if (n < 0 && (errno == EAGAIN || errno == EWOULDBLOCK))
        printf("recv: EAGAIN (no data)\n");
    send(sv[1], "DATA", 4, 0);
    n = recv(sv[0], buf, sizeof(buf) - 1, 0);
    buf[n] = '\0';
    printf("recv: %s\n", buf);
    close(sv[0]);
    close(sv[1]);
    return 0;
}'''
