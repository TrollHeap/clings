common_mistake = "Oublier de fermer epfd → fuite de fd kernel (epoll instance)"
description = """
NSY103 — epoll est l'interface Linux de multiplexage scalable. epoll_create1 crée l'instance, epoll_ctl ajoute/modifie des fd, epoll_wait bloque jusqu'à un événement.

Utilisez epoll pour surveiller deux socketpairs et lire les messages disponibles."""
difficulty = 4
exercise_type = "complete"
hints = [
    "epoll_create1(0) crée une instance epoll (le flag 0 = pas de CLOEXEC)",
    "epoll_ctl(epfd, EPOLL_CTL_ADD, fd, &ev) ajoute un fd à surveiller",
    "EPOLLIN signifie 'données disponibles en lecture'",
]
id = "sock-epoll-01"
kc_ids = ["KC-C14"]
key_concept = "epoll est O(1) vs select O(n) — epoll_create1, epoll_ctl ADD, epoll_wait est le trio fondamental"
lang = "c"
prerequisites = ["sock-select-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <sys/socket.h>
#include <sys/epoll.h>

int main(void) {
    int sv1[2], sv2[2];
    socketpair(AF_UNIX, SOCK_STREAM, 0, sv1);
    socketpair(AF_UNIX, SOCK_STREAM, 0, sv2);
    send(sv1[1], "EP1", 3, 0);
    send(sv2[1], "EP2", 3, 0);
    int epfd = epoll_create1(0);
    struct epoll_event ev;
    ev.events = EPOLLIN;
    ev.data.fd = sv1[0];
    epoll_ctl(epfd, EPOLL_CTL_ADD, sv1[0], &ev);
    ev.data.fd = sv2[0];
    epoll_ctl(epfd, EPOLL_CTL_ADD, sv2[0], &ev);
    struct epoll_event events[2];
    int n = epoll_wait(epfd, events, 2, 1000);
    printf("Events: %d\n", n);
    for (int i = 0; i < n; i++) {
        char buf[64];
        int r = recv(events[i].data.fd, buf, sizeof(buf) - 1, 0);
        buf[r] = '\0';
        printf("fd ready: %s\n", buf);
    }
    close(sv1[0]); close(sv1[1]);
    close(sv2[0]); close(sv2[1]);
    close(epfd);
    return 0;
}'''
