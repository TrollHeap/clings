common_mistake = "Oublier unlink() → le fichier socket reste et bind() échoue au prochain lancement"
description = """
NSY103 — Les sockets Unix (AF_UNIX) communiquent via le système de fichiers, sans passer par la pile réseau. struct sockaddr_un contient le chemin du socket. Plus rapide que TCP loopback.

Créez un socket AF_UNIX, forkez un serveur et un client qui échangent un message."""
difficulty = 5
exercise_type = "complete"
hints = [
    "AF_UNIX (ou AF_LOCAL) pour les sockets domaine Unix",
    "struct sockaddr_un utilise sun_family et sun_path (chemin fichier)",
    "unlink(path) supprime le fichier socket après usage",
]
id = "sock-unix-01"
kc_ids = ["KC-C14"]
key_concept = "AF_UNIX utilise le filesystem au lieu de la pile réseau — plus rapide pour l'IPC locale"
lang = "c"
prerequisites = ["sock-epoll-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <sys/socket.h>
#include <sys/un.h>
#include <sys/wait.h>

int main(void) {
    char path[] = "/tmp/kf_unix_XXXXXX";
    snprintf(path, sizeof(path), "/tmp/kf_unix_%d", getpid());
    int srv = socket(AF_UNIX, SOCK_STREAM, 0);
    struct sockaddr_un addr;
    memset(&addr, 0, sizeof(addr));
    addr.sun_family = AF_UNIX;
    strncpy(addr.sun_path, path, sizeof(addr.sun_path) - 1);
    bind(srv, (struct sockaddr *)&addr, sizeof(addr));
    listen(srv, 1);
    pid_t pid = fork();
    if (pid == 0) {
        int fd = socket(AF_UNIX, SOCK_STREAM, 0);
        connect(fd, (struct sockaddr *)&addr, sizeof(addr));
        send(fd, "UNIX_MSG", 8, 0);
        close(fd);
        return 0;
    }
    int cli = accept(srv, NULL, NULL);
    char buf[64];
    int n = recv(cli, buf, sizeof(buf) - 1, 0);
    buf[n] = '\0';
    printf("Received: %s\n", buf);
    printf("Domain: AF_UNIX\n");
    close(cli);
    close(srv);
    unlink(path);
    wait(NULL);
    return 0;
}'''
