common_mistake = "Oublier listen() entre bind() et accept() → accept échoue"
description = """
NSY103 — Un serveur TCP suit le cycle : socket → bind → listen → accept → recv/send → close. listen() met le socket en mode écoute, accept() bloque jusqu'à une connexion entrante.

Implémentez un serveur echo qui traite un seul client. Le client est forké dans le même process."""
difficulty = 2
exercise_type = "complete"
hints = [
    "bind(srv, addr, addrlen) attache le socket à une adresse locale",
    "listen(srv, backlog) met le socket en mode écoute avec backlog=5 connexions en attente",
    "accept() retourne un nouveau fd pour la connexion acceptée",
]
id = "sock-server-01"
kc_ids = ["KC-C14"]
key_concept = "bind() attache à une adresse, listen() active l'écoute, accept() bloque jusqu'à une connexion"
lang = "c"
prerequisites = ["sock-connect-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <sys/socket.h>
#include <netinet/in.h>
#include <arpa/inet.h>
#include <sys/wait.h>

int main(void) {
    int srv = socket(AF_INET, SOCK_STREAM, 0);
    int opt = 1;
    setsockopt(srv, SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt));
    struct sockaddr_in addr = {0};
    addr.sin_family = AF_INET;
    addr.sin_port = htons(0);
    addr.sin_addr.s_addr = htonl(INADDR_LOOPBACK);
    bind(srv, (struct sockaddr *)&addr, sizeof(addr));
    socklen_t len = sizeof(addr);
    getsockname(srv, (struct sockaddr *)&addr, &len);
    int port = ntohs(addr.sin_port);
    listen(srv, 5);
    pid_t pid = fork();
    if (pid == 0) {
        int fd = socket(AF_INET, SOCK_STREAM, 0);
        struct sockaddr_in sa = {0};
        sa.sin_family = AF_INET;
        sa.sin_port = htons(port);
        inet_pton(AF_INET, "127.0.0.1", &sa.sin_addr);
        connect(fd, (struct sockaddr *)&sa, sizeof(sa));
        send(fd, "PING", 4, 0);
        char buf[64];
        int n = recv(fd, buf, sizeof(buf) - 1, 0);
        buf[n] = '\0';
        printf("Client received: %s\n", buf);
        close(fd);
        return 0;
    }
    int cli = accept(srv, NULL, NULL);
    char buf[64];
    int n = recv(cli, buf, sizeof(buf) - 1, 0);
    buf[n] = '\0';
    printf("Server received: %s\n", buf);
    send(cli, buf, n, 0);
    close(cli);
    close(srv);
    wait(NULL);
    return 0;
}'''
