common_mistake = "Confondre SOCK_STREAM (TCP) et SOCK_DGRAM (UDP)"
description = """
NSY103 — socket() crée un point de communication. Les paramètres (AF_INET, SOCK_STREAM, 0) créent un socket TCP IPv4. Le descripteur retourné est un entier positif.

Créez un socket TCP et un socket UDP, affichez leurs descripteurs, puis fermez-les."""
difficulty = 1
exercise_type = "complete"
hints = [
    "SOCK_STREAM = TCP (connexion fiable, ordonnée)",
    "SOCK_DGRAM = UDP (datagrammes, sans connexion)",
    "socket() retourne -1 en cas d'erreur, sinon un fd >= 0",
]
id = "sock-create-01"
kc_ids = ["KC-C14"]
key_concept = "socket(AF_INET, SOCK_STREAM, 0) crée un TCP; SOCK_DGRAM crée un UDP — toujours close() après usage"
lang = "c"
prerequisites = ["sockets-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <sys/socket.h>
#include <netinet/in.h>

int main(void) {
    int tcp_fd = socket(AF_INET, SOCK_STREAM, 0);
    int udp_fd = socket(AF_INET, SOCK_DGRAM, 0);
    printf("TCP socket: fd=%d\n", tcp_fd >= 0 ? 1 : 0);
    printf("UDP socket: fd=%d\n", udp_fd >= 0 ? 1 : 0);
    printf("TCP type: SOCK_STREAM\n");
    printf("UDP type: SOCK_DGRAM\n");
    close(tcp_fd);
    close(udp_fd);
    printf("Sockets closed.\n");
    return 0;
}'''
starter_code = '''
