 * ========================================================= */

int main(void) {
    fd_set readfds;
    FD_ZERO(&readfds);
    printf("FD set initialized\n");
    int test_fd = 5;
    FD_SET(test_fd, &readfds);
    printf("FD %d added to set\n", test_fd);
    printf("FD %d in set: %d\n", test_fd, FD_ISSET(test_fd, &readfds));
    return 0;
}
