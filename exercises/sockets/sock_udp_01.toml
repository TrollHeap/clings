common_mistake = "Utiliser send/recv au lieu de sendto/recvfrom pour UDP sans connect()"
description = """
NSY103 — UDP est sans connexion : sendto() envoie un datagramme à une adresse, recvfrom() reçoit et retourne l'adresse de l'expéditeur. Pas de connect/accept nécessaire.

Envoyez un message UDP depuis un enfant forké et recevez-le dans le parent."""
difficulty = 2
exercise_type = "complete"
hints = [
    "sendto(fd, msg, len, 0, dest_addr, addrlen) envoie un datagramme UDP",
    "recvfrom(fd, buf, len, 0, from_addr, &addrlen) reçoit et stocke l'adresse source",
    "Pas besoin de connect/listen/accept pour UDP",
]
id = "sock-udp-01"
kc_ids = ["KC-C14"]
key_concept = "UDP est sans connexion : sendto envoie un datagramme avec adresse, recvfrom reçoit avec adresse source"
lang = "c"
prerequisites = ["sock-server-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <sys/socket.h>
#include <netinet/in.h>
#include <arpa/inet.h>
#include <sys/wait.h>

int main(void) {
    int srv = socket(AF_INET, SOCK_DGRAM, 0);
    struct sockaddr_in addr = {0};
    addr.sin_family = AF_INET;
    addr.sin_port = htons(0);
    addr.sin_addr.s_addr = htonl(INADDR_LOOPBACK);
    bind(srv, (struct sockaddr *)&addr, sizeof(addr));
    socklen_t len = sizeof(addr);
    getsockname(srv, (struct sockaddr *)&addr, &len);
    int port = ntohs(addr.sin_port);
    pid_t pid = fork();
    if (pid == 0) {
        int fd = socket(AF_INET, SOCK_DGRAM, 0);
        struct sockaddr_in dest = {0};
        dest.sin_family = AF_INET;
        dest.sin_port = htons(port);
        inet_pton(AF_INET, "127.0.0.1", &dest.sin_addr);
        char *msg = "UDP_HELLO";
        sendto(fd, msg, strlen(msg), 0, (struct sockaddr *)&dest, sizeof(dest));
        close(fd);
        return 0;
    }
    char buf[64];
    struct sockaddr_in from;
    socklen_t flen = sizeof(from);
    int n = recvfrom(srv, buf, sizeof(buf) - 1, 0, (struct sockaddr *)&from, &flen);
    buf[n] = '\0';
    printf("Received: %s\n", buf);
    printf("Protocol: UDP\n");
    close(srv);
    wait(NULL);
    return 0;
}'''
