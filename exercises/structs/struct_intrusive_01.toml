/* == EXEMPLE ================================================
 * container_of simplifie : retrouver un Employee depuis son badge
 * Le badge (struct Badge) est imbrique dans Employee.
 * =========================================================== */
typedef struct Badge { int id; } Badge;
typedef struct { char name[20]; Badge badge; } Employee;

#define example_container_of(ptr, type, member) \
    ((type *)((char *)(ptr) - offsetof(type, member)))

void example_demo(void) {
    Employee emp = {"Alice", {42}};
    Badge *b = &emp.badge;
    Employee *e = example_container_of(b, Employee, badge);
    printf("%s (badge %d)\n", e->name, e->badge.id);
    printf("offsetof(Employee, badge) = %zu\n", offsetof(Employee, badge));
