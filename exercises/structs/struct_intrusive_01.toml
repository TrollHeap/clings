common_mistake = "Oublier le cast (char*) dans container_of — sans lui, l'arithmétique de pointeurs utilise sizeof(*ptr) au lieu d'octets"
description = """
NSY103 — Dans le noyau Linux, les listes chaînées sont intrusives : le nœud de liste est imbriqué dans la struct de données. La macro `container_of` retrouve la struct englobante à partir de l'adresse du nœud, en utilisant `offsetof`.

Implémentez une liste intrusive simplifiée avec `container_of`, `list_add` et un parcours."""
difficulty = 5
exercise_type = "complete"
hints = [
    "`container_of(ptr, type, member)` soustrait offsetof(type, member) à l'adresse ptr pour remonter au début de la struct",
    "Le nœud de liste `ListNode link` est un champ de Task, pas un wrapper autour de Task",
    "list_add insère en tête : `node->next = head->next; head->next = node;`",
]
id = "struct-intrusive-01"
kc_ids = ["KC-C03"]
key_concept = "container_of utilise offsetof pour retrouver la struct englobante — c'est le fondement des listes intrusives du noyau Linux"
lang = "c"
prerequisites = ["struct-padding-01"]
solution_code = '''
#include <stdio.h>
#include <stddef.h>
#include <stdlib.h>

#define container_of(ptr, type, member) \
    ((type *)((char *)(ptr) - offsetof(type, member)))

typedef struct ListNode {
    struct ListNode *next;
} ListNode;

typedef struct {
    int pid;
    char name[16];
    ListNode link;
} Task;

void list_add(ListNode *head, ListNode *node) {
    node->next = head->next;
    head->next = node;
}

int main(void) {
    ListNode head = {NULL};

    Task t1 = {100, "init", {NULL}};
    Task t2 = {200, "bash", {NULL}};
    Task t3 = {300, "vim", {NULL}};

    list_add(&head, &t1.link);
    list_add(&head, &t2.link);
    list_add(&head, &t3.link);

    printf("Task list:\n");
    for (ListNode *n = head.next; n; n = n->next) {
        Task *t = container_of(n, Task, link);
        printf("  pid=%d name=%s\n", t->pid, t->name);
    }

    printf("offsetof(Task, link) = %zu\n", offsetof(Task, link));
    printf("sizeof(Task) = %zu\n", sizeof(Task));
    return 0;
}'''
