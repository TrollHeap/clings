common_mistake = "Oublier de mettre à jour prev lors de l'insertion — la liste fonctionne forward mais pas backward"
description = """
NSY103 — Une liste doublement chaînée ajoute un pointeur `prev` à chaque nœud. Cela permet de parcourir la liste dans les deux sens et de supprimer un nœud en O(1) si on a déjà son adresse.

Implémentez `insert_front`, `insert_back`, `print_forward`, `print_backward` et `free_list`."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Chaque nœud a deux pointeurs : `prev` et `next`, initialisés à NULL",
    "insert_front : le nouveau nœud pointe next vers l'ancien head, et l'ancien head pointe prev vers le nouveau",
    "print_backward : partir de tail, suivre prev jusqu'à NULL",
]
id = "linked-list-02"
kc_ids = ["KC-C03"]
key_concept = "Le double chaînage (prev+next) permet le parcours bidirectionnel et la suppression O(1)"
lang = "c"
prerequisites = ["linked-list-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>

typedef struct DNode {
    int val;
    struct DNode *prev;
    struct DNode *next;
} DNode;

typedef struct { DNode *head; DNode *tail; } DList;

DNode *make_dnode(int val) {
    DNode *n = malloc(sizeof(DNode));
    if (!n) return NULL;
    n->val = val;
    n->prev = NULL;
    n->next = NULL;
    return n;
}

void insert_front(DList *list, int val) {
    DNode *n = make_dnode(val);
    if (!n) return;
    n->next = list->head;
    if (list->head) list->head->prev = n;
    list->head = n;
    if (!list->tail) list->tail = n;
}

void insert_back(DList *list, int val) {
    DNode *n = make_dnode(val);
    if (!n) return;
    n->prev = list->tail;
    if (list->tail) list->tail->next = n;
    list->tail = n;
    if (!list->head) list->head = n;
}

void print_forward(const DList *list) {
    for (DNode *c = list->head; c; c = c->next)
        printf("%d ", c->val);
    printf("\n");
}

void print_backward(const DList *list) {
    for (DNode *c = list->tail; c; c = c->prev)
        printf("%d ", c->val);
    printf("\n");
}

void free_list(DList *list) {
    DNode *c = list->head;
    while (c) {
        DNode *tmp = c->next;
        free(c);
        c = tmp;
    }
    list->head = list->tail = NULL;
}

int main(void) {
    DList list = {NULL, NULL};
    insert_back(&list, 1);
    insert_back(&list, 2);
    insert_back(&list, 3);
    insert_front(&list, 0);
    printf("Forward  : ");
    print_forward(&list);
    printf("Backward : ");
    print_backward(&list);
    free_list(&list);
    return 0;
}'''
