#include <stdio.h>

/* == EXEMPLE ================================================
 * Struct RGB et distance euclidienne entre deux couleurs
 * typedef struct regroupe des champs, acces via le point.
 * =========================================================== */
typedef struct { int r; int g; int b; } RGB;

float example_color_diff(RGB c1, RGB c2) {
    int dr = c1.r - c2.r;
    int dg = c1.g - c2.g;
    int db = c1.b - c2.b;
    return (float)(dr*dr + dg*dg + db*db);
}
void example_demo(void) {
    RGB white = {255, 255, 255};
    RGB black = {0, 0, 0};
    printf("white = (%d, %d, %d)\n", white.r, white.g, white.b);
    printf("black = (%d, %d, %d)\n", black.r, black.g, black.b);
    printf("Diff carre : %.1f\n", example_color_diff(white, black));
}
