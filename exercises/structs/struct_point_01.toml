common_mistake = "Oublier le ';' après la définition de struct"
description = """
NSY103 — Une `struct` groupe des champs de types différents. L'accès aux champs d'une variable struct utilise le point `.`, l'accès via pointeur utilise `->`.

Définissez `Point2D {float x, y}`, initialisez deux points, calculez la distance Manhattan."""
difficulty = 1
exercise_type = "complete"
hints = [
    "`typedef struct { float x; float y; } Point2D;`",
    "Distance Manhattan : |p1.x - p2.x| + |p1.y - p2.y| = |1-4| + |2-6| = 3 + 4 = 7",
    "Accès aux champs d'une struct par valeur : `a.x`, `a.y`",
]
id = "struct-point-01"
kc_ids = ["KC-C03"]
key_concept = "struct sur pile : accès par ., sur tas (via pointeur) : accès par ->"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
typedef struct { float x; float y; } Point2D;
float manhattan(Point2D a, Point2D b) {
    float dx = a.x - b.x;
    float dy = a.y - b.y;
    if (dx < 0) dx = -dx;
    if (dy < 0) dy = -dy;
    return dx + dy;
}

int main(void) {
    Point2D p1 = {1.0f, 2.0f};
    Point2D p2 = {4.0f, 6.0f};
    printf("p1 = (%.1f, %.1f)\n", p1.x, p1.y);
    printf("p2 = (%.1f, %.1f)\n", p2.x, p2.y);
    printf("Distance Manhattan : %.1f\n", manhattan(p1, p2));
    return 0;
}
'''
