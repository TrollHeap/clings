#include <stdio.h>
#include <math.h>

/* == EXEMPLE ================================================
 * Mini vtable pour des animaux (speak + legs)
 * Chaque "classe" fournit sa propre implementation.
 * =========================================================== */
typedef struct Animal Animal;
typedef struct { void (*speak)(const Animal *); int (*legs)(const Animal *); } AnimalVT;
struct Animal { const AnimalVT *vt; };

typedef struct { Animal base; char name[20]; } Dog;
typedef struct { Animal base; int indoor; } Cat;

void dog_speak(const Animal *a) { printf("%s: Woof!\n", ((Dog*)a)->name); }
int dog_legs(const Animal *a) { (void)a; return 4; }
void cat_speak(const Animal *a) { (void)a; printf("Cat: Meow!\n"); }
int cat_legs(const Animal *a) { (void)a; return 4; }

static const AnimalVT dog_vt = {dog_speak, dog_legs};
static const AnimalVT cat_vt = {cat_speak, cat_legs};

void example_demo(void) {
    Dog d = {{&dog_vt}, "Rex"};
    Cat c = {{&cat_vt}, 1};
    Animal *animals[] = {&d.base, &c.base};
    for (int i = 0; i < 2; i++) {
        animals[i]->vt->speak(animals[i]);
        printf("  legs=%d\n", animals[i]->vt->legs(animals[i]));
    }
}
