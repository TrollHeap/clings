common_mistake = "Oublier de passer l'objet (self/this) comme premier argument des fonctions de la vtable"
description = """
NSY103 — En C, on simule le polymorphisme objet avec une vtable : une struct de pointeurs de fonctions. Chaque "classe" fournit sa propre implémentation. L'objet contient un pointeur vers sa vtable, permettant l'appel dynamique.

Implémentez deux formes (Circle, Rect) avec une vtable commune (area, describe) et utilisez-les de manière polymorphe."""
difficulty = 4
exercise_type = "complete"
hints = [
    "La vtable est un champ `const ShapeVTable *vtable` dans la struct de base Shape",
    "On caste `const Shape *s` vers `const Circle *` car Circle contient Shape comme premier champ (même adresse)",
    "L'initialisation `{{&circle_vtable}, 5.0}` : les accolades externes pour Circle, internes pour Shape base",
]
id = "struct-vtable-01"
kc_ids = ["KC-C03"]
key_concept = "La vtable (struct de pointeurs de fonctions) est le mécanisme fondamental de polymorphisme en C, utilisé dans le noyau Linux"
lang = "c"
prerequisites = ["struct-union-01"]
solution_code = '''
#include <stdio.h>
#include <math.h>

typedef struct Shape Shape;

typedef struct {
    double (*area)(const Shape *);
    void (*describe)(const Shape *);
} ShapeVTable;

struct Shape {
    const ShapeVTable *vtable;
};

typedef struct {
    Shape base;
    double radius;
} Circle;

typedef struct {
    Shape base;
    double width, height;
} Rect;

double circle_area(const Shape *s) {
    const Circle *c = (const Circle *)s;
    return 3.14159265 * c->radius * c->radius;
}

void circle_describe(const Shape *s) {
    const Circle *c = (const Circle *)s;
    printf("Circle(r=%.1f)\n", c->radius);
}

double rect_area(const Shape *s) {
    const Rect *r = (const Rect *)s;
    return r->width * r->height;
}

void rect_describe(const Shape *s) {
    const Rect *r = (const Rect *)s;
    printf("Rect(%.1fx%.1f)\n", r->width, r->height);
}

static const ShapeVTable circle_vtable = {circle_area, circle_describe};
static const ShapeVTable rect_vtable = {rect_area, rect_describe};

int main(void) {
    Circle c = {{&circle_vtable}, 5.0};
    Rect r = {{&rect_vtable}, 3.0, 4.0};
    Shape *shapes[] = {&c.base, &r.base};
    for (int i = 0; i < 2; i++) {
        shapes[i]->vtable->describe(shapes[i]);
        printf("  area = %.2f\n", shapes[i]->vtable->area(shapes[i]));
    }
    return 0;
}'''
