common_mistake = "Oublier le cast (Type) dans le compound literal : {1,2,3} seul n'est pas un compound literal"
description = """
NSY103 — L'initialisation désignée (`{.champ = val}`) permet d'initialiser les champs d'une struct par nom plutôt que par position. Les compound literals `(Type){...}` créent des objets temporaires directement dans une expression.

Utilisez ces deux mécanismes pour initialiser et modifier des structs `Color`."""
difficulty = 1
exercise_type = "complete"
hints = [
    "Initialisation désignée : `{.r = 255, .g = 0, .b = 0}` — les champs non mentionnés sont mis à 0",
    "`{.b = 255}` initialise seulement b, r et g sont automatiquement 0",
    "Compound literal : `(Color){128, 0, 128}` crée un objet Color temporaire",
]
id = "struct-init-02"
kc_ids = ["KC-C03"]
key_concept = "L'initialisation désignée nomme les champs ; les compound literals créent des objets inline"
lang = "c"
prerequisites = ["struct-point-01"]
solution_code = '''
#include <stdio.h>
typedef struct { int r, g, b; } Color;
void print_color(const char *name, Color c) {
    printf("%s = (%d, %d, %d)\n", name, c.r, c.g, c.b);
}
Color make_red(void) { return (Color){.r = 255, .g = 0, .b = 0}; }
Color make_blue(void) { return (Color){.r = 0, .g = 0, .b = 255}; }
Color make_color(int r, int g, int b) { return (Color){.r = r, .g = g, .b = b}; }

int main(void) {
    Color red = make_red();
    print_color("red", red);
    Color blue = make_blue();
    print_color("blue", blue);
    Color purple = make_color(128, 0, 128);
    print_color("purple", purple);
    Color colors[] = {
        {.r = 255, .g = 255, .b = 0},
        {.r = 0, .g = 255, .b = 255}
    };
    printf("colors[0] = (%d, %d, %d)\n", colors[0].r, colors[0].g, colors[0].b);
    printf("colors[1] = (%d, %d, %d)\n", colors[1].r, colors[1].g, colors[1].b);
    return 0;
}'''
