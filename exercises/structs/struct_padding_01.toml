#include <stdio.h>
#include <stddef.h>

/* == EXEMPLE ================================================
 * Padding dans une struct simple
 * char(1) + padding(3) + int(4) = 8 octets, pas 5
 * =========================================================== */
typedef struct { char c; int i; } Ex;

void example_demo(void) {
    printf("sizeof(Ex) = %zu\n", sizeof(Ex));
    printf("offsetof(c) = %zu\n", offsetof(Ex, c));
    printf("offsetof(i) = %zu\n", offsetof(Ex, i));
}
