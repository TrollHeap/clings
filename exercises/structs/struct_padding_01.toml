common_mistake = "Supposer que sizeof(struct) == somme des sizeof(champs) — le padding est invisible mais bien réel"
description = """
NSY103 — Le compilateur insère du padding entre les champs d'une struct pour respecter les contraintes d'alignement. `offsetof(type, champ)` donne la position exacte d'un champ. Réordonner les champs peut réduire la taille.

Comparez deux structs avec les mêmes champs mais dans un ordre différent pour observer l'impact du padding."""
difficulty = 5
exercise_type = "complete"
hints = [
    "`offsetof(Type, champ)` de <stddef.h> donne le décalage en octets du champ depuis le début de la struct",
    "Règle d'alignement : chaque champ doit être à une adresse multiple de sa taille (int=4, double=8)",
    "Trier les champs du plus grand au plus petit minimise le padding",
]
id = "struct-padding-01"
kc_ids = ["KC-C03"]
key_concept = "Le padding d'alignement peut doubler la taille d'une struct — réordonner du plus grand au plus petit minimise le gaspillage"
lang = "c"
prerequisites = ["struct-serialize-01"]
solution_code = '''
#include <stdio.h>
#include <stddef.h>
typedef struct { char a; int b; char c; double d; char e; } Padded;
typedef struct { double d; int b; char a; char c; char e; } Packed;
size_t padded_sizeof(void) { return sizeof(Padded); }
size_t packed_sizeof(void) { return sizeof(Packed); }
size_t padded_offsetof_a(void) { return offsetof(Padded, a); }
size_t padded_offsetof_b(void) { return offsetof(Padded, b); }
size_t padded_offsetof_d(void) { return offsetof(Padded, d); }
size_t packed_offsetof_d(void) { return offsetof(Packed, d); }
size_t packed_offsetof_b(void) { return offsetof(Packed, b); }
size_t packed_offsetof_a(void) { return offsetof(Packed, a); }

int main(void) {
    printf("=== Padded ===\n");
    printf("sizeof = %zu\n", sizeof(Padded));
    printf("offsetof(a) = %zu\n", offsetof(Padded, a));
    printf("offsetof(b) = %zu\n", offsetof(Padded, b));
    printf("offsetof(c) = %zu\n", offsetof(Padded, c));
    printf("offsetof(d) = %zu\n", offsetof(Padded, d));
    printf("offsetof(e) = %zu\n", offsetof(Padded, e));
    printf("=== Packed ===\n");
    printf("sizeof = %zu\n", sizeof(Packed));
    printf("offsetof(d) = %zu\n", offsetof(Packed, d));
    printf("offsetof(b) = %zu\n", offsetof(Packed, b));
    printf("offsetof(a) = %zu\n", offsetof(Packed, a));
    printf("Economie : %zu octets\n", sizeof(Padded) - sizeof(Packed));
    return 0;
}'''
