[validation]
mode = "test"
test_code = """
void test_rect_area(void) {
    Rectangle *r = malloc(sizeof(Rectangle));
    TEST_ASSERT_NOT_NULL(r);
    r->width = 5.0f;
    r->height = 3.0f;
    float area = rect_area(r);
    TEST_ASSERT_EQUAL_FLOAT(15.0f, area);
    free(r);
}

void test_rect_area_square(void) {
    Rectangle *r = malloc(sizeof(Rectangle));
    r->width = 4.0f;
    r->height = 4.0f;
    TEST_ASSERT_EQUAL_FLOAT(16.0f, rect_area(r));
    free(r);
}

void test_rect_perimeter(void) {
    Rectangle *r = malloc(sizeof(Rectangle));
    r->width = 5.0f;
    r->height = 3.0f;
    float perim = rect_perimeter(r);
    TEST_ASSERT_EQUAL_FLOAT(16.0f, perim);
    free(r);
}

void test_rect_perimeter_unit(void) {
    Rectangle *r = malloc(sizeof(Rectangle));
    r->width = 1.0f;
    r->height = 1.0f;
    TEST_ASSERT_EQUAL_FLOAT(4.0f, rect_perimeter(r));
    free(r);
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_rect_area);
    RUN_TEST(test_rect_area_square);
    RUN_TEST(test_rect_perimeter);
    RUN_TEST(test_rect_perimeter_unit);
    return UNITY_END();
}
"""

