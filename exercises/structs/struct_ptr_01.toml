common_mistake = "Utiliser . au lieu de -> sur un pointeur"
description = """
NSY103 — Quand une struct est allouée dynamiquement, on accède à ses champs via `->` (équivalent de `(*ptr).champ`).

Allouez un `Rectangle` sur le tas, calculez son aire et périmètre via pointeur."""
difficulty = 2
exercise_type = "complete"
hints = [
    "`Rectangle *r = malloc(sizeof(Rectangle));`",
    "`r->width = 5.0f;` pour assigner via pointeur (équivalent à `(*r).width = 5.0f;`)",
    "N'oubliez pas `free(r);` en fin de programme",
]
id = "struct-ptr-01"
kc_ids = ["KC-C03"]
key_concept = "L'opérateur -> est du sucre syntaxique : ptr->champ équivaut à (*ptr).champ — déréférence et accès au membre en une seule étape"
lang = "c"
prerequisites = ["struct-point-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
typedef struct { float width; float height; } Rectangle;
float rect_area(Rectangle *r) { return r->width * r->height; }
float rect_perimeter(Rectangle *r) { return 2.0f * (r->width + r->height); }

int main(void) {
    Rectangle *r = malloc(sizeof(Rectangle));
    if (!r) return 1;
    r->width = 5.0f;
    r->height = 3.0f;
    printf("Largeur : %.1f\n", r->width);
    printf("Hauteur : %.1f\n", r->height);
    printf("Aire : %.1f\n", rect_area(r));
    printf("Perimetre : %.1f\n", rect_perimeter(r));
    free(r);
    return 0;
}'''
