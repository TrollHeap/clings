common_mistake = "Lire le mauvais champ de l'union (ex: .f quand type==VAL_INT) — comportement indéfini"
description = """
NSY103 — Une `union` partage le même espace mémoire pour tous ses champs : sa taille est celle du plus grand. Pour savoir quel champ est actif, on ajoute un `enum` tag — c'est le pattern "tagged union" ou "variant type".

Implémentez un type `Value` qui peut contenir un entier, un flottant ou une chaîne, avec affichage dynamique selon le tag."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Le tag `v->type` indique quel champ de l'union est actif",
    "Accéder au mauvais champ (ex: `v->data.f` quand type == VAL_INT) donne un résultat indéfini",
    "sizeof(Value) = sizeof(tag) + sizeof(union) + padding — l'union prend la taille du plus grand membre",
]
id = "struct-union-01"
kc_ids = ["KC-C03"]
key_concept = "Une union tagged combine un enum (discriminant) et une union (données) pour implémenter le polymorphisme en C"
lang = "c"
prerequisites = ["linked-list-02"]
solution_code = '''
#include <stdio.h>

typedef enum { VAL_INT, VAL_FLOAT, VAL_STR } ValType;

typedef struct {
    ValType type;
    union {
        int i;
        float f;
        char s[32];
    } data;
} Value;

void print_value(const Value *v) {
    switch (v->type) {
        case VAL_INT:   printf("int: %d\n", v->data.i); break;
        case VAL_FLOAT: printf("float: %.1f\n", v->data.f); break;
        case VAL_STR:   printf("str: %s\n", v->data.s); break;
    }
}

int main(void) {
    Value vals[3];
    vals[0].type = VAL_INT;
    vals[0].data.i = 42;
    vals[1].type = VAL_FLOAT;
    vals[1].data.f = 3.14f;
    vals[2].type = VAL_STR;
    snprintf(vals[2].data.s, sizeof(vals[2].data.s), "hello");

    printf("sizeof(Value) = %zu\n", sizeof(Value));
    for (int k = 0; k < 3; k++)
        print_value(&vals[k]);
    return 0;
}'''
