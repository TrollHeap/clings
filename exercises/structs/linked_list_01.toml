common_mistake = "Ne pas libérer chaque nœud : sauvegarder next avant free(cur)"
description = """
NSY103 — Une liste chaînée est une structure récursive : chaque nœud contient une valeur et un pointeur vers le nœud suivant. Le dernier nœud pointe vers NULL.

Implémentez `append(head, val)` et `print_list(head)`, puis libérez la liste."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Struct : `typedef struct Node { int val; struct Node *next; } Node;`",
    "append : si *head == NULL, le nouveau nœud devient la tête ; sinon parcourir jusqu'à cur->next == NULL",
    "free_list : sauvegarder `Node *tmp = head->next;` avant `free(head);`",
]
id = "linked-list-01"
kc_ids = ["KC-C03"]
key_concept = "Chaque nœud alloué séparément ; traversée via ->next jusqu'à NULL"
lang = "c"
prerequisites = ["struct-ptr-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
typedef struct Node { int val; struct Node *next; } Node;
Node *make_node(int val) {
    Node *n = malloc(sizeof(Node));
    if (!n) return NULL;
    n->val = val; n->next = NULL;
    return n;
}
void append(Node **head, int val) {
    Node *n = make_node(val);
    if (!*head) { *head = n; return; }
    Node *cur = *head;
    while (cur->next) cur = cur->next;
    cur->next = n;
}
void print_list(Node *head) {
    for (Node *cur = head; cur; cur = cur->next)
        printf("%d", cur->val);
    printf("\n");
}
void free_list(Node *head) {
    while (head) { Node *tmp = head->next; free(head); head = tmp; }
}
int list_length(Node *head) {
    int count = 0;
    for (Node *cur = head; cur; cur = cur->next) count++;
    return count;
}
int list_sum(Node *head) {
    int sum = 0;
    for (Node *cur = head; cur; cur = cur->next) sum += cur->val;
    return sum;
}
Node *list_find(Node *head, int val) {
    for (Node *cur = head; cur; cur = cur->next)
        if (cur->val == val) return cur;
    return NULL;
}

int main(void) {
    Node *list = NULL;
    append(&list, 1); append(&list, 2); append(&list, 3);
    print_list(list);
    free_list(list);
    return 0;
}
'''
