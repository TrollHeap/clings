common_mistake = "Oublier sizeof(Etudiant) comme 3ème argument de qsort — qsort déplace des blocs de cette taille"
description = """
NSY103 — Un tableau de structs permet de manipuler des collections d'objets. On peut trier ce tableau avec `qsort` en définissant un comparateur qui accède aux champs de la struct.

Créez un tableau de 4 étudiants (nom, note), triez-les par note décroissante, puis affichez le classement."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Le comparateur reçoit des `const void *` qu'il faut caster en `const Etudiant *`",
    "Pour tri décroissant : comparer eb->note avec ea->note (inversé)",
    "`sizeof(classe) / sizeof(classe[0])` donne le nombre d'éléments",
]
id = "struct-array-01"
kc_ids = ["KC-C03"]
key_concept = "qsort sur tableau de structs : le comparateur caste void* en struct* pour accéder aux champs"
lang = "c"
prerequisites = ["struct-nested-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

typedef struct {
    char nom[20];
    int note;
} Etudiant;

int cmp_note_desc(const void *a, const void *b) {
    const Etudiant *ea = (const Etudiant *)a;
    const Etudiant *eb = (const Etudiant *)b;
    return (eb->note > ea->note) - (eb->note < ea->note);
}

int main(void) {
    Etudiant classe[] = {
        {"Alice", 15},
        {"Bob", 18},
        {"Charlie", 12},
        {"Diana", 17}
    };
    int n = sizeof(classe) / sizeof(classe[0]);

    qsort(classe, n, sizeof(Etudiant), cmp_note_desc);

    for (int i = 0; i < n; i++) {
        printf("%d. %s : %d\n", i + 1, classe[i].nom, classe[i].note);
    }
    return 0;
}'''
