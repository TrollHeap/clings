#include <stdio.h>
#include <stdlib.h>
#include <string.h>

/* == EXEMPLE ================================================
 * Tableau de structs Produit tri par prix croissant
 * qsort permute des blocs de sizeof(Produit) octets.
 * =========================================================== */
typedef struct { char nom[20]; float prix; } Produit;

int example_cmp_prix(const void *a, const void *b) {
    const Produit *pa = (const Produit *)a;
    const Produit *pb = (const Produit *)b;
    return (pa->prix > pb->prix) - (pa->prix < pb->prix);
}
void example_demo(void) {
    Produit shop[] = {{"Cafe", 5.50f}, {"The", 3.20f}, {"Jus", 4.10f}};
    qsort(shop, 3, sizeof(Produit), example_cmp_prix);
    for (int i = 0; i < 3; i++)
        printf("%s : %.2f\n", shop[i].nom, shop[i].prix);
}
