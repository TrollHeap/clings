common_mistake = "Ouvrir en mode texte ('w'/'r') au lieu de binaire ('wb'/'rb') — peut corrompre les données sur Windows"
description = """
NSY103 — `fwrite` et `fread` peuvent lire/écrire une struct entière en une seule opération. La struct est copiée bit à bit vers le fichier. Attention : ce format n'est pas portable (endianness, padding).

Sérialisez un tableau de 3 records dans un fichier binaire, relisez-les et vérifiez l'intégrité."""
difficulty = 4
exercise_type = "complete"
hints = [
    '''Mode binaire : `"wb"` pour écriture, `"rb"` pour lecture — le 'b' empêche la traduction \n''',
    "`fwrite(recs, sizeof(Record), n, f)` écrit n structs d'un coup",
    "`fread(recs, sizeof(Record), max, f)` retourne le nombre de structs lues",
]
id = "struct-serialize-01"
kc_ids = ["KC-C03"]
key_concept = "fwrite/fread sérialisent une struct bit à bit — rapide mais non portable entre architectures"
lang = "c"
prerequisites = ["struct-vtable-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

typedef struct {
    char name[20];
    int age;
    float score;
} Record;

int write_records(const char *path, const Record *recs, int n) {
    FILE *f = fopen(path, "wb");
    if (!f) return -1;
    size_t written = fwrite(recs, sizeof(Record), n, f);
    fclose(f);
    return (int)written;
}

int read_records(const char *path, Record *recs, int max) {
    FILE *f = fopen(path, "rb");
    if (!f) return -1;
    size_t nread = fread(recs, sizeof(Record), max, f);
    fclose(f);
    return (int)nread;
}

int main(void) {
    Record data[] = {
        {"Alice", 25, 92.5f},
        {"Bob", 30, 87.3f},
        {"Charlie", 22, 95.1f}
    };
    const char *path = "/tmp/kf_records.bin";
    int w = write_records(path, data, 3);
    printf("Written: %d records\n", w);

    Record loaded[3] = {0};
    int r = read_records(path, loaded, 3);
    printf("Read: %d records\n", r);
    for (int i = 0; i < r; i++) {
        printf("%s, %d, %.1f\n", loaded[i].name, loaded[i].age, loaded[i].score);
    }
    printf("Integrity: %d\n", memcmp(data, loaded, sizeof(data)) == 0);
    remove(path);
    return 0;
}'''
