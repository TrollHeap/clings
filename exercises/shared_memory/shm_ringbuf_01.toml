common_mistake = "Confondre head et tail → push sur head au lieu de tail inverse l'ordre FIFO"
description = """
NSY103 — Un ring buffer (tampon circulaire) en mémoire partagée permet une communication FIFO entre producteur et consommateur. Les indices head et tail avancent modulo la capacité. Le producteur écrit à tail, le consommateur lit à head.

Implémentez un ring buffer de 4 slots. L'enfant (producteur) envoie 3 messages, le parent (consommateur) les lit séquentiellement après wait()."""
difficulty = 3
exercise_type = "complete"
hints = [
    "rb_push écrit dans slots[tail] puis avance tail modulo CAP",
    "rb_pop lit depuis slots[head] puis avance head modulo CAP",
    """Le modulo (% CAP) fait que les indices "tournent" — c'est le principe circulaire""",
]
id = "shm-ringbuf-01"
kc_ids = ["KC-C13"]
key_concept = "Ring buffer : indices head/tail modulo capacité ; FIFO sans allocation dynamique"
lang = "c"
prerequisites = ["shm-mutex-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>

#define CAP 4
#define MSG_LEN 32

typedef struct {
    char slots[CAP][MSG_LEN];
    int head;
    int tail;
    int count;
} RingBuf;

void rb_push(RingBuf *rb, const char *msg) {
    strncpy(rb->slots[rb->tail], msg, MSG_LEN - 1);
    rb->tail = (rb->tail + 1) % CAP;
    rb->count++;
}

const char *rb_pop(RingBuf *rb) {
    const char *msg = rb->slots[rb->head];
    rb->head = (rb->head + 1) % CAP;
    rb->count--;
    return msg;
}

int main(void) {
    int fd = shm_open("/kf_shm_ring", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, sizeof(RingBuf));
    RingBuf *rb = (RingBuf *)mmap(NULL, sizeof(RingBuf),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);
    memset(rb, 0, sizeof(RingBuf));

    if (fork() == 0) {
        rb_push(rb, "msg-A");
        rb_push(rb, "msg-B");
        rb_push(rb, "msg-C");
        _exit(0);
    }
    wait(NULL);

    while (rb->count > 0)
        printf("Pop: %s\n", rb_pop(rb));

    munmap(rb, sizeof(RingBuf));
    shm_unlink("/kf_shm_ring");
    return 0;
}'''
