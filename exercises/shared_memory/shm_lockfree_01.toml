typedef struct { atomic_int counter; atomic_int ready; } AtomicShared;

/* == EXEMPLE =======================================
 * atomic_fetch_add avec 2 enfants, 500 chacun
 * ================================================= */
void example_atomic(void) {
    AtomicShared s; atomic_store(&s.counter, 0); atomic_store(&s.ready, 0);
