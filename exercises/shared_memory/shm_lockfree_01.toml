common_mistake = "Utiliser un int normal au lieu d'atomic_int → race condition car read-modify-write n'est pas atomique"
description = """
NSY103 — Les opérations atomiques (stdatomic.h) permettent la synchronisation sans mutex. __atomic_fetch_add() incrémente un compteur de manière atomique (instruction CPU lock xadd). Un flag atomic_int avec __atomic_store et __atomic_load implémente un spinlock minimaliste.

Créez un compteur atomique en mémoire partagée. 4 enfants incrémentent chacun 1000 fois avec __atomic_fetch_add. Le parent vérifie que le total est 4000."""
difficulty = 5
exercise_type = "complete"
hints = [
    "atomic_fetch_add(&counter, 1) incrémente de manière atomique (pas de race)",
    "atomic_load et atomic_store pour lire/écrire un atomic_int de manière thread-safe",
    "Le flag 'ready' permet au parent de savoir quand tous les enfants ont fini",
]
id = "shm-lockfree-01"
kc_ids = ["KC-C13"]
key_concept = "atomic_fetch_add = incrément lock-free (instruction CPU lock xadd) ; pas de mutex nécessaire"
lang = "c"
prerequisites = ["shm-multiproc-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>
#include <string.h>
#include <stdatomic.h>

typedef struct {
    atomic_int counter;
    atomic_int ready;
} AtomicShared;

int main(void) {
    int fd = shm_open("/kf_shm_atomic", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, sizeof(AtomicShared));
    AtomicShared *as = (AtomicShared *)mmap(NULL, sizeof(AtomicShared),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);

    atomic_store(&as->counter, 0);
    atomic_store(&as->ready, 0);

    for (int i = 0; i < 4; i++) {
        if (fork() == 0) {
            for (int j = 0; j < 1000; j++)
                atomic_fetch_add(&as->counter, 1);
            atomic_fetch_add(&as->ready, 1);
            _exit(0);
        }
    }

    while (atomic_load(&as->ready) < 4)
        usleep(1000);

    printf("Atomic counter: %d\n", atomic_load(&as->counter));

    munmap(as, sizeof(AtomicShared));
    shm_unlink("/kf_shm_atomic");
    return 0;
}'''
