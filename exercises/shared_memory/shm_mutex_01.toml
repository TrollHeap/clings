common_mistake = "Mutex sur la stack locale au lieu du segment partagé → chaque processus a son propre mutex inutile"
description = """
NSY103 — Quand plusieurs processus accèdent au même compteur partagé, il faut un mutex avec l'attribut PTHREAD_PROCESS_SHARED. Le mutex lui-même est placé dans le segment partagé. pthread_mutexattr_setpshared() active le partage inter-processus.

Créez un compteur protégé par un mutex partagé. 4 enfants incrémentent chacun le compteur 1000 fois. Le parent affiche le total attendu (4000)."""
difficulty = 3
exercise_type = "complete"
hints = [
    "PTHREAD_PROCESS_SHARED permet au mutex d'être partagé entre processus",
    "Le mutex doit être dans le segment partagé (pas sur la stack locale)",
    "lock/unlock autour de chaque incrément pour éviter les races",
]
id = "shm-mutex-01"
kc_ids = ["KC-C13"]
key_concept = "pthread_mutex avec PTHREAD_PROCESS_SHARED protège les accès concurrents entre processus"
lang = "c"
prerequisites = ["shm-array-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>
#include <pthread.h>
#include <string.h>

typedef struct {
    pthread_mutex_t mutex;
    int counter;
} SharedCounter;

int main(void) {
    int fd = shm_open("/kf_shm_mutex", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, sizeof(SharedCounter));
    SharedCounter *sc = (SharedCounter *)mmap(NULL, sizeof(SharedCounter),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);

    pthread_mutexattr_t attr;
    pthread_mutexattr_init(&attr);
    pthread_mutexattr_setpshared(&attr, PTHREAD_PROCESS_SHARED);
    pthread_mutex_init(&sc->mutex, &attr);
    pthread_mutexattr_destroy(&attr);
    sc->counter = 0;

    for (int i = 0; i < 4; i++) {
        if (fork() == 0) {
            for (int j = 0; j < 1000; j++) {
                pthread_mutex_lock(&sc->mutex);
                sc->counter++;
                pthread_mutex_unlock(&sc->mutex);
            }
            _exit(0);
        }
    }
    for (int i = 0; i < 4; i++) wait(NULL);
    printf("Counter: %d\n", sc->counter);

    pthread_mutex_destroy(&sc->mutex);
    munmap(sc, sizeof(SharedCounter));
    shm_unlink("/kf_shm_mutex");
    return 0;
}'''
