    '''
#include <stdio.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>
#include <pthread.h>
#include <string.h>

typedef struct { pthread_mutex_t mutex; int counter; } SharedCounter;

/* == EXEMPLE =======================================
 * Mutex partage avec 2 enfants, 500 increments chacun
 * ================================================= */
void example_shm_mutex(void) {
    int fd = shm_open("/kf_ex_mtx", O_CREAT|O_RDWR, 0644);
    ftruncate(fd, sizeof(SharedCounter));
    SharedCounter *s = (SharedCounter *)mmap(NULL, sizeof(SharedCounter), PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);
    pthread_mutexattr_t a; pthread_mutexattr_init(&a);
    pthread_mutexattr_setpshared(&a, PTHREAD_PROCESS_SHARED);
    pthread_mutex_init(&s->mutex, &a); pthread_mutexattr_destroy(&a);
    s->counter = 0;
    for (int i = 0; i < 2; i++) {
        if (fork() == 0) {
            for (int j = 0; j < 500; j++) {
                pthread_mutex_lock(&s->mutex); s->counter++; pthread_mutex_unlock(&s->mutex);
            }
            _exit(0);
        }
    }
    wait(NULL); wait(NULL);
    printf("Total: %d\n", s->counter);
    pthread_mutex_destroy(&s->mutex);
    munmap(s, sizeof(SharedCounter)); shm_unlink("/kf_ex_mtx");
}
/* Resultat: Total: 1000 */

