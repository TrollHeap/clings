common_mistake = "Allouer moins que sizeof(struct) avec ftruncate → les champs en fin de struct sont en dehors du segment"
description = """
NSY103 — On peut mapper une struct entière en mémoire partagée. Le pointeur retourné par mmap est casté vers le type de la struct. Tous les champs sont alors accessibles par les deux processus.

Créez un segment partagé contenant une struct avec un compteur et un message. L'enfant initialise les champs, le parent lit après wait()."""
difficulty = 2
exercise_type = "complete"
hints = [
    "ftruncate(fd, sizeof(SharedState)) alloue exactement la taille de la struct",
    "Le cast (SharedState *)mmap(...) permet d'accéder aux champs via ->",
    '''strncpy avec limite 63 pour le buffer de 64 (garder place pour '\0')''',
]
id = "shm-struct-01"
kc_ids = ["KC-C13"]
key_concept = "On peut mapper n'importe quel type C en mémoire partagée ; sizeof() pour la taille"
lang = "c"
prerequisites = ["shm-readwrite-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>

typedef struct {
    int counter;
    char message[64];
} SharedState;

int main(void) {
    int fd = shm_open("/kf_shm_struct", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, sizeof(SharedState));
    SharedState *state = (SharedState *)mmap(NULL, sizeof(SharedState),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);

    if (fork() == 0) {
        state->counter = 7;
        strncpy(state->message, "shared struct", 63);
        _exit(0);
    }
    wait(NULL);
    printf("counter=%d message=%s\n", state->counter, state->message);

    munmap(state, sizeof(SharedState));
    shm_unlink("/kf_shm_struct");
    return 0;
}'''
