common_mistake = "Lancer les écrivains en parallèle sans mutex → write_count++ est une race condition"
description = """
NSY103 — Avec un mutex inter-processus et un compteur de lecteurs, on implémente le pattern lecteurs-écrivains. Plusieurs lecteurs peuvent lire simultanément, mais un écrivain a un accès exclusif. Ici, on simplifie : les écrivains modifient séquentiellement, puis les lecteurs lisent.

Créez un segment partagé avec un tableau de 3 valeurs. 3 enfants écrivains écrivent séquentiellement (via waitpid), puis le parent lit et affiche toutes les valeurs."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Chaque enfant écrit dans values[i] — indices distincts, pas de conflit",
    "waitpid(pid, NULL, 0) entre chaque fork assure l'ordre séquentiel des write_count++",
    "write_count est incrémenté séquentiellement grâce à waitpid",
]
id = "shm-multiproc-01"
kc_ids = ["KC-C13"]
key_concept = "N écrivains séquentiels (waitpid) puis lecture ; sans mutex si accès séquentiels garantis"
lang = "c"
prerequisites = ["shm-mmap-file-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>
#include <string.h>

#define N 3

typedef struct {
    int values[N];
    int write_count;
} SharedData;

int main(void) {
    int fd = shm_open("/kf_shm_multi", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, sizeof(SharedData));
    SharedData *sd = (SharedData *)mmap(NULL, sizeof(SharedData),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);
    memset(sd, 0, sizeof(SharedData));

    for (int i = 0; i < N; i++) {
        pid_t pid = fork();
        if (pid == 0) {
            sd->values[i] = (i + 1) * 100;
            sd->write_count++;
            _exit(0);
        }
        waitpid(pid, NULL, 0);
    }

    printf("Writes: %d\n", sd->write_count);
    for (int i = 0; i < N; i++)
        printf("values[%d]=%d\n", i, sd->values[i]);

    munmap(sd, sizeof(SharedData));
    shm_unlink("/kf_shm_multi");
    return 0;
}'''
