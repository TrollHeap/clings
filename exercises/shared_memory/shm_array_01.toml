common_mistake = "Oublier _exit(0) → l'enfant continue la boucle et fork à nouveau"
description = """
NSY103 — Un tableau peut être mappé en mémoire partagée. Chaque processus enfant peut écrire dans un index différent sans conflit (pas de synchronisation nécessaire si les indices ne se chevauchent pas).

Créez un tableau partagé de 4 entiers. Forkez 4 enfants, chacun écrit son index * 10 dans sa case. Le parent lit et affiche le tableau."""
difficulty = 2
exercise_type = "complete"
hints = [
    "MAP_SHARED pour que les écritures soient visibles entre processus",
    "Chaque enfant écrit dans arr[i] — pas de conflit car indices différents",
    "_exit(0) dans l'enfant pour ne pas continuer la boucle for",
]
id = "shm-array-01"
kc_ids = ["KC-C13"]
key_concept = "Tableau partagé sans synchronisation possible si chaque processus écrit dans un index distinct"
lang = "c"
prerequisites = ["shm-struct-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>
#include <string.h>

#define N 4

int main(void) {
    int fd = shm_open("/kf_shm_array", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, N * sizeof(int));
    int *arr = (int *)mmap(NULL, N * sizeof(int),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);
    memset(arr, 0, N * sizeof(int));

    for (int i = 0; i < N; i++) {
        if (fork() == 0) {
            arr[i] = i * 10;
            _exit(0);
        }
    }
    for (int i = 0; i < N; i++)
        wait(NULL);

    for (int i = 0; i < N; i++)
        printf("arr[%d]=%d\n", i, arr[i]);

    munmap(arr, N * sizeof(int));
    shm_unlink("/kf_shm_array");
    return 0;
}'''
