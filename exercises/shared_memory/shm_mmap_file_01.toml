common_mistake = "Utiliser MAP_PRIVATE au lieu de MAP_SHARED → les écritures ne sont jamais reflétées dans le fichier"
description = """
NSY103 — mmap() peut aussi mapper un fichier ordinaire en mémoire (pas seulement shm_open). Les modifications au mapping sont écrites dans le fichier avec msync() ou automatiquement à munmap(). Cela permet de persister les données sur disque.

Créez un fichier temporaire, mappez-le avec mmap MAP_SHARED, écrivez une struct dedans, synchronisez avec msync, puis relisez depuis un nouveau mapping pour vérifier la persistance."""
difficulty = 4
exercise_type = "complete"
hints = [
    "MAP_SHARED avec un fichier fait que les écritures sont reflétées dans le fichier",
    "msync(ptr, len, MS_SYNC) force l'écriture synchrone sur disque",
    "Un second mmap sur le même fichier voit les données écrites",
]
id = "shm-mmap-file-01"
kc_ids = ["KC-C13"]
key_concept = "mmap sur fichier = mapping persisté sur disque ; msync force la synchronisation"
lang = "c"
prerequisites = ["shm-ringbuf-01"]
solution_code = '''
#include <stdlib.h>
#include <stdio.h>
#include <string.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <unistd.h>

typedef struct {
    int version;
    char data[32];
} FileData;

int main(void) {
    char tmpfile[] = "/tmp/kf_mmap_XXXXXX";
    int fd = mkstemp(tmpfile);
    ftruncate(fd, sizeof(FileData));

    FileData *w = (FileData *)mmap(NULL, sizeof(FileData),
        PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);

    w->version = 1;
    strncpy(w->data, "persisted", 31);
    msync(w, sizeof(FileData), MS_SYNC);
    munmap(w, sizeof(FileData));

    FileData *r = (FileData *)mmap(NULL, sizeof(FileData),
        PROT_READ, MAP_SHARED, fd, 0);
    printf("version=%d data=%s\n", r->version, r->data);
    munmap(r, sizeof(FileData));

    close(fd);
    unlink(tmpfile);
    return 0;
}'''
