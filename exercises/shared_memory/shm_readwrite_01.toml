common_mistake = "Utiliser MAP_PRIVATE au lieu de MAP_SHARED → chaque processus a sa propre copie (copy-on-write)"
description = """
NSY103 — Après fork(), parent et enfant partagent le segment mmap(MAP_SHARED). Les écritures de l'un sont visibles par l'autre immédiatement. L'enfant écrit, le parent lit après wait().

Créez un segment partagé. L'enfant y écrit la valeur 99. Le parent attend l'enfant puis lit et affiche la valeur."""
difficulty = 1
exercise_type = "complete"
hints = [
    "MAP_SHARED fait que les modifications sont visibles entre processus (pas MAP_PRIVATE)",
    "L'enfant écrit *shared = 99 avant _exit()",
    "Le parent fait wait() pour s'assurer que l'enfant a fini d'écrire",
]
id = "shm-readwrite-01"
kc_ids = ["KC-C13"]
key_concept = "MAP_SHARED + fork() = même page physique ; les écritures sont immédiatement visibles"
lang = "c"
prerequisites = ["shm-create-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <sys/mman.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>

int main(void) {
    int fd = shm_open("/kf_shm_rw", O_CREAT | O_RDWR, 0644);
    ftruncate(fd, 4096);
    int *shared = (int *)mmap(NULL, 4096, PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);

    *shared = 0;
    pid_t pid = fork();
    if (pid == 0) {
        *shared = 99;
        _exit(0);
    }
    wait(NULL);
    printf("Parent reads: %d\n", *shared);

    munmap(shared, 4096);
    shm_unlink("/kf_shm_rw");
    return 0;
}'''
