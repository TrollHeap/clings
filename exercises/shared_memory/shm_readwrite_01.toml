/* == EXEMPLE =======================================
 * Enfant ecrit un char, parent le lit
 * ================================================= */
void example_shm_char(void) {
    int fd = shm_open("/kf_ex_char", O_CREAT|O_RDWR, 0644);
    ftruncate(fd, 4096);
    char *p = (char *)mmap(NULL, 4096, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);
    *p = 'X';
    if (fork() == 0) { *p = 'Z'; _exit(0); }
    wait(NULL);
    printf("char: %c\n", *p);
    munmap(p, 4096); shm_unlink("/kf_ex_char");
}
/* Resultat: char: Z */

