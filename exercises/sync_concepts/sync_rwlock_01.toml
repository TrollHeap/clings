common_mistake = "Utiliser rdlock pour une opération d'écriture — le read lock ne garantit pas l'exclusion mutuelle entre lecteurs"
description = """
NSY103 — Un read-write lock permet plusieurs lecteurs simultanés mais un seul écrivain exclusif. pthread_rwlock_rdlock pour la lecture, pthread_rwlock_wrlock pour l'écriture. Les lecteurs ne se bloquent pas entre eux.

Utilisez un rwlock pour protéger un compteur avec 3 lecteurs et 1 écrivain."""
difficulty = 3
exercise_type = "complete"
hints = [
    "pthread_rwlock_wrlock et rdlock prennent l'adresse : &rwlock",
    "La fonction lecteur à passer à pthread_create est reader",
    "rdlock permet plusieurs lecteurs simultanés, wrlock est exclusif",
]
id = "sync-rwlock-01"
kc_ids = ["KC-C22"]
key_concept = "rwlock : N lecteurs simultanés OU 1 écrivain exclusif — optimal quand les lectures sont fréquentes et les écritures rares"
lang = "c"
prerequisites = [
    "sync-mutex-order-01",
    "sync-condvar-01",
]
solution_code = '''
#include <stdio.h>
#include <pthread.h>
#include <unistd.h>

pthread_rwlock_t rwlock = PTHREAD_RWLOCK_INITIALIZER;
int shared_data = 0;

void *writer(void *arg) {
    (void)arg;
    for (int i = 0; i < 5; i++) {
        pthread_rwlock_wrlock(&rwlock);
        shared_data++;
        pthread_rwlock_unlock(&rwlock);
    }
    return NULL;
}

void *reader(void *arg) {
    int id = *(int *)arg;
    pthread_rwlock_rdlock(&rwlock);
    printf("Lecteur %d: data = %d\n", id, shared_data);
    pthread_rwlock_unlock(&rwlock);
    return NULL;
}

int main(void) {
    pthread_t tw, tr[3];
    int ids[3] = {0, 1, 2};
    pthread_create(&tw, NULL, writer, NULL);
    pthread_join(tw, NULL);
    for (int i = 0; i < 3; i++)
        pthread_create(&tr[i], NULL, reader, &ids[i]);
    for (int i = 0; i < 3; i++)
        pthread_join(tr[i], NULL);
    printf("Final: %d\n", shared_data);
    pthread_rwlock_destroy(&rwlock);
    return 0;
}'''
