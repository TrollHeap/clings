common_mistake = "Problème ABA : entre le load et le CAS, un autre thread peut pop puis push un noeud différent à la même adresse"
description = """
NSY103 — Une structure lock-free utilise des opérations atomiques au lieu de mutex. Une pile (stack) lock-free LIFO utilise CAS pour modifier atomiquement le pointeur de tête. push et pop tentent un CAS en boucle jusqu'à succès.

Implémentez une pile lock-free avec __atomic_compare_exchange_n sur le pointeur head."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Dans push, n->next doit pointer vers l'ancien head : old_head",
    "Le CAS dans push remplace head par le nouveau noeud n",
    "Une pile vide a head == NULL",
]
id = "sync-lockfree-01"
kc_ids = ["KC-C22"]
key_concept = "Lock-free : CAS en boucle retry — si un autre thread modifie head entre load et CAS, le CAS échoue et on retente"
lang = "c"
prerequisites = ["sync-spinlock-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <pthread.h>

typedef struct Node {
    int value;
    struct Node *next;
} Node;

Node *head = NULL;

void push(int val) {
    Node *n = malloc(sizeof(Node));
    n->value = val;
    Node *old_head;
    do {
        old_head = __atomic_load_n(&head, __ATOMIC_ACQUIRE);
        n->next = old_head;
    } while (!__atomic_compare_exchange_n(&head, &old_head, n, 0,
            __ATOMIC_RELEASE, __ATOMIC_RELAXED));
}

int pop(int *val) {
    Node *old_head;
    do {
        old_head = __atomic_load_n(&head, __ATOMIC_ACQUIRE);
        if (old_head == NULL) return 0;
    } while (!__atomic_compare_exchange_n(&head, &old_head,
            old_head->next, 0, __ATOMIC_RELEASE, __ATOMIC_RELAXED));
    *val = old_head->value;
    free(old_head);
    return 1;
}

int main(void) {
    push(10);
    push(20);
    push(30);
    int val;
    while (pop(&val)) {
        printf("%d\n", val);
    }
    printf("Pile vide\n");
    return 0;
}'''
