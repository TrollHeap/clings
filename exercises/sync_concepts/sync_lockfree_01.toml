#include <stdio.h>
#include <stdlib.h>
#include <pthread.h>

/* == EXEMPLE ===============================================
 * Compteur lock-free avec fetch-and-add
 * Pas besoin de CAS pour un simple compteur.
 * ========================================================= */
int lf_counter = 0;

void *lf_worker(void *arg) {
    (void)arg;
    for (int i = 0; i < 1000; i++)
        __atomic_add_fetch(&lf_counter, 1, __ATOMIC_SEQ_CST);
    return NULL;
}

int main(void) {
    printf("Lock-free counter simple\n");
    printf("Counter: %d (devrait être 0)\n", lf_counter);
    return 0;
}
