common_mistake = "Utiliser if au lieu de while pour tester la condition — les spurious wakeups peuvent réveiller le thread sans que la condition soit vraie"
description = """
NSY103 — Une variable de condition (condvar) permet à un thread d'attendre qu'une condition soit vraie. pthread_cond_wait libère le mutex et bloque atomiquement. pthread_cond_signal réveille un thread en attente.

Implémentez un producteur-consommateur simple avec une condvar."""
difficulty = 2
exercise_type = "complete"
hints = [
    "L'initialiseur statique est PTHREAD_COND_INITIALIZER",
    "pthread_cond_signal prend l'adresse : &cond",
    "La condition à tester dans le while est data_ready",
]
id = "sync-condvar-01"
kc_ids = ["KC-C22"]
key_concept = "pthread_cond_wait libère le mutex et bloque atomiquement — toujours dans une boucle while pour les spurious wakeups"
lang = "c"
prerequisites = ["sync-mutex-order-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

pthread_mutex_t mtx = PTHREAD_MUTEX_INITIALIZER;
pthread_cond_t cond = PTHREAD_COND_INITIALIZER;
int data_ready = 0;
int shared_data = 0;

void *producer(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mtx);
    shared_data = 42;
    data_ready = 1;
    printf("Producteur: data = %d\n", shared_data);
    pthread_cond_signal(&cond);
    pthread_mutex_unlock(&mtx);
    return NULL;
}

void *consumer(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mtx);
    while (!data_ready) {
        pthread_cond_wait(&cond, &mtx);
    }
    printf("Consommateur: data = %d\n", shared_data);
    pthread_mutex_unlock(&mtx);
    return NULL;
}

int main(void) {
    pthread_t tp, tc;
    pthread_create(&tc, NULL, consumer, NULL);
    pthread_create(&tp, NULL, producer, NULL);
    pthread_join(tp, NULL);
    pthread_join(tc, NULL);
    printf("Synchronisation OK\n");
    return 0;
}'''
