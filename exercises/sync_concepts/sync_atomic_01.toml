common_mistake = "Oublier le & devant la variable — __atomic_add_fetch prend un pointeur, pas une valeur"
description = """
NSY103 — Les builtins __atomic de GCC garantissent des opérations indivisibles sur des variables partagées, sans mutex. __atomic_add_fetch effectue une addition atomique et retourne la nouvelle valeur.

Utilisez __atomic_add_fetch pour incrémenter un compteur de manière thread-safe avec deux threads."""
difficulty = 1
exercise_type = "complete"
hints = [
    "Le builtin est __atomic_add_fetch pour addition atomique",
    "Le premier argument est l'adresse : &counter",
    "Le résultat attendu est 200000 car les opérations sont atomiques",
]
id = "sync-atomic-01"
kc_ids = ["KC-C22"]
key_concept = "__atomic_add_fetch(&var, val, order) effectue var += val de manière atomique et retourne la nouvelle valeur"
lang = "c"
prerequisites = ["sync-race-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

int counter = 0;

void *increment(void *arg) {
    (void)arg;
    for (int i = 0; i < 100000; i++) {
        __atomic_add_fetch(&counter, 1, __ATOMIC_SEQ_CST);
    }
    return NULL;
}

int main(void) {
    pthread_t t1, t2;
    pthread_create(&t1, NULL, increment, NULL);
    pthread_create(&t2, NULL, increment, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    printf("Counter: %d\n", counter);
    printf("Atomique: %s\n", counter == 200000 ? "OUI" : "NON");
    return 0;
}'''
