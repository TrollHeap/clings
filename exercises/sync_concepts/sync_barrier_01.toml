common_mistake = "Initialiser la barrière avec un mauvais compte — si count > nombre réel de threads, les threads attendent indéfiniment"
description = """
NSY103 — Une barrière pthread bloque tous les threads participants jusqu'à ce que le nombre requis de threads ait atteint la barrière. Tous sont alors libérés simultanément.

pthread_barrier_init initialise avec un compte, pthread_barrier_wait bloque jusqu'à ce que count threads attendent."""
difficulty = 2
exercise_type = "complete"
hints = [
    "pthread_barrier_wait prend l'adresse : &barrier",
    "Le nombre de threads pour la barrière est NUM_THREADS",
    "pthread_barrier_destroy prend aussi &barrier",
]
id = "sync-barrier-01"
kc_ids = ["KC-C22"]
key_concept = "pthread_barrier_wait bloque jusqu'à ce que count threads aient appelé wait — synchronisation de phase"
lang = "c"
prerequisites = ["sync-mutex-order-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

#define NUM_THREADS 3

pthread_barrier_t barrier;

void *worker(void *arg) {
    int id = *(int *)arg;
    printf("Thread %d: avant barriere\n", id);
    pthread_barrier_wait(&barrier);
    printf("Thread %d: apres barriere\n", id);
    return NULL;
}

int main(void) {
    pthread_t threads[NUM_THREADS];
    int ids[NUM_THREADS];
    pthread_barrier_init(&barrier, NULL, NUM_THREADS);
    for (int i = 0; i < NUM_THREADS; i++) {
        ids[i] = i;
        pthread_create(&threads[i], NULL, worker, &ids[i]);
    }
    for (int i = 0; i < NUM_THREADS; i++) {
        pthread_join(threads[i], NULL);
    }
    pthread_barrier_destroy(&barrier);
    printf("Tous passes!\n");
    return 0;
}'''
