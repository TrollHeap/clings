common_mistake = "Verrouiller mutex_b avant mutex_a dans un thread et inversement dans l'autre — deadlock garanti sous charge"
description = """
NSY103 — Un deadlock survient quand deux threads verrouillent deux mutex dans un ordre différent : T1 prend A puis attend B, T2 prend B puis attend A. La solution est d'imposer un ordre de verrouillage global (toujours A avant B).

Corrigez un deadlock en imposant un ordre de verrouillage consistant."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Pour éviter un deadlock, les deux workers doivent verrouiller dans le MÊME ordre",
    "L'ordre correct est toujours mutex_a d'abord, puis mutex_b",
    "Le déverrouillage se fait dans l'ordre inverse : mutex_b puis mutex_a",
]
id = "sync-mutex-order-01"
kc_ids = ["KC-C22"]
key_concept = "Toujours verrouiller les mutex dans le même ordre global pour éviter les deadlocks (lock ordering)"
lang = "c"
prerequisites = ["sync-race-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

pthread_mutex_t mutex_a = PTHREAD_MUTEX_INITIALIZER;
pthread_mutex_t mutex_b = PTHREAD_MUTEX_INITIALIZER;
int resource_a = 0;
int resource_b = 0;

void *worker1(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mutex_a);
    pthread_mutex_lock(&mutex_b);
    resource_a += 10;
    resource_b += 10;
    pthread_mutex_unlock(&mutex_b);
    pthread_mutex_unlock(&mutex_a);
    return NULL;
}

void *worker2(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mutex_a);
    pthread_mutex_lock(&mutex_b);
    resource_a += 20;
    resource_b += 20;
    pthread_mutex_unlock(&mutex_b);
    pthread_mutex_unlock(&mutex_a);
    return NULL;
}

int main(void) {
    pthread_t t1, t2;
    pthread_create(&t1, NULL, worker1, NULL);
    pthread_create(&t2, NULL, worker2, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    printf("resource_a: %d\n", resource_a);
    printf("resource_b: %d\n", resource_b);
    printf("Pas de deadlock!\n");
    return 0;
}'''
