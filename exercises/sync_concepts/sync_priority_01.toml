common_mistake = "Confondre PRIO_INHERIT (héritage dynamique) avec PRIO_PROTECT (plafond statique) — PROTECT fixe une priorité maximale à la création"
description = """
NSY103 — L'inversion de priorité survient quand un thread haute priorité est bloqué par un thread basse priorité qui détient un mutex. Le protocole d'héritage de priorité (PTHREAD_PRIO_INHERIT) résout ce problème en élevant temporairement la priorité du détenteur du mutex.

Démontrez l'inversion de priorité et sa résolution avec PTHREAD_PRIO_INHERIT."""
difficulty = 4
exercise_type = "complete"
hints = [
    "La constante pour l'héritage de priorité est PTHREAD_PRIO_INHERIT",
    "La fonction haute priorité est high_priority",
    "PRIO_INHERIT élève la priorité du détenteur du mutex au niveau du thread bloqué",
]
id = "sync-priority-01"
kc_ids = ["KC-C22"]
key_concept = "PTHREAD_PRIO_INHERIT : le thread détenant le mutex hérite de la priorité du thread bloqué le plus prioritaire"
lang = "c"
prerequisites = [
    "sync-mutex-order-01",
    "sync-condvar-01",
]
solution_code = '''
#include <stdio.h>
#include <pthread.h>
#include <unistd.h>

pthread_mutex_t mtx;

void *low_priority(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mtx);
    printf("Low: lock acquis\n");
    usleep(200000);
    printf("Low: travail termine\n");
    pthread_mutex_unlock(&mtx);
    return NULL;
}

void *high_priority(void *arg) {
    (void)arg;
    usleep(50000);
    printf("High: tentative lock\n");
    pthread_mutex_lock(&mtx);
    printf("High: lock acquis\n");
    pthread_mutex_unlock(&mtx);
    return NULL;
}

int main(void) {
    pthread_mutexattr_t attr;
    pthread_mutexattr_init(&attr);
    pthread_mutexattr_setprotocol(&attr, PTHREAD_PRIO_INHERIT);
    pthread_mutex_init(&mtx, &attr);
    pthread_mutexattr_destroy(&attr);

    pthread_t tl, th;
    pthread_create(&tl, NULL, low_priority, NULL);
    pthread_create(&th, NULL, high_priority, NULL);
    pthread_join(tl, NULL);
    pthread_join(th, NULL);
    printf("Protocole: PRIO_INHERIT\n");
    printf("Inversion resolue\n");
    pthread_mutex_destroy(&mtx);
    return 0;
}'''
