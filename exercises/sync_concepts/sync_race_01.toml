common_mistake = "Penser que counter++ est une opération indivisible — en réalité c'est 3 instructions assembleur"
description = """
NSY103 — Une race condition se produit quand deux threads accèdent simultanément à une variable partagée sans synchronisation. Le résultat dépend de l'ordre d'exécution (non déterministe).

Créez deux threads qui incrémentent un compteur partagé 100000 fois chacun, puis affichez le résultat (qui sera probablement < 200000)."""
difficulty = 1
exercise_type = "complete"
hints = [
    "L'incrémentation est simplement counter++ dans la boucle",
    "La fonction à passer à pthread_create est increment",
    "L'opérateur de comparaison est < (counter < 200000)",
]
id = "sync-race-01"
kc_ids = ["KC-C22"]
key_concept = "counter++ n'est pas atomique : read-modify-write peut être interrompu entre threads"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <pthread.h>

int counter = 0;

void *increment(void *arg) {
    (void)arg;
    for (int i = 0; i < 100000; i++) {
        counter++;
    }
    return NULL;
}

int main(void) {
    pthread_t t1, t2;
    pthread_create(&t1, NULL, increment, NULL);
    pthread_create(&t2, NULL, increment, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    printf("Counter: %d\n", counter);
    printf("Expected: 200000\n");
    printf("Race condition: %s\n", counter < 200000 ? "OUI" : "NON");
    return 0;
}'''
