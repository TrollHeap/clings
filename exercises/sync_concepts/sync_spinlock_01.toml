#include <stdio.h>
#include <pthread.h>

/* == EXEMPLE ===============================================
 * Test-and-set avec __atomic_exchange_n
 * Plus simple que CAS mais moins flexible.
 * ========================================================= */
int ex_lock = 0;

void tas_lock(int *lk) {
    while (__atomic_exchange_n(lk, 1, __ATOMIC_ACQUIRE)) {
        /* spin : exchange retourne l'ancienne valeur */
        /* si ancienne == 1, le lock était pris → on reboucle */
    }
}

void tas_unlock(int *lk) {
    __atomic_store_n(lk, 0, __ATOMIC_RELEASE);
}

int main(void) {
    printf("Test-and-set spinlock\n");
    tas_lock(&ex_lock);
    printf("Lock acquis\n");
    tas_unlock(&ex_lock);
    printf("Lock libere\n");
    return 0;
}
