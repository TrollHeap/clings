common_mistake = "Oublier de remettre expected à 0 après un CAS raté — expected est modifié par la fonction et contient la valeur actuelle"
description = """
NSY103 — Un spinlock est un verrou qui boucle activement (busy-wait) en attendant d'acquérir le verrou. __atomic_compare_exchange_n tente de remplacer atomiquement une valeur attendue par une nouvelle valeur. Si la variable contient la valeur attendue, elle est remplacée et la fonction retourne true.

Implémentez un spinlock avec __atomic_compare_exchange_n."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Pour acquérir le lock, on remplace 0 par 1 : le troisième argument est 1",
    "Si CAS échoue, expected a été modifié — il faut le remettre à 0 pour retenter",
    "Pour libérer le lock, on remet la valeur à 0 avec __atomic_store_n",
]
id = "sync-spinlock-01"
kc_ids = ["KC-C22"]
key_concept = "CAS (Compare-And-Swap) : si *ptr == expected alors *ptr = desired, sinon expected = *ptr — base de toute synchronisation lock-free"
lang = "c"
prerequisites = [
    "sync-atomic-01",
    "sync-mutex-order-01",
]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

int lock = 0;
int counter = 0;

void spin_lock(int *lk) {
    int expected = 0;
    while (!__atomic_compare_exchange_n(lk, &expected, 1, 0,
            __ATOMIC_ACQUIRE, __ATOMIC_RELAXED)) {
        expected = 0;
    }
}

void spin_unlock(int *lk) {
    __atomic_store_n(lk, 0, __ATOMIC_RELEASE);
}

void *worker(void *arg) {
    (void)arg;
    for (int i = 0; i < 100000; i++) {
        spin_lock(&lock);
        counter++;
        spin_unlock(&lock);
    }
    return NULL;
}

int main(void) {
    pthread_t t1, t2;
    pthread_create(&t1, NULL, worker, NULL);
    pthread_create(&t2, NULL, worker, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    printf("Counter: %d\n", counter);
    printf("Spinlock OK: %s\n", counter == 200000 ? "OUI" : "NON");
    return 0;
}'''
