common_mistake = "Libérer l'ancienne version avant que tous les lecteurs aient terminé — use-after-free garanti"
description = """
NSY103 — RCU (Read-Copy-Update) est un mécanisme de synchronisation où les lecteurs accèdent aux données sans verrou. L'écrivain crée une copie modifiée, puis remplace atomiquement le pointeur. L'ancienne version est libérée après que tous les lecteurs aient terminé (grâce period = join des threads lecteurs).

Implémentez un RCU simplifié avec un pointeur atomique. La grâce period est simulée par le join des threads lecteurs."""
difficulty = 4
exercise_type = "complete"
hints = [
    "rcu_read charge le pointeur global_data atomiquement avec __atomic_load_n",
    "copy->value reçoit le paramètre new_value, puis __atomic_store_n publie copy",
    "rcu_update retourne l'ancien pointeur — on le libère après que les lecteurs aient fini (grâce period = join)",
]
id = "sync-rcu-01"
kc_ids = ["KC-C22"]
key_concept = "RCU : lecteurs sans verrou (load atomique), écrivain copie-modifie-remplace, libération après grâce period (join)"
lang = "c"
prerequisites = [
    "sync-spinlock-01",
    "sync-barrier-01",
]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <pthread.h>

typedef struct {
    int version;
    int value;
} Data;

Data *global_data = NULL;

void rcu_read(int reader_id) {
    Data *local = __atomic_load_n(&global_data, __ATOMIC_ACQUIRE);
    printf("Lecteur %d: v%d val=%d\n", reader_id,
           local->version, local->value);
}

Data *rcu_update(int new_value) {
    Data *old = __atomic_load_n(&global_data, __ATOMIC_ACQUIRE);
    Data *copy = malloc(sizeof(Data));
    memcpy(copy, old, sizeof(Data));
    copy->version = old->version + 1;
    copy->value = new_value;
    __atomic_store_n(&global_data, copy, __ATOMIC_RELEASE);
    printf("Update: v%d val=%d\n", copy->version, copy->value);
    return old;
}

void *reader_thread(void *arg) {
    int id = *(int *)arg;
    rcu_read(id);
    return NULL;
}

int main(void) {
    global_data = malloc(sizeof(Data));
    global_data->version = 1;
    global_data->value = 100;
    printf("Init: v%d val=%d\n", global_data->version, global_data->value);

    /* Update: copy-on-write */
    Data *old = rcu_update(200);

    /* Lecteurs voient la nouvelle version */
    pthread_t t[2];
    int ids[2] = {0, 1};
    for (int i = 0; i < 2; i++)
        pthread_create(&t[i], NULL, reader_thread, &ids[i]);
    for (int i = 0; i < 2; i++)
        pthread_join(t[i], NULL);

    /* Grâce period terminée: tous les lecteurs finis, libérer l'ancien */
    free(old);

    printf("Final: v%d val=%d\n",
           global_data->version, global_data->value);
    free(global_data);
    return 0;
}'''
