common_mistake = "Utiliser MAP_PRIVATE au lieu de MAP_SHARED — les modifications ne seront pas sauvées"
description = """
NSY103 — mmap permet de mapper un fichier directement en mémoire. Les lectures/écritures sur la zone mappée sont traduites en I/O fichier par le noyau. C'est plus efficace que read/write pour les gros fichiers.

Mappez un fichier en mémoire, lisez son contenu, modifiez-le via le mapping."""
difficulty = 2
exercise_type = "complete"
hints = [
    "mmap(NULL, len, prot, MAP_SHARED, fd, 0) mappe le fichier fd",
    "MAP_SHARED fait que les modifications sont visibles dans le fichier",
    "munmap libère le mapping — les données sont flushées vers le fichier",
]
id = "vm-mmap-01"
kc_ids = ["KC-C18"]
key_concept = "mmap MAP_SHARED mappe un fichier en mémoire — modifications visibles dans le fichier"
lang = "c"
prerequisites = ["vm-page-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_mmap.txt";
    int fd = open(path, O_CREAT | O_RDWR | O_TRUNC, 0644);
    const char *data = "Hello mmap world!";
    write(fd, data, strlen(data));
    size_t len = strlen(data);
    char *mapped = (char *)mmap(NULL, len,
        PROT_READ | PROT_WRITE,
        MAP_SHARED, fd, 0);
    if (mapped == MAP_FAILED) { perror("mmap"); close(fd); return 1; }
    close(fd);
    printf("Mapped: %s\n", mapped);
    mapped[0] = 'J';
    printf("Modified: %s\n", mapped);
    munmap(mapped, len);
    fd = open(path, O_RDONLY);
    char buf[64];
    ssize_t n = read(fd, buf, sizeof(buf) - 1);
    buf[n] = '\0';
    printf("File after: %s\n", buf);
    close(fd);
    unlink(path);
    return 0;
}'''
