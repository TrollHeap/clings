common_mistake = "Ne pas mettre à jour last_used lors d'un HIT — LRU doit enregistrer t à chaque accès, pas seulement lors des fautes"
description = """
NSY103/UTC502 — LRU (Least Recently Used) remplace la page dont l'accès le plus récent est le plus ancien. Il approxime le comportement optimal en exploitant la localité temporelle.

Implémentez LRU avec un tableau last_used[] qui enregistre le timestamp de dernier accès de chaque frame. Référence : {1,2,3,4,1,2,5,1,2,3,4,5}, 3 frames."""
difficulty = 3
exercise_type = "complete"
hints = [
    "find_lru() compare last_used[i] < last_used[lru] pour trouver la frame la moins récemment utilisée",
    "Pour chaque accès (hit ou fault), mettez à jour last_used[pos] = t avec le timestamp courant",
    "Phase de remplissage : tant que filled < FRAMES, utilisez frames[filled++] sans appeler find_lru",
]
id = "vm-page-replacement-lru-01"
kc_ids = ["KC-C14"]
key_concept = "LRU utilise last_used[] pour identifier la page la moins récemment accédée — meilleur que FIFO, approche l'optimum"
lang = "c"
prerequisites = ["vm-page-replacement-fifo-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define FRAMES 3
#define REFS 12

int find_lru(int last_used[], int n) {
    int lru = 0;
    for (int i = 1; i < n; i++)
        if (last_used[i] < last_used[lru]) lru = i;
    return lru;
}

int in_frames(int frames[], int n, int page) {
    for (int i = 0; i < n; i++)
        if (frames[i] == page) return i;
    return -1;
}

int main(void) {
    int refs[] = {1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5};
    int frames[FRAMES];
    int last_used[FRAMES];
    memset(frames, -1, sizeof(frames));
    memset(last_used, 0, sizeof(last_used));
    int faults = 0;
    int filled = 0;

    for (int t = 0; t < REFS; t++) {
        int idx = in_frames(frames, FRAMES, refs[t]);
        if (idx == -1) {
            int pos = (filled < FRAMES) ? filled++ : find_lru(last_used, FRAMES);
            frames[pos] = refs[t];
            last_used[pos] = t;
            faults++;
        } else {
            last_used[idx] = t;
        }
    }
    printf("Page faults: %d\n", faults);
    return 0;
}'''
