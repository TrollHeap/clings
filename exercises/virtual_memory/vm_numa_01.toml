common_mistake = "Allouer de la mémoire sur un thread puis l'utiliser sur un autre CPU/noeud — latence accrue"
description = """
NSY103 — Sur les systèmes NUMA (Non-Uniform Memory Access), chaque CPU a de la mémoire locale (rapide) et distante (lente). Le noyau alloue par défaut sur le noeud local (first-touch policy). get_mempolicy() et set_mempolicy() permettent de contrôler le placement.

Explorez la topologie NUMA du système et démontrez l'impact du placement mémoire."""
difficulty = 5
exercise_type = "complete"
hints = [
    "sched_getcpu() retourne le numéro du CPU sur lequel le thread tourne actuellement",
    "_SC_PHYS_PAGES donne le nombre total de pages physiques, _SC_NPROCESSORS_ONLN le nombre de CPUs en ligne",
    "La politique first-touch alloue la page sur le noeud NUMA du CPU qui la touche en premier",
]
id = "vm-numa-01"
kc_ids = ["KC-C18"]
key_concept = "NUMA: la mémoire locale est plus rapide — first-touch alloue sur le noeud du CPU courant"
lang = "c"
prerequisites = [
    "vm-tlb-01",
    "vm-overcommit-01",
]
solution_code = '''
#define _GNU_SOURCE
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>
#include <sched.h>
#include <errno.h>
int main(void) {
    int cpu = sched_getcpu();
    printf("Current CPU: %d\n", cpu);
    long pages_total = sysconf(_SC_PHYS_PAGES);
    long pages_avail = sysconf(_SC_AVPHYS_PAGES);
    long ps = sysconf(_SC_PAGESIZE);
    long total_mb = (pages_total * ps) / (1024 * 1024);
    long avail_mb = (pages_avail * ps) / (1024 * 1024);
    printf("Total RAM: %ld MB\n", total_mb);
    printf("Available RAM: %ld MB\n", avail_mb);
    int ncpus = (int)sysconf(_SC_NPROCESSORS_ONLN);
    printf("Online CPUs: %d\n", ncpus);
    size_t size = 4096 * 1024; /* 4MB */
    char *local = (char *)mmap(NULL, size,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (local == MAP_FAILED) { perror("mmap"); return 1; }
    memset(local, 'L', size);
    printf("Local alloc: %c (first-touch on CPU %d)\n", local[0], cpu);
    int populated = 1;
    for (size_t i = 0; i < size; i += (size_t)ps) {
        if (local[i] != 'L') { populated = 0; break; }
    }
    printf("All pages populated: %s\n", populated ? "yes" : "no");
    printf("NUMA awareness: %s\n",
        ncpus > 1 ? "multi-cpu system" : "single-cpu system");
    munmap(local, size);
    return 0;
}'''
