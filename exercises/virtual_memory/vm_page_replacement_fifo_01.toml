common_mistake = "Oublier le modulo FRAMES dans next = (next + 1) % FRAMES, ou ne pas incrémenter faults à chaque défaut"
description = """
NSY103/UTC502 — Quand la mémoire physique est pleine, le noyau doit choisir quelle page expulser. L'algorithme FIFO (First-In First-Out) remplace toujours la page chargée en premier.

Implémentez FIFO avec un pointeur circulaire sur 3 frames. Référence : {1,2,3,4,1,2,5,1,2,3,4,5}."""
difficulty = 2
exercise_type = "complete"
hints = [
    "in_frames() parcourt le tableau frames[] et renvoie 1 si la page y est présente",
    "Le pointeur next avance circulairement : next = (next + 1) % FRAMES",
    "Incrémentez faults à chaque défaut (page absente des frames)",
]
id = "vm-page-replacement-fifo-01"
kc_ids = ["KC-C14"]
key_concept = "FIFO remplace la page la plus ancienne via un pointeur circulaire — simple mais peut souffrir de l'anomalie de Bélády"
lang = "c"
prerequisites = ["vm-page-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define FRAMES 3
#define REFS 12

int in_frames(int frames[], int n, int page) {
    for (int i = 0; i < n; i++)
        if (frames[i] == page) return 1;
    return 0;
}

int main(void) {
    int refs[] = {1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5};
    int frames[FRAMES];
    memset(frames, -1, sizeof(frames));
    int faults = 0;
    int next = 0;  /* pointeur FIFO */

    for (int i = 0; i < REFS; i++) {
        if (!in_frames(frames, FRAMES, refs[i])) {
            frames[next] = refs[i];
            next = (next + 1) % FRAMES;
            faults++;
        }
    }
    printf("Page faults: %d\n", faults);
    return 0;
}'''
