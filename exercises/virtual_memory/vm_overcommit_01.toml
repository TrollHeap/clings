common_mistake = "Croire que mmap alloue immédiatement la mémoire physique — c'est du demand paging"
description = """
NSY103 — Linux utilise l'overcommit: mmap/malloc peuvent réserver plus de mémoire virtuelle que la RAM physique disponible. Les pages ne sont allouées physiquement qu'au premier accès (demand paging). Si la mémoire physique est épuisée, l'OOM killer termine des processus.

Démontrez l'overcommit en allouant une grande zone sans la toucher, puis en accédant à une petite partie."""
difficulty = 3
exercise_type = "complete"
hints = [
    "MAP_ANONYMOUS crée un mapping sans fichier backing — initialisé à zéro",
    "mincore() vérifie quelles pages sont résidentes en RAM (bit 0 du vecteur)",
    "L'overcommit permet à mmap de réussir même si la RAM est insuffisante",
]
id = "vm-overcommit-01"
kc_ids = ["KC-C18"]
key_concept = "L'overcommit permet de mapper plus que la RAM — les pages ne sont allouées qu'au premier accès"
lang = "c"
prerequisites = ["vm-mmap-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    size_t huge = 1UL << 30; /* 1 GB */
    char *mem = (char *)mmap(NULL, huge,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (mem == MAP_FAILED) { perror("mmap"); return 1; }
    printf("Mapped 1GB: success\n");
    size_t ps = (size_t)getpagesize();
    mem[0] = 'A';
    mem[ps] = 'B';
    mem[ps * 2] = 'C';
    printf("Touched 3 pages: %c%c%c\n", mem[0], mem[ps], mem[ps * 2]);
    unsigned char vec[3];
    int rc = mincore(mem, ps * 3, vec);
    printf("mincore result: %d\n", rc);
    int resident = 0;
    for (int i = 0; i < 3; i++) {
        if (vec[i] & 1) resident++;
    }
    printf("Resident pages: %d/3\n", resident);
    printf("Overcommit: %s\n", resident <= 3 ? "yes" : "no");
    munmap(mem, huge);
    return 0;
}'''
