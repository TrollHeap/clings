/* == EXEMPLE: observer le break avec malloc =========== */
void example_malloc_brk(void) {
    void *b1 = sbrk(0);
    void *p = malloc(1024);
    void *b2 = sbrk(0);
    printf("Break avant malloc: %p\n", b1);
    printf("Break après malloc: %p\n", b2);
    printf("malloc a bougé le break: %s\n", b2 > b1 ? "oui" : "non");
