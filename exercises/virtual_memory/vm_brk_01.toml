common_mistake = "Confondre la valeur retournée par sbrk(n): c'est l'ANCIEN break, pas le nouveau"
description = """
NSY103 — sbrk() et brk() sont les appels système historiques pour étendre le tas (heap). sbrk(0) retourne l'adresse actuelle du program break. sbrk(n) l'avance de n octets. malloc() utilise sbrk en interne pour les petites allocations.

Explorez le program break et observez comment il évolue avec sbrk et malloc."""
difficulty = 2
exercise_type = "complete"
hints = [
    "sbrk(0) retourne l'adresse actuelle du program break sans le modifier",
    "sbrk(n) avance le break de n octets et retourne l'ancien break",
    "sbrk(-n) recule le break — c'est ainsi que free() rend la mémoire",
]
id = "vm-brk-01"
kc_ids = ["KC-C18"]
key_concept = "sbrk étend/rétracte le tas en déplaçant le program break — base de malloc"
lang = "c"
prerequisites = ["vm-addr-01"]
solution_code = '''
#include <stddef.h>
#include <stdio.h>
#include <unistd.h>
#include <stdlib.h>
#include <stdint.h>
int main(void) {
    void *brk0 = sbrk(0);
    printf("Initial break: %p\n", brk0);
    void *brk1 = sbrk(4096);
    printf("After sbrk(4096): %p\n", brk1);
    void *brk2 = sbrk(0);
    printf("Current break: %p\n", brk2);
    ptrdiff_t diff = (char *)brk2 - (char *)brk0;
    printf("Moved: %td bytes\n", diff);
    printf("Moved 4096: %s\n", diff >= 4096 ? "yes" : "no");
    sbrk(-4096); /* retract */
    void *brk3 = sbrk(0);
    printf("After retract: %s\n",
        brk3 == brk0 ? "back to start" : "different");
    return 0;
}'''
