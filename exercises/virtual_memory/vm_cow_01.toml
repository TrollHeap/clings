common_mistake = "Utiliser MAP_SHARED au lieu de MAP_PRIVATE — avec MAP_SHARED les modifications sont visibles par les deux processus"
description = """
NSY103 — Après fork(), parent et enfant partagent les mêmes pages physiques en lecture seule (copy-on-write). Quand l'un écrit, la MMU génère un page fault et le noyau copie la page concernée. Cela rend fork() quasi-instantané même pour les gros processus.

Démontrez le COW: après fork, vérifiez que les données sont identiques puis que les modifications sont isolées."""
difficulty = 4
exercise_type = "complete"
hints = [
    "fork() duplique le processus — les pages MAP_PRIVATE sont copiées en COW",
    "waitpid(pid, &status, 0) attend la fin du processus enfant",
    "MAP_PRIVATE + COW: l'écriture de l'enfant ne modifie pas la copie du parent",
]
id = "vm-cow-01"
kc_ids = ["KC-C18"]
key_concept = "Le COW retarde la copie des pages après fork — la copie n'a lieu qu'à la première écriture"
lang = "c"
prerequisites = [
    "vm-protect-01",
    "vm-mmap-01",
]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <sys/wait.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    size_t ps = (size_t)getpagesize();
    char *shared = (char *)mmap(NULL, ps,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (shared == MAP_FAILED) { perror("mmap"); return 1; }
    strcpy(shared, "before fork");
    printf("Parent before fork: %s\n", shared);
    fflush(stdout);
    pid_t pid = fork();
    if (pid < 0) { perror("fork"); return 1; }
    if (pid == 0) {
        /* enfant */
        printf("Child sees: %s\n", shared);
        strcpy(shared, "child wrote");
        printf("Child after write: %s\n", shared);
        fflush(stdout);
        _exit(0);
    }
    /* parent */
    int status;
    waitpid(pid, &status, 0);
    printf("Parent after child: %s\n", shared);
    printf("COW isolated: %s\n",
        strcmp(shared, "before fork") == 0 ? "yes" : "no");
    munmap(shared, ps);
    return 0;
}'''
