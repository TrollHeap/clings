common_mistake = "Confondre MADV_DONTNEED (Linux: libère immédiatement) avec POSIX (simple conseil)"
description = """
NSY103 — madvise() informe le noyau de votre pattern d'accès mémoire. MADV_SEQUENTIAL optimise le prefetch linéaire, MADV_DONTNEED libère les pages (elles reviennent à zéro sur relecture), MADV_WILLNEED déclenche le prefetch.

Utilisez madvise MADV_DONTNEED pour libérer des pages et vérifiez qu'elles reviennent à zéro."""
difficulty = 3
exercise_type = "complete"
hints = [
    "madvise(addr, len, advice) envoie un conseil au noyau sur l'usage mémoire",
    "MADV_DONTNEED indique que les pages ne sont plus nécessaires — elles reviennent à zéro",
    "Seules les pages spécifiées sont affectées, les autres restent intactes",
]
id = "vm-madvise-01"
kc_ids = ["KC-C18"]
key_concept = "MADV_DONTNEED libère les pages — elles reviennent à zéro sur les mappings anonymes"
lang = "c"
prerequisites = ["vm-mmap-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    long ps = sysconf(_SC_PAGESIZE);
    size_t size = (size_t)ps * 2;
    char *m = (char *)mmap(NULL, size,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (m == MAP_FAILED) { perror("mmap"); return 1; }
    memset(m, 'X', size);
    printf("Before: m[0]=%c m[ps]=%c\n", m[0], m[ps]);
    int rc = madvise(m, (size_t)ps, MADV_DONTNEED);
    printf("madvise result: %d\n", rc);
    printf("After: m[0]=%d m[ps]=%c\n", (int)(unsigned char)m[0], m[ps]);
    printf("Page 0 zeroed: %s\n", m[0] == 0 ? "yes" : "no");
    printf("Page 1 intact: %s\n", m[ps] == 'X' ? "yes" : "no");
    munmap(m, size);
    return 0;
}'''
