common_mistake = "Ne pas appeler msync avant munmap — les données peuvent être perdues en cas de crash"
description = """
NSY103 — msync() force l'écriture des pages modifiées d'un mapping vers le fichier backing. MS_SYNC est bloquant (attend la fin), MS_ASYNC demande au noyau de planifier l'écriture.

Utilisez msync pour garantir la persistance des modifications d'un mmap."""
difficulty = 2
exercise_type = "complete"
hints = [
    "msync(addr, len, flags) synchronise les pages modifiées vers le fichier",
    "MS_SYNC est bloquant — retourne quand l'écriture est terminée",
    "MS_ASYNC demande au noyau de planifier — retourne immédiatement",
]
id = "vm-msync-01"
kc_ids = ["KC-C18"]
key_concept = "msync MS_SYNC force la persistance des pages modifiées vers le fichier"
lang = "c"
prerequisites = ["vm-mmap-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_msync.txt";
    int fd = open(path, O_CREAT | O_RDWR | O_TRUNC, 0644);
    const char *init = "original data here";
    write(fd, init, strlen(init));
    size_t len = strlen(init);
    char *m = (char *)mmap(NULL, len, PROT_READ | PROT_WRITE,
        MAP_SHARED, fd, 0);
    if (m == MAP_FAILED) { perror("mmap"); close(fd); return 1; }
    close(fd);
    memcpy(m, "MODIFIED DATA HERE", len);
    int rc = msync(m, len, MS_SYNC);
    printf("msync result: %d\n", rc);
    fd = open(path, O_RDONLY);
    char buf[64];
    ssize_t n = read(fd, buf, sizeof(buf) - 1);
    buf[n] = '\0';
    printf("File: %s\n", buf);
    printf("Synced: %s\n", strcmp(buf, "MODIFIED DATA HERE") == 0 ? "yes" : "no");
    close(fd);
    munmap(m, len);
    unlink(path);
    return 0;
}'''
