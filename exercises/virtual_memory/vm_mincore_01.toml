common_mistake = "Oublier que mincore nécessite un buffer d'au moins ceil(len/page_size) octets"
description = """
NSY103 — mincore() indique quelles pages d'un mapping sont actuellement en RAM (résidentes). Un octet par page: bit 0 = 1 si résident. C'est utile pour le profilage et l'optimisation I/O.

Utilisez mincore pour vérifier la résidence des pages après écriture."""
difficulty = 3
exercise_type = "complete"
hints = [
    "mincore(addr, len, vec) remplit vec avec 1 octet par page",
    "Le bit 0 de chaque octet indique si la page est en RAM",
    "Les pages touchées (écrites) sont résidentes, les autres peuvent ne pas l'être",
]
id = "vm-mincore-01"
kc_ids = ["KC-C18"]
key_concept = "mincore révèle quelles pages sont résidentes en RAM — diagnostic de performance"
lang = "c"
prerequisites = ["vm-mmap-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    long ps = sysconf(_SC_PAGESIZE);
    size_t size = (size_t)ps * 4;
    char *m = (char *)mmap(NULL, size,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (m == MAP_FAILED) { perror("mmap"); return 1; }
    size_t npages = size / (size_t)ps;
    unsigned char vec[4];
    memset(m, 'A', (size_t)ps);
    memset(m + 2 * ps, 'C', (size_t)ps);
    int rc = mincore(m, size, vec);
    printf("mincore result: %d\n", rc);
    int resident = 0;
    for (size_t i = 0; i < npages; i++) {
        printf("Page %zu: %s\n", i, (vec[i] & 1) ? "resident" : "not resident");
        if (vec[i] & 1) resident++;
    }
    printf("Resident pages: %d/%zu\n", resident, npages);
    printf("At least 2 resident: %s\n", resident >= 2 ? "yes" : "no");
    munmap(m, size);
    return 0;
}'''
