common_mistake = "Supposer que MAP_HUGETLB fonctionne toujours — il faut des huge pages pré-réservées dans /proc/sys/vm/nr_hugepages"
description = """
NSY103 — Les huge pages (2MB ou 1GB sur x86_64) réduisent la pression sur le TLB en utilisant moins d'entrées pour couvrir la même mémoire. MAP_HUGETLB demande des huge pages au noyau. On peut aussi utiliser madvise avec MADV_HUGEPAGE pour le transparent huge pages (THP).

Comparez la taille de page standard avec les huge pages et explorez les constantes associées."""
difficulty = 3
exercise_type = "complete"
hints = [
    "madvise(addr, len, MADV_HUGEPAGE) demande au noyau d'utiliser des transparent huge pages",
    "Une huge page de 2MB = 512 pages standard de 4KB",
    "munmap libère le mapping, qu'il soit en pages standard ou huge pages",
]
id = "vm-hugepage-01"
kc_ids = ["KC-C18"]
key_concept = "Les huge pages (2MB) réduisent les TLB misses en couvrant 512x plus de mémoire par entrée"
lang = "c"
prerequisites = [
    "vm-mmap-01",
    "vm-page-01",
]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>

#ifndef MAP_HUGE_2MB
#define MAP_HUGE_2MB (21 << MAP_HUGE_SHIFT)
#endif

int main(void) {
    long ps = getpagesize();
    long hp_size = 2L * 1024 * 1024; /* 2MB */
    printf("Standard page: %ld bytes\n", ps);
    printf("Huge page: %ld bytes\n", hp_size);
    printf("Ratio: %ld standard pages per huge page\n", hp_size / ps);
    long tlb_entries = 1024;
    long coverage_std = tlb_entries * ps;
    long coverage_hp = tlb_entries * hp_size;
    printf("TLB coverage (standard): %ld MB\n", coverage_std / (1024 * 1024));
    printf("TLB coverage (huge): %ld MB\n", coverage_hp / (1024 * 1024));
    char *mem = (char *)mmap(NULL, hp_size,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (mem == MAP_FAILED) { perror("mmap"); return 1; }
    int rc = madvise(mem, (size_t)hp_size, MADV_HUGEPAGE);
    printf("madvise HUGEPAGE: %s\n", rc == 0 ? "ok" : "unsupported");
    memset(mem, 'H', (size_t)hp_size);
    printf("Filled 2MB: %c...%c\n", mem[0], mem[hp_size - 1]);
    munmap(mem, (size_t)hp_size);
    return 0;
}'''
