common_mistake = "Retourner 0 au lieu de n dans next_use() quand la page n'est plus accédée — une page jamais réutilisée doit avoir priorité maximale d'éviction"
description = """
NSY103/UTC502 — L'algorithme optimal de Bélády (OPT) remplace la page dont le prochain accès est le plus éloigné dans le futur. Irréalisable en pratique (nécessite de connaître le futur), il sert de borne inférieure théorique pour évaluer les autres algorithmes.

Implémentez OPT : pour chaque défaut, calculez next_use() pour chaque page en mémoire et expulsez celle dont l'utilisation future est la plus lointaine. Référence : {1,2,3,4,1,2,5,1,2,3,4,5}, 3 frames."""
difficulty = 4
exercise_type = "complete"
hints = [
    "next_use() parcourt refs[from..n-1] et retourne l'index du premier accès futur à page — retournez n (infini) si la page n'est plus utilisée",
    "find_opt() appelle next_use() pour chaque frame et retourne l'index de la frame avec le next_use le plus grand",
    "Dans main, appelez find_opt(frames, refs, REFS, i + 1) — le +1 car on cherche l'utilisation APRÈS l'accès courant",
]
id = "vm-page-replacement-opt-01"
kc_ids = ["KC-C14"]
key_concept = "OPT remplace la page dont l'accès futur est le plus éloigné — borne théorique inférieure, impossible en production"
lang = "c"
prerequisites = ["vm-page-replacement-lru-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define FRAMES 3
#define REFS 12

int next_use(int refs[], int n, int from, int page) {
    for (int i = from; i < n; i++)
        if (refs[i] == page) return i;
    return n;
}

int find_opt(int frames[], int refs[], int n, int from) {
    int farthest = -1, victim = 0;
    for (int i = 0; i < FRAMES; i++) {
        int nu = next_use(refs, n, from, frames[i]);
        if (nu > farthest) {
            farthest = nu;
            victim = i;
        }
    }
    return victim;
}

int in_frames(int frames[], int n, int page) {
    for (int i = 0; i < n; i++)
        if (frames[i] == page) return 1;
    return 0;
}

int main(void) {
    int refs[] = {1, 2, 3, 4, 1, 2, 5, 1, 2, 3, 4, 5};
    int frames[FRAMES];
    memset(frames, -1, sizeof(frames));
    int faults = 0;
    int filled = 0;

    for (int i = 0; i < REFS; i++) {
        if (!in_frames(frames, FRAMES, refs[i])) {
            if (filled < FRAMES) {
                frames[filled++] = refs[i];
            } else {
                int victim = find_opt(frames, refs, REFS, i + 1);
                frames[victim] = refs[i];
            }
            faults++;
        }
    }
    printf("Page faults: %d\n", faults);
    return 0;
}'''
