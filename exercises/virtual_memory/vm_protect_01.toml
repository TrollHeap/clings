/* == EXEMPLE: PROT_NONE interdit tout accès =========== */
static jmp_buf ex_jmp;
static void ex_handler(int sig) { (void)sig; longjmp(ex_jmp, 1); }
void example_none(void) {
    size_t ps = (size_t)getpagesize();
    char *p = mmap(NULL, ps, PROT_READ|PROT_WRITE, MAP_PRIVATE|MAP_ANONYMOUS, -1, 0);
    p[0] = 'A';
    mprotect(p, ps, PROT_NONE);
    signal(SIGSEGV, ex_handler);
    if (setjmp(ex_jmp) == 0) { char c = p[0]; (void)c; printf("Read ok\n"); }
    else { printf("PROT_NONE: lecture interdite\n"); }
    munmap(p, ps);
}

