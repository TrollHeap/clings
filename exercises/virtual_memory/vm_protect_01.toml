common_mistake = "Passer une adresse non alignée à mprotect — elle doit être un multiple de la taille de page"
description = """
NSY103 — mprotect() change les permissions d'une zone mémoire (lecture, écriture, exécution). Les permissions sont vérifiées par la MMU à chaque accès. Tenter un accès interdit provoque un SIGSEGV.

Allouez une zone avec mmap, changez ses permissions avec mprotect, et vérifiez le comportement."""
difficulty = 2
exercise_type = "complete"
hints = [
    "mprotect(addr, len, prot) change les permissions d'une zone mémoire",
    "PROT_READ seul interdit l'écriture — tentative = SIGSEGV",
    "L'adresse doit être alignée sur une frontière de page",
]
id = "vm-protect-01"
kc_ids = ["KC-C18"]
key_concept = "mprotect change les permissions de pages mémoire — la MMU les applique matériellement"
lang = "c"
prerequisites = ["vm-mmap-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <signal.h>
#include <setjmp.h>
#include <string.h>

static jmp_buf jump_buf;
static void handler(int sig) { (void)sig; longjmp(jump_buf, 1); }

int main(void) {
    size_t ps = (size_t)getpagesize();
    char *mem = (char *)mmap(NULL, ps, PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (mem == MAP_FAILED) { perror("mmap"); return 1; }
    strcpy(mem, "writable");
    printf("Before protect: %s\n", mem);
    int rc = mprotect(mem, ps, PROT_READ);
    printf("mprotect result: %d\n", rc);
    printf("Read after protect: %s\n", mem);
    signal(SIGSEGV, handler);
    if (setjmp(jump_buf) == 0) {
        mem[0] = 'X';
        printf("Write succeeded\n");
    } else {
        printf("Write blocked: SIGSEGV caught\n");
    }
    mprotect(mem, ps, PROT_READ | PROT_WRITE);
    mem[0] = 'W';
    printf("After restore: %c%s\n", mem[0], mem + 1);
    munmap(mem, ps);
    return 0;
}'''
