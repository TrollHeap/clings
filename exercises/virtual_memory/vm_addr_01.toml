common_mistake = "Supposer que sizeof(void*) == sizeof(int) — c'est faux sur x86_64 (8 vs 4)"
description = """
NSY103 — Chaque processus a son propre espace d'adressage virtuel. Sur x86_64, c'est 48 bits (256 TB). Les adresses virtuelles sont traduites en adresses physiques par la MMU via les tables de pages.

Explorez les propriétés de l'espace d'adressage: taille de pointeur, zones utilisateur/noyau."""
difficulty = 1
exercise_type = "complete"
hints = [
    "sizeof(void *) donne la taille d'un pointeur — 8 octets sur x86_64",
    "Les adresses userspace ont le bit 47 à 0 sur x86_64",
    "getpagesize() pour calculer le nombre de pages dans un espace donné",
]
id = "vm-addr-01"
kc_ids = ["KC-C18"]
key_concept = "Espace virtuel 48-bit sur x86_64, userspace/kernel séparés au bit 47"
lang = "c"
prerequisites = ["vm-page-01"]
solution_code = '''
#include <stdio.h>
#include <stdint.h>
#include <unistd.h>
int main(void) {
    printf("Pointer size: %zu bytes\n", sizeof(void *));
    printf("Address bits: %zu\n", sizeof(void *) * 8);
    int stack_var = 42;
    printf("Stack addr high nibble: 0x%lx\n",
        ((unsigned long)&stack_var) >> (sizeof(void *) * 8 - 4));
    int is_userspace = ((unsigned long)&stack_var >> 47) == 0;
    printf("In userspace: %s\n", is_userspace ? "yes" : "no");
    printf("getpagesize: %d\n", getpagesize());
    unsigned long pages_in_4gb = (1UL << 32) / (unsigned long)getpagesize();
    printf("Pages in 4GB: %lu\n", pages_in_4gb);
    return 0;
}'''
