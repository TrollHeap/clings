common_mistake = "Confondre les indices [0] et [1] des pipes — chaque participant doit lire depuis [0] et écrire dans [1] du pipe approprié"
description = """
NSY103 — Capstone avancé combinant sockets (simulés par pipes), pthreads et communication bidirectionnelle. Implémentez un reverse-proxy simplifié : le proxy reçoit des requêtes d'un client, les transmet à un backend, reçoit la réponse du backend, et la renvoie au client.

Pour la testabilité, toute la communication se fait via des pipes. Un thread simule le client, un thread simule le backend, et le proxy fait le relais dans le thread principal.

⚠ Cet exercice combine : pipe() x4, pthread_create(), read()/write() bidirectionnel, gestion de multiples fd."""
difficulty = 5
exercise_type = "complete"
hints = [
    "4 pipes = 4 canaux unidirectionnels : client->proxy, proxy->client, proxy->backend, backend->proxy",
    "Chaque pipe a [0]=lecture et [1]=écriture — le proxy lit depuis [0] et écrit dans [1] des pipes appropriés",
    "Le message QUIT sert de sentinelle pour arrêter proprement le proxy et le backend",
]
id = "capstone-proxy-01"
kc_ids = ["KC-CAP"]
key_concept = "Un reverse-proxy relaie le trafic bidirectionnellement : 4 pipes = 2 canaux full-duplex (client<->proxy, proxy<->backend)"
lang = "c"
prerequisites = [
    "capstone-chat-01",
    "pipe-01",
]
solution_code = '''
#define _DEFAULT_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <pthread.h>

typedef struct {
    int client_to_proxy[2];
    int proxy_to_client[2];
    int proxy_to_backend[2];
    int backend_to_proxy[2];
} ProxyPipes;

void *client_thread(void *arg) {
    ProxyPipes *p = (ProxyPipes *)arg;
    const char *requests[] = {"GET /index", "GET /about", "QUIT"};
    char response[128];

    for (int i = 0; i < 3; i++) {
        printf("[client] envoye: %s\n", requests[i]);
        write(p->client_to_proxy[1], requests[i], strlen(requests[i]));

        if (strcmp(requests[i], "QUIT") != 0) {
            ssize_t n = read(p->proxy_to_client[0], response, sizeof(response) - 1);
            if (n > 0) {
                response[n] = '\0';
                printf("[client] recu: %s\n", response);
            }
        }
        usleep(10000);
    }
    return NULL;
}

void *backend_thread(void *arg) {
    ProxyPipes *p = (ProxyPipes *)arg;
    char request[128];

    while (1) {
        ssize_t n = read(p->proxy_to_backend[0], request, sizeof(request) - 1);
        if (n <= 0) break;
        request[n] = '\0';
        if (strcmp(request, "QUIT") == 0) {
            printf("[backend] arret\n");
            break;
        }

        printf("[backend] requete: %s\n", request);
        char response[128];
        snprintf(response, sizeof(response), "200 OK: %s", request);
        write(p->backend_to_proxy[1], response, strlen(response));
    }
    return NULL;
}

void proxy_relay(ProxyPipes *p) {
    char buf[128];
    while (1) {
        ssize_t n = read(p->client_to_proxy[0], buf, sizeof(buf) - 1);
        if (n <= 0) break;
        buf[n] = '\0';
        printf("[proxy] relais client->backend: %s\n", buf);

        write(p->proxy_to_backend[1], buf, n);

        if (strcmp(buf, "QUIT") == 0) {
            printf("[proxy] arret\n");
            break;
        }

        n = read(p->backend_to_proxy[0], buf, sizeof(buf) - 1);
        if (n > 0) {
            buf[n] = '\0';
            printf("[proxy] relais backend->client: %s\n", buf);
            write(p->proxy_to_client[1], buf, n);
        }
    }
}

int main(void) {
    ProxyPipes p;
    pipe(p.client_to_proxy);
    pipe(p.proxy_to_client);
    pipe(p.proxy_to_backend);
    pipe(p.backend_to_proxy);

    pthread_t cli_t, back_t;
    pthread_create(&cli_t, NULL, client_thread, &p);
    pthread_create(&back_t, NULL, backend_thread, &p);

    proxy_relay(&p);

    pthread_join(cli_t, NULL);
    close(p.proxy_to_backend[1]);
    pthread_join(back_t, NULL);

    close(p.client_to_proxy[0]); close(p.client_to_proxy[1]);
    close(p.proxy_to_client[0]); close(p.proxy_to_client[1]);
    close(p.proxy_to_backend[0]);
    close(p.backend_to_proxy[0]); close(p.backend_to_proxy[1]);
    printf("[main] proxy termine\n");
    return 0;
}'''
