common_mistake = "Oublier O_NONBLOCK — avec des fd bloquants, un read() sur un fd signalé prêt mais déjà lu peut bloquer le serveur entier"
description = """
NSY103 — Capstone avancé combinant sockets (simulés par pipes), pthreads et epoll. Implémentez un serveur de chat event-driven utilisant epoll pour multiplexer plusieurs sources d'entrée (pipes simulant des clients). Le serveur utilise epoll_wait au lieu d'un thread par client.

Pour la testabilité, les clients sont simulés par des pipes avec des écritures séquentielles.

⚠ Cet exercice combine : epoll_create1(), epoll_ctl(), epoll_wait(), pipe(), non-blocking I/O."""
difficulty = 5
exercise_type = "complete"
hints = [
    "epoll_create1(0) crée l'instance epoll, EPOLLIN surveille la disponibilité en lecture",
    "O_NONBLOCK sur les fd de lecture évite que read() bloque quand il n'y a pas de données",
    "events[j].data.fd contient le descripteur qui a déclenché l'événement — comparez avec pipes[k][0] pour identifier le client",
]
id = "capstone-chat-03"
kc_ids = ["KC-CAP"]
key_concept = "epoll est le mécanisme Linux pour l'I/O multiplexé scalable : O(1) vs select/poll O(n), idéal pour les serveurs event-driven"
lang = "c"
prerequisites = ["capstone-chat-02"]
solution_code = '''
#define _DEFAULT_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <sys/epoll.h>
#include <fcntl.h>
#include <errno.h>

#define MAX_EVENTS 4
#define MAX_CLIENTS 3

void set_nonblocking(int fd) {
    int flags = fcntl(fd, F_GETFL, 0);
    fcntl(fd, F_SETFL, flags | O_NONBLOCK);
}

int main(void) {
    int pipes[MAX_CLIENTS][2];
    const char *names[] = {"Alice", "Bob", "Charlie"};

    int epfd = epoll_create1(0);
    if (epfd < 0) { perror("epoll_create1"); return 1; }

    for (int i = 0; i < MAX_CLIENTS; i++) {
        pipe(pipes[i]);
        set_nonblocking(pipes[i][0]);

        struct epoll_event ev;
        ev.events = EPOLLIN;
        ev.data.fd = pipes[i][0];
        epoll_ctl(epfd, EPOLL_CTL_ADD, pipes[i][0], &ev);
    }

    printf("[epoll] serveur demarre, %d clients\n", MAX_CLIENTS);

    const char *messages[MAX_CLIENTS][2] = {
        {"Salut de Alice", "Bye Alice"},
        {"Salut de Bob", "Bye Bob"},
        {"Salut de Charlie", "Bye Charlie"}
    };

    for (int round = 0; round < 2; round++) {
        for (int i = 0; i < MAX_CLIENTS; i++) {
            write(pipes[i][1], messages[i][round], strlen(messages[i][round]));
        }
        usleep(10000);

        struct epoll_event events[MAX_EVENTS];
        int nfds = epoll_wait(epfd, events, MAX_EVENTS, 100);

        for (int j = 0; j < nfds; j++) {
            char buf[128];
            ssize_t n = read(events[j].data.fd, buf, sizeof(buf) - 1);
            if (n > 0) {
                buf[n] = '\0';
                int client_id = -1;
                for (int k = 0; k < MAX_CLIENTS; k++) {
                    if (pipes[k][0] == events[j].data.fd) { client_id = k; break; }
                }
                printf("[epoll] client %s: %s\n", names[client_id], buf);
            }
        }
    }

    for (int i = 0; i < MAX_CLIENTS; i++) {
        close(pipes[i][0]);
        close(pipes[i][1]);
    }
    close(epfd);
    printf("[epoll] serveur arrete\n");
    return 0;
}'''
