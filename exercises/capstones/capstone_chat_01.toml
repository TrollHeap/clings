common_mistake = "Oublier de fermer le fd d'écriture dans le client — le serveur ne reçoit jamais EOF et bloque dans read()"
description = """
NSY103 — Capstone combinant sockets et pthreads. Implémentez un système de chat simplifié utilisant des pipes (pour la testabilité) au lieu de vrais sockets. Un thread serveur lit les messages et les affiche, un thread client envoie des messages prédéfinis.

Le pattern est identique à un vrai chat TCP : un thread accepte/lit, un autre écrit.

⚠ Cet exercice combine : pipe(), pthread_create(), pthread_join(), read(), write()."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Le serveur lit depuis read_fd (pipefd[0]), le client écrit dans write_fd (pipefd[1])",
    "Le client doit fermer write_fd après ses messages pour que le serveur reçoive EOF",
    "pthread_join(cli) avant pthread_join(srv) garantit que le client finit d'écrire avant qu'on attende le serveur",
]
id = "capstone-chat-01"
kc_ids = ["KC-CAP"]
key_concept = "Un chat = un canal bidirectionnel (ici pipe) + un thread lecteur (serveur) + un thread écrivain (client)"
lang = "c"
prerequisites = [
    "pipe-01",
    "pthread-01",
]
solution_code = '''
#define _DEFAULT_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <pthread.h>

typedef struct {
    int read_fd;
    int write_fd;
} ChatChannel;

void *server_thread(void *arg) {
    ChatChannel *ch = (ChatChannel *)arg;
    char buf[128];
    ssize_t n;
    while ((n = read(ch->read_fd, buf, sizeof(buf) - 1)) > 0) {
        buf[n] = '\0';
        printf("[serveur] recu: %s\n", buf);
    }
    printf("[serveur] client deconnecte\n");
    return NULL;
}

void *client_thread(void *arg) {
    ChatChannel *ch = (ChatChannel *)arg;
    const char *messages[] = {"Bonjour", "Comment ca va?", "Au revoir"};
    for (int i = 0; i < 3; i++) {
        write(ch->write_fd, messages[i], strlen(messages[i]));
        printf("[client] envoye: %s\n", messages[i]);
        usleep(10000);
    }
    close(ch->write_fd);
    return NULL;
}

int main(void) {
    int pipefd[2];
    pipe(pipefd);

    ChatChannel server_ch = {.read_fd = pipefd[0], .write_fd = -1};
    ChatChannel client_ch = {.read_fd = -1, .write_fd = pipefd[1]};

    pthread_t srv, cli;
    pthread_create(&srv, NULL, server_thread, &server_ch);
    pthread_create(&cli, NULL, client_thread, &client_ch);

    pthread_join(cli, NULL);
    pthread_join(srv, NULL);

    close(pipefd[0]);
    printf("[main] chat termine\n");
    return 0;
}'''
