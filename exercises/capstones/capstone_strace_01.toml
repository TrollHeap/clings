starter_code_stages = [
    '''
/* == EXEMPLE =======================================
 * Logger d'appels de fonctions via wrapper
 * Pattern: fonction wrapper qui log + appelle l'originale.
 * ================================================= */
static int log_fd_ex = -1;

int logged_add(int a, int b) {
    int ret = a + b;
    char buf[64];
    int len = snprintf(buf, sizeof(buf), "add(%d, %d) = %d\n", a, b, ret);
    if (log_fd_ex >= 0) write(log_fd_ex, buf, len);
    return ret;
}

void example_logger(void) {
    int p[2]; pipe(p);
    pid_t pid = fork();
    if (pid == 0) {
        close(p[0]); log_fd_ex = p[1];
        logged_add(3, 4); logged_add(10, 20);
        close(log_fd_ex); exit(0);
    }
    close(p[1]);
    char buf[128]; ssize_t n;
    while ((n = read(p[0], buf, sizeof(buf)-1)) > 0) { buf[n]='\0'; printf("%s", buf); }
    wait(NULL); close(p[0]);
}
/* Resultat: add(3, 4) = 7 / add(10, 20) = 30 */

int main(void) {
    example_logger();
    return 0;
}''',
