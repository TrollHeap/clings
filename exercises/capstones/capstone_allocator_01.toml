solution_code = '''
#include <stdio.h>
#include <string.h>
#include <stdint.h>

#define HEAP_SIZE 256

typedef struct Block {
    size_t size;
    int free;
    struct Block *next;
} Block;

#define BLOCK_SIZE sizeof(Block)

static char heap[HEAP_SIZE];
static Block *free_list = NULL;

void heap_init(void) {
    free_list = (Block *)heap;
    free_list->size = HEAP_SIZE - BLOCK_SIZE;
    free_list->free = 1;
    free_list->next = NULL;
}

void *my_malloc(size_t size) {
    Block *curr = free_list;
    while (curr) {
        if (curr->free && curr->size >= size) {
            if (curr->size >= size + BLOCK_SIZE + 8) {
                Block *new_block = (Block *)((char *)curr + BLOCK_SIZE + size);
                new_block->size = curr->size - size - BLOCK_SIZE;
                new_block->free = 1;
                new_block->next = curr->next;
                curr->size = size;
                curr->next = new_block;
            }
            curr->free = 0;
            return (char *)curr + BLOCK_SIZE;
        }
        curr = curr->next;
    }
    return NULL;
}

void my_free(void *ptr) {
    if (!ptr) return;
    Block *block = (Block *)((char *)ptr - BLOCK_SIZE);
    block->free = 1;

    Block *curr = free_list;
    while (curr) {
        if (curr->free && curr->next && curr->next->free) {
            curr->size += BLOCK_SIZE + curr->next->size;
            curr->next = curr->next->next;
            continue;
        }
        curr = curr->next;
    }
}

void heap_dump(void) {
    Block *curr = free_list;
    int idx = 0;
    while (curr) {
        printf("  [%d] %s size=%zu\n", idx,
               curr->free ? "FREE" : "USED", curr->size);
        curr = curr->next;
        idx++;
    }
}

int main(void) {
    heap_init();
    printf("=== init ===\n");
    heap_dump();

    printf("=== malloc 32, 64, 16 ===\n");
    void *a = my_malloc(32);
    void *b = my_malloc(64);
    void *c = my_malloc(16);
    memset(a, 'A', 32);
    memset(b, 'B', 64);
    memset(c, 'C', 16);
    heap_dump();

    printf("=== free b (64) ===\n");
    my_free(b);
    heap_dump();

    printf("=== malloc 24 (dans trou de b) ===\n");
    void *d = my_malloc(24);
    memset(d, 'D', 24);
    heap_dump();

    printf("=== free a, free d, free c ===\n");
    my_free(a);
    my_free(d);
    my_free(c);
    heap_dump();

    printf("=== coalesce final ===\n");
    Block *curr = free_list;
    while (curr) {
        if (curr->free && curr->next && curr->next->free) {
            curr->size += BLOCK_SIZE + curr->next->size;
            curr->next = curr->next->next;
            continue;
        }
        curr = curr->next;
    }
    heap_dump();

    return 0;
}'''
