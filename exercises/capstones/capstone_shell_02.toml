typedef struct { char *prog; int verbose; char *output; } Opts;

Opts parse_opts(char *line) {
    Opts o = {NULL, 0, NULL};
    char *t = strtok(line, " ");
    char buf[128] = "";
    while (t) {
        if (strcmp(t, "-v") == 0) { o.verbose = 1; }
        else if (strcmp(t, "-o") == 0) { t = strtok(NULL, " "); o.output = t; }
        else { if (strlen(buf) > 0) strcat(buf, " "); strcat(buf, t); }
        t = strtok(NULL, " ");
    }
    o.prog = strdup(buf);
    return o;
}

void example_opts(void) {
    char line[] = "gcc -v -o main.out file.c";
    Opts o = parse_opts(line);
    printf("Prog: %s, Verbose: %d, Output: %s\n", o.prog, o.verbose, o.output);
    free(o.prog);
}
/* Resultat: Prog: gcc file.c, Verbose: 1, Output: main.out */

