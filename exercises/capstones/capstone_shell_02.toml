common_mistake = "Confondre O_TRUNC (écrase le fichier) et O_APPEND (ajoute à la fin) pour > vs >>"
description = """
NSY103 — Capstone combinant processus, pipes, descripteurs de fichiers et redirections. Implémentez un parser de commande shell qui détecte les opérateurs de redirection (<, >, >>), ouvre les fichiers correspondants avec open(), redirige les fd avec dup2(), puis exécute la commande simulée.

Pour la testabilité, on utilise des fichiers simulés via fmemopen et on affiche les actions de redirection.

⚠ Cet exercice combine : open(), dup2(), fork(), close(), parsing de ligne de commande."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Le parser doit détecter <, > et >> comme tokens séparés et stocker le fichier suivant",
    "O_RDONLY pour la redirection d'entrée, O_WRONLY|O_CREAT|O_TRUNC pour > et O_APPEND pour >>",
    "Après dup2(fd, STDIN_FILENO), fermez l'ancien fd pour éviter les fuites de descripteurs",
]
id = "capstone-shell-02"
kc_ids = ["KC-CAP"]
key_concept = "Les redirections shell utilisent open() + dup2() : < = O_RDONLY, > = O_TRUNC, >> = O_APPEND"
lang = "c"
prerequisites = ["capstone-shell-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <fcntl.h>
#include <sys/wait.h>

typedef struct {
    char *cmd;
    char *infile;
    char *outfile;
    int append;
} Command;

Command parse_redirections(char *line) {
    Command c = {NULL, NULL, NULL, 0};
    char *token = strtok(line, " ");
    char cmd_buf[256] = "";
    while (token) {
        if (strcmp(token, "<") == 0) {
            token = strtok(NULL, " ");
            c.infile = token;
        } else if (strcmp(token, ">>") == 0) {
            token = strtok(NULL, " ");
            c.outfile = token;
            c.append = 1;
        } else if (strcmp(token, ">") == 0) {
            token = strtok(NULL, " ");
            c.outfile = token;
        } else {
            if (strlen(cmd_buf) > 0) strcat(cmd_buf, " ");
            strcat(cmd_buf, token);
        }
        token = strtok(NULL, " ");
    }
    c.cmd = strdup(cmd_buf);
    return c;
}

void execute_with_redirections(Command *c) {
    printf("CMD: %s\n", c->cmd);
    if (c->infile)
        printf("REDIR: stdin < %s\n", c->infile);
    if (c->outfile) {
        if (c->append)
            printf("REDIR: stdout >> %s\n", c->outfile);
        else
            printf("REDIR: stdout > %s\n", c->outfile);
    }

    pid_t pid = fork();
    if (pid == 0) {
        if (c->infile) {
            int fd = open(c->infile, O_RDONLY);
            if (fd >= 0) {
                dup2(fd, STDIN_FILENO);
                close(fd);
            }
        }
        if (c->outfile) {
            int flags = O_WRONLY | O_CREAT;
            flags |= c->append ? O_APPEND : O_TRUNC;
            int fd = open(c->outfile, flags, 0644);
            if (fd >= 0) {
                dup2(fd, STDOUT_FILENO);
                close(fd);
            }
        }
        printf("[exec: %s]\n", c->cmd);
        exit(0);
    }
    int status;
    waitpid(pid, &status, 0);
    printf("EXIT: %d\n", WEXITSTATUS(status));
}

int main(void) {
    char line1[] = "cat < input.txt";
    char line2[] = "echo hello > output.txt";
    char line3[] = "logger msg >> log.txt";

    Command c1 = parse_redirections(line1);
    Command c2 = parse_redirections(line2);
    Command c3 = parse_redirections(line3);

    execute_with_redirections(&c1);
    execute_with_redirections(&c2);
    execute_with_redirections(&c3);

    free(c1.cmd); free(c2.cmd); free(c3.cmd);
    return 0;
}'''
