common_mistake = "Oublier WUNTRACED dans waitpid — sans ce flag, waitpid ignore les processus stoppés et bloque indéfiniment"
description = """
NSY103 — Capstone avancé combinant processus, signaux et job control. Implémentez un mini job controller qui gère une table de jobs, peut suspendre un processus (SIGTSTP), le reprendre en foreground (SIGCONT) ou en background, et afficher l'état des jobs.

Pour la testabilité, les jobs sont simulés avec fork() et les signaux sont envoyés programmatiquement.

⚠ Cet exercice combine : fork(), kill(), waitpid(WNOHANG|WUNTRACED), SIGTSTP, SIGCONT, gestion de groupe de processus."""
difficulty = 5
exercise_type = "complete"
hints = [
    "SIGTSTP suspend un processus (comme Ctrl-Z), SIGCONT le reprend",
    "waitpid avec WUNTRACED permet de détecter quand un enfant est stoppé via WIFSTOPPED(status)",
    "fg = SIGCONT + waitpid en premier plan, bg = SIGCONT sans attendre",
]
id = "capstone-shell-03"
kc_ids = ["KC-CAP"]
key_concept = "Job control = table de jobs + SIGTSTP/SIGCONT + waitpid(WUNTRACED) pour détecter les processus stoppés"
lang = "c"
prerequisites = ["capstone-shell-02"]
solution_code = '''
#define _DEFAULT_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <signal.h>
#include <sys/wait.h>
#include <string.h>

#define MAX_JOBS 4

typedef enum { JOB_RUNNING, JOB_STOPPED, JOB_DONE } JobState;

typedef struct {
    pid_t pid;
    JobState state;
    char name[32];
} Job;

Job jobs[MAX_JOBS];
int njobs = 0;

const char *state_str(JobState s) {
    switch (s) {
        case JOB_RUNNING: return "Running";
        case JOB_STOPPED: return "Stopped";
        case JOB_DONE:    return "Done";
    }
    return "?";
}

int add_job(pid_t pid, const char *name) {
    if (njobs >= MAX_JOBS) return -1;
    jobs[njobs].pid = pid;
    jobs[njobs].state = JOB_RUNNING;
    strncpy(jobs[njobs].name, name, 31);
    jobs[njobs].name[31] = '\0';
    return njobs++;
}

void print_jobs(void) {
    for (int i = 0; i < njobs; i++) {
        printf("[%d] %-8s %s\n", i+1, state_str(jobs[i].state),
               jobs[i].name);
    }
}

void job_fg(int idx) {
    if (idx < 0 || idx >= njobs) return;
    if (jobs[idx].state == JOB_STOPPED) {
        printf("fg: reprendre '%s'\n", jobs[idx].name);
        kill(jobs[idx].pid, SIGCONT);
        jobs[idx].state = JOB_RUNNING;
    }
    int status;
    waitpid(jobs[idx].pid, &status, WUNTRACED);
    if (WIFSTOPPED(status)) {
        jobs[idx].state = JOB_STOPPED;
        printf("[%d] Stopped %s\n", idx+1, jobs[idx].name);
    } else {
        jobs[idx].state = JOB_DONE;
        printf("[%d] Done %s\n", idx+1, jobs[idx].name);
    }
}

void job_bg(int idx) {
    if (idx < 0 || idx >= njobs) return;
    if (jobs[idx].state == JOB_STOPPED) {
        printf("bg: reprendre '%s' en arriere-plan\n", jobs[idx].name);
        kill(jobs[idx].pid, SIGCONT);
        jobs[idx].state = JOB_RUNNING;
    }
}

int main(void) {
    pid_t pid1 = fork();
    if (pid1 == 0) {
        pause();
        pause();
        exit(0);
    }

    pid_t pid2 = fork();
    if (pid2 == 0) {
        pause();
        exit(0);
    }

    usleep(50000);
    add_job(pid1, "worker1");
    add_job(pid2, "worker2");

    printf("--- jobs ---\n");
    print_jobs();

    printf("--- stop worker1 ---\n");
    kill(pid1, SIGTSTP);
    usleep(50000);
    int status;
    waitpid(pid1, &status, WUNTRACED);
    if (WIFSTOPPED(status)) jobs[0].state = JOB_STOPPED;
    print_jobs();

    printf("--- fg worker1 ---\n");
    kill(pid1, SIGCONT);
    jobs[0].state = JOB_RUNNING;
    usleep(50000);
    kill(pid1, SIGTSTP);
    waitpid(pid1, &status, WUNTRACED);
    if (WIFSTOPPED(status)) jobs[0].state = JOB_STOPPED;
    printf("[1] Stopped worker1\n");

    printf("--- bg worker1 ---\n");
    job_bg(0);
    usleep(50000);

    kill(pid1, SIGTERM);
    kill(pid2, SIGTERM);
    waitpid(pid1, &status, 0);
    jobs[0].state = JOB_DONE;
    waitpid(pid2, &status, 0);
    jobs[1].state = JOB_DONE;

    printf("--- final ---\n");
    print_jobs();
    return 0;
}'''
