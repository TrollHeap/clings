#define _DEFAULT_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <signal.h>
#include <sys/wait.h>
#include <string.h>

/* == EXEMPLE =======================================
 * Gestion simple de signal: suspendre/reprendre
 * Pattern: kill(pid, SIGSTOP) + kill(pid, SIGCONT)
 * waitpid avec WUNTRACED pour detecter l'arret.
 * ================================================= */
void example_stop_continue(void) {
    pid_t child = fork();
    if (child == 0) {
        while (1) pause();
        exit(0);
    }
    usleep(50000);
    printf("Stopping child %d\n", child);
    kill(child, SIGSTOP);
    int st;
    waitpid(child, &st, WUNTRACED);
    if (WIFSTOPPED(st)) printf("Child stopped\n");
    printf("Continuing child\n");
    kill(child, SIGCONT);
    usleep(50000);
    kill(child, SIGTERM);
    waitpid(child, &st, 0);
    printf("Child done\n");
}
/* Resultat: Stopping child N / Child stopped / Continuing child / Child done */

/* == VOTRE EXERCICE ================================
 * Job controller complet avec fg/bg
 * Table de jobs, SIGTSTP/SIGCONT, etats Running/Stopped/Done
