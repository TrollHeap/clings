common_mistake = "Utiliser signal() au lieu de sigaction() — signal() a un comportement non-portable et peut réinitialiser le handler après réception"
description = """
NSY103 — Capstone combinant processus, signaux, file I/O et gestion d'erreurs (errno). Implémentez un daemon simplifié qui : fork() pour se détacher, crée un fichier PID, installe des handlers pour SIGHUP (rechargement) et SIGTERM (arrêt propre), et écrit dans un fichier journal.

Pour la testabilité, le daemon simule son cycle de vie complet dans un seul processus en envoyant les signaux à lui-même.

⚠ Cet exercice combine : fork(), setsid(), signal handling (sigaction), open()/write() pour journalisation, errno."""
difficulty = 4
exercise_type = "complete"
hints = [
    "SIGHUP est traditionnellement utilisé pour recharger la configuration d'un daemon",
    "SIGTERM demande un arrêt propre — le handler met un flag, la boucle principale vérifie et nettoie",
    "strerror(errno) convertit le code d'erreur en chaîne lisible — utile pour les messages d'erreur dans les logs",
]
id = "capstone-daemon-01"
kc_ids = ["KC-CAP"]
key_concept = "Un daemon Unix : fork+setsid pour se détacher, pidfile pour l'identification, SIGHUP=reload, SIGTERM=arrêt propre"
lang = "c"
prerequisites = [
    "signal-constants-01",
    "pipe-01",
]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <signal.h>
#include <fcntl.h>
#include <errno.h>
#include <time.h>

volatile sig_atomic_t reload_config = 0;
volatile sig_atomic_t shutdown_requested = 0;

void handle_sighup(int sig) {
    (void)sig;
    reload_config = 1;
}

void handle_sigterm(int sig) {
    (void)sig;
    shutdown_requested = 1;
}

void log_message(int log_fd, const char *msg) {
    char buf[256];
    time_t now = 1709856000;
    struct tm *tm = gmtime(&now);
    int len = snprintf(buf, sizeof(buf), "[%04d-%02d-%02d %02d:%02d:%02d] %s\n",
                       tm->tm_year + 1900, tm->tm_mon + 1, tm->tm_mday,
                       tm->tm_hour, tm->tm_min, tm->tm_sec, msg);
    write(log_fd, buf, len);
}

int write_pidfile(const char *path, pid_t pid) {
    int fd = open(path, O_WRONLY | O_CREAT | O_TRUNC, 0644);
    if (fd < 0) {
        fprintf(stderr, "pidfile: %s\n", strerror(errno));
        return -1;
    }
    char buf[32];
    int len = snprintf(buf, sizeof(buf), "%d\n", pid);
    write(fd, buf, len);
    close(fd);
    return 0;
}

int main(void) {
    printf("[daemon] demarrage\n");

    struct sigaction sa_hup, sa_term;
    sa_hup.sa_handler = handle_sighup;
    sigemptyset(&sa_hup.sa_mask);
    sa_hup.sa_flags = 0;
    sigaction(SIGHUP, &sa_hup, NULL);

    sa_term.sa_handler = handle_sigterm;
    sigemptyset(&sa_term.sa_mask);
    sa_term.sa_flags = 0;
    sigaction(SIGTERM, &sa_term, NULL);

    pid_t pid = getpid();
    printf("[daemon] pid enregistre\n");

    const char *pidfile = "/tmp/kf_daemon_test.pid";
    const char *logfile = "/tmp/kf_daemon_test.log";

    write_pidfile(pidfile, pid);

    int log_fd = open(logfile, O_WRONLY | O_CREAT | O_TRUNC, 0644);
    if (log_fd < 0) {
        fprintf(stderr, "logfile: %s\n", strerror(errno));
        return 1;
    }

    log_message(log_fd, "daemon demarre");

    printf("[daemon] simulation: SIGHUP\n");
    kill(pid, SIGHUP);
    if (reload_config) {
        printf("[daemon] rechargement config\n");
        log_message(log_fd, "config rechargee");
        reload_config = 0;
    }

    log_message(log_fd, "tick");
    printf("[daemon] tick\n");

    printf("[daemon] simulation: SIGTERM\n");
    kill(pid, SIGTERM);
    if (shutdown_requested) {
        printf("[daemon] arret propre\n");
        log_message(log_fd, "arret propre");
    }

    close(log_fd);
    unlink(pidfile);
    unlink(logfile);
    printf("[daemon] termine\n");
    return 0;
}'''
