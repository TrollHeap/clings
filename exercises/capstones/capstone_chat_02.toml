common_mistake = "Oublier PTHREAD_PROCESS_SHARED sur le mutexattr — le mutex ne fonctionnera pas entre processus mappant le même shm"
description = """
NSY103 — Capstone combinant sockets (simulés par pipes), pthreads et mémoire partagée. Implémentez un chat où l'historique des messages est stocké dans un segment de mémoire partagée (shm). Plusieurs threads accèdent à l'historique de façon synchronisée avec un mutex.

Le serveur écrit les messages reçus dans le shm, et une fonction affiche l'historique complet depuis le shm.

⚠ Cet exercice combine : shm_open(), mmap(), ftruncate(), pthread_mutex, pipe(), pthreads."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Le mutex doit être dans le segment shm et initialisé avec PTHREAD_PROCESS_SHARED pour être partagé",
    "Toujours lock/unlock le mutex autour des accès à count et messages[]",
    "shm_unlink supprime le segment nommé — appelez-le en dernier pour nettoyer",
]
id = "capstone-chat-02"
kc_ids = ["KC-CAP"]
key_concept = "La mémoire partagée (shm) permet de persister l'historique entre threads/processus avec un mutex pour la synchronisation"
lang = "c"
prerequisites = [
    "capstone-chat-01",
    "shm-01",
]
solution_code = '''
#define _DEFAULT_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <pthread.h>
#include <sys/mman.h>
#include <fcntl.h>

#define MAX_MESSAGES 8
#define MSG_LEN 64
#define SHM_NAME "/kf_chat_history"

typedef struct {
    pthread_mutex_t mutex;
    int count;
    char messages[MAX_MESSAGES][MSG_LEN];
} ChatHistory;

ChatHistory *create_shared_history(void) {
    int fd = shm_open(SHM_NAME, O_CREAT | O_RDWR, 0600);
    ftruncate(fd, sizeof(ChatHistory));
    ChatHistory *h = mmap(NULL, sizeof(ChatHistory),
                          PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);

    pthread_mutexattr_t attr;
    pthread_mutexattr_init(&attr);
    pthread_mutexattr_setpshared(&attr, PTHREAD_PROCESS_SHARED);
    pthread_mutex_init(&h->mutex, &attr);
    pthread_mutexattr_destroy(&attr);
    h->count = 0;
    return h;
}

void add_message(ChatHistory *h, const char *msg) {
    pthread_mutex_lock(&h->mutex);
    if (h->count < MAX_MESSAGES) {
        strncpy(h->messages[h->count], msg, MSG_LEN - 1);
        h->messages[h->count][MSG_LEN - 1] = '\0';
        h->count++;
    }
    pthread_mutex_unlock(&h->mutex);
}

void print_history(ChatHistory *h) {
    pthread_mutex_lock(&h->mutex);
    printf("=== Historique (%d messages) ===\n", h->count);
    for (int i = 0; i < h->count; i++) {
        printf("  [%d] %s\n", i, h->messages[i]);
    }
    pthread_mutex_unlock(&h->mutex);
}

typedef struct {
    int read_fd;
    ChatHistory *history;
} ServerCtx;

void *server_thread(void *arg) {
    ServerCtx *ctx = (ServerCtx *)arg;
    char buf[MSG_LEN];
    ssize_t n;
    while ((n = read(ctx->read_fd, buf, sizeof(buf) - 1)) > 0) {
        buf[n] = '\0';
        printf("[serveur] recu: %s\n", buf);
        add_message(ctx->history, buf);
    }
    printf("[serveur] fin de reception\n");
    return NULL;
}

int main(void) {
    ChatHistory *history = create_shared_history();

    int pipefd[2];
    pipe(pipefd);

    ServerCtx ctx = {.read_fd = pipefd[0], .history = history};
    pthread_t srv;
    pthread_create(&srv, NULL, server_thread, &ctx);

    const char *msgs[] = {"Alice: Salut!", "Bob: Hello!", "Alice: Ca va?"};
    for (int i = 0; i < 3; i++) {
        write(pipefd[1], msgs[i], strlen(msgs[i]));
        usleep(10000);
    }
    close(pipefd[1]);

    pthread_join(srv, NULL);
    close(pipefd[0]);

    print_history(history);

    munmap(history, sizeof(ChatHistory));
    shm_unlink(SHM_NAME);
    printf("[main] termine\n");
    return 0;
}'''
