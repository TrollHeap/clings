    '''
/* == EXEMPLE =======================================
 * Pipeline simple : un ecrivain et un lecteur via pipe
 * Pattern : pipe() -> fork() x2 -> dup2() -> waitpid()
 * ================================================= */
void example_echo_wc(void) {
    int fd[2];
    pipe(fd);

    pid_t p1 = fork();
    if (p1 == 0) {
        close(fd[0]);
        dup2(fd[1], STDOUT_FILENO);
        close(fd[1]);
        printf("alpha\nbeta\ngamma\n");
        fflush(stdout);
        exit(0);
    }

    pid_t p2 = fork();
    if (p2 == 0) {
        close(fd[1]);
        dup2(fd[0], STDIN_FILENO);
        close(fd[0]);
        char buf[64];
        int n = 0;
        while (fgets(buf, sizeof(buf), stdin)) n++;
        printf("Total: %d\n", n);
        exit(0);
    }

    close(fd[0]);
    close(fd[1]);
    int s;
    waitpid(p1, &s, 0);
    waitpid(p2, &s, 0);
}
/* Resultat: Total: 3 */

int main(void) {
    example_echo_wc();
    return 0;
}''',
