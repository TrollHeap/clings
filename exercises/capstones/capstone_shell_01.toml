common_mistake = "Oublier de fermer les fd du pipe dans le parent — le processus lecteur ne recevra jamais EOF et bloquera"
description = """
NSY103 — Capstone combinant processus, pipes et signaux. Implémentez un mini-shell qui parse une commande pipeline "cmd1 | cmd2", crée un pipe, fork deux enfants (un pour chaque commande), redirige stdout/stdin via le pipe, et attend les deux enfants. Pour la testabilité, on simule les commandes avec des fonctions internes au lieu d'exec.

⚠ Cet exercice combine : fork(), pipe(), dup2(), waitpid(), signal handling."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Le producteur écrit dans pipefd[1] (stdout redirigé), le consommateur lit depuis pipefd[0] (stdin redirigé)",
    "dup2(pipefd[1], STDOUT_FILENO) redirige stdout vers le pipe — fermez l'original après",
    "Le parent doit fermer les deux extrémités du pipe avant d'attendre, sinon le lecteur ne recevra jamais EOF",
]
id = "capstone-shell-01"
kc_ids = ["KC-CAP"]
key_concept = "Un pipeline shell = pipe() + fork() x2 + dup2() pour rediriger stdin/stdout entre processus"
lang = "c"
prerequisites = [
    "pipe-01",
    "process-state-01",
]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>
#include <signal.h>

volatile sig_atomic_t child_exited = 0;

void sigchld_handler(int sig) {
    (void)sig;
    child_exited = 1;
}

void cmd_producer(void) {
    printf("HELLO\n");
    printf("WORLD\n");
    fflush(stdout);
}

void cmd_upper_count(void) {
    char buf[64];
    int count = 0;
    while (fgets(buf, sizeof(buf), stdin)) {
        count++;
    }
    printf("Lines: %d\n", count);
}

int main(void) {
    struct sigaction sa;
    sa.sa_handler = sigchld_handler;
    sigemptyset(&sa.sa_mask);
    sa.sa_flags = SA_RESTART;
    sigaction(SIGCHLD, &sa, NULL);

    printf("shell> producer | counter\n");

    int pipefd[2];
    pipe(pipefd);

    pid_t pid1 = fork();
    if (pid1 == 0) {
        close(pipefd[0]);
        dup2(pipefd[1], STDOUT_FILENO);
        close(pipefd[1]);
        cmd_producer();
        exit(0);
    }

    pid_t pid2 = fork();
    if (pid2 == 0) {
        close(pipefd[1]);
        dup2(pipefd[0], STDIN_FILENO);
        close(pipefd[0]);
        cmd_upper_count();
        exit(0);
    }

    close(pipefd[0]);
    close(pipefd[1]);

    int status;
    waitpid(pid1, &status, 0);
    printf("child1 exit=%d\n", WEXITSTATUS(status));
    waitpid(pid2, &status, 0);
    printf("child2 exit=%d\n", WEXITSTATUS(status));
    printf("shell> done\n");
    return 0;
}'''
