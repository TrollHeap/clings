common_mistake = "Inverser l'ordre sem_wait(mutex) et sem_wait(empty/full) — cela peut causer un deadlock si le buffer est plein/vide"
description = """
NSY103 — Capstone combinant mémoire partagée, sémaphores POSIX et processus. Implémentez le problème classique producteur-consommateur : un processus enfant produit des éléments dans un buffer en shm, un autre les consomme, synchronisés par des sémaphores (sem_full, sem_empty, sem_mutex).

Le buffer circulaire est en mémoire partagée, les sémaphores gèrent les places libres et occupées.

⚠ Cet exercice combine : shm_open(), mmap(), sem_open(), fork(), waitpid()."""
difficulty = 3
exercise_type = "complete"
hints = [
    "sem_empty commence à BUF_SIZE (places libres), sem_full à 0 (éléments disponibles), sem_mutex à 1",
    "Producteur: sem_wait(empty) puis sem_wait(mutex), écrire, sem_post(mutex) puis sem_post(full)",
    "Consommateur: sem_wait(full) puis sem_wait(mutex), lire, sem_post(mutex) puis sem_post(empty) — l'inverse du producteur",
]
id = "capstone-prodcons-01"
kc_ids = ["KC-CAP"]
key_concept = "Le pattern producteur-consommateur utilise 3 sémaphores : empty (places libres), full (éléments), mutex (exclusion mutuelle)"
lang = "c"
prerequisites = [
    "sem-01",
    "shm-01",
]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <sys/mman.h>
#include <sys/wait.h>
#include <fcntl.h>
#include <semaphore.h>

#define BUF_SIZE 4
#define NUM_ITEMS 6
#define SHM_NAME "/kf_prodcons"

typedef struct {
    int buffer[BUF_SIZE];
    int in;
    int out;
} SharedBuffer;

int main(void) {
    int fd = shm_open(SHM_NAME, O_CREAT | O_RDWR, 0600);
    ftruncate(fd, sizeof(SharedBuffer));
    SharedBuffer *sb = mmap(NULL, sizeof(SharedBuffer),
                            PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd);
    sb->in = 0;
    sb->out = 0;

    sem_unlink("/kf_empty"); sem_unlink("/kf_full"); sem_unlink("/kf_mutex");
    sem_t *sem_empty = sem_open("/kf_empty", O_CREAT, 0600, BUF_SIZE);
    sem_t *sem_full  = sem_open("/kf_full",  O_CREAT, 0600, 0);
    sem_t *sem_mutex = sem_open("/kf_mutex", O_CREAT, 0600, 1);

    pid_t producer = fork();
    if (producer == 0) {
        for (int i = 0; i < NUM_ITEMS; i++) {
            sem_wait(sem_empty);
            sem_wait(sem_mutex);
            sb->buffer[sb->in] = (i + 1) * 10;
            printf("[prod] buffer[%d] = %d\n", sb->in, sb->buffer[sb->in]);
            sb->in = (sb->in + 1) % BUF_SIZE;
            sem_post(sem_mutex);
            sem_post(sem_full);
        }
        exit(0);
    }

    pid_t consumer = fork();
    if (consumer == 0) {
        for (int i = 0; i < NUM_ITEMS; i++) {
            sem_wait(sem_full);
            sem_wait(sem_mutex);
            int val = sb->buffer[sb->out];
            printf("[cons] buffer[%d] = %d\n", sb->out, val);
            sb->out = (sb->out + 1) % BUF_SIZE;
            sem_post(sem_mutex);
            sem_post(sem_empty);
        }
        exit(0);
    }

    int status;
    waitpid(producer, &status, 0);
    waitpid(consumer, &status, 0);

    printf("[main] termine, in=%d out=%d\n", sb->in, sb->out);

    sem_close(sem_empty); sem_close(sem_full); sem_close(sem_mutex);
    sem_unlink("/kf_empty"); sem_unlink("/kf_full"); sem_unlink("/kf_mutex");
    munmap(sb, sizeof(SharedBuffer));
    shm_unlink(SHM_NAME);
    return 0;
}'''
