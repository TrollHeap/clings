#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <sys/mman.h>
#include <sys/wait.h>
#include <fcntl.h>
#include <semaphore.h>

/* == EXEMPLE =======================================
 * Compteur partage avec semaphore
 * Pattern: shm + sem pour synchroniser 2 processus.
 * ================================================= */
void example_shared_counter(void) {
    sem_unlink("/kf_ex_sem");
    sem_t *s = sem_open("/kf_ex_sem", O_CREAT, 0600, 0);
    int fd = shm_open("/kf_ex_cnt", O_CREAT|O_RDWR, 0600);
    ftruncate(fd, sizeof(int));
    int *counter = mmap(NULL, sizeof(int), PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0);
    close(fd); *counter = 0;
    pid_t pid = fork();
    if (pid == 0) {
        *counter = 42;
        sem_post(s);
        exit(0);
    }
    sem_wait(s);
    printf("Counter: %d\n", *counter);
    wait(NULL);
    sem_close(s); sem_unlink("/kf_ex_sem");
    munmap(counter, sizeof(int)); shm_unlink("/kf_ex_cnt");
}
/* Resultat: Counter: 42 */

/* == VOTRE EXERCICE ================================
 * Producteur-consommateur classique
 * Buffer circulaire en shm, 3 semaphores
 * sem_empty=BUF_SIZE, sem_full=0, sem_mutex=1
 * ================================================= */

#define BUF_SIZE 4
#define NUM_ITEMS 6

int main(void) {
    example_shared_counter();
    return 0;
