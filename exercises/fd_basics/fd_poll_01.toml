common_mistake = "Ne pas vérifier revents — events est ce qu'on demande, revents est ce qui s'est passé"
description = """
NSY103 — poll() surveille plusieurs descripteurs de fichier simultanément. Contrairement à select(), il n'a pas de limite sur le numéro de fd maximum.

Utilisez poll() pour surveiller deux pipes et détectez lesquels sont prêts en lecture."""
difficulty = 4
exercise_type = "complete"
hints = [
    "POLLIN pour surveiller la disponibilité en lecture",
    "poll(fds, nfds, timeout_ms) — timeout=0 pour non-bloquant",
    "revents est rempli par poll() avec les événements détectés",
]
id = "fd-poll-01"
kc_ids = ["KC-C16"]
key_concept = "poll() surveille N descripteurs avec struct pollfd {fd, events, revents}"
lang = "c"
prerequisites = ["fd-pipe-redir-01"]
solution_code = '''
#include <stdio.h>
#include <poll.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    int pipe1[2], pipe2[2];
    pipe(pipe1);
    pipe(pipe2);
    write(pipe1[1], "data1", 5);
    close(pipe1[1]);
    struct pollfd fds[2];
    fds[0].fd = pipe1[0];
    fds[0].events = POLLIN;
    fds[1].fd = pipe2[0];
    fds[1].events = POLLIN;
    int ready = poll(fds, 2, 0);
    printf("Ready: %d\n", ready);
    printf("pipe1 readable: %d\n", (fds[0].revents & POLLIN) != 0);
    printf("pipe2 readable: %d\n", (fds[1].revents & POLLIN) != 0);
    if (fds[0].revents & POLLIN) {
        char buf[16];
        ssize_t n = read(pipe1[0], buf, sizeof(buf) - 1);
        buf[n] = '\0';
        printf("pipe1 data: %s\n", buf);
    }
    close(pipe1[0]);
    close(pipe2[0]);
    close(pipe2[1]);
    return 0;
}'''
