common_mistake = "Ne pas fermer l'instance epoll (epfd) — fuite de descripteur"
description = """
NSY103 — epoll est l'API Linux haute performance pour surveiller de nombreux descripteurs. epoll_create1() crée l'instance, epoll_ctl() ajoute/supprime des fd, epoll_wait() attend les événements.

Créez un epoll qui surveille deux pipes et traitez les événements."""
difficulty = 4
exercise_type = "complete"
hints = [
    "epoll_create1(0) crée une instance epoll",
    "epoll_ctl(epfd, EPOLL_CTL_ADD, fd, &ev) enregistre un fd",
    "epoll_wait(epfd, events, maxevents, timeout_ms) attend les événements",
]
id = "fd-epoll-01"
kc_ids = ["KC-C16"]
key_concept = "epoll: O(1) pour surveiller N fd — epoll_create1/epoll_ctl/epoll_wait"
lang = "c"
prerequisites = ["fd-poll-01"]
solution_code = '''
#include <stdio.h>
#include <sys/epoll.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    int pipe1[2], pipe2[2];
    pipe(pipe1); pipe(pipe2);
    int epfd = epoll_create1(0);
    struct epoll_event ev;
    ev.events = EPOLLIN;
    ev.data.fd = pipe1[0];
    epoll_ctl(epfd, EPOLL_CTL_ADD, pipe1[0], &ev);
    ev.data.fd = pipe2[0];
    epoll_ctl(epfd, EPOLL_CTL_ADD, pipe2[0], &ev);
    write(pipe1[1], "ep1", 3); close(pipe1[1]);
    write(pipe2[1], "ep2", 3); close(pipe2[1]);
    struct epoll_event events[2];
    int n = epoll_wait(epfd, events, 2, 100);
    printf("Events: %d\n", n);
    for (int i = 0; i < n; i++) {
        char buf[16];
        ssize_t r = read(events[i].data.fd, buf, sizeof(buf) - 1);
        buf[r] = '\0';
        printf("fd=%s data=%s\n",
            events[i].data.fd == pipe1[0] ? "pipe1" : "pipe2", buf);
    }
    close(pipe1[0]); close(pipe2[0]); close(epfd);
    return 0;
}'''
