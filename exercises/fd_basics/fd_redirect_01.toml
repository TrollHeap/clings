common_mistake = "Oublier fflush(stdout) — le buffer stdio peut ne pas être vidé avant la restauration"
description = """
NSY103 — La redirection de stdout vers un fichier se fait avec dup2(). On sauvegarde stdout, on redirige vers le fichier, on écrit, puis on restaure stdout.

Redirigez stdout vers un fichier, écrivez via printf, restaurez et relisez le contenu."""
difficulty = 2
exercise_type = "complete"
hints = [
    "dup(STDOUT_FILENO) sauvegarde stdout dans un autre fd",
    "dup2(fd, STDOUT_FILENO) redirige stdout vers fd",
    "fflush(stdout) force l'écriture du buffer stdio",
]
id = "fd-redirect-01"
kc_ids = ["KC-C16"]
key_concept = "Redirection: dup(STDOUT) pour sauvegarder, dup2(fd, STDOUT) pour rediriger"
lang = "c"
prerequisites = ["fd-dup-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_redirect.txt";
    int saved_stdout = dup(STDOUT_FILENO);
    int fd = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0644);
    dup2(fd, STDOUT_FILENO);
    close(fd);
    printf("redirected output");
    fflush(stdout);
    dup2(saved_stdout, STDOUT_FILENO);
    close(saved_stdout);
    int rfd = open(path, O_RDONLY);
    char buf[64];
    ssize_t n = read(rfd, buf, sizeof(buf) - 1);
    buf[n] = '\0';
    close(rfd);
    printf("Captured: %s\n", buf);
    unlink(path);
    return 0;
}'''
