common_mistake = "Oublier de sauvegarder stderr avant la redirection — impossible de le restaurer"
description = """
NSY103 — /dev/null est un fichier spécial qui absorbe tout ce qu'on y écrit et retourne EOF en lecture. Rediriger stderr vers /dev/null supprime les messages d'erreur.

Redirigez stderr vers /dev/null, vérifiez que les messages sont absorbés, puis restaurez."""
difficulty = 3
exercise_type = "complete"
hints = [
    "dup(STDERR_FILENO) sauvegarde stderr",
    "O_WRONLY pour ouvrir /dev/null en écriture",
    "dup2(devnull, STDERR_FILENO) redirige stderr vers /dev/null",
]
id = "fd-devnull-01"
kc_ids = ["KC-C16"]
key_concept = "/dev/null absorbe tout — utile pour supprimer stderr ou stdout temporairement"
lang = "c"
prerequisites = ["fd-redirect-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
int main(void) {
    printf("Step 1: stderr active\n");
    int saved_stderr = dup(STDERR_FILENO);
    int devnull = open("/dev/null", O_WRONLY);
    dup2(devnull, STDERR_FILENO);
    close(devnull);
    fprintf(stderr, "This should be suppressed\n");
    printf("Step 2: stderr suppressed\n");
    dup2(saved_stderr, STDERR_FILENO);
    close(saved_stderr);
    printf("Step 3: stderr restored\n");
    return 0;
}'''
