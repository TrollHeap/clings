common_mistake = "Oublier d'envoyer au moins 1 octet de données avec le message de contrôle"
description = """
NSY103 — SCM_RIGHTS permet de transférer un descripteur de fichier d'un processus à un autre via un socket Unix. Le fd est dupliqué dans la table de l'autre processus. C'est le mécanisme utilisé par systemd socket activation.

Transférez un fd d'un enfant vers le parent via un socket Unix pair."""
difficulty = 5
exercise_type = "complete"
hints = [
    "SCM_RIGHTS est le type de message de contrôle pour passer des fd",
    "CMSG_DATA(cmsg) accède aux données du message de contrôle",
    "Le fd est dupliqué dans la table du processus récepteur",
]
id = "fd-passfd-01"
kc_ids = ["KC-C16"]
key_concept = "SCM_RIGHTS: transfert de fd entre processus via socket Unix + sendmsg/recvmsg"
lang = "c"
prerequisites = ["fd-epoll-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <fcntl.h>
#include <sys/socket.h>
#include <sys/wait.h>
void send_fd(int sock, int fd_to_send) {
    struct msghdr msg = {0};
    char buf[1] = {'F'};
    struct iovec iov = {.iov_base = buf, .iov_len = 1};
    msg.msg_iov = &iov;
    msg.msg_iovlen = 1;
    char cmsg_buf[CMSG_SPACE(sizeof(int))];
    msg.msg_control = cmsg_buf;
    msg.msg_controllen = sizeof(cmsg_buf);
    struct cmsghdr *cmsg = CMSG_FIRSTHDR(&msg);
    cmsg->cmsg_level = SOL_SOCKET;
    cmsg->cmsg_type = SCM_RIGHTS;
    cmsg->cmsg_len = CMSG_LEN(sizeof(int));
    memcpy(CMSG_DATA(cmsg), &fd_to_send, sizeof(int));
    sendmsg(sock, &msg, 0);
}
int recv_fd(int sock) {
    struct msghdr msg = {0};
    char buf[1];
    struct iovec iov = {.iov_base = buf, .iov_len = 1};
    msg.msg_iov = &iov;
    msg.msg_iovlen = 1;
    char cmsg_buf[CMSG_SPACE(sizeof(int))];
    msg.msg_control = cmsg_buf;
    msg.msg_controllen = sizeof(cmsg_buf);
    recvmsg(sock, &msg, 0);
    struct cmsghdr *cmsg = CMSG_FIRSTHDR(&msg);
    int received_fd;
    memcpy(&received_fd, CMSG_DATA(cmsg), sizeof(int));
    return received_fd;
}
int main(void) {
    int sv[2];
    socketpair(AF_UNIX, SOCK_STREAM, 0, sv);
    const char *path = "/tmp/kf_passfd.txt";
    int fd = open(path, O_CREAT | O_RDWR | O_TRUNC, 0644);
    write(fd, "passed fd data", 14);
    lseek(fd, 0, SEEK_SET);
    pid_t pid = fork();
    if (pid == 0) {
        close(sv[0]);
        send_fd(sv[1], fd);
        close(fd);
        close(sv[1]);
        _exit(0);
    }
    close(sv[1]);
    close(fd);
    int received = recv_fd(sv[0]);
    close(sv[0]);
    char buf[32];
    ssize_t n = read(received, buf, sizeof(buf) - 1);
    buf[n] = '\0';
    printf("Received fd data: %s\n", buf);
    close(received);
    wait(NULL);
    unlink(path);
    return 0;
}'''
