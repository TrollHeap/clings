common_mistake = "Oublier de fermer le fd entre écriture et relecture — le curseur resterait à la fin"
description = """
NSY103 — Les descripteurs de fichier (fd) sont des entiers qui représentent des fichiers ouverts. Les appels système fondamentaux sont open(), read(), write() et close().

Créez un fichier temporaire, écrivez-y du texte, relisez-le et affichez-le."""
difficulty = 1
exercise_type = "complete"
hints = [
    "write(fd, buf, len) écrit len octets dans fd",
    "close(fd) ferme le descripteur",
    "O_RDONLY pour ouvrir en lecture seule",
]
id = "fd-open-01"
kc_ids = ["KC-C16"]
key_concept = "open→write→close→open→read→close: cycle de vie basique d'un fd"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_fd_open_test.txt";
    int fd = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0644);
    const char *msg = "hello fd";
    write(fd, msg, strlen(msg));
    close(fd);
    fd = open(path, O_RDONLY);
    char buf[32];
    ssize_t n = read(fd, buf, sizeof(buf) - 1);
    buf[n] = '\0';
    printf("Read: %s\n", buf);
    close(fd);
    unlink(path);
    return 0;
}'''
