common_mistake = "Supposer que read() lit toujours exactement n octets — en réalité c'est un maximum"
description = """
NSY103 — read() peut retourner moins d'octets que demandé (short read). Pour lire un fichier entier, il faut boucler jusqu'à ce que read() retourne 0 (EOF).

Implémentez une lecture par blocs de 4 octets et comptez les blocs lus."""
difficulty = 1
exercise_type = "complete"
hints = [
    "read(fd, buf, n) lit au plus n octets et retourne le nombre lu",
    "read retourne 0 à EOF",
    "count++ incrémente le compteur de blocs",
]
id = "fd-read-01"
kc_ids = ["KC-C16"]
key_concept = "read() peut retourner moins que demandé — toujours boucler jusqu'à EOF (retour 0)"
lang = "c"
prerequisites = ["fd-open-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_read_blocks.txt";
    int fd = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0644);
    write(fd, "AABBCCDDEE", 10);
    close(fd);
    fd = open(path, O_RDONLY);
    char block[5];
    ssize_t n;
    int count = 0;
    while ((n = read(fd, block, 4)) > 0) {
        block[n] = '\0';
        count++;
        printf("Block %d: [%s] (%zd bytes)\n", count, block, n);
    }
    printf("Total blocks: %d\n", count);
    close(fd);
    unlink(path);
    return 0;
}'''
