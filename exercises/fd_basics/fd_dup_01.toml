common_mistake = "Fermer un seul fd ne ferme pas les autres duplicatas — le fichier reste ouvert"
description = """
NSY103 — dup() duplique un descripteur de fichier (retourne un nouveau fd pointant vers la même entrée de la table des fichiers ouverts). dup2(oldfd, newfd) force le nouveau fd à une valeur précise.

Dupliquez un fd avec dup() et dup2(), écrivez via les deux, et vérifiez qu'ils partagent le même curseur."""
difficulty = 2
exercise_type = "complete"
hints = [
    "dup(fd) retourne un nouveau fd pointant vers le même fichier",
    "dup2(oldfd, newfd) ferme newfd s'il est ouvert puis le fait pointer vers oldfd",
    "Les fd dupliqués partagent le même curseur de position",
]
id = "fd-dup-01"
kc_ids = ["KC-C16"]
key_concept = "dup/dup2 créent des alias vers la même entrée de table — curseur partagé"
lang = "c"
prerequisites = ["fd-open-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_dup_test.txt";
    int fd1 = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0644);
    int fd2 = dup(fd1);
    printf("fd1=%d, fd2=%d\n", fd1, fd2);
    write(fd1, "AAA", 3);
    write(fd2, "BBB", 3);
    int fd3 = 10;
    dup2(fd1, fd3);
    write(fd3, "CCC", 3);
    close(fd1);
    close(fd2);
    close(fd3);
    int rfd = open(path, O_RDONLY);
    char buf[32];
    ssize_t n = read(rfd, buf, sizeof(buf) - 1);
    buf[n] = '\0';
    printf("Content: %s\n", buf);
    printf("Length: %zd\n", n);
    close(rfd);
    unlink(path);
    return 0;
}'''
