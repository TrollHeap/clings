common_mistake = "Oublier O_EXCL — sans lui, open réussit même si le fichier existe déjà"
description = """
NSY103 — O_CREAT crée le fichier s'il n'existe pas. Combiné avec O_EXCL, l'appel échoue si le fichier existe déjà (création atomique). Le mode (permissions) est le troisième argument.

Créez un fichier avec des permissions spécifiques et vérifiez-les."""
difficulty = 1
exercise_type = "complete"
hints = [
    "O_EXCL avec O_CREAT fait échouer open si le fichier existe",
    "0640 = rw-r----- (propriétaire lit/écrit, groupe lit)",
    "st_mode & 0777 extrait les bits de permission",
]
id = "fd-create-01"
kc_ids = ["KC-C16"]
key_concept = "O_CREAT|O_EXCL = création atomique, mode = permissions UNIX en octal"
lang = "c"
prerequisites = ["fd-open-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <sys/stat.h>
int main(void) {
    const char *path = "/tmp/kf_create_test.txt";
    unlink(path);
    int fd = open(path, O_CREAT | O_WRONLY | O_EXCL, 0640);
    if (fd == -1) { perror("open"); return 1; }
    write(fd, "created\n", 8);
    close(fd);
    struct stat st;
    stat(path, &st);
    printf("File created\n");
    printf("Mode: %o\n", st.st_mode & 0777);
    printf("Size: %ld\n", (long)st.st_size);
    unlink(path);
    return 0;
}'''
