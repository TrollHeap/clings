common_mistake = "Confondre F_GETFL (file flags) et F_GETFD (fd flags)"
description = """
NSY103 — fcntl() permet de manipuler les propriétés d'un descripteur de fichier. F_GETFL/F_SETFL lisent/modifient les flags d'accès. F_GETFD/F_SETFD gèrent le flag close-on-exec.

Lisez les flags d'un fd, ajoutez O_APPEND, et vérifiez le flag FD_CLOEXEC."""
difficulty = 2
exercise_type = "complete"
hints = [
    "F_GETFL lit les flags du fichier (O_RDONLY, O_WRONLY, O_APPEND...)",
    "F_SETFL modifie les flags du fichier",
    "F_GETFD/F_SETFD pour le flag FD_CLOEXEC (close-on-exec)",
]
id = "fd-fcntl-01"
kc_ids = ["KC-C16"]
key_concept = "fcntl: F_GETFL/F_SETFL pour flags fichier, F_GETFD/F_SETFD pour flags fd"
lang = "c"
prerequisites = ["fd-dup-01"]
solution_code = '''
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    const char *path = "/tmp/kf_fcntl_test.txt";
    int fd = open(path, O_CREAT | O_WRONLY | O_TRUNC, 0644);
    int flags = fcntl(fd, F_GETFL);
    printf("O_WRONLY set: %d\n", (flags & O_ACCMODE) == O_WRONLY);
    flags |= O_APPEND;
    fcntl(fd, F_SETFL, flags);
    int new_flags = fcntl(fd, F_GETFL);
    printf("O_APPEND set: %d\n", (new_flags & O_APPEND) != 0);
    int fdflags = fcntl(fd, F_GETFD);
    printf("FD_CLOEXEC: %d\n", (fdflags & FD_CLOEXEC) != 0);
    fcntl(fd, F_SETFD, fdflags | FD_CLOEXEC);
    fdflags = fcntl(fd, F_GETFD);
    printf("FD_CLOEXEC after set: %d\n", (fdflags & FD_CLOEXEC) != 0);
    close(fd);
    unlink(path);
    return 0;
}'''
