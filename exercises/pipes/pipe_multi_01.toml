void example_multi_pipe(void) {
    int fd[2];
    pipe(fd);
    for (int i = 0; i < 2; i++) {
        if (fork() == 0) {
            close(fd[0]);
            char m[32];
            snprintf(m, sizeof(m), "child %d\n", i);
