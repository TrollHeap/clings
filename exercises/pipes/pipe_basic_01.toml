    '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>

/* == EXEMPLE =======================================
 * Envoyer un entier du parent a l'enfant via pipe
 * Le parent ecrit dans fd[1], l'enfant lit depuis fd[0].
 * ================================================= */
void example_pipe_fork(void) {
    int fd[2];
    pipe(fd);
    pid_t pid = fork();
    if (pid == 0) {
        close(fd[1]);
        int val;
        read(fd[0], &val, sizeof(val));
        printf("Enfant got: %d\n", val);
        close(fd[0]);
        _exit(0);
    } else {
        close(fd[0]);
        int val = 99;
        write(fd[1], &val, sizeof(val));
        close(fd[1]);
        wait(NULL);
    }
}
/* Resultat: Enfant got: 99 */

