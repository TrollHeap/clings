mode = "output"

[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "fork() duplique le processus : l'enfant hérite de tous les descripteurs de fichier ouverts, y compris fd[0] et fd[1] du pipe. Chaque processus doit ensuite fermer l'extrémité qu'il n'utilise pas pour éviter des blocages sur EOF."
label = "pipe(fd) + fork() — deux processus partagent le pipe"
step_label = "Étape 1 — fork() : parent et enfant partagent les fd du pipe"

[[visualizer.steps.edges]]
label = "kernel pipe buffer"
source = "parent"
target = "child"

[[visualizer.steps.nodes]]
id = "parent"
label = """
Parent
fd[1] (write)"""

[[visualizer.steps.nodes]]
id = "child"
label = """
Enfant
fd[0] (read)"""

[[visualizer.steps]]
explanation = "write(fd[1]) copie les données dans le buffer circulaire kernel du pipe. Le parent ferme fd[0] (lecture) avant d'écrire car il n'en a pas besoin — et surtout, si l'extrémité lecture restait ouverte dans le parent après close(fd[1]), l'enfant ne verrait jamais EOF (le kernel compterait encore un lecteur)."
label = "Parent: write(fd[1], 'Bonjour fils')"
step_label = "Étape 2 — Parent: write(fd[1], 'Bonjour fils') dans le buffer kernel"

[[visualizer.steps.edges]]
label = "12 bytes"
source = "msg"
target = "buf"

[[visualizer.steps.nodes]]
id = "msg"
label = '"Bonjour fils"'

[[visualizer.steps.nodes]]
id = "buf"
label = "kernel buffer"

[[visualizer.steps]]
explanation = "read(fd[0]) retourne le nombre d'octets lus — pas nécessairement strlen(msg), car les pipes ne garantissent pas la préservation des frontières de messages pour les tailles > PIPE_BUF. Ici le message est court (12 octets) donc une seule lecture suffit. L'enfant appelle _exit(0) (et non exit()) pour éviter de flusher les buffers stdio deux fois."
label = "Enfant: read(fd[0]) → affiche le message"
step_label = "Étape 3 — Enfant: read(fd[0]) → affiche le message reçu"

[[visualizer.steps.edges]]
label = "n bytes"
source = "buf"
target = "out"

[[visualizer.steps.nodes]]
id = "buf"
label = "kernel buffer"

[[visualizer.steps.nodes]]
id = "out"
label = "buf[] enfant"
