label = """
pipe buffer
(vide)"""

[[visualizer.steps]]
explanation = "write() dépose les données dans le buffer kernel. Le pipe n'est plus vide, donc le prochain read() pourra aboutir même en mode O_NONBLOCK — on illustre ainsi que O_NONBLOCK ne bloque que lorsqu'il n'y a rien à lire."
label = 'write(fd[1], "nonblock") — pipe non vide'
step_label = "Étape 2 — write() alimente le pipe (plus vide)"

