[[visualizer.steps]]
explanation = "fcntl(fd[0], F_SETFL, O_NONBLOCK) modifie les flags du descripteur au niveau kernel. Dès lors, read() sur un pipe vide retourne immédiatement -1 avec errno=EAGAIN au lieu de suspendre le processus — essentiel pour les boucles d'événements."
