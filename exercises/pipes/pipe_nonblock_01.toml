label = "pipe buffer"

[[visualizer.steps]]
explanation = "read() réussit cette fois car le buffer kernel contient des données. En mode O_NONBLOCK, il n'y a aucune différence quand des données sont disponibles — la non-bloquance n'affecte que le cas où le pipe est vide ou plein."
label = "read(fd[0]) — succès cette fois"
