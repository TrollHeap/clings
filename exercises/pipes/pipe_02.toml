common_mistake = "Confondre p1[0] et p1[1] : 0=lecture, 1=écriture — toujours dans ce sens"
description = """
NSY103 — Un pipeline Unix chaîne des processus via des pipes. Chaque étape lit depuis un pipe, traite, et écrit dans le suivant. Sans fork, on simule avec deux pipes dans le même processus.

Créez deux pipes : écrivez '42' dans pipe1, lisez et doublez (×2), écrivez '84' dans pipe2, lisez et affichez."""
difficulty = 2
exercise_type = "complete"
hints = [
    "fd[1]=écriture, fd[0]=lecture — même règle pour p1 et p2",
    "Fermez fd[1] avant de lire pour signaler EOF au lecteur",
    "atoi() convertit une chaîne en int, snprintf() fait l'inverse",
]
id = "pipe-02"
kc_ids = ["KC-C10"]
key_concept = "Pipeline = chaîne de pipes ; fermer l'extrémité écriture avant de lire pour obtenir EOF"
lang = "c"
prerequisites = ["pipe-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <string.h>

int main(void) {
    int p1[2], p2[2];
    pipe(p1);
    pipe(p2);
    write(p1[1], "42", 2);
    close(p1[1]);
    char buf1[8];
    ssize_t n1 = read(p1[0], buf1, sizeof(buf1) - 1);
    buf1[n1] = '\0';
    close(p1[0]);
    printf("Pipe1: %s\n", buf1);
    int val = atoi(buf1) * 2;
    char buf2[8];
    snprintf(buf2, sizeof(buf2), "%d", val);
    write(p2[1], buf2, strlen(buf2));
    close(p2[1]);
    char out[8];
    ssize_t n2 = read(p2[0], out, sizeof(out) - 1);
    out[n2] = '\0';
    close(p2[0]);
    printf("Pipe2: %s\n", out);
    return 0;
}'''
