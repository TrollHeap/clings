[[visualizer.steps]]
explanation = "write() puis read() sur le même fd O_RDWR fonctionnent car le FIFO est un buffer FIFO (First-In-First-Out) : write() dépose des octets dans la file kernel, read() les consomme dans l'ordre. Un seul processus peut ainsi tester le canal sans avoir besoin d'un second processus."
label = "write() puis read() — aller-retour dans le buffer FIFO"
step_label = "Étape 3 — write() puis read() : aller-retour dans le buffer FIFO kernel"

