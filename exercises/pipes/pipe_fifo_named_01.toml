label = "processus"

[[visualizer.steps]]
explanation = "open(FIFO_PATH, O_RDWR) est non-bloquant en mono-processus sur Linux : le kernel considère que les deux extrémités sont ouvertes par le même fd. Avec O_RDONLY ou O_WRONLY seul, open() bloquerait indéfiniment jusqu'à ce qu'un autre processus ouvre l'extrémité opposée."
label = "open(O_RDWR) — accès lecture+écriture sans blocage"
step_label = "Étape 2 — open(O_RDWR) évite le blocage en mono-processus"

