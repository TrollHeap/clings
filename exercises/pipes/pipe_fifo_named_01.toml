[[visualizer.steps]]
explanation = "unlink() supprime l'entrée du FIFO dans le répertoire du filesystem. Si des processus avaient encore le fichier ouvert, le nœud inode serait conservé jusqu'au dernier close() — c'est le mécanisme de reference counting des inodes POSIX. Ici le fd est déjà fermé, donc unlink() libère immédiatement l'inode."
label = "unlink() — suppression du fichier FIFO"
step_label = "Étape 4 — unlink() supprime le fichier FIFO du filesystem"

