common_mistake = "Oublier de fermer le fd epoll avec close(epfd) → fuite de descripteur kernel"
description = """
NSY103 — epoll est l'API Linux scalable pour le multiplexage I/O, supérieure à select() pour un grand nombre de fd. epoll_create1() crée une instance, epoll_ctl() ajoute/modifie/supprime des fd, et epoll_wait() attend des événements.

Créez 3 pipes. 3 enfants écrivent chacun dans un pipe. Le parent utilise epoll pour collecter les messages au fur et à mesure, puis les affiche triés par ordre alphabétique."""
difficulty = 5
exercise_type = "complete"
hints = [
    "epoll_create1(0) crée une instance epoll (le flag 0 = pas de EPOLL_CLOEXEC)",
    "ev.events = EPOLLIN pour surveiller la disponibilité en lecture",
    "epoll_ctl(epfd, EPOLL_CTL_ADD, fd, &ev) ajoute un fd à l'instance epoll",
]
id = "pipe-epoll-01"
kc_ids = ["KC-C10"]
key_concept = "epoll = multiplexage O(1) ; epoll_create1 + epoll_ctl(ADD) + epoll_wait en boucle"
lang = "c"
prerequisites = ["pipe-splice-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>
#include <sys/epoll.h>

static int cmp_str32(const void *a, const void *b) {
    return strcmp((const char *)a, (const char *)b);
}

#define N 3

int main(void) {
    int pipes[N][2];
    for (int i = 0; i < N; i++)
        pipe(pipes[i]);

    for (int i = 0; i < N; i++) {
        if (fork() == 0) {
            for (int j = 0; j < N; j++) {
                close(pipes[j][0]);
                if (j != i) close(pipes[j][1]);
            }
            char msg[32];
            snprintf(msg, sizeof(msg), "epoll-%d", i);
            write(pipes[i][1], msg, strlen(msg));
            close(pipes[i][1]);
            _exit(0);
        }
    }
    for (int i = 0; i < N; i++)
        close(pipes[i][1]);

    int epfd = epoll_create1(0);
    for (int i = 0; i < N; i++) {
        struct epoll_event ev;
        ev.events = EPOLLIN;
        ev.data.fd = pipes[i][0];
        epoll_ctl(epfd, EPOLL_CTL_ADD, pipes[i][0], &ev);
    }

    char results[N][32];
    int count = 0;
    while (count < N) {
        struct epoll_event events[N];
        int nfds = epoll_wait(epfd, events, N, -1);
        for (int i = 0; i < nfds; i++) {
            char buf[32];
            ssize_t n = read(events[i].data.fd, buf, sizeof(buf) - 1);
            if (n > 0) {
                buf[n] = '\0';
                strcpy(results[count++], buf);
            }
            close(events[i].data.fd);
        }
    }
    close(epfd);
    for (int i = 0; i < N; i++)
        wait(NULL);
    qsort(results, count, 32, cmp_str32);
    for (int i = 0; i < count; i++)
        printf("Event: %s\n", results[i]);
    return 0;
}'''
