[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "Comme un pipe est unidirectionnel, la communication bidirectionnelle requiert deux pipes : p2c (parent-to-child) et c2p (child-to-parent). Chaque processus écrit dans son pipe de sortie et lit depuis son pipe d'entrée — c'est l'architecture de popen() en mode lecture+écriture."
label = "2 pipes : p2c (parent→enfant) et c2p (enfant→parent)"
step_label = "Étape 1 — Architecture 2 pipes pour la communication bidirectionnelle"

[[visualizer.steps.edges]]
label = "p2c: ping"
source = "parent"
target = "child"

[[visualizer.steps.edges]]
label = "c2p: pong"
source = "child"
target = "parent"

[[visualizer.steps.nodes]]
id = "parent"
label = "Parent"

[[visualizer.steps.nodes]]
id = "child"
label = "Enfant"

[[visualizer.steps]]
explanation = "Le parent écrit dans p2c[1] puis ferme cette extrémité avant de lire c2p[0] — c'est critique pour éviter un deadlock : si le parent gardait p2c[1] ouvert pendant le read(c2p[0]), et que l'enfant attendait d'abord le read(p2c[0]), aucun des deux ne progresserait."
label = "Parent write p2c[1]='ping' → Enfant read p2c[0]"
step_label = "Étape 2 — Parent write p2c[1]='ping', enfant read p2c[0]"

[[visualizer.steps.edges]]
label = "read"
source = "p2c"
target = "child"

[[visualizer.steps.nodes]]
id = "p2c"
label = "p2c pipe"

[[visualizer.steps.nodes]]
id = "child"
label = 'Enfant: "ping"'

[[visualizer.steps]]
explanation = "L'enfant écrit dans c2p[1] puis ferme ses extrémités — le parent peut alors lire depuis c2p[0] et obtenir EOF quand l'enfant se termine. wait(NULL) garantit que le parent attend la fin de l'enfant avant de terminer, évitant un enfant zombie dans la table des processus."
label = "Enfant write c2p[1]='pong' → Parent read c2p[0]"
step_label = "Étape 3 — Enfant write c2p[1]='pong', parent read c2p[0]"

[[visualizer.steps.edges]]
label = "read"
source = "c2p"
target = "parent"

[[visualizer.steps.nodes]]
id = "c2p"
label = "c2p pipe"

[[visualizer.steps.nodes]]
id = "parent"
label = 'Parent: "pong"'
