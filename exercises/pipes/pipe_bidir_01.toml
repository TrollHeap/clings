common_mistake = "Utiliser un seul pipe pour les deux directions → risque de lire ses propres données"
description = """
NSY103 — Un pipe est unidirectionnel. Pour une communication bidirectionnelle, on utilise deux pipes : pipe1 (parent→enfant) et pipe2 (enfant→parent).

Créez deux pipes. Le parent envoie 'ping' à l'enfant via pipe1, l'enfant répond 'pong' via pipe2. Le parent affiche la réponse."""
difficulty = 3
exercise_type = "complete"
hints = [
    "p2c = parent-to-child : parent écrit p2c[1], enfant lit p2c[0]",
    "c2p = child-to-parent : enfant écrit c2p[1], parent lit c2p[0]",
    "Chaque processus ferme les extrémités qu'il n'utilise pas (4 close au total)",
]
id = "pipe-bidir-01"
kc_ids = ["KC-C10"]
key_concept = "Communication bidirectionnelle nécessite 2 pipes car un pipe est unidirectionnel"
lang = "c"
prerequisites = ["pipe-multi-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>

int main(void) {
    setbuf(stdout, NULL);
    int p2c[2], c2p[2];
    pipe(p2c);
    pipe(c2p);

    pid_t pid = fork();
    if (pid == 0) {
        close(p2c[1]);
        close(c2p[0]);
        char buf[32];
        ssize_t n = read(p2c[0], buf, sizeof(buf) - 1);
        buf[n] = '\0';
        printf("Enfant recu: %s\n", buf);
        const char *reply = "pong";
        write(c2p[1], reply, strlen(reply));
        close(p2c[0]);
        close(c2p[1]);
        _exit(0);
    } else {
        close(p2c[0]);
        close(c2p[1]);
        const char *msg = "ping";
        write(p2c[1], msg, strlen(msg));
        close(p2c[1]);
        char buf[32];
        ssize_t n = read(c2p[0], buf, sizeof(buf) - 1);
        buf[n] = '\0';
        printf("Parent recu: %s\n", buf);
        close(c2p[0]);
        wait(NULL);
    }
    return 0;
}'''
