    "Fermer p[1] après dup2 est crucial : sinon le pipe reste ouvert côté écriture et read bloque",
    "fflush(stdout) est nécessaire avant de restaurer stdout pour vider le buffer C",
]
id = "pipe-03"
kc_ids = ["KC-C10"]
key_concept = "dup2(p[1], 1) redirige stdout→pipe ; sauvegarder stdout_fd=dup(1) pour restaurer"
lang = "c"
prerequisites = ["pipe-02"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>

int main(void) {
    int p[2];
    pipe(p);
    int saved_stdout = dup(STDOUT_FILENO);
    dup2(p[1], STDOUT_FILENO);
    close(p[1]);
    printf("hello stdout");
    fflush(stdout);
    dup2(saved_stdout, STDOUT_FILENO);
    close(saved_stdout);
    char buf[64];
    ssize_t n = read(p[0], buf, sizeof(buf) - 1);
    buf[n] = '\0';
    close(p[0]);
    printf("Captured: %s\n", buf);
    return 0;
}'''
