[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "mkstemp() crée un fichier temporaire unique et retourne un fd ouvert. Après le write(), lseek(tmpfd, 0, SEEK_SET) repositionne le curseur au début — sans cette étape, splice() lirait depuis la position courante (fin du fichier) et ne transférerait rien."
label = "Fichier temporaire créé avec mkstemp"
step_label = "Étape 1 — mkstemp() crée le fichier source, lseek() remet le curseur au début"

[[visualizer.steps.edges]]
label = "write + lseek(0)"
source = "file"
target = "fd"

[[visualizer.steps.nodes]]
id = "file"
label = """
tmpfile
"splice zero-copy""""

[[visualizer.steps.nodes]]
id = "fd"
label = "tmpfd"

[[visualizer.steps]]
explanation = "splice() déplace les pages du page cache du fichier directement dans le buffer circulaire du pipe, sans jamais copier les données en espace utilisateur. Le kernel déplace des pointeurs de pages plutôt que du contenu — la performance est constante quelle que soit la taille transférée."
label = "splice(tmpfd → fd[1]) — zero-copy kernel transfer"
step_label = "Étape 2 — splice() transfère sans copie du fichier vers le pipe"

[[visualizer.steps.edges]]
label = "splice (no userspace copy)"
source = "tmpfd"
target = "pipe"

[[visualizer.steps.nodes]]
id = "tmpfd"
label = "tmpfd (fichier)"

[[visualizer.steps.nodes]]
id = "pipe"
label = "pipe fd[1]"

[[visualizer.steps]]
explanation = "read(fd[0]) récupère les données depuis le pipe — l'extrémité lecture du buffer circulaire kernel. Le nombre d'octets retourné par splice() correspond exactement à ce qui sera disponible en lecture, ce qui permet d'imprimer le compte précis sans appel supplémentaire."
label = "read(fd[0]) — récupérer les données"
step_label = "Étape 3 — read(fd[0]) consomme les données transférées par splice()"

[[visualizer.steps.edges]]
label = "16 bytes"
source = "pipe"
target = "buf"

[[visualizer.steps.nodes]]
id = "pipe"
label = "pipe fd[0]"

[[visualizer.steps.nodes]]
