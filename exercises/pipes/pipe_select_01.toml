common_mistake = "Oublier FD_ZERO avant chaque appel à select — la fd_set garde les résultats précédents"
description = """
NSY103 — select() permet de surveiller plusieurs descripteurs de fichier simultanément. On passe un fd_set à select() qui bloque jusqu'à ce qu'au moins un fd soit prêt en lecture. FD_SET() ajoute un fd, FD_ISSET() vérifie s'il est prêt.

Créez 2 pipes. Deux enfants écrivent chacun dans un pipe. Le parent utilise select() pour lire les messages dès qu'ils arrivent."""
difficulty = 4
exercise_type = "complete"
hints = [
    "FD_SET(fd, &rfds) ajoute fd à l'ensemble surveillé",
    "FD_ISSET(fd, &rfds) vérifie si fd est prêt après select()",
    "Le premier argument de select est le plus grand fd + 1",
]
id = "pipe-select-01"
kc_ids = ["KC-C10"]
key_concept = "select() multiplexe N descripteurs ; FD_SET ajoute, FD_ISSET vérifie la disponibilité"
lang = "c"
prerequisites = ["pipe-bidir-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/select.h>

int main(void) {
    int fd1[2], fd2[2];
    pipe(fd1);
    pipe(fd2);

    /* Écriture dans les deux pipes depuis le parent (ordre garanti) */
    write(fd1[1], "msg-A\n", 6); close(fd1[1]);
    write(fd2[1], "msg-B\n", 6); close(fd2[1]);

    int done = 0;
    while (done < 2) {
        fd_set rfds;
        FD_ZERO(&rfds);
        if (fd1[0] >= 0) FD_SET(fd1[0], &rfds);
        if (fd2[0] >= 0) FD_SET(fd2[0], &rfds);
        int maxfd = (fd1[0] > fd2[0] ? fd1[0] : fd2[0]) + 1;
        select(maxfd, &rfds, NULL, NULL, NULL);

        char buf[64];
        ssize_t n;
        if (fd1[0] >= 0 && FD_ISSET(fd1[0], &rfds)) {
            n = read(fd1[0], buf, sizeof(buf) - 1);
            if (n > 0) { buf[n-1] = '\0'; printf("Select got: %s\n", buf); }
            close(fd1[0]); fd1[0] = -1; done++;
        }
        if (fd2[0] >= 0 && FD_ISSET(fd2[0], &rfds)) {
            n = read(fd2[0], buf, sizeof(buf) - 1);
            if (n > 0) { buf[n-1] = '\0'; printf("Select got: %s\n", buf); }
            close(fd2[0]); fd2[0] = -1; done++;
        }
    }
    return 0;
}'''
