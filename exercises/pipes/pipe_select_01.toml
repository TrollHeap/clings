#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>
#include <sys/select.h>

/* == EXEMPLE =======================================
 * select() avec un seul pipe et timeout
 * ================================================= */
void example_select_one(void) {
    int fd[2];
    pipe(fd);
    if (fork() == 0) {
        close(fd[0]);
        write(fd[1], "data", 4);
        close(fd[1]);
        _exit(0);
    }
    close(fd[1]);
    fd_set rfds;
    FD_ZERO(&rfds);
    FD_SET(fd[0], &rfds);
    select(fd[0]+1, &rfds, NULL, NULL, NULL);
    if (FD_ISSET(fd[0], &rfds)) {
        char buf[16];
        ssize_t n = read(fd[0], buf, sizeof(buf)-1);
        buf[n] = '\0';
        printf("Got: %s\n", buf);
    }
    close(fd[0]); wait(NULL);
}
/* Resultat: Got: data */

