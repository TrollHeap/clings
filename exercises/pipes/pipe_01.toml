[[visualizer.steps]]
explanation = "pipe(fd) est un appel système qui demande au noyau de créer une paire de descripteurs liés : fd[0] pour la lecture, fd[1] pour l'écriture. Ils partagent un buffer circulaire de 4096 octets (PIPE_BUF) géré entièrement par le kernel."
label = "pipe(fd) — deux descripteurs créés"
step_label = "Étape 1 — pipe() crée la paire de file descriptors"

[[visualizer.steps.edges]]
label = "kernel buffer"
source = "w"
target = "r"

[[visualizer.steps.nodes]]
id = "w"
label = """
fd[1]
(write)"""

[[visualizer.steps.nodes]]
id = "r"
label = """
fd[0]
(read)"""

[[visualizer.steps]]
explanation = "write() transfère les octets dans le buffer kernel du pipe. Le kernel maintient un buffer circulaire (PIPE_BUF = 4096 octets) ; l'écriture est atomique si n ≤ PIPE_BUF et le buffer n'est pas plein."
label = 'write(fd[1], "hello pipe", 10)'
step_label = "Étape 2 — write() remplit le buffer kernel"

[[visualizer.steps.edges]]
label = "10 bytes"
source = "msg"
target = "buf"

[[visualizer.steps.nodes]]
id = "msg"
label = '"hello pipe"'

[[visualizer.steps.nodes]]
id = "buf"
label = "kernel buffer"

[[visualizer.steps]]
explanation = "read() extrait les octets du buffer kernel et les place dans le tableau buf de l'espace utilisateur. Fermer fd[1] avant read() est crucial : si l'extrémité écriture reste ouverte, read() bloque indéfiniment même si le buffer est vide (pas d'EOF)."
label = "read(fd[0], buf, 31) — récupère le message"
step_label = "Étape 3 — read() consomme le buffer kernel"

