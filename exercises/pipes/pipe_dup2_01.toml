[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "dup2(fd[1], STDOUT_FILENO) force le descripteur numéro 1 à pointer vers le pipe. Après cet appel, tout ce que l'enfant envoie via printf() (qui écrit sur fd 1) atterrit dans le buffer kernel du pipe au lieu du terminal."
label = "dup2(fd[1], STDOUT_FILENO) — redirection"
step_label = "Étape 1 — dup2() redirige stdout de l'enfant vers le pipe"

[[visualizer.steps.edges]]
label = "dup2 → same file"
source = "stdout"
target = "pipe"

[[visualizer.steps.nodes]]
id = "stdout"
label = "STDOUT (fd 1)"

[[visualizer.steps.nodes]]
id = "pipe"
label = "pipe fd[1]"

[[visualizer.steps]]
explanation = "Grâce à dup2, l'enfant utilise printf() normalement sans savoir qu'il écrit dans un pipe. Le parent lit depuis fd[0] et récupère exactement ce que l'enfant a imprimé — c'est le mécanisme qu'utilise la bibliothèque C pour popen()."
label = "Enfant: printf → pipe → Parent: read"
step_label = "Étape 2 — printf() de l'enfant transite par le pipe vers le parent"

[[visualizer.steps.edges]]
label = "via pipe"
source = "child"
target = "parent"

[[visualizer.steps.nodes]]
id = "child"
label = 'printf("Hello")'

[[visualizer.steps.nodes]]
id = "parent"
label = "read(fd[0])"

[[visualizer.steps]]
explanation = "Après avoir lu le message reçu depuis le pipe, le parent le réaffiche via son propre stdout (qui n'a pas été redirigé). C'est là que wait(NULL) entre en jeu : sans lui, le parent pourrait se terminer avant que l'enfant ait fini d'écrire dans le pipe."
label = "Parent affiche le message reçu"
step_label = "Étape 3 — Parent affiche le message reçu du pipe"

