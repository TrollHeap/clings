label = "pipe buffer"

[[visualizer.steps]]
explanation = "L'enfant consommateur redirige fd[0] vers STDIN_FILENO avec dup2 : fgets(stdin) lit alors depuis le pipe de façon transparente. Le pipe se ferme (EOF) quand le parent ferme ses copies de fd, ce qui termine la boucle fgets."
label = "Enfant 2: fd[0] → stdin (consommateur)"
step_label = "Étape 2 — Enfant 2 redirige stdin ← pipe (consommateur)"

