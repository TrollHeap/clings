common_mistake = "Le parent doit fermer les deux fd du pipe sinon l'enfant 2 ne reçoit jamais EOF"
description = """
NSY103 — Un pipeline shell 'cmd1 | cmd2' connecte stdout de cmd1 à stdin de cmd2 via un pipe. On simule ce mécanisme avec fork+dup2+pipe : l'enfant 1 écrit des lignes dans le pipe, l'enfant 2 les compte.

Créez un pipeline où le premier enfant écrit 3 lignes et le second les compte et affiche le total."""
difficulty = 2
exercise_type = "complete"
hints = [
    "L'enfant producteur redirige STDOUT_FILENO vers fd[1] avec dup2",
    "L'enfant consommateur redirige STDIN_FILENO vers fd[0] avec dup2",
    "Le parent ferme les deux extrémités du pipe pour que l'enfant 2 reçoive EOF",
]
id = "pipe-chain-01"
kc_ids = ["KC-C10"]
key_concept = "Un pipeline connecte stdout d'un processus à stdin d'un autre via pipe+dup2"
lang = "c"
prerequisites = ["pipe-dup2-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>

int main(void) {
    int fd[2];
    pipe(fd);

    pid_t p1 = fork();
    if (p1 == 0) {
        close(fd[0]);
        dup2(fd[1], STDOUT_FILENO);
        close(fd[1]);
        printf("alpha\n");
        printf("beta\n");
        printf("gamma\n");
        fflush(stdout);
        _exit(0);
    }

    pid_t p2 = fork();
    if (p2 == 0) {
        close(fd[1]);
        dup2(fd[0], STDIN_FILENO);
        close(fd[0]);
        int count = 0;
        char buf[128];
        while (fgets(buf, sizeof(buf), stdin) != NULL)
            count++;
        printf("Lines: %d\n", count);
        fflush(stdout);
        _exit(0);
    }

    close(fd[0]);
    close(fd[1]);
    wait(NULL);
    wait(NULL);
    return 0;
}'''
