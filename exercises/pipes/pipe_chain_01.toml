#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/wait.h>

/* == EXEMPLE =======================================
 * Pipeline : enfant ecrit des nombres, parent les somme
 * dup2 redirige stdout de l'enfant vers le pipe.
 * ================================================= */
void example_pipeline(void) {
    int fd[2];
    pipe(fd);
    pid_t p = fork();
    if (p == 0) {
        close(fd[0]);
        dup2(fd[1], STDOUT_FILENO);
        close(fd[1]);
        printf("10\n20\n30\n");
        fflush(stdout);
        _exit(0);
    }
    close(fd[1]);
    FILE *f = fdopen(fd[0], "r");
    int sum = 0, v;
    while (fscanf(f, "%d", &v) == 1) sum += v;
    fclose(f);
    wait(NULL);
    printf("Sum: %d\n", sum);
}
/* Resultat: Sum: 60 */

