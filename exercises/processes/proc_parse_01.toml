/* == EXEMPLE =======================================
 * Parser des headers HTTP (cle: valeur)
 * Meme pattern : fmemopen + fgets + sscanf pour
 * extraire des paires cle/valeur depuis du texte.
 * ================================================= */
void example_parse_headers(void) {
    const char *headers =
        "Host: example.com\n"
        "Content-Type: text/html\n"
        "Connection: keep-alive\n"
        "Accept: */*\n";
    FILE *f = fmemopen((void *)headers, strlen(headers), "r");
    if (!f) return;
    char line[128], key[64], val[64];
    while (fgets(line, sizeof(line), f)) {
        line[strcspn(line, "\n")] = 0;
        if (sscanf(line, "%63[^:]: %63[^\n]", key, val) == 2) {
            if (!strcmp(key, "Host") || !strcmp(key, "Content-Type")) {
                printf("%s -> %s\n", key, val);
            }
        }
    }
    fclose(f);
}
