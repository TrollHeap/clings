common_mistake = "Croire qu'un setenv dans l'enfant modifie le parent — chaque processus a sa copie"
description = """
NSY103 — Les variables d'environnement sont des paires clé=valeur héritées par les processus enfants. getenv() lit une variable, setenv() la définit, unsetenv() la supprime. environ est le tableau global.

Manipulez les variables d'environnement et observez l'héritage après fork."""
difficulty = 3
exercise_type = "complete"
hints = [
    """getenv("VAR") retourne NULL si la variable n'existe pas""",
    "setenv(name, value, overwrite) — overwrite=1 pour remplacer une existante",
    "L'enfant reçoit une copie de l'environnement — ses modifications sont isolées",
]
id = "proc-env-01"
kc_ids = ["KC-C07"]
key_concept = "L'environnement est hérité par fork mais chaque processus a sa propre copie"
lang = "c"
prerequisites = ["fork-exec-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <sys/wait.h>

int main(void) {
    setbuf(stdout, NULL);
    /* Lire une variable existante */
    const char *home = getenv("HOME");
    printf("HOME=%s\n", home ? home : "(not set)");

    /* Definir une nouvelle variable */
    setenv("KF_TEST", "hello", 1);
    printf("KF_TEST=%s\n", getenv("KF_TEST"));

    /* Modifier (overwrite=1) */
    setenv("KF_TEST", "world", 1);
    printf("KF_TEST=%s\n", getenv("KF_TEST"));

    /* L'enfant hérite de l'environnement */
    pid_t child = fork();
    if (child == 0) {
        printf("Child KF_TEST=%s\n", getenv("KF_TEST"));
        /* Modifier dans l'enfant n'affecte pas le parent */
        setenv("KF_TEST", "child_only", 1);
        printf("Child modified KF_TEST=%s\n", getenv("KF_TEST"));
        _exit(0);
    }
    waitpid(child, NULL, 0);

    /* Le parent garde sa valeur */
    printf("Parent KF_TEST=%s\n", getenv("KF_TEST"));

    /* Supprimer */
    unsetenv("KF_TEST");
    const char *val = getenv("KF_TEST");
    printf("After unset: %s\n", val ? val : "(not set)");

    return 0;
}'''
