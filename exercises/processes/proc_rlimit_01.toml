common_mistake = "Tenter d'augmenter hard sans privilèges root — setrlimit retourne EPERM"
description = """
NSY103 — getrlimit/setrlimit contrôlent les limites de ressources par processus : taille de fichier (RLIMIT_FSIZE), nombre de fichiers ouverts (RLIMIT_NOFILE), taille de la pile (RLIMIT_STACK), etc. Chaque limite a une valeur soft (courante) et hard (maximum).

Affichez et modifiez les limites de ressources du processus courant."""
difficulty = 4
exercise_type = "complete"
hints = [
    "struct rlimit { rlim_t rlim_cur (soft), rlim_t rlim_max (hard) }",
    "getrlimit(resource, &rl) remplit la struct, setrlimit la modifie",
    "On ne peut augmenter soft que jusqu'à hard — seul root peut augmenter hard",
]
id = "proc-rlimit-01"
kc_ids = ["KC-C07"]
key_concept = "rlimit contrôle les ressources : soft = limite courante, hard = plafond non-root"
lang = "c"
prerequisites = ["proc-daemon-01"]
solution_code = '''
#include <stdio.h>
#include <sys/resource.h>

void show_limit(const char *name, int resource) {
    struct rlimit rl;
    if (getrlimit(resource, &rl) == 0) {
        if (rl.rlim_cur == RLIM_INFINITY)
            printf("%-15s soft=unlimited", name);
        else
            printf("%-15s soft=%-10lu", name, (unsigned long)rl.rlim_cur);
        if (rl.rlim_max == RLIM_INFINITY)
            printf("  hard=unlimited\n");
        else
            printf("  hard=%lu\n", (unsigned long)rl.rlim_max);
    }
}

int main(void) {
    show_limit("RLIMIT_NOFILE", RLIMIT_NOFILE);
    show_limit("RLIMIT_STACK", RLIMIT_STACK);
    show_limit("RLIMIT_FSIZE", RLIMIT_FSIZE);

    /* Reduire la limite de fichiers ouverts */
    struct rlimit new_rl;
    getrlimit(RLIMIT_NOFILE, &new_rl);
    unsigned long old_soft = (unsigned long)new_rl.rlim_cur;
    new_rl.rlim_cur = 64;
    if (setrlimit(RLIMIT_NOFILE, &new_rl) == 0)
        printf("\nChanged NOFILE: %lu -> %lu\n", old_soft, 64UL);

    show_limit("RLIMIT_NOFILE", RLIMIT_NOFILE);

    /* Restaurer */
    new_rl.rlim_cur = old_soft;
    setrlimit(RLIMIT_NOFILE, &new_rl);
    printf("Restored\n");

    return 0;
}'''
