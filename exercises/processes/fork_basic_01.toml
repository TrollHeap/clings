common_mistake = "Utiliser exit() au lieu de _exit() dans l'enfant — double flush des buffers stdio"
description = """
NSY103 — fork() crée un processus enfant identique au parent. Le parent reçoit le PID de l'enfant, l'enfant reçoit 0. getpid() et getppid() retournent le PID du processus courant et de son parent.

Créez un enfant avec fork() et affichez les relations parent-enfant de manière déterministe."""
difficulty = 1
exercise_type = "complete"
hints = [
    "fork() retourne 0 dans l'enfant, le PID de l'enfant dans le parent",
    "getppid() retourne le PID du processus parent",
    "_exit() dans l'enfant évite de flusher les buffers stdio du parent",
]
id = "fork-basic-01"
kc_ids = ["KC-C07"]
key_concept = "fork() retourne 0 dans l'enfant et le PID enfant dans le parent — c'est la seule différence"
lang = "c"
prerequisites = ["process-state-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <sys/wait.h>

int main(void) {
    setbuf(stdout, NULL);
    printf("Parent PID: %d\n", getpid());

    pid_t child = fork();
    if (child == -1) {
        perror("fork");
        return 1;
    }

    if (child == 0) {
        /* Processus enfant */
        printf("Child: my PID=%d, parent PID=%d\n", getpid(), getppid());
        _exit(42);
    }

    /* Processus parent */
    int status;
    waitpid(child, &status, 0);
    if (WIFEXITED(status))
        printf("Parent: child %d exited with code %d\n", child, WEXITSTATUS(status));

    return 0;
}'''
