common_mistake = "Oublier le toggle entrée/sortie — PTRACE_SYSCALL s'arrête deux fois par appel système"
description = """
NSY103 — ptrace() permet à un processus de contrôler l'exécution d'un autre : inspecter registres, mémoire, intercepter les appels système. C'est le mécanisme derrière strace et gdb.

Utilisez ptrace pour tracer les appels système d'un processus enfant qui fait write()."""
difficulty = 5
exercise_type = "complete"
hints = [
    "PTRACE_TRACEME dans l'enfant + SIGSTOP pour donner le contrôle au parent",
    "PTRACE_SYSCALL continue jusqu'au prochain syscall (entrée ou sortie)",
    "orig_rax contient le numéro du syscall sur x86_64",
]
id = "proc-ptrace-01"
kc_ids = ["KC-C07"]
key_concept = "ptrace permet d'intercepter chaque syscall — PTRACE_SYSCALL s'arrête à l'entrée ET à la sortie"
lang = "c"
prerequisites = ["proc-rlimit-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <signal.h>
#include <sys/ptrace.h>
#include <sys/wait.h>
#include <sys/user.h>
#include <sys/syscall.h>

int main(void) {
    pid_t child = fork();
    if (child == 0) {
        /* Enfant: se déclare tracé */
        ptrace(PTRACE_TRACEME, 0, NULL, NULL);
        raise(SIGSTOP); /* s'arrête pour que le parent prenne le controle */
        /* Faire quelques appels système */
        write(STDOUT_FILENO, "Hello\n", 6);
        write(STDOUT_FILENO, "World\n", 6);
        _exit(0);
    }

    /* Parent: tracer les syscalls */
    int status;
    int syscall_count = 0;
    int in_syscall = 0;

    waitpid(child, &status, 0); /* attendre SIGSTOP initial */

    /* Commencer le tracing */
    ptrace(PTRACE_SYSCALL, child, NULL, NULL);

    while (1) {
        waitpid(child, &status, 0);
        if (WIFEXITED(status)) {
            printf("Child exited with %d\n", WEXITSTATUS(status));
            break;
        }
        if (WIFSTOPPED(status)) {
            struct user_regs_struct regs;
            ptrace(PTRACE_GETREGS, child, NULL, &regs);
            if (in_syscall) {
                /* Retour du syscall */
                in_syscall = 0;
            } else {
                /* Entrée du syscall */
                long syscall_nr = regs.orig_rax;
                if (syscall_nr == SYS_write)
                    syscall_count++;
                in_syscall = 1;
            }
            ptrace(PTRACE_SYSCALL, child, NULL, NULL);
        }
    }

    printf("write() calls traced: %d\n", syscall_count);
    return 0;
}'''
