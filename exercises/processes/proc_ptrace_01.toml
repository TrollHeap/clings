/* == EXEMPLE =======================================
 * Compter les syscalls totaux d'un enfant
 * ================================================= */
void example_ptrace(void) {
    pid_t p = fork();
    if (p == 0) {
        ptrace(PTRACE_TRACEME, 0, NULL, NULL);
        raise(SIGSTOP);
        write(1, "x", 1);
        _exit(0);
    }
    int st, count = 0;
    waitpid(p, &st, 0);
    ptrace(PTRACE_SYSCALL, p, NULL, NULL);
    while (1) {
        waitpid(p, &st, 0);
        if (WIFEXITED(st)) break;
        count++;
        ptrace(PTRACE_SYSCALL, p, NULL, NULL);
    }
    printf("example: %d syscall stops\n", count);
}

