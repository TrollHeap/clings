common_mistake = "Un seul fork laisse le processus comme leader de session — il peut encore ouvrir un terminal"
description = """
NSY103 — Un daemon est un processus en arrière-plan sans terminal de contrôle. La daemonisation classique utilise le double fork : 1) fork + parent exit (détachement du terminal), 2) setsid() (nouvelle session), 3) second fork + parent exit (empêche de récupérer un terminal).

Simulez les étapes de daemonisation et affichez les transitions de manière déterministe via un pipe."""
difficulty = 4
exercise_type = "complete"
hints = [
    "setsid() crée une nouvelle session — le processus devient leader de session",
    "Le double fork empêche le daemon de récupérer un terminal de contrôle",
    "getsid(0) retourne le SID du processus courant",
]
id = "proc-daemon-01"
kc_ids = ["KC-C07"]
key_concept = "Double fork + setsid : le daemon n'est pas leader de session, ne peut pas récupérer un terminal"
lang = "c"
prerequisites = ["proc-env-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <sys/wait.h>

int main(void) {
    int pipefd[2];
    if (pipe(pipefd) == -1) { perror("pipe"); return 1; }

    printf("Step 1: Original process PID=%d\n", getpid());

    pid_t pid1 = fork();
    if (pid1 == -1) { perror("fork"); return 1; }
    if (pid1 > 0) {
        /* Premier parent quitte */
        close(pipefd[1]);
        /* Lire les messages du daemon */
        char buf[256];
        FILE *f = fdopen(pipefd[0], "r");
        while (fgets(buf, sizeof(buf), f))
            printf("%s", buf);
        fclose(f);
        waitpid(pid1, NULL, 0);
        return 0;
    }

    /* Premier enfant */
    close(pipefd[0]);
    FILE *out = fdopen(pipefd[1], "w");

    pid_t sid = setsid();
    fprintf(out, "Step 2: setsid() new session SID=%d\n", sid);

    pid_t pid2 = fork();
    if (pid2 > 0) {
        /* Second parent quitte */
        fclose(out);
        _exit(0);
    }

    /* Processus daemon final */
    fprintf(out, "Step 3: Daemon PID=%d, SID=%d\n", getpid(), getsid(0));
    fprintf(out, "Step 4: Daemon detached from terminal\n");
    fclose(out);
    _exit(0);
}'''
