 * Fork simple avec communication par pipe
 * L'enfant écrit dans le pipe, le parent lit
 * ================================================= */
void example_pipe_fork(void) {
    int fd[2];
    pipe(fd);
    pid_t p = fork();
    if (p == 0) {
