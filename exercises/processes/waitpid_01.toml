common_mistake = "Utiliser status directement comme code de sortie — il faut WEXITSTATUS pour extraire les 8 bits"
description = """
NSY103 — waitpid(pid, &status, options) permet d'attendre un processus avec des options : WNOHANG retourne immédiatement si aucun enfant n'est terminé, WUNTRACED détecte les enfants stoppés (SIGSTOP).

Démontrez les macros WIFEXITED, WIFSIGNALED, WEXITSTATUS sur différents scénarios de terminaison."""
difficulty = 2
exercise_type = "complete"
hints = [
    "WEXITSTATUS(status) extrait le code de sortie (8 bits, 0-255)",
    "WTERMSIG(status) retourne le numéro du signal qui a tué le processus",
    "raise(sig) envoie un signal au processus courant (équivalent de kill(getpid(), sig))",
]
id = "waitpid-01"
kc_ids = ["KC-C07"]
key_concept = "Le status de wait encode la terminaison : WIFEXITED pour exit normal, WIFSIGNALED pour signal"
lang = "c"
prerequisites = ["fork-multi-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <signal.h>
#include <sys/wait.h>

void check_status(const char *label, int status) {
    if (WIFEXITED(status))
        printf("%s: exited normally, code=%d\n", label, WEXITSTATUS(status));
    else if (WIFSIGNALED(status))
        printf("%s: killed by signal %d\n", label, WTERMSIG(status));
    else
        printf("%s: other\n", label);
}

int main(void) {
    /* Enfant 1: sortie normale */
    pid_t c1 = fork();
    if (c1 == 0) _exit(0);

    /* Enfant 2: sortie avec code erreur */
    pid_t c2 = fork();
    if (c2 == 0) _exit(42);

    /* Enfant 3: tué par signal */
    pid_t c3 = fork();
    if (c3 == 0) {
        raise(SIGTERM); /* se tue avec SIGTERM */
        _exit(1);    /* jamais atteint */
    }

    int status;
    waitpid(c1, &status, 0);
    check_status("Child 1", status);

    waitpid(c2, &status, 0);
    check_status("Child 2", status);

    waitpid(c3, &status, 0);
    check_status("Child 3", status);

    return 0;
}'''
