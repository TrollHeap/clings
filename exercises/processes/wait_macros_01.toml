    '''
#include <stdio.h>
#include <sys/wait.h>

/* == EXEMPLE =======================================
 * Decoder des status wait() differents
 * WIFEXITED/WEXITSTATUS pour sortie normale,
 * WIFSIGNALED/WTERMSIG pour mort par signal.
 * ================================================= */
void example_decode(int status) {
    if (WIFEXITED(status)) {
        printf("Exit code: %d\n", WEXITSTATUS(status));
    } else if (WIFSIGNALED(status)) {
        printf("Killed by signal: %d\n", WTERMSIG(status));
    }
}
