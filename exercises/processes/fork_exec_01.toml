common_mistake = "Oublier _exit(127) après exec échoué — l'enfant continue le code du parent"
description = """
NSY103 — Le pattern fork+exec+wait est le mécanisme fondamental de création de processus sous UNIX. Le parent fork, l'enfant exec un nouveau programme, le parent wait. C'est ainsi que le shell lance des commandes.

Implémentez une mini-fonction run_command qui exécute une commande et retourne son code de sortie."""
difficulty = 3
exercise_type = "complete"
hints = [
    "fork() crée l'enfant, execvp() remplace son image, waitpid() attend la fin",
    'Convention UNIX : code 127 signifie "command not found"',
    "execvp reçoit argv directement — même tableau que celui passé en paramètre",
]
id = "fork-exec-01"
kc_ids = ["KC-C07"]
key_concept = "Le pattern fork+exec+wait est la base de tout lancement de processus sous UNIX"
lang = "c"
prerequisites = ["waitpid-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <sys/wait.h>

int run_command(const char *prog, char *const argv[]) {
    pid_t pid = fork();
    if (pid == -1) {
        perror("fork");
        return -1;
    }
    if (pid == 0) {
        execvp(prog, argv);
        perror("execvp");
        _exit(127); /* convention: 127 = command not found */
    }
    int status;
    waitpid(pid, &status, 0);
    if (WIFEXITED(status))
        return WEXITSTATUS(status);
    return -1;
}

int main(void) {
    int rc;

    char *cmd1[] = {"echo", "Command 1 OK", NULL};
    rc = run_command("echo", cmd1);
    printf("Exit code: %d\n", rc);

    char *cmd2[] = {"test", "-f", "/nonexistent", NULL};
    rc = run_command("test", cmd2);
    printf("Exit code: %d\n", rc);

    char *cmd3[] = {"echo", "Command 3 OK", NULL};
    rc = run_command("echo", cmd3);
    printf("Exit code: %d\n", rc);

    return 0;
}'''
