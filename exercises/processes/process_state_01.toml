common_mistake = "Confondre SLEEPING (attente E/S) et STOPPED (suspendu par SIGSTOP)"
description = """
NSY103 — Un processus Linux traverse plusieurs états : RUNNING, SLEEPING, STOPPED, ZOMBIE. Ces transitions suivent des règles précises.

Implémentez une machine d'état de processus simplifiée avec une enum et une fonction de transition.

⚠ Note : cet exercice simule le comportement des appels système dans un environnement WASM. Les vrais syscalls (fork, signal, shmget, etc.) ne sont pas disponibles dans le sandbox."""
difficulty = 2
exercise_type = "complete"
hints = [
    "enum ProcState { RUNNING, SLEEPING, STOPPED, ZOMBIE, DEAD };",
    "typedef struct { int pid; enum ProcState state; int exit_code; } Proc;",
    "Transition sur signal SIGSTOP → STOPPED, SIGCONT → RUNNING",
]
id = "process-state-01"
kc_ids = ["KC-C07"]
key_concept = "Zombie = process terminé dont le parent n'a pas encore fait wait()"
lang = "c"
prerequisites = ["wait-macros-01"]
solution_code = '''
#include <stdio.h>
typedef enum { RUNNING, SLEEPING, STOPPED, ZOMBIE, DEAD } ProcState;
typedef struct { int pid; ProcState state; int exit_code; } Proc;
const char *state_name(ProcState s) {
    switch (s) {
        case RUNNING:  return "RUNNING";
        case SLEEPING: return "SLEEPING";
        case STOPPED:  return "STOPPED";
        case ZOMBIE:   return "ZOMBIE";
        case DEAD:     return "DEAD";
        default:       return "UNKNOWN";
    }
}
Proc make_proc(int pid) { return (Proc){pid, RUNNING, 0}; }
void sleep_proc(Proc *p)  { if (p->state == RUNNING) p->state = SLEEPING; }
void wake_proc(Proc *p)   { if (p->state == SLEEPING) p->state = RUNNING; }
void stop_proc(Proc *p)   { if (p->state == RUNNING || p->state == SLEEPING) p->state = STOPPED; }
void cont_proc(Proc *p)   { if (p->state == STOPPED) p->state = RUNNING; }
void exit_proc(Proc *p, int code) { p->state = ZOMBIE; p->exit_code = code; }
void reap_proc(Proc *p)   { if (p->state == ZOMBIE) p->state = DEAD; }
void print_proc(const Proc *p) { printf("PID %d: %s\n", p->pid, state_name(p->state)); }
int main(void) {
    Proc p = make_proc(42);
    print_proc(&p);
    sleep_proc(&p); print_proc(&p);
    wake_proc(&p);  print_proc(&p);
    stop_proc(&p);  print_proc(&p);
    cont_proc(&p);  print_proc(&p);
    exit_proc(&p, 0); print_proc(&p);
    reap_proc(&p);  print_proc(&p);
    return 0;
}'''
