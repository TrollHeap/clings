common_mistake = "Croire que la priorité 0 est la plus haute — c'est l'inverse, 0 est la plus basse"
description = """
NSY103 — Les files POSIX délivrent les messages par priorité décroissante. Un message de priorité 5 sera reçu avant un message de priorité 1, quel que soit l'ordre d'envoi.

Envoyez 3 messages avec des priorités différentes (1, 3, 2). Recevez-les et vérifiez qu'ils arrivent dans l'ordre décroissant de priorité."""
difficulty = 2
exercise_type = "complete"
hints = [
    "mq_send(mq, msg, len, priority) — priority plus élevée = reçu en premier",
    "mq_receive retourne toujours le message de plus haute priorité",
    "Priorité 3 > 2 > 1 → ordre de réception : high, mid, low",
]
id = "mq-priority-01"
kc_ids = ["KC-C12"]
key_concept = "Les files POSIX sont triées par priorité ; mq_receive retourne le plus prioritaire"
lang = "c"
prerequisites = ["mq-sendrecv-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 128 };
    mqd_t mq = mq_open("/kf_mq_prio", O_CREAT | O_RDWR, 0644, &attr);

    mq_send(mq, "low", 3, 1);
    mq_send(mq, "high", 4, 3);
    mq_send(mq, "mid", 3, 2);

    for (int i = 0; i < 3; i++) {
        char buf[128];
        unsigned int prio;
        ssize_t n = mq_receive(mq, buf, sizeof(buf), &prio);
        buf[n] = '\0';
        printf("prio=%u msg=%s\n", prio, buf);
    }

    mq_close(mq);
    mq_unlink("/kf_mq_prio");
    return 0;
}'''
