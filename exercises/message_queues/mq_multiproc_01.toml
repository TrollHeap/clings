[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "fork() duplique le descripteur mqd_t dans l'espace de l'enfant. Contrairement aux pipes qui nécessitent deux fd (lecture/écriture), une file POSIX nommée est accessible indépendamment par plusieurs processus via son nom dans /dev/mqueue — même sans héritage de descripteur."
label = "fork() — enfant hérite du descripteur mq"
step_label = "Étape 1 — fork() : l'enfant hérite du descripteur mq"

[[visualizer.steps.edges]]
label = "mq descriptor"
source = "parent"
target = "mq"

[[visualizer.steps.edges]]
label = "inherited mq"
source = "child"
target = "mq"

[[visualizer.steps.nodes]]
id = "parent"
label = "Parent"

[[visualizer.steps.nodes]]
id = "child"
label = "Enfant"

[[visualizer.steps.nodes]]
id = "mq"
label = "/kf_mq_multi"

[[visualizer.steps]]
explanation = "L'enfant envoie son message dans la file du noyau via mq_send(), puis ferme son descripteur et se termine avec _exit(0). Le message reste dans la file du noyau après la mort du processus enfant — c'est la différence clé avec les pipes : les messages persistent tant que la file existe."
label = "Enfant: mq_send 'Hello from child'"
step_label = "Étape 2 — Enfant : mq_send() puis terminaison"

[[visualizer.steps.edges]]
label = "mq_send"
source = "child"
target = "mq"

[[visualizer.steps.nodes]]
id = "child"
label = "Enfant"

[[visualizer.steps.nodes]]
id = "mq"
label = """
/kf_mq_multi
curmsgs=1"""

[[visualizer.steps]]
explanation = "Le parent attend la fin de l'enfant avec wait() pour s'assurer que le message est dans la file, puis lit avec mq_receive(). Ce pattern producteur/consommateur IPC est fondamental en NSY103 : les message queues offrent une synchronisation implicite — mq_receive() bloque si la file est vide."
label = "Parent: wait() puis mq_receive"
step_label = "Étape 3 — Parent : wait() puis mq_receive() IPC"

