label = """
sigevent
SIGEV_THREAD
callback"""

[[visualizer.steps]]
explanation = "mq_send() dépose le message dans la file du noyau. Comme la file était vide et qu'une notification était enregistrée, le noyau crée immédiatement un thread POSIX qui exécute notify_callback(). La notification ne se déclenche que sur la transition vide → non-vide, pas pour chaque message."
label = "mq_send déclenche la notification"
step_label = "Étape 2 — mq_send() déclenche la notification kernel"

