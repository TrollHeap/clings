notify_callback"""

[[visualizer.steps]]
explanation = "Le callback s'exécute dans un nouveau thread créé par le noyau. Il appelle mq_receive() pour lire le message et affiche le résultat. Le flag g_done permet au thread principal de détecter la fin via une boucle d'attente. Pour des notifications continues, il faudrait rappeler mq_notify() depuis le callback."
label = "Callback: mq_receive + printf"
step_label = "Étape 3 — Callback : mq_receive() asynchrone dans le thread"

