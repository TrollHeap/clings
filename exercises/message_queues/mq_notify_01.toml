[[visualizer.steps]]
explanation = "mq_notify() enregistre une notification auprès du noyau : quand la file passera de vide à non-vide, le noyau créera un nouveau thread et exécutera notify_callback. SIGEV_THREAD est l'une des deux méthodes disponibles (l'autre étant SIGEV_SIGNAL). La notification est one-shot : elle doit être réenregistrée après chaque déclenchement."
label = "mq_notify — enregistrement SIGEV_THREAD"
step_label = "Étape 1 — mq_notify() enregistre la callback SIGEV_THREAD"

