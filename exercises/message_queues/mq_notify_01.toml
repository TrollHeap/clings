common_mistake = "Oublier que mq_notify est one-shot — pour des notifications continues il faut réenregistrer dans le callback"
description = """
NSY103 — mq_notify() enregistre une notification qui sera déclenchée quand un message arrive dans une file vide. On peut utiliser SIGEV_THREAD pour exécuter une fonction callback dans un nouveau thread. La notification est one-shot : il faut la réenregistrer après chaque déclenchement.

Utilisez mq_notify avec SIGEV_THREAD pour être notifié de l'arrivée d'un message. Le callback lit et affiche le message."""
difficulty = 3
exercise_type = "complete"
hints = [
    "SIGEV_THREAD fait exécuter la callback dans un nouveau thread",
    "sigev_notify_function pointe vers la fonction callback",
    "mq_notify est one-shot : la notification ne se déclenche qu'une fois",
]
id = "mq-notify-01"
kc_ids = ["KC-C12"]
key_concept = "mq_notify + SIGEV_THREAD : notification asynchrone one-shot quand la file passe de vide à non vide"
lang = "c"
prerequisites = ["mq-multiproc-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>
#include <signal.h>
#include <unistd.h>
#include <pthread.h>

static mqd_t g_mq;
static volatile int g_done = 0;

static void notify_callback(union sigval sv) {
    (void)sv;
    char buf[128];
    unsigned int prio;
    ssize_t n = mq_receive(g_mq, buf, sizeof(buf), &prio);
    if (n > 0) {
        buf[n] = '\0';
        printf("Notified: %s\n", buf);
    }
    g_done = 1;
}

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 128 };
    g_mq = mq_open("/kf_mq_notify", O_CREAT | O_RDWR, 0644, &attr);

    struct sigevent sev;
    sev.sigev_notify = SIGEV_THREAD;
    sev.sigev_notify_function = notify_callback;
    sev.sigev_notify_attributes = NULL;
    mq_notify(g_mq, &sev);

    mq_send(g_mq, "async msg", 9, 0);

    while (!g_done)
        usleep(10000);

    mq_close(g_mq);
    mq_unlink("/kf_mq_notify");
    return 0;
}'''
