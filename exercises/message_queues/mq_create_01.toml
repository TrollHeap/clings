[validation]
expected_output = """
maxmsg=10 msgsize=128 curmsgs=0
"""
mode = "output"

[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "mq_open() crée une file de messages POSIX dans l'espace du noyau, identifiée par le nom /kf_mq_create. Sous Linux, la file apparaît dans /dev/mqueue. Les attributs mq_maxmsg et mq_msgsize définissent la capacité maximale et la taille des messages ; la file persiste dans le noyau jusqu'à mq_unlink()."
label = "mq_open — création de la file POSIX"
step_label = "Étape 1 — mq_open() crée la file nommée"

[[visualizer.steps.edges]]
label = "mq_open O_CREAT"
source = "attr"
target = "mq"

[[visualizer.steps.nodes]]
id = "attr"
label = """
mq_attr
maxmsg=10
msgsize=128"""

[[visualizer.steps.nodes]]
id = "mq"
label = "/kf_mq_create"

[[visualizer.steps]]
explanation = "mq_getattr() interroge le noyau pour obtenir l'état courant de la file : mq_curmsgs indique le nombre de messages en attente (0 ici, aucun envoi encore effectué). C'est l'équivalent d'un stat() sur un fichier : une lecture non destructive des métadonnées du descripteur."
label = "mq_getattr — lecture des attributs courants"
step_label = "Étape 2 — mq_getattr() lit les attributs de la file"

[[visualizer.steps.edges]]
label = "mq_getattr"
source = "mq"
target = "cur"

[[visualizer.steps.nodes]]
id = "mq"
label = "/kf_mq_create"

[[visualizer.steps.nodes]]
id = "cur"
label = """
cur: maxmsg=10
msgsize=128
curmsgs=0"""

[[visualizer.steps]]
explanation = "mq_close() ferme le descripteur local (comme close() pour un fd), mais la file reste dans le noyau. mq_unlink() supprime le nom du filesystem (/dev/mqueue/kf_mq_create) et détruit la file quand tous les descripteurs sont fermés. Omettre mq_unlink() laisse la file persister après la fin du processus."
label = "mq_close + mq_unlink — nettoyage"
step_label = "Étape 3 — mq_close() et mq_unlink() nettoient la file"

[[visualizer.steps.edges]]
label = "close+unlink"
source = "mq"
target = "gone"

[[visualizer.steps.nodes]]
id = "mq"
label = "/kf_mq_create"

[[visualizer.steps.nodes]]
id = "gone"
label = "(supprimé)"
