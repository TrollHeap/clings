explanation = "mq_timedreceive() avec un deadline égal au temps présent expire immédiatement si la file est vide. Le noyau compare l'heure courante (CLOCK_REALTIME) à l'heure absolue fournie dans struct timespec. Si le deadline est dépassé, l'appel retourne -1 avec errno=ETIMEDOUT sans bloquer."
label = "mq_timedreceive avec deadline = maintenant"
step_label = "Étape 1 — mq_timedreceive() expire immédiatement (file vide)"

