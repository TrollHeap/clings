common_mistake = "Utiliser un timeout relatif au lieu d'absolu — struct timespec doit être un point dans le temps, pas une durée"
description = """
NSY103 — mq_timedreceive() fonctionne comme mq_receive() mais avec un timeout absolu (struct timespec). Si aucun message n'arrive avant le deadline, l'appel échoue avec errno=ETIMEDOUT. On construit le deadline en ajoutant un délai à clock_gettime(CLOCK_REALTIME).

Tentez de recevoir avec un timeout de 0 secondes sur une file vide (→ ETIMEDOUT), puis envoyez un message et recevez avec succès."""
difficulty = 4
exercise_type = "complete"
hints = [
    "clock_gettime(CLOCK_REALTIME, &ts) donne l'heure actuelle comme deadline",
    "mq_timedreceive avec ts = maintenant → timeout immédiat si file vide",
    "ETIMEDOUT est l'errno retourné quand le timeout expire",
]
id = "mq-timeout-01"
kc_ids = ["KC-C12"]
key_concept = "mq_timedreceive utilise un timeout absolu (CLOCK_REALTIME) ; retourne ETIMEDOUT si expiré"
lang = "c"
prerequisites = ["mq-notify-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>
#include <time.h>
#include <errno.h>

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 128 };
    mqd_t mq = mq_open("/kf_mq_timeout", O_CREAT | O_RDWR, 0644, &attr);

    struct timespec ts;
    clock_gettime(CLOCK_REALTIME, &ts);

    char buf[128];
    ssize_t n = mq_timedreceive(mq, buf, sizeof(buf), NULL, &ts);
    if (n == -1 && errno == ETIMEDOUT)
        printf("Timeout: no message\n");

    mq_send(mq, "timed msg", 9, 0);
    clock_gettime(CLOCK_REALTIME, &ts);
    ts.tv_sec += 5;
    n = mq_timedreceive(mq, buf, sizeof(buf), NULL, &ts);
    buf[n] = '\0';
    printf("Received: %s\n", buf);

    mq_close(mq);
    mq_unlink("/kf_mq_timeout");
    return 0;
}'''
