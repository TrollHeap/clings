label = "ETIMEDOUT"
source = "mq"
target = "ts"

[[visualizer.steps.nodes]]
id = "mq"
label = """
/kf_mq_timeout
(vide)"""

[[visualizer.steps.nodes]]
id = "ts"
label = "deadline = now"

[[visualizer.steps]]
explanation = "mq_send() dépose le message dans la file du noyau de façon synchrone. Le message sera disponible instantanément pour le prochain mq_timedreceive(). Contrairement à mq_notify (asynchrone), mq_send/mq_receive fonctionnent en mode synchrone bloquant par défaut."
label = "mq_send 'timed msg'"
step_label = "Étape 2 — mq_send() dépose le message dans la file"

