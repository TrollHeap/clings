label = "/kf_mq_timeout"

[[visualizer.steps]]
explanation = "mq_timedreceive() avec un deadline +5 secondes dans le futur réussit immédiatement si un message est disponible dans la file — le timeout n'est jamais atteint. Le noyau retourne le message sans attendre, la struct timespec n'est consultée que si la file est vide au moment de l'appel."
label = "mq_timedreceive avec deadline +5s → succès"
