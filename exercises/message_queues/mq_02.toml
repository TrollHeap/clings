    "Après le match, décalez les éléments vers la gauche et décrémenter qtail pour maintenir la cohérence",
    "Dans main, passez 2 comme second argument de msgrcv_typed pour cibler les messages urgents",
]
id = "mq-02"
kc_ids = ["KC-C12"]
key_concept = "msgrcv avec mtype>0 filtre par type — utile pour des canaux prioritaires ou spécialisés"
lang = "c"
prerequisites = ["mq-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define MSG_SIZE 64
#define QUEUE_LEN 8

typedef struct { long mtype; char mtext[MSG_SIZE]; } MsgBuf;

MsgBuf queue[QUEUE_LEN];
int qtail = 0;

void msgsnd_sim(long type, const char *text) {
    queue[qtail].mtype = type;
    strncpy(queue[qtail].mtext, text, MSG_SIZE - 1);
    qtail++;
}

int msgrcv_typed(MsgBuf *out, long type) {
    for (int i = 0; i < qtail; i++) {
        if (queue[i].mtype == type) {
            *out = queue[i];
            for (int j = i; j < qtail - 1; j++)
                queue[j] = queue[j+1];
            qtail--;
            return 0;
        }
    }
    return -1;
}

int main(void) {
    msgsnd_sim(1, "normal task");
    msgsnd_sim(2, "urgent task");
    msgsnd_sim(1, "another task");
    MsgBuf msg;
    if (msgrcv_typed(&msg, 2) == 0)
        printf("Found type %ld: %s\n", msg.mtype, msg.mtext);
    return 0;
}'''
