[visualizer]
type = "dataflow"

[[visualizer.steps]]
explanation = "mq_send() copie le message depuis l'espace utilisateur vers la file du noyau, en l'associant à sa priorité (0 ici). Le noyau trie automatiquement les messages par priorité décroissante dans la file. L'appel est bloquant si la file est pleine (mq_maxmsg atteint)."
label = "mq_send — envoyer dans la file"
step_label = "Étape 1 — mq_send() envoie le message dans la file"

[[visualizer.steps.edges]]
label = "mq_send prio=0"
source = "msg"
target = "mq"

[[visualizer.steps.nodes]]
id = "msg"
label = '"Hello MQ"'

[[visualizer.steps.nodes]]
id = "mq"
label = "/kf_mq_sendrecv"

[[visualizer.steps]]
explanation = "mq_receive() extrait le message de plus haute priorité de la file et le copie dans le buffer utilisateur. La taille du buffer doit être au moins égale à mq_msgsize, sinon l'appel échoue avec EMSGSIZE. Le paramètre &prio est rempli avec la priorité du message reçu."
label = "mq_receive — récupérer le message"
step_label = "Étape 2 — mq_receive() extrait le message prioritaire"

[[visualizer.steps.edges]]
label = "mq_receive"
source = "mq"
target = "buf"

[[visualizer.steps.nodes]]
id = "mq"
label = "/kf_mq_sendrecv"

[[visualizer.steps.nodes]]
id = "buf"
label = 'buf = "Hello MQ"'

[[visualizer.steps]]
explanation = "Le message et sa priorité sont affichés, puis mq_close() ferme le descripteur et mq_unlink() supprime la file du noyau. Contrairement aux pipes, les message queues POSIX préservent les frontières des messages : chaque send correspond à un seul receive, quelle que soit la taille."
label = "Affichage + nettoyage"
step_label = "Étape 3 — Affichage du résultat et nettoyage"

[[visualizer.steps.edges]]
label = "printf"
source = "buf"
target = "stdout"

[[visualizer.steps.nodes]]
id = "buf"
label = '"Hello MQ" prio=0'

[[visualizer.steps.nodes]]
id = "stdout"
label = "stdout"
