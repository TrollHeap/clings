common_mistake = "Buffer de réception trop petit (< mq_msgsize) → mq_receive échoue avec EMSGSIZE"
description = """
NSY103 — mq_send() envoie un message dans la file avec une priorité. mq_receive() récupère le message de plus haute priorité. La taille du buffer de réception doit être >= mq_msgsize.

Créez une file, envoyez 'Hello MQ' avec priorité 0, recevez et affichez le message."""
difficulty = 1
exercise_type = "complete"
hints = [
    "mq_send(mq, msg, len, priority) — priority=0 est la plus basse",
    "mq_receive(mq, buf, bufsize, &prio) — bufsize doit être >= mq_msgsize",
    "mq_receive retourne la taille du message reçu (ssize_t)",
]
id = "mq-sendrecv-01"
kc_ids = ["KC-C12"]
key_concept = "mq_send/mq_receive : envoi avec priorité, réception du plus prioritaire"
lang = "c"
prerequisites = ["mq-create-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 128 };
    mqd_t mq = mq_open("/kf_mq_sendrecv", O_CREAT | O_RDWR, 0644, &attr);

    const char *msg = "Hello MQ";
    mq_send(mq, msg, strlen(msg), 0);

    char buf[128];
    unsigned int prio;
    ssize_t n = mq_receive(mq, buf, sizeof(buf), &prio);
    buf[n] = '\0';
    printf("Received: %s (prio=%u)\n", buf, prio);

    mq_close(mq);
    mq_unlink("/kf_mq_sendrecv");
    return 0;
}'''
