common_mistake = "Implémenter un déqueue global (qhead++) sans compteur par type — perd le monitoring"
description = """
NSY103 — Un dispatcher traite les messages dans l'ordre FIFO mais compte par type. Enfilez task-A (t1), alert-B (t2), task-C (t1). Défilez dans l'ordre et comptez les occurrences par type.

⚠ Note : cet exercice simule le comportement des appels système dans un environnement WASM. Les vrais syscalls (fork, signal, shmget, etc.) ne sont pas disponibles dans le sandbox."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Dans dispatch_all, `m->mtype` est à la fois l'index pour type_count[] et la valeur à afficher dans printf",
    "type_count est indexé par mtype directement : type_count[m->mtype]++ incrémente le bon compteur",
    "Le troisième message est de type 1 comme task-A — vérifiez que type1=2 dans la sortie finale",
]
id = "mq-03"
kc_ids = ["KC-C12"]
key_concept = "FIFO global + comptage par type = monitoring de trafic réseau ou dispatch de tâches"
lang = "c"
prerequisites = ["mq-02"]
solution_code = '''
#include <stdio.h>
#include <string.h>

#define MSG_SIZE 32
#define QUEUE_LEN 8
#define MAX_TYPE 3

typedef struct { long mtype; char mtext[MSG_SIZE]; } MsgBuf;

MsgBuf queue[QUEUE_LEN];
int qhead = 0, qtail = 0;
int type_count[MAX_TYPE + 1] = {0};

void msgsnd_sim(long type, const char *text) {
    queue[qtail].mtype = type;
    strncpy(queue[qtail].mtext, text, MSG_SIZE - 1);
    qtail++;
}

void dispatch_all(void) {
    while (qhead < qtail) {
        MsgBuf *m = &queue[qhead++];
        type_count[m->mtype]++;
        printf("[%ld] %s\n", m->mtype, m->mtext);
    }
}

int main(void) {
    msgsnd_sim(1, "task-A");
    msgsnd_sim(2, "alert-B");
    msgsnd_sim(1, "task-C");
    dispatch_all();
    printf("type1=%d type2=%d\n", type_count[1], type_count[2]);
    return 0;
}'''
