/* == EXEMPLE ===============================================
 * Comptage de messages par niveau de priorite
 * Dispatch FIFO + compteur par priorite (1=low, 2=med, 3=high).
 * ========================================================= */
MsgBuf example_q[QUEUE_LEN];
int example_head = 0, example_tail = 0;
int prio_count[MAX_TYPE + 1] = {0};

void example_send(long prio, const char *text) {
    example_q[example_tail].mtype = prio;
    strncpy(example_q[example_tail].mtext, text, MSG_SIZE - 1);
    example_tail++;
}

void example_dispatch(void) {
    while (example_head < example_tail) {
        MsgBuf *m = &example_q[example_head++];
        prio_count[m->mtype]++;
        printf("[P%ld] %s\n", m->mtype, m->mtext);
    }
}

void example_count_by_priority(void) {
    example_send(2, "check-disk");
    example_send(3, "cpu-alert");
    example_send(2, "check-mem");
    example_dispatch();
    printf("P2=%d P3=%d\n", prio_count[2], prio_count[3]);
