common_mistake = "Oublier de mq_unlink les DEUX files → elles persistent dans /dev/mqueue"
description = """
NSY103 — Un broker reçoit des messages de producteurs et les redistribue aux consommateurs. Avec les files POSIX, on utilise une file d'entrée (inbox) et une file de sortie (outbox). Le broker lit de l'inbox, transforme le message, et l'envoie dans l'outbox.

Implémentez un broker qui lit 3 messages de l'inbox, les préfixe avec '[BROKER] ' et les renvoie dans l'outbox. Un enfant produit les messages, le parent joue le broker puis lit l'outbox."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Le producteur (enfant) envoie dans inbox, le broker (parent) lit inbox et écrit dans outbox",
    "mq_send et mq_receive sont les seules fonctions nécessaires pour le routage",
    "snprintf permet de préfixer le message avec '[BROKER] '",
]
id = "mq-broker-01"
kc_ids = ["KC-C12"]
key_concept = "Pattern broker : découpler producteurs et consommateurs via deux files + transformation"
lang = "c"
prerequisites = ["mq-timeout-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 256 };
    mqd_t inbox = mq_open("/kf_mq_inbox", O_CREAT | O_RDWR, 0644, &attr);
    mqd_t outbox = mq_open("/kf_mq_outbox", O_CREAT | O_RDWR, 0644, &attr);

    pid_t pid = fork();
    if (pid == 0) {
        for (int i = 0; i < 3; i++) {
            char msg[64];
            snprintf(msg, sizeof(msg), "event-%d", i);
            mq_send(inbox, msg, strlen(msg), 0);
        }
        mq_close(inbox);
        mq_close(outbox);
        _exit(0);
    }

    wait(NULL);

    for (int i = 0; i < 3; i++) {
        char buf[256];
        ssize_t n = mq_receive(inbox, buf, sizeof(buf), NULL);
        buf[n] = '\0';
        char out[256];
        snprintf(out, sizeof(out), "[BROKER] %s", buf);
        mq_send(outbox, out, strlen(out), 0);
    }

    for (int i = 0; i < 3; i++) {
        char buf[256];
        ssize_t n = mq_receive(outbox, buf, sizeof(buf), NULL);
        buf[n] = '\0';
        printf("%s\n", buf);
    }

    mq_close(inbox);
    mq_close(outbox);
    mq_unlink("/kf_mq_inbox");
    mq_unlink("/kf_mq_outbox");
    return 0;
}'''
