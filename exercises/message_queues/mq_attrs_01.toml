common_mistake = "Confondre mq_maxmsg (capacité) et mq_curmsgs (occupation actuelle)"
description = """
NSY103 — mq_getattr() retourne les attributs courants d'une file : mq_flags (O_NONBLOCK ou 0), mq_maxmsg, mq_msgsize, et mq_curmsgs (nombre de messages en attente). On peut observer curmsgs évoluer après chaque send/receive.

Créez une file, envoyez 2 messages, vérifiez curmsgs à chaque étape, recevez 1 message, vérifiez à nouveau."""
difficulty = 2
exercise_type = "complete"
hints = [
    "mq_getattr(mq, &cur) remplit la structure cur avec les attributs courants",
    "cur.mq_curmsgs donne le nombre de messages actuellement dans la file",
    "Passer NULL comme dernier argument de mq_receive si la priorité n'est pas nécessaire",
]
id = "mq-attrs-01"
kc_ids = ["KC-C12"]
key_concept = "mq_getattr observe l'état dynamique de la file ; curmsgs reflète le remplissage"
lang = "c"
prerequisites = ["mq-priority-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 128 };
    mqd_t mq = mq_open("/kf_mq_attrs", O_CREAT | O_RDWR, 0644, &attr);

    struct mq_attr cur;
    mq_getattr(mq, &cur);
    printf("Start: curmsgs=%ld\n", cur.mq_curmsgs);

    mq_send(mq, "msg1", 4, 0);
    mq_send(mq, "msg2", 4, 0);
    mq_getattr(mq, &cur);
    printf("After 2 sends: curmsgs=%ld\n", cur.mq_curmsgs);

    char buf[128];
    mq_receive(mq, buf, sizeof(buf), NULL);
    mq_getattr(mq, &cur);
    printf("After 1 recv: curmsgs=%ld\n", cur.mq_curmsgs);

    mq_receive(mq, buf, sizeof(buf), NULL);
    mq_close(mq);
    mq_unlink("/kf_mq_attrs");
    return 0;
}'''
