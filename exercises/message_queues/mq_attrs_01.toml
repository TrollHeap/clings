/kf_mq_attrs
curmsgs=0"""

[[visualizer.steps]]
explanation = "Après deux mq_send(), mq_getattr() reflète mq_curmsgs=2 : le noyau maintient ce compteur en temps réel. La différence entre mq_maxmsg (capacité max, 10) et mq_curmsgs (occupation actuelle, 2) indique l'espace disponible. Quand mq_curmsgs == mq_maxmsg, le prochain mq_send() bloque."
label = "Après 2 sends : curmsgs=2"
step_label = "Étape 2 — Après 2 envois : curmsgs=2"

