common_mistake = "Lancer les étapes en parallèle sans synchronisation → une étape peut lire avant que la précédente ait écrit"
description = """
NSY103 — Un pipeline multi-étapes utilise des files de messages comme buffers entre les étapes de traitement. Chaque étape lit de sa file d'entrée, transforme le message, et l'envoie dans la file suivante. Ce pattern est fondamental en architecture microservices.

Implémentez un pipeline à 3 étapes : stage1 ajoute '[S1]', stage2 ajoute '[S2]', et le résultat est lu à la fin. Utilisez fork() pour chaque étape."""
difficulty = 5
exercise_type = "complete"
hints = [
    "Chaque étape lit de qN et écrit dans q(N+1)",
    "waitpid entre chaque fork assure l'ordre séquentiel du pipeline",
    "Le résultat final est dans q2 : '[S2] [S1] data'",
]
id = "mq-pipeline-01"
kc_ids = ["KC-C12"]
key_concept = "Pipeline multi-étapes : chaque processus est une étape qui lit/transforme/écrit via MQ"
lang = "c"
prerequisites = ["mq-broker-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <mqueue.h>
#include <fcntl.h>
#include <sys/stat.h>
#include <sys/wait.h>
#include <unistd.h>

int main(void) {
    struct mq_attr attr = { .mq_maxmsg = 10, .mq_msgsize = 256 };
    mqd_t q0 = mq_open("/kf_pipe_q0", O_CREAT | O_RDWR, 0644, &attr);
    mqd_t q1 = mq_open("/kf_pipe_q1", O_CREAT | O_RDWR, 0644, &attr);
    mqd_t q2 = mq_open("/kf_pipe_q2", O_CREAT | O_RDWR, 0644, &attr);

    mq_send(q0, "data", 4, 0);

    pid_t p1 = fork();
    if (p1 == 0) {
        char buf[256];
        ssize_t n = mq_receive(q0, buf, sizeof(buf), NULL);
        buf[n] = '\0';
        char out[256];
        snprintf(out, sizeof(out), "[S1] %s", buf);
        mq_send(q1, out, strlen(out), 0);
        mq_close(q0); mq_close(q1); mq_close(q2);
        _exit(0);
    }
    waitpid(p1, NULL, 0);

    pid_t p2 = fork();
    if (p2 == 0) {
        char buf[256];
        ssize_t n = mq_receive(q1, buf, sizeof(buf), NULL);
        buf[n] = '\0';
        char out[256];
        snprintf(out, sizeof(out), "[S2] %s", buf);
        mq_send(q2, out, strlen(out), 0);
        mq_close(q0); mq_close(q1); mq_close(q2);
        _exit(0);
    }
    waitpid(p2, NULL, 0);

    char result[256];
    ssize_t n = mq_receive(q2, result, sizeof(result), NULL);
    result[n] = '\0';
    printf("Pipeline result: %s\n", result);

    mq_close(q0); mq_close(q1); mq_close(q2);
    mq_unlink("/kf_pipe_q0");
    mq_unlink("/kf_pipe_q1");
    mq_unlink("/kf_pipe_q2");
    return 0;
}'''
