common_mistake = "Oublier #define _XOPEN_SOURCE 500 avant les includes — nftw() nécessite cette macro"
description = """
NSY103 — `nftw()` (new file tree walk) parcourt récursivement une arborescence. Le callback reçoit le chemin, un `struct stat *`, un type (FTW_F pour fichier, FTW_D pour répertoire), et un `struct FTW` avec des infos de profondeur. Le flag `FTW_DEPTH` traite les enfants avant le parent.

Utilisez `nftw()` pour compter les fichiers réguliers dans une arborescence temporaire."""
difficulty = 3
exercise_type = "complete"
hints = [
    "`FTW_F` indique un fichier régulier dans le callback de nftw",
    "`nftw(chemin, callback, nopenfd, flags)` — nopenfd limite les fd ouverts simultanément",
    "Le callback doit retourner 0 pour continuer le parcours, non-0 pour arrêter",
]
id = "fs-walk-01"
kc_ids = ["KC-C19"]
key_concept = "nftw() parcourt récursivement une arborescence avec un callback"
lang = "c"
prerequisites = [
    "fs-readdir-01",
    "fs-stat-01",
]
solution_code = '''
#define _XOPEN_SOURCE 500
#include <stdio.h>
#include <ftw.h>
#include <sys/stat.h>
#include <string.h>
#include <unistd.h>

static int file_count = 0;

static int callback(const char *fpath, const struct stat *sb,
                    int typeflag, struct FTW *ftwbuf) {
    (void)fpath; (void)sb; (void)ftwbuf;
    if (typeflag == FTW_F) {
        file_count++;
    }
    return 0;
}

int main(void) {
    const char *base = "/tmp/kf_nftw";
    mkdir(base, 0755);
    char sub[256];
    snprintf(sub, sizeof(sub), "%s/subdir", base);
    mkdir(sub, 0755);
    FILE *f;
    char p[256];
    snprintf(p, sizeof(p), "%s/a.txt", base); f = fopen(p, "w"); fclose(f);
    snprintf(p, sizeof(p), "%s/b.txt", base); f = fopen(p, "w"); fclose(f);
    snprintf(p, sizeof(p), "%s/subdir/c.txt", base); f = fopen(p, "w"); fclose(f);

    file_count = 0;
    nftw(base, callback, 20, 0);
    printf("Fichiers trouves : %d\n", file_count);

    unlink("/tmp/kf_nftw/a.txt");
    unlink("/tmp/kf_nftw/b.txt");
    unlink("/tmp/kf_nftw/subdir/c.txt");
    rmdir("/tmp/kf_nftw/subdir");
    rmdir("/tmp/kf_nftw");
    return 0;
}'''
