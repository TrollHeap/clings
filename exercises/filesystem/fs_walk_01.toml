/* == EXEMPLE ================================================
 * Calculer la taille totale des fichiers avec nftw()
 * Le callback recoit le chemin, stat, type, et infos FTW.
 * =========================================================== */
static long total_size = 0;

static int size_callback(const char *fpath, const struct stat *sb,
                         int typeflag, struct FTW *ftwbuf) {
    (void)fpath; (void)ftwbuf;
    if (typeflag == FTW_F) {
        total_size += sb->st_size;
