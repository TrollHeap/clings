common_mistake = "rename() échoue entre filesystems différents (EXDEV) — il faut alors copier + unlink"
description = """
NSY103 — `rename()` déplace/renomme un fichier de manière atomique sur le même filesystem. Si la destination existe, elle est remplacée atomiquement — les lecteurs voient l'ancien ou le nouveau contenu, jamais un état intermédiaire. C'est la technique standard pour la mise à jour atomique de fichiers.

Implémentez une mise à jour atomique : écrire dans un fichier temporaire, puis `rename()` vers la destination finale."""
difficulty = 3
exercise_type = "complete"
hints = [
    "`rename(ancien, nouveau)` — renomme atomiquement, la destination est écrasée si elle existe",
    "Après rename(), l'ancien chemin n'existe plus — le fichier a été déplacé",
    "`access(chemin, F_OK)` vérifie l'existence d'un fichier (retourne 0 si existe)",
]
id = "fs-rename-01"
kc_ids = ["KC-C19"]
key_concept = "rename() est atomique sur le même filesystem — utilisé pour les mises à jour sûres"
lang = "c"
prerequisites = [
    "fs-stat-01",
    "fs-link-01",
]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/stat.h>

int main(void) {
    const char *target = "/tmp/kf_rename_target";
    const char *tmp = "/tmp/kf_rename_tmp";
    unlink(target); unlink(tmp);

    FILE *f = fopen(target, "w");
    fprintf(f, "ancienne version");
    fclose(f);

    f = fopen(tmp, "w");
    fprintf(f, "nouvelle version");
    fclose(f);

    struct stat sb;
    stat(target, &sb);
    unsigned long ino_before = sb.st_ino;

    if (rename(tmp, target) == -1) {
        perror("rename");
        return 1;
    }

    stat(target, &sb);
    printf("Inode change : %d\n", (sb.st_ino != ino_before) ? 1 : 0);

    char buf[64] = {0};
    f = fopen(target, "r");
    fgets(buf, sizeof(buf), f);
    fclose(f);
    printf("Contenu : %s\n", buf);

    int tmp_existe = (access(tmp, F_OK) == 0) ? 1 : 0;
    printf("Tmp existe encore : %d\n", tmp_existe);

    unlink(target);
    return 0;
}'''
