#include <stdio.h>
#include <unistd.h>
#include <string.h>
#include <sys/stat.h>

/* == EXEMPLE ================================================
 * Renommer un fichier simple avec rename()
 * rename() change l'entree de repertoire atomiquement.
 * =========================================================== */
void example_simple_rename(void) {
    const char *a = "/tmp/kf_ex_old";
    const char *b = "/tmp/kf_ex_new";
    unlink(a); unlink(b);
    FILE *f = fopen(a, "w"); fprintf(f, "data"); fclose(f);
    rename(a, b);
    printf("Ancien existe : %d\n", access(a, F_OK) == 0 ? 1 : 0);
    printf("Nouveau existe : %d\n", access(b, F_OK) == 0 ? 1 : 0);
    unlink(b);
}
