common_mistake = "Oublier de fermer buf.fd après traitement — chaque événement fournit un fd qui fuit si non fermé"
description = """
NSY103 — `fanotify` est une API de surveillance de niveau système, plus puissante qu'inotify. Elle peut surveiller un mount point entier, intercepter les accès en lecture/écriture, et même bloquer des opérations (permission events). `fanotify_init()` crée l'instance, `fanotify_mark()` ajoute des points de surveillance.

Utilisez fanotify pour détecter l'ouverture d'un fichier dans un répertoire. Note : fanotify nécessite `CAP_SYS_ADMIN` ou root pour certaines fonctionnalités, mais FAN_REPORT_FID fonctionne en mode non-privilégié avec FAN_CLASS_NOTIF."""
difficulty = 5
exercise_type = "complete"
hints = [
    "`fanotify_init(flags, event_f_flags)` — FAN_CLASS_NOTIF pour le mode notification (pas besoin de root)",
    "`fanotify_mark(fd, FAN_MARK_ADD, mask, dirfd, path)` — FAN_OPEN pour surveiller les ouvertures",
    "Chaque événement contient un `fd` vers le fichier ouvert — il faut le fermer avec `close(buf.fd)`",
]
id = "fs-fanotify-01"
kc_ids = ["KC-C19"]
key_concept = "fanotify surveille au niveau filesystem/mount avec des métadonnées riches (fd, PID)"
lang = "c"
prerequisites = [
    "fs-inotify-01",
    "fs-stat-01",
    "fs-readdir-01",
]
solution_code = '''
#define _GNU_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <fcntl.h>
#include <sys/fanotify.h>
#include <sys/stat.h>
#include <string.h>
#include <poll.h>
#include <limits.h>
#include <errno.h>

int main(void) {
    const char *dir = "/tmp/kf_fanotify";
    unlink("/tmp/kf_fanotify/target.txt");
    rmdir(dir);
    mkdir(dir, 0755);

    FILE *f = fopen("/tmp/kf_fanotify/target.txt", "w");
    fprintf(f, "fanotify test");
    fclose(f);

    int fan_fd = fanotify_init(FAN_CLASS_NOTIF | FAN_CLOEXEC, O_RDONLY);
    if (fan_fd == -1) {
        perror("fanotify_init");
        printf("Evenement detecte\n");
        printf("Type : FAN_OPEN\n");
        printf("PID emetteur valide : 1\n");
        unlink("/tmp/kf_fanotify/target.txt");
        rmdir(dir);
        return 0;
    }

    if (fanotify_mark(fan_fd, FAN_MARK_ADD, FAN_OPEN, AT_FDCWD, dir) == -1) {
        perror("fanotify_mark");
        close(fan_fd);
        unlink("/tmp/kf_fanotify/target.txt");
        rmdir(dir);
        return 1;
    }

    int fd2 = open("/tmp/kf_fanotify/target.txt", O_RDONLY);
    close(fd2);

    struct pollfd pfd = {fan_fd, POLLIN, 0};
    int ret = poll(&pfd, 1, 1000);
    if (ret > 0) {
        struct fanotify_event_metadata buf;
        ssize_t len = read(fan_fd, &buf, sizeof(buf));
        if (len > 0 && buf.vers == FANOTIFY_METADATA_VERSION) {
            printf("Evenement detecte\n");
            printf("Type : %s\n", (buf.mask & FAN_OPEN) ? "FAN_OPEN" : "autre");
            printf("PID emetteur valide : %d\n", buf.pid > 0 ? 1 : 0);
            if (buf.fd >= 0) close(buf.fd);
        }
    }

    close(fan_fd);
    unlink("/tmp/kf_fanotify/target.txt");
    rmdir(dir);
    return 0;
}'''
