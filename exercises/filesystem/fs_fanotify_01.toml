 * - surveille des mount points entiers
 * - fournit un fd vers le fichier (pas juste le nom)
 * - peut bloquer des operations (permission events)
 * =========================================================== */
void example_close_write(void) {
    int fd = fanotify_init(FAN_CLASS_NOTIF | FAN_CLOEXEC, O_RDONLY);
    if (fd == -1) { perror("fanotify_init"); return; }
    if (fanotify_mark(fd, FAN_MARK_ADD, FAN_CLOSE_WRITE,
                      AT_FDCWD, "/tmp") == -1) {
        perror("mark"); close(fd); return;
    }
