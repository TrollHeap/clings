common_mistake = 'Oublier de filtrer les entrées "." et ".." qui apparaissent dans tout répertoire'
description = """
NSY103 — Les fonctions `opendir()` et `readdir()` permettent de parcourir le contenu d'un répertoire. `opendir()` retourne un `DIR *`, `readdir()` retourne un `struct dirent *` à chaque appel (NULL à la fin). Le champ `d_name` contient le nom de l'entrée.

Créez un répertoire temporaire avec 3 fichiers, puis listez-les avec opendir/readdir en filtrant `.` et `..`."""
difficulty = 1
exercise_type = "complete"
hints = [
    "Ouvrir un répertoire : `DIR *dp = opendir(chemin);`",
    "Lire l'entrée suivante : `struct dirent *entry = readdir(dp);`",
    "Le nom du fichier est dans `entry->d_name`, fermer avec `closedir(dp)`",
]
id = "fs-readdir-01"
kc_ids = ["KC-C19"]
key_concept = "opendir/readdir/closedir pour parcourir un répertoire"
lang = "c"
prerequisites = ["fs-stat-01"]
solution_code = '''
#include <unistd.h>
#include <stdio.h>
#include <dirent.h>
#include <string.h>
#include <sys/stat.h>
#include <stdlib.h>

int main(void) {
    const char *dir = "/tmp/kf_test_readdir";
    mkdir(dir, 0755);
    FILE *f;
    f = fopen("/tmp/kf_test_readdir/alpha.txt", "w"); fclose(f);
    f = fopen("/tmp/kf_test_readdir/beta.txt", "w"); fclose(f);
    f = fopen("/tmp/kf_test_readdir/gamma.txt", "w"); fclose(f);

    DIR *dp = opendir(dir);
    if (!dp) { perror("opendir"); return 1; }
    struct dirent *entry;
    int count = 0;
    while ((entry = readdir(dp)) != NULL) {
        if (strcmp(entry->d_name, ".") == 0 || strcmp(entry->d_name, "..") == 0)
            continue;
        count++;
    }
    closedir(dp);
    printf("Fichiers trouves : %d\n", count);
    remove("/tmp/kf_test_readdir/alpha.txt");
    remove("/tmp/kf_test_readdir/beta.txt");
    remove("/tmp/kf_test_readdir/gamma.txt");
    rmdir(dir);
    return 0;
}'''
