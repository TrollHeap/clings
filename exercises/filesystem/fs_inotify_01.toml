common_mistake = "Oublier que read() sur le fd inotify peut retourner plusieurs événements — il faut itérer sur le buffer"
description = """
NSY103 — `inotify` est l'API Linux pour surveiller les modifications du système de fichiers. `inotify_init()` crée une instance, `inotify_add_watch()` ajoute un chemin à surveiller avec un masque d'événements (IN_CREATE, IN_MODIFY, IN_DELETE...). Les événements sont lus via `read()` en structs `inotify_event`.

Surveillez un répertoire avec inotify, créez un fichier dedans, puis lisez l'événement IN_CREATE."""
difficulty = 4
exercise_type = "complete"
hints = [
    "`inotify_init()` crée l'instance inotify et retourne un descripteur de fichier",
    "`inotify_add_watch(fd, chemin, masque)` ajoute un chemin à surveiller",
    "Le nom du fichier est dans `event->name`, le type d'événement dans `event->mask`",
]
id = "fs-inotify-01"
kc_ids = ["KC-C19"]
key_concept = "inotify surveille les changements du filesystem via le noyau Linux"
lang = "c"
prerequisites = [
    "fs-readdir-01",
    "fs-stat-01",
]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>
#include <sys/inotify.h>
#include <sys/stat.h>
#include <string.h>
#include <poll.h>

#define BUF_LEN (sizeof(struct inotify_event) + 256)

int main(void) {
    const char *dir = "/tmp/kf_inotify";
    unlink("/tmp/kf_inotify/test.txt");
    rmdir(dir);
    mkdir(dir, 0755);

    int fd = inotify_init();
    if (fd == -1) { perror("inotify_init"); return 1; }

    int wd = inotify_add_watch(fd, dir, IN_CREATE);
    if (wd == -1) { perror("inotify_add_watch"); close(fd); return 1; }

    FILE *f = fopen("/tmp/kf_inotify/test.txt", "w");
    fprintf(f, "hello");
    fclose(f);

    struct pollfd pfd = {fd, POLLIN, 0};
    int ret = poll(&pfd, 1, 1000);
    if (ret > 0) {
        char buf[BUF_LEN];
        ssize_t len = read(fd, buf, sizeof(buf));
        if (len > 0) {
            struct inotify_event *event = (struct inotify_event *)buf;
            printf("Evenement detecte\n");
            printf("Fichier : %s\n", event->name);
            printf("Creation : %d\n", (event->mask & IN_CREATE) ? 1 : 0);
        }
    }

    inotify_rm_watch(fd, wd);
    close(fd);
    unlink("/tmp/kf_inotify/test.txt");
    rmdir(dir);
    return 0;
}'''
