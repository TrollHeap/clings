common_mistake = "Oublier le préfixe 0 pour les littéraux octaux — 644 != 0644"
description = """
NSY103 — Les permissions Unix sont encodées dans `st_mode` : lecture (r=4), écriture (w=2), exécution (x=1) pour propriétaire, groupe, autres. `chmod()` modifie les permissions. `access()` vérifie les droits effectifs.

Créez un fichier, affichez ses permissions, modifiez-les avec `chmod()`, puis vérifiez avec `stat()`."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Le masque `0777` extrait les 9 bits de permissions de st_mode",
    "`chmod(chemin, mode)` change les permissions — ex: `chmod(path, 0400)` = lecture seule propriétaire",
    "`S_IWUSR` est la constante pour le bit d'écriture du propriétaire",
]
id = "fs-perms-01"
kc_ids = ["KC-C19"]
key_concept = "Permissions Unix en octal : r=4, w=2, x=1 pour user/group/other"
lang = "c"
prerequisites = ["fs-stat-01"]
solution_code = '''
#include <stdio.h>
#include <sys/stat.h>
#include <unistd.h>

int main(void) {
    const char *path = "/tmp/kf_test_perms";
    unlink(path);
    FILE *f = fopen(path, "w");
    fprintf(f, "secret");
    fclose(f);

    struct stat sb;
    stat(path, &sb);
    printf("Permissions initiales : %o\n", sb.st_mode & 0777);

    chmod(path, 0400);

    stat(path, &sb);
    printf("Permissions modifiees : %o\n", sb.st_mode & 0777);
    printf("Lecture proprio : %d\n", (sb.st_mode & S_IRUSR) ? 1 : 0);
    printf("Ecriture proprio : %d\n", (sb.st_mode & S_IWUSR) ? 1 : 0);

    chmod(path, 0644);
    remove(path);
    return 0;
}'''
