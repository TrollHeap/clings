[visualizer]
type = "stack_heap"

[[visualizer.steps]]
arrows = []
explanation = "Chaque fichier a un numéro d'inode unique dans son filesystem. st_ino est unique par (st_dev, st_ino). Deux fichiers sur le même filesystem ont le même st_dev mais des st_ino différents."
heap = []
label = "Deux fichiers, deux inodes"
step_label = "Inodes différents pour fichiers différents"

[[visualizer.steps.call_frames]]
args = "void"
function_name = "main"
is_active = true

[[visualizer.steps.stack]]
name = "s1.st_ino"
value = "N (unique)"

[[visualizer.steps.stack]]
name = "s2.st_ino"
value = "M (different)"

[[visualizer.steps.stack]]
name = "s1.st_dev"
value = "device X"

[[visualizer.steps.stack]]
name = "s2.st_dev"
value = "device X (meme FS)"

[[visualizer.steps]]
