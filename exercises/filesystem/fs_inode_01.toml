/* == EXEMPLE ================================================
 * Explorer les metadonnees du repertoire /tmp
 * struct stat contient inode, device, liens, uid, taille, etc.
 * =========================================================== */
void example_dir_meta(void) {
    struct stat sb;
    stat("/tmp", &sb);
    printf("Inode /tmp > 0 : %d\n", sb.st_ino > 0 ? 1 : 0);
    printf("Type : repertoire = %d\n", S_ISDIR(sb.st_mode) ? 1 : 0);
    printf("Liens >= 2 : %d\n", sb.st_nlink >= 2 ? 1 : 0);
