common_mistake = "Confondre st_ino (numéro d'inode) avec st_dev (identifiant du device/filesystem)"
description = """
NSY103 — Chaque fichier est identifié par un numéro d'inode unique dans son système de fichiers. L'inode stocke toutes les métadonnées (taille, permissions, timestamps, compteur de liens) mais PAS le nom. Le nom est stocké dans l'entrée du répertoire qui pointe vers l'inode.

Explorez les champs de `struct stat` pour démontrer que deux fichiers ont des inodes différents, et qu'un hard link partage le même inode."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Le numéro d'inode est dans `sb.st_ino` — chaque fichier a un inode unique",
    "Le nombre de liens (hard links) est dans `sb.st_nlink`",
    "Le device (filesystem) est dans `sb.st_dev`, la taille dans `sb.st_size`",
]
id = "fs-inode-01"
kc_ids = ["KC-C19"]
key_concept = "L'inode stocke toutes les métadonnées sauf le nom du fichier"
lang = "c"
prerequisites = [
    "fs-stat-01",
    "fs-link-01",
]
solution_code = '''
#include <stdio.h>
#include <sys/stat.h>
#include <unistd.h>

int main(void) {
    const char *f1 = "/tmp/kf_ino_a";
    const char *f2 = "/tmp/kf_ino_b";
    const char *hl = "/tmp/kf_ino_hl";
    unlink(f1); unlink(f2); unlink(hl);

    FILE *fp;
    fp = fopen(f1, "w"); fprintf(fp, "fichier_a"); fclose(fp);
    fp = fopen(f2, "w"); fprintf(fp, "fichier_bb"); fclose(fp);
    link(f1, hl);

    struct stat s1, s2, shl;
    stat(f1, &s1);
    stat(f2, &s2);
    stat(hl, &shl);

    printf("Inodes differents : %d\n", (s1.st_ino != s2.st_ino) ? 1 : 0);
    printf("Hard link meme inode : %d\n", (s1.st_ino == shl.st_ino) ? 1 : 0);
    printf("Nlinks f1 : %lu\n", (unsigned long)s1.st_nlink);
    printf("Meme device : %d\n", (s1.st_dev == s2.st_dev) ? 1 : 0);
    printf("Taille f1 : %ld\n", (long)s1.st_size);
    printf("Taille f2 : %ld\n", (long)s2.st_size);

    unlink(f1); unlink(f2); unlink(hl);
    return 0;
}'''
