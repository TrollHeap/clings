common_mistake = '''Oublier que getxattr() ne termine pas la valeur par \0 — il faut l'ajouter manuellement'''
description = """
NSY103 — Les attributs étendus (xattr) permettent d'associer des métadonnées arbitraires (clé-valeur) aux fichiers, au-delà de ce que stocke l'inode classique. L'espace de noms `user.` est accessible sans privilèges. `setxattr()` écrit, `getxattr()` lit, `listxattr()` liste les attributs.

Associez un attribut étendu `user.author` à un fichier, puis relisez-le."""
difficulty = 4
exercise_type = "complete"
hints = [
    "`setxattr(path, name, value, size, flags)` — flags=0 pour créer ou remplacer",
    "`getxattr(path, name, buf, bufsize)` retourne la taille de la valeur lue",
    '''`listxattr(path, buf, bufsize)` retourne la liste des noms d'attributs séparés par \0''',
]
id = "fs-xattr-01"
kc_ids = ["KC-C19"]
key_concept = "Les xattr ajoutent des métadonnées clé-valeur arbitraires aux fichiers"
lang = "c"
prerequisites = [
    "fs-stat-01",
    "fs-inode-01",
]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <sys/xattr.h>

int main(void) {
    const char *path = "/tmp/kf_xattr_test";
    unlink(path);
    FILE *f = fopen(path, "w");
    fprintf(f, "data");
    fclose(f);

    const char *attr_name = "user.author";
    const char *attr_value = "nsy103";

    if (setxattr(path, attr_name, attr_value, strlen(attr_value), 0) == -1) {
        perror("setxattr");
        return 1;
    }
    printf("Attribut defini\n");

    char buf[256] = {0};
    ssize_t len = getxattr(path, attr_name, buf, sizeof(buf));
    if (len == -1) {
        perror("getxattr");
        return 1;
    }
    buf[len] = '\0';
    printf("Attribut : %s = %s\n", attr_name, buf);

    char list_buf[512] = {0};
    ssize_t list_len = listxattr(path, list_buf, sizeof(list_buf));
    printf("Nombre attributs : %d\n", list_len > 0 ? 1 : 0);

    unlink(path);
    return 0;
}'''
