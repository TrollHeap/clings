common_mistake = "Oublier de passer l'adresse de sb avec & — stat() attend un pointeur"
description = """
NSY103 — L'appel système `stat()` remplit une structure `struct stat` avec les métadonnées d'un fichier : taille, permissions, timestamps, type. Les macros `S_ISREG()`, `S_ISDIR()` permettent de tester le type de fichier.

Utilisez `stat()` pour afficher la taille et le type du fichier `/etc/hostname`."""
difficulty = 1
exercise_type = "complete"
hints = [
    "La fonction s'appelle `stat(chemin, &sb)` — premier argument : chemin, second : pointeur vers struct stat",
    "La taille du fichier est dans le champ `sb.st_size`",
    "Le type est testé via `S_ISREG(sb.st_mode)` pour un fichier régulier",
]
id = "fs-stat-01"
kc_ids = ["KC-C19"]
key_concept = "stat() remplit struct stat avec les métadonnées d'un fichier"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <sys/stat.h>

int main(void) {
    struct stat sb;
    const char *path = "/tmp/kf_test_stat";
    FILE *f = fopen(path, "w");
    if (!f) { perror("fopen"); return 1; }
    fprintf(f, "hello world");
    fclose(f);
    if (stat(path, &sb) == -1) {
        perror("stat");
        return 1;
    }
    printf("Taille : %ld octets\n", (long)sb.st_size);
    printf("Est un fichier : %d\n", S_ISREG(sb.st_mode) ? 1 : 0);
    printf("Est un repertoire : %d\n", S_ISDIR(sb.st_mode) ? 1 : 0);
    remove(path);
    return 0;
}'''
