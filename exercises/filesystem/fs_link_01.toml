common_mistake = "Confondre l'ordre des arguments de symlink() : c'est symlink(cible, nom_du_lien)"
description = """
NSY103 — `link()` crée un hard link (même inode, même données). `symlink()` crée un lien symbolique (nouvel inode, pointe vers un chemin). `readlink()` lit la cible d'un lien symbolique. `lstat()` inspecte le lien lui-même sans le suivre.

Créez un fichier, un hard link et un symlink vers ce fichier. Vérifiez que le hard link partage le même inode et lisez la cible du symlink."""
difficulty = 2
exercise_type = "complete"
hints = [
    "`link(source, destination)` crée un hard link — les deux noms partagent le même inode",
    "`symlink(cible, nom_lien)` crée un lien symbolique",
    "`readlink(chemin, buf, taille)` lit la cible d'un symlink sans le suivre",
]
id = "fs-link-01"
kc_ids = ["KC-C19"]
key_concept = "Hard link = même inode, symlink = nouvel inode pointant vers un chemin"
lang = "c"
prerequisites = ["fs-stat-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <sys/stat.h>
#include <string.h>

int main(void) {
    const char *orig = "/tmp/kf_link_orig";
    const char *hard = "/tmp/kf_link_hard";
    const char *soft = "/tmp/kf_link_soft";

    unlink(hard);
    unlink(soft);
    unlink(orig);

    FILE *f = fopen(orig, "w");
    fprintf(f, "test");
    fclose(f);

    link(orig, hard);
    symlink(orig, soft);

    struct stat s1, s2;
    stat(orig, &s1);
    stat(hard, &s2);
    printf("Meme inode : %d\n", (s1.st_ino == s2.st_ino) ? 1 : 0);
    printf("Nlinks : %ld\n", (long)s1.st_nlink);

    char buf[256];
    ssize_t len = readlink(soft, buf, sizeof(buf) - 1);
    buf[len] = '\0';
    printf("Cible symlink : %s\n", buf);

    unlink(soft);
    unlink(hard);
    unlink(orig);
    return 0;
}'''
