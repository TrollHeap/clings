/* == EXEMPLE ================================================
 * Creer un hard link et verifier le compteur nlink
 * link() ajoute un nom pour le meme inode.
 * =========================================================== */
void example_hardlink(void) {
    const char *a = "/tmp/kf_ex_a";
    const char *b = "/tmp/kf_ex_b";
    unlink(a); unlink(b);
    FILE *f = fopen(a, "w"); fprintf(f, "hi"); fclose(f);
    link(a, b);
    struct stat sa, sb;
    stat(a, &sa); stat(b, &sb);
    printf("Meme inode: %d\n", (sa.st_ino == sb.st_ino) ? 1 : 0);
    printf("nlink: %ld\n", (long)sa.st_nlink);
    unlink(a); unlink(b);
}
