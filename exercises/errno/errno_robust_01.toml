solution_code = '''
#include <stdio.h>
#include <string.h>
#include <errno.h>
typedef enum {
    KF_OK = 0,
    KF_ERR_IO,
    KF_ERR_MEM,
    KF_ERR_ARG,
    KF_ERR_PERM
} kf_error;
typedef struct {
    kf_error code;
    const char *file;
    int line;
    char message[128];
} error_context;
static __thread error_context last_error = {0};
void kf_set_error(kf_error code, const char *file, int line, const char *fmt, ...) {
    last_error.code = code;
    last_error.file = file;
    last_error.line = line;
    snprintf(last_error.message, sizeof(last_error.message), "%s", fmt);
}
#define KF_ERROR(code, msg) kf_set_error(code, __FILE__, __LINE__, msg)
const char *kf_error_name(kf_error e) {
    switch (e) {
        case KF_OK:       return "OK";
        case KF_ERR_IO:   return "IO_ERROR";
        case KF_ERR_MEM:  return "MEM_ERROR";
        case KF_ERR_ARG:  return "ARG_ERROR";
        case KF_ERR_PERM: return "PERM_ERROR";
        default:          return "UNKNOWN";
    }
}
void kf_print_error(void) {
    if (last_error.code != KF_OK) {
        printf("[%s] %s\n", kf_error_name(last_error.code), last_error.message);
    } else {
        printf("[OK] no error\n");
    }
}
kf_error process_value(int val) {
    if (val < 0) {
        KF_ERROR(KF_ERR_ARG, "negative value");
        return KF_ERR_ARG;
    }
    if (val > 100) {
        KF_ERROR(KF_ERR_IO, "value too large");
        return KF_ERR_IO;
    }
    last_error.code = KF_OK;
    return KF_OK;
}
int main(void) {
    process_value(42);
    kf_print_error();
    process_value(-1);
    kf_print_error();
    process_value(200);
    kf_print_error();
    printf("Error module: complete\n");
    return 0;
}'''
starter_code = '''
#include <stdio.h>
#include <string.h>
#include <errno.h>

typedef enum {
    KF_OK = 0,
    KF_ERR_IO,
    KF_ERR_MEM,
    KF_ERR_ARG,
    KF_ERR_PERM
} kf_error;

typedef struct {
    kf_error code;
    const char *file;
    int line;
    char message[128];
} error_context;

static __thread error_context last_error = {0};

void kf_set_error(kf_error code, const char *file, int line, const char *fmt, ...) {
    last_error.code = ____;
    last_error.file = ____;
    last_error.line = ____;
    snprintf(last_error.message, sizeof(last_error.message), "%s", fmt);
}

#define KF_ERROR(code, msg) kf_set_error(code, __FILE__, __LINE__, msg)

const char *kf_error_name(kf_error e) {
    switch (e) {
        case KF_OK:       return "OK";
        case KF_ERR_IO:   return "IO_ERROR";
        case KF_ERR_MEM:  return "MEM_ERROR";
        case KF_ERR_ARG:  return "ARG_ERROR";
        case KF_ERR_PERM: return "PERM_ERROR";
        default:          return "UNKNOWN";
    }
}

void kf_print_error(void) {
    if (last_error.code != KF_OK) {
        printf("[%s] %s\n", kf_error_name(last_error.code), last_error.message);
    } else {
        printf("[OK] no error\n");
    }
}

kf_error process_value(int val) {
    if (val < 0) {
        KF_ERROR(KF_ERR_ARG, "negative value");
        return KF_ERR_ARG;
    }
    if (val > 100) {
        KF_ERROR(KF_ERR_IO, "value too large");
        return KF_ERR_IO;
    }
    last_error.code = KF_OK;
    return KF_OK;
}

int main(void) {
    process_value(42);
    kf_print_error();
    process_value(-1);
    kf_print_error();
    process_value(200);
    kf_print_error();
    printf("Error module: complete\n");
    return 0;
}'''
