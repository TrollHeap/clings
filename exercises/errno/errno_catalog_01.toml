common_mistake = "Les valeurs numériques des errno ne sont pas séquentielles — ENOMEM=12, EACCES=13, EINVAL=22"
description = """
NSY103 — Les codes errno les plus fréquents en programmation système Linux incluent EPERM, ENOENT, ESRCH, EINTR, EIO, ENOMEM, EACCES, EEXIST, EINVAL, etc.

Créez un catalogue qui affiche les 10 codes errno les plus importants avec leur valeur et description."""
difficulty = 3
exercise_type = "complete"
hints = [
    "sizeof(catalog)/sizeof(catalog[0]) donne le nombre d'éléments",
    "catalog[i].code pour le numéro, catalog[i].name pour le nom",
    "strerror(catalog[i].code) pour la description",
]
id = "errno-catalog-01"
kc_ids = ["KC-C15"]
key_concept = "Les codes errno sont des entiers standardisés POSIX avec des descriptions via strerror()"
lang = "c"
prerequisites = ["errno-eperm-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
typedef struct {
    int code;
    const char *name;
} errno_entry;
int main(void) {
    errno_entry catalog[] = {
        {EPERM,  "EPERM"},
        {ENOENT, "ENOENT"},
        {ESRCH,  "ESRCH"},
        {EINTR,  "EINTR"},
        {EIO,    "EIO"},
        {ENOMEM, "ENOMEM"},
        {EACCES, "EACCES"},
        {EEXIST, "EEXIST"},
        {EINVAL, "EINVAL"},
        {EPIPE,  "EPIPE"}
    };
    int count = sizeof(catalog) / sizeof(catalog[0]);
    printf("=== Errno Catalog (%d entries) ===\n", count);
    for (int i = 0; i < count; i++) {
        printf("%2d %-8s %s\n", catalog[i].code, catalog[i].name, strerror(catalog[i].code));
    }
    return 0;
}'''
