common_mistake = "Ne pas vérifier EINTR — l'appel semble échouer alors qu'il faut juste le relancer"
description = """
NSY103 — Quand un signal interrompt un appel système bloquant, celui-ci retourne -1 avec errno=EINTR. Il faut relancer l'appel dans une boucle.

Implémentez une fonction safe_write() qui relance write() si errno==EINTR, et testez-la avec une écriture dans un pipe."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Un appel interrompu retourne -1",
    "EINTR signifie qu'un signal a interrompu l'appel",
    "La boucle do/while relance tant que n==-1 && errno==EINTR",
]
id = "errno-eintr-01"
kc_ids = ["KC-C15"]
key_concept = "Boucle EINTR: do { n=syscall(); } while(n==-1 && errno==EINTR);"
lang = "c"
prerequisites = ["errno-check-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <unistd.h>
ssize_t safe_write(int fd, const void *buf, size_t count) {
    ssize_t n;
    do {
        n = write(fd, buf, count);
    } while (n == -1 && errno == EINTR);
    return n;
}
int main(void) {
    int pipefd[2];
    pipe(pipefd);
    const char *msg = "safe write ok";
    ssize_t written = safe_write(pipefd[1], msg, strlen(msg));
    close(pipefd[1]);
    char buf[64];
    ssize_t nr = read(pipefd[0], buf, sizeof(buf) - 1);
    buf[nr] = '\0';
    close(pipefd[0]);
    printf("Written: %zd bytes\n", written);
    printf("Read: %s\n", buf);
    return 0;
}'''
