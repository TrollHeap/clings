common_mistake = "Ne pas sauvegarder errno — le 2e open() écrase errno du 1er appel"
description = """
NSY103 — Face à une erreur, plusieurs stratégies existent : retry (EINTR, EAGAIN), fallback (chemin alternatif), fail-fast (erreur fatale). Le choix dépend du code errno.

Implémentez une fonction qui tente d'ouvrir un fichier avec fallback sur un chemin alternatif."""
difficulty = 4
exercise_type = "complete"
hints = [
    "strerror() pour convertir errno en chaîne",
    "Sauvegarder errno avant un autre appel système qui pourrait le modifier",
    "Retourner -1 pour signaler l'échec total",
]
id = "errno-recovery-01"
kc_ids = ["KC-C15"]
key_concept = "Sauvegarder errno avant un autre appel système, pattern primary/fallback"
lang = "c"
prerequisites = ["errno-wrapper-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <fcntl.h>
#include <unistd.h>
int open_with_fallback(const char *primary, const char *fallback) {
    int fd = open(primary, O_RDONLY);
    if (fd >= 0) return fd;
    int saved = errno;
    printf("Primary failed: %s\n", strerror(saved));
    fd = open(fallback, O_RDONLY);
    if (fd >= 0) {
        printf("Fallback succeeded\n");
        return fd;
    }
    printf("Fallback failed: %s\n", strerror(errno));
    return -1;
}
int main(void) {
    int fd = open("/tmp/kf_fallback.txt", O_CREAT | O_WRONLY | O_TRUNC, 0644);
    if (fd >= 0) { write(fd, "fallback data", 13); close(fd); }
    int result = open_with_fallback("/kf_no_such_primary", "/tmp/kf_fallback.txt");
    if (result >= 0) {
        char buf[32];
        ssize_t n = read(result, buf, sizeof(buf) - 1);
        buf[n] = '\0';
        printf("Read: %s\n", buf);
        close(result);
    }
    result = open_with_fallback("/kf_no_primary", "/kf_no_fallback");
    if (result == -1) {
        printf("Both failed\n");
    }
    unlink("/tmp/kf_fallback.txt");
    return 0;
}'''
