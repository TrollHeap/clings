#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <fcntl.h>
#include <unistd.h>

/* == EXEMPLE: retry puis abandon ======================== */
int example_retry_open(const char *path, int retries) {
    for (int i = 0; i < retries; i++) {
        int fd = open(path, O_RDONLY);
        if (fd >= 0) return fd;
        if (errno != EINTR) return -1;
    }
    return -1;
}

/* == VOTRE EXERCICE: fallback =========================== */
int open_with_fallback(const char *primary, const char *fallback) {
    int fd = open(primary, O_RDONLY);
    if (fd >= 0) return fd;
    int saved = errno;
    printf("Primary failed: %s\n", strerror(saved));
    fd = open(fallback, O_RDONLY);
    if (fd >= 0) { printf("Fallback succeeded\n"); return fd; }
    printf("Fallback failed: %s\n", strerror(errno));
    return -1;
}

int main(void) {
