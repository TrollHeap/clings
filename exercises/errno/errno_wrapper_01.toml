common_mistake = "Relancer sur toutes les erreurs au lieu de seulement EINTR — boucle infinie sur erreurs permanentes"
description = """
NSY103 — Un wrapper d'appel système robuste doit gérer EINTR (relance), distinguer les erreurs récupérables des fatales, et fournir un message d'erreur clair.

Implémentez un wrapper safe_open() qui relance sur EINTR et affiche un message clair en cas d'erreur."""
difficulty = 3
exercise_type = "complete"
hints = [
    "La boucle EINTR est: do { fd=open(...); } while(fd==-1 && errno==EINTR);",
    "Seul EINTR justifie un retry — les autres erreurs sont définitives",
    "fd > 0 ? 1 : 0 normalise le fd pour un output déterministe",
]
id = "errno-wrapper-01"
kc_ids = ["KC-C15"]
key_concept = "Wrapper EINTR: boucle retry pour signaux, retour immédiat pour erreurs réelles"
lang = "c"
prerequisites = ["errno-eintr-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <fcntl.h>
#include <unistd.h>
int safe_open(const char *path, int flags) {
    int fd;
    do {
        fd = open(path, flags);
    } while (fd == -1 && errno == EINTR);
    return fd;
}
void try_open(const char *path) {
    int fd = safe_open(path, O_RDONLY);
    if (fd == -1) {
        printf("safe_open(%s): %s\n", path, strerror(errno));
    } else {
        printf("safe_open(%s): fd=%d (ok)\n", path, fd > 0 ? 1 : 0);
        close(fd);
    }
}
int main(void) {
    try_open("/tmp");
    try_open("/kf_wrapper_nonexistent");
    printf("Wrapper handles EINTR: yes\n");
    return 0;
}'''
