common_mistake = "Confondre ENOENT (fichier inexistant) avec ENOTDIR (composant du chemin n'est pas un répertoire)"
description = """
NSY103 — ENOENT (Error NO ENTry) indique qu'un chemin n'existe pas. C'est l'erreur la plus courante avec les appels système de fichiers.

Testez plusieurs chemins avec access() et affichez le résultat pour chacun."""
difficulty = 2
exercise_type = "complete"
hints = [
    "access() retourne -1 en cas d'erreur, 0 si ok",
    "strerror(errno) pour obtenir le message",
    "/tmp existe toujours sur un système Linux",
]
id = "errno-enoent-01"
kc_ids = ["KC-C15"]
key_concept = "ENOENT=2 signifie que le chemin référencé n'existe pas dans le système de fichiers"
lang = "c"
prerequisites = ["errno-check-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <unistd.h>
void check_path(const char *path) {
    errno = 0;
    int rc = access(path, F_OK);
    if (rc == -1) {
        printf("%s: %s (errno=%d)\n", path, strerror(errno), errno);
    } else {
        printf("%s: exists\n", path);
    }
}
int main(void) {
    check_path("/tmp");
    check_path("/nonexistent_kf_path");
    check_path("/also/does/not/exist");
    return 0;
}'''
