common_mistake = "Consulter errno sans vérifier le retour — errno n'est valide que si l'appel a échoué"
description = """
NSY103 — Après un appel système qui échoue, il faut vérifier la valeur de retour (-1 pour open) puis consulter errno pour connaître la raison de l'échec.

Tentez d'ouvrir un fichier inexistant, vérifiez le retour, puis affichez errno et son message."""
difficulty = 1
exercise_type = "complete"
hints = [
    "open() retourne -1 en cas d'erreur",
    "strerror(errno) donne le message d'erreur en chaîne",
    "ENOENT = 2 = No such file or directory",
]
id = "errno-check-01"
kc_ids = ["KC-C15"]
key_concept = "Toujours vérifier la valeur de retour avant de consulter errno"
lang = "c"
prerequisites = ["errno-strerror-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <fcntl.h>
#include <unistd.h>
int main(void) {
    int fd = open("/tmp/clings_nonexistent_file_xyz.txt", O_RDONLY);
    if (fd == -1) {
        printf("open failed: errno=%d (%s)\n", errno, strerror(errno));
    } else {
        printf("open succeeded (unexpected)\n");
        close(fd);
    }
    printf("ENOENT=%d\n", ENOENT);
    return 0;
}'''
