common_mistake = "Oublier __thread — my_errno serait partagé entre threads et causerait des races"
description = """
NSY103 — Dans une bibliothèque, on peut implémenter un système d'erreur inspiré d'errno : une variable thread-local + des fonctions de diagnostic.

Créez un mini-système d'erreur avec des codes custom, un getter/setter et un message descriptif."""
difficulty = 4
exercise_type = "complete"
hints = [
    "set_error stocke le code dans my_errno",
    "get_error retourne my_errno",
    "ERR_DIVZERO pour la division par zéro",
]
id = "errno-custom-01"
kc_ids = ["KC-C15"]
key_concept = "__thread pour thread-local storage, pattern getter/setter avec codes d'erreur enum"
lang = "c"
prerequisites = ["errno-thread-01"]
solution_code = '''
#include <stdio.h>
enum {
    ERR_NONE = 0,
    ERR_OVERFLOW = 1,
    ERR_UNDERFLOW = 2,
    ERR_DIVZERO = 3
};
static __thread int my_errno = ERR_NONE;
void set_error(int code) { my_errno = code; }
int get_error(void) { return my_errno; }
const char *error_str(int code) {
    switch (code) {
        case ERR_NONE:      return "no error";
        case ERR_OVERFLOW:  return "overflow";
        case ERR_UNDERFLOW: return "underflow";
        case ERR_DIVZERO:   return "division by zero";
        default:            return "unknown error";
    }
}
int safe_div(int a, int b) {
    if (b == 0) { set_error(ERR_DIVZERO); return 0; }
    set_error(ERR_NONE);
    return a / b;
}
int main(void) {
    int r1 = safe_div(10, 3);
    printf("10/3=%d err=%s\n", r1, error_str(get_error()));
    int r2 = safe_div(5, 0);
    printf("5/0=%d err=%s\n", r2, error_str(get_error()));
    set_error(ERR_OVERFLOW);
    printf("manual: err=%s\n", error_str(get_error()));
    return 0;
}'''
