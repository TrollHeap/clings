common_mistake = "Confondre EPERM et EACCES — EACCES est pour les permissions fichier, EPERM pour les opérations système"
description = """
NSY103 — EPERM (Operation not permitted) et EACCES (Permission denied) sont deux erreurs de permissions distinctes. EACCES concerne les droits d'accès fichier, EPERM concerne les opérations privilégiées.

Démontrez la différence en testant des opérations qui génèrent chacune de ces erreurs."""
difficulty = 2
exercise_type = "complete"
hints = [
    "open() retourne -1 en cas d'erreur",
    "strerror(errno) donne le message lisible",
    "Un fichier mode 0444 ne peut pas être ouvert en écriture",
]
id = "errno-eperm-01"
kc_ids = ["KC-C15"]
key_concept = "EACCES=droits fichier insuffisants, EPERM=opération réservée à root/privilégiée"
lang = "c"
prerequisites = ["errno-enoent-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <fcntl.h>
#include <unistd.h>
#include <sys/stat.h>
int main(void) {
    int fd = open("/tmp/kf_readonly_test.txt", O_CREAT | O_WRONLY, 0444);
    if (fd >= 0) {
        write(fd, "test", 4);
        close(fd);
    }
    errno = 0;
    fd = open("/tmp/kf_readonly_test.txt", O_WRONLY);
    if (fd == -1) {
        printf("Write attempt: %s (errno=%d)\n", strerror(errno), errno);
    } else {
        close(fd);
    }
    printf("EPERM=%d, EACCES=%d\n", EPERM, EACCES);
    unlink("/tmp/kf_readonly_test.txt");
    return 0;
}'''
