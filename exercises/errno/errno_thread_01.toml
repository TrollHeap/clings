common_mistake = "Croire que errno est une variable globale partagée — c'est un macro vers une variable TLS"
description = """
NSY103 — errno est thread-local (chaque thread a sa propre copie). Deux threads peuvent échouer simultanément sans écraser l'errno de l'autre.

Créez deux threads qui provoquent chacun une erreur différente et vérifiez que errno est bien isolé par thread."""
difficulty = 3
exercise_type = "complete"
hints = [
    "open() retourne -1 en cas d'erreur",
    "O_WRONLY pour tenter d'écrire dans un fichier en lecture seule",
    "pthread_join séquentialise l'exécution pour un output déterministe",
]
id = "errno-thread-01"
kc_ids = ["KC-C15"]
key_concept = "errno est thread-local (__thread) — chaque thread a sa propre copie isolée"
lang = "c"
prerequisites = ["errno-eperm-01"]
solution_code = '''
#include <stdio.h>
#include <errno.h>
#include <string.h>
#include <pthread.h>
#include <fcntl.h>
#include <unistd.h>
void *thread_enoent(void *arg) {
    (void)arg;
    int fd = open("/kf_thread_no_such_file", O_RDONLY);
    if (fd == -1) {
        printf("Thread A: errno=%d (%s)\n", errno, strerror(errno));
    }
    return NULL;
}
void *thread_eacces(void *arg) {
    (void)arg;
    int fd = open("/tmp/kf_thread_ro.txt", O_CREAT | O_WRONLY, 0444);
    if (fd >= 0) { close(fd); }
    fd = open("/tmp/kf_thread_ro.txt", O_WRONLY);
    if (fd == -1) {
        printf("Thread B: errno=%d (%s)\n", errno, strerror(errno));
    } else { close(fd); }
    unlink("/tmp/kf_thread_ro.txt");
    return NULL;
}
int main(void) {
    pthread_t ta, tb;
    pthread_create(&ta, NULL, thread_enoent, NULL);
    pthread_join(ta, NULL);
    pthread_create(&tb, NULL, thread_eacces, NULL);
    pthread_join(tb, NULL);
    printf("errno is thread-local: yes\n");
    return 0;
}'''
