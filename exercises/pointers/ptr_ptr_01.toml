common_mistake = "Passer int* au lieu de int** : la valeur du pointeur ne peut pas être modifiée depuis la fonction"
description = """
NSY103 — Un pointeur vers un pointeur (`int **pp`) permet de modifier un pointeur depuis une fonction. Cela permet par exemple d'implémenter `swap` qui échange réellement les valeurs.

Implémentez `swap(int *a, int *b)` qui échange les valeurs pointées, et démontrez l'utilisation de `int **pp`."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Pour swap : `int tmp = *a; *a = *b; *b = tmp;`",
    "Pour déclarer un pointeur vers pointeur : `int **pp = &p;`",
    "`**pp` lit la valeur finale, `*pp` lit le pointeur intermédiaire",
]
id = "ptr-ptr-01"
kc_ids = ["KC-C01"]
key_concept = "int **pp : pointeur vers pointeur vers int — indispensable pour modifier un pointeur depuis une fonction (passage par adresse de pointeur)"
lang = "c"
prerequisites = ["ptr-deref-01"]
solution_code = '''
#include <stdio.h>

void swap_int_ptr(int **a, int **b) {
    int *tmp = *a;
    *a = *b;
    *b = tmp;
}

int main(void) {
    {
        int x = 10, y = 20;
        int *p = &x, *q = &y;
        swap_int_ptr(&p, &q);
        printf("%d\n", (int)(*p));
        printf("%d\n", (int)(*q));
    }
    {
        int a = -5, b = 15;
        int *pa = &a, *pb = &b;
        swap_int_ptr(&pa, &pb);
        printf("%d\n", (int)(*pa));
        printf("%d\n", (int)(*pb));
    }
    {
        int z = 99;
        int *p = &z, *q = &z;
        swap_int_ptr(&p, &q);
        printf("%d\n", (int)(*p));
        printf("%d\n", (int)(*q));
    }
    {
        int x = 1, y = 2;
        int *p = &x, *q = &y;
        swap_int_ptr(&p, &q);
        printf("%d\n", (int)(*p));
        swap_int_ptr(&p, &q);
        printf("%d\n", (int)(*p));
    }
    return 0;
}
'''
