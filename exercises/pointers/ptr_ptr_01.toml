[validation]
mode = "test"
test_code = """
void test_swap_pointers_basic(void) {
    int x = 10, y = 20;
    int *p = &x, *q = &y;
    swap_int_ptr(&p, &q);
    TEST_ASSERT_EQUAL_INT(20, *p);
    TEST_ASSERT_EQUAL_INT(10, *q);
}

void test_swap_pointers_negative(void) {
    int a = -5, b = 15;
    int *pa = &a, *pb = &b;
    swap_int_ptr(&pa, &pb);
    TEST_ASSERT_EQUAL_INT(15, *pa);
    TEST_ASSERT_EQUAL_INT(-5, *pb);
}

void test_swap_pointers_same_target(void) {
    int z = 99;
    int *p = &z, *q = &z;
    swap_int_ptr(&p, &q);
    TEST_ASSERT_EQUAL_INT(99, *p);
    TEST_ASSERT_EQUAL_INT(99, *q);
}

void test_swap_pointers_double_swap(void) {
    int x = 1, y = 2;
    int *p = &x, *q = &y;
    swap_int_ptr(&p, &q);
    TEST_ASSERT_EQUAL_INT(2, *p);
    swap_int_ptr(&p, &q);
    TEST_ASSERT_EQUAL_INT(1, *p);
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_swap_pointers_basic);
    RUN_TEST(test_swap_pointers_negative);
    RUN_TEST(test_swap_pointers_same_target);
    RUN_TEST(test_swap_pointers_double_swap);
    return UNITY_END();
}
"""

