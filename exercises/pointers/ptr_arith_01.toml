common_mistake = "Confondre p++ (modifie p) avec *(p+i) (lit sans modifier)"
description = """
NSY103 — L'arithmétique de pointeurs permet de parcourir des tableaux efficacement. `p + i` pointe vers le i-ième élément après p.

Complétez `sum_array()` qui additionne les éléments d'un tableau `int[]` via arithmétique de pointeurs (sans crochets `[]`)."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Dans la boucle, utilisez `*(arr + i)` pour accéder à l'élément i",
    "La condition d'arrêt : `i < n`",
    "Initialisez `sum = 0` avant la boucle",
]
id = "ptr-arith-01"
kc_ids = ["KC-C01"]
key_concept = "Ajouter i à un pointeur avance de i×sizeof(*p) octets : p+i == &arr[i] et *(p+i) == arr[i]"
lang = "c"
prerequisites = ["ptr-deref-01"]
solution_code = '''
#include <stdio.h>

int sum_array(const int *arr, int n) {
    int sum = 0;
    for (int i = 0; i < n; i++) {
        sum += *(arr + i);
    }
    return sum;
}

int main(void) {
    int nums[] = {10, 20, 30, 40, 50};
    int total = sum_array(nums, 5);
    printf("Somme : %d\n", total);
    printf("Element 2 : %d\n", *(nums + 2));
    return 0;
}
'''
