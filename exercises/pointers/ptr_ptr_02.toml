solution_code = '''
#include <stdio.h>
#include <string.h>

void sort_strings(char *arr[], int n) {
    for (int i = 0; i < n - 1; i++) {
        for (int j = 0; j < n - 1 - i; j++) {
            if (strcmp(arr[j], arr[j + 1]) > 0) {
                char *tmp = arr[j];
                arr[j] = arr[j + 1];
                arr[j + 1] = tmp;
            }
        }
    }
}

int main(void) {
    char *fruits[] = {"banane", "cerise", "abricot", "datte", "elderberry"};
    int n = 5;
    sort_strings(fruits, n);
    for (int i = 0; i < n; i++) printf("%s\n", fruits[i]);
    return 0;
}
'''
