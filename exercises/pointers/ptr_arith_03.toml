common_mistake = "Confondre int *fn(int) (fonction retournant int*) avec int (*fn)(int) (pointeur de fonction)"
description = """
NSY103 — Un pointeur de fonction stocke l'adresse d'une fonction. Sa syntaxe est `type_retour (*nom)(params)`. On peut passer une fonction en argument d'une autre pour créer des callbacks.

Implémentez une fonction `apply` qui applique une fonction callback à chaque élément d'un tableau."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Syntaxe pointeur de fonction : `int (*fn)(int)` — fn est un pointeur vers une fonction prenant int et retournant int",
    "Appeler via pointeur : `fn(arr[i])` — pas besoin de `*` pour appeler",
    "Passer le nom de la fonction directement : `apply(a, 4, doubler)` — le nom se convertit automatiquement en pointeur",
]
id = "ptr-arith-03"
kc_ids = ["KC-C01"]
key_concept = "int (*fn)(int) déclare un pointeur vers une fonction — callback pattern"
lang = "c"
prerequisites = ["ptr-arith-02"]
solution_code = '''
#include <stdio.h>

int double_val(int x) { return x * 2; }
int square_val(int x) { return x * x; }

void apply(int *arr, int n, int (*fn)(int)) {
    for (int i = 0; i < n; i++) {
        arr[i] = fn(arr[i]);
    }
}

static int negate(int x) { return -x; }

int main(void) {
    {
        int arr[] = {1, 2, 3};
        apply(arr, 3, double_val);
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[1]));
        printf("%d\n", (int)(arr[2]));
    }
    {
        int arr[] = {2, 3, 4};
        apply(arr, 3, square_val);
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[1]));
        printf("%d\n", (int)(arr[2]));
    }
    {
        int arr[] = {-5, 0, 10};
        apply(arr, 3, negate);
        printf("%d\n", (int)(arr[0]));
        printf("%d\n", (int)(arr[1]));
        printf("%d\n", (int)(arr[2]));
    }
    {
        int arr[] = {7};
        apply(arr, 1, double_val);
        printf("%d\n", (int)(arr[0]));
    }
    return 0;
}
'''
