[validation]
mode = "test"
test_code = """
void test_apply_double(void) {
    int arr[] = {1, 2, 3};
    apply(arr, 3, double_val);
    TEST_ASSERT_EQUAL_INT(2, arr[0]);
    TEST_ASSERT_EQUAL_INT(4, arr[1]);
    TEST_ASSERT_EQUAL_INT(6, arr[2]);
}

void test_apply_square(void) {
    int arr[] = {2, 3, 4};
    apply(arr, 3, square_val);
    TEST_ASSERT_EQUAL_INT(4, arr[0]);
    TEST_ASSERT_EQUAL_INT(9, arr[1]);
    TEST_ASSERT_EQUAL_INT(16, arr[2]);
}

void test_apply_negate(void) {
    int arr[] = {-5, 0, 10};
    apply(arr, 3, negate);
    TEST_ASSERT_EQUAL_INT(5, arr[0]);
    TEST_ASSERT_EQUAL_INT(0, arr[1]);
    TEST_ASSERT_EQUAL_INT(-10, arr[2]);
}

void test_apply_single(void) {
    int arr[] = {7};
    apply(arr, 1, double_val);
    TEST_ASSERT_EQUAL_INT(14, arr[0]);
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_apply_double);
    RUN_TEST(test_apply_square);
    RUN_TEST(test_apply_negate);
    RUN_TEST(test_apply_single);
    return UNITY_END();
}
"""

