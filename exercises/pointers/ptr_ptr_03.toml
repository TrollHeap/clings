/* == EXEMPLE ================================================
 * Allocation d'un buffer de chars via double pointeur
 * La fonction alloue et remplit, l'appelant libere.
 * =========================================================== */
int example_alloc_greeting(char **out, const char *name) {
    int len = 7 + (int)strlen(name) + 1;
    *out = malloc(len);
    if (!*out) return -1;
    snprintf(*out, len, "Bonjour %s", name);
    return 0;
}
