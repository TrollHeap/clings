common_mistake = "Utiliser restrict alors que les pointeurs se chevauchent → comportement indéfini"
description = """
NSY103 — Le qualificateur `restrict` promet au compilateur que le pointeur est le seul moyen d'accéder à la mémoire pointée, ce qui permet des optimisations (vectorisation, réordonnancement). Sans restrict, le compilateur doit supposer que deux pointeurs peuvent pointer vers la même mémoire (aliasing).

Implémentez deux versions de `vector_add` (avec et sans restrict) et démontrez la différence conceptuelle en mesurant le nombre d'opérations."""
difficulty = 5
exercise_type = "complete"
hints = [
    "`restrict` se place après le `*` : `int *restrict p`",
    "Le corps des deux fonctions est identique — la différence est dans les garanties au compilateur",
    "L'exemple avec overlap montre l'aliasing : a et b pointent vers des zones qui se chevauchent",
]
id = "ptr-restrict-01"
kc_ids = ["KC-C01"]
key_concept = "restrict promet au compilateur que les pointeurs ne se chevauchent pas — permet vectorisation et optimisation"
lang = "c"
prerequisites = ["ptr-generic-02"]
solution_code = '''
#include <stdio.h>

void vec_add_alias(int *a, const int *b, const int *c, int n) {
    for (int i = 0; i < n; i++) {
        a[i] = b[i] + c[i];
    }
}

void vec_add_restrict(int *restrict a, const int *restrict b,
                      const int *restrict c, int n) {
    for (int i = 0; i < n; i++) {
        a[i] = b[i] + c[i];
    }
}

int main(void) {
    int x[] = {1, 2, 3, 4, 5};
    int y[] = {10, 20, 30, 40, 50};
    int result[5];
    vec_add_restrict(result, x, y, 5);
    printf("restrict : ");
    for (int i = 0; i < 5; i++) printf("%d ", result[i]);
    printf("\n");
    int overlap[5] = {1, 2, 3, 4, 5};
    vec_add_alias(overlap + 1, overlap, overlap, 4);
    printf("alias    : ");
    for (int i = 0; i < 5; i++) printf("%d ", overlap[i]);
    printf("\n");
    printf("sizeof(int*) : %lu\n", (unsigned long)sizeof(int *));
    printf("restrict est un contrat compilateur, pas une garantie runtime\n");
    return 0;
}
'''
