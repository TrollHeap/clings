common_mistake = "Oublier * dans la déclaration du type pointeur (int p vs int *p)"
description = """
NSY103 — Un pointeur est une variable qui stocke une adresse mémoire. L'opérateur `&` donne l'adresse d'une variable, `*` accède à la valeur pointée.

Déclarez un entier `x = 42`, un pointeur `p` vers `x`, puis affichez la valeur via le pointeur."""
difficulty = 1
exercise_type = "complete"
hints = [
    "Pour déclarer un pointeur vers int : `int *p;`",
    "Pour obtenir l'adresse de x : `p = &x;`",
    'Pour lire la valeur via le pointeur : `printf("%d", *p);`',
]
id = "ptr-deref-01"
kc_ids = ["KC-C01"]
key_concept = "L'opérateur & retourne l'adresse d'une variable ; * déréférence un pointeur pour lire ou écrire la valeur pointée"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>

int main(void) {
    int x = 42;
    int *p = &x;
    printf("Valeur de x : %d\n", x);
    printf("Valeur via *p : %d\n", *p);
    printf("Adresses egales : %d\n", (p == &x));
    return 0;
}
'''
starter_code = """
#include <stdio.h>

int main(void) {
    // Déclarez x=42, un pointeur p vers x
    // Affichez: "Valeur de x : 42", "Valeur via *p : 42", "Adresses egales : 1"
    return 0;
}
"""
starter_code_stages = [
    '''
#include <stdio.h>

/* == EXEMPLE ================================================
 * Declarer un pointeur vers float et dereferencement
 * L'operateur & donne l'adresse, * lit la valeur pointee.
 * =========================================================== */
void example_float_ptr(void) {
    float temperature = 36.6f;
    float *fp = &temperature;
    printf("temperature = %.1f\n", temperature);
    printf("via *fp     = %.1f\n", *fp);
    printf("fp == &temperature : %d\n", (fp == &temperature));
}
/* Resultat: temperature = 36.6, via *fp = 36.6, egalite = 1 */

/* == VOTRE EXERCICE =========================================
