[validation]
mode = "test"
test_code = """
void test_count_empty(void) {
    int arr[] = {1, 2, 3};
    TEST_ASSERT_EQUAL_INT(0, count_elements(arr, arr));
}

void test_count_single(void) {
    int arr[] = {42};
    TEST_ASSERT_EQUAL_INT(1, count_elements(arr, arr + 1));
}

void test_count_multiple(void) {
    int arr[] = {10, 20, 30, 40, 50};
    TEST_ASSERT_EQUAL_INT(5, count_elements(arr, arr + 5));
}

void test_count_partial(void) {
    int arr[] = {1, 2, 3, 4, 5, 6, 7};
    TEST_ASSERT_EQUAL_INT(3, count_elements(arr + 2, arr + 5));
}

void test_count_two(void) {
    int arr[] = {100, 200};
    TEST_ASSERT_EQUAL_INT(2, count_elements(arr, arr + 2));
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_count_empty);
    RUN_TEST(test_count_single);
    RUN_TEST(test_count_multiple);
    RUN_TEST(test_count_partial);
    RUN_TEST(test_count_two);
    return UNITY_END();
}
"""

