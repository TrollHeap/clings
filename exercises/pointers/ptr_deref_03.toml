common_mistake = "Confondre le résultat de end - begin (en nombre d'éléments) avec une différence d'octets : le compilateur divise automatiquement par sizeof(*p)"
description = """
NSY103 — La soustraction de deux pointeurs de même type donne directement le nombre d'éléments qui les séparent (et non une différence en octets).

Implémentez `count_elements(int *begin, int *end)` qui retourne le nombre d'entiers entre `begin` et `end` en utilisant uniquement l'arithmétique de pointeurs."""
difficulty = 1
exercise_type = "complete"
hints = [
    "`end - begin` retourne une valeur de type `ptrdiff_t` — castez-la en `(int)`",
    "Si begin == end, il n'y a aucun élément — la soustraction donne 0",
    "end pointe après le dernier élément : `arr + n` est valide même si on ne déréférence pas end",
]
id = "ptr-deref-03"
kc_ids = ["KC-C01"]
key_concept = "end - begin donne le nombre d'éléments (ptrdiff_t) — le compilateur divise par sizeof(*begin) automatiquement"
lang = "c"
prerequisites = ["ptr-deref-02"]
solution_code = '''
#include <stdio.h>

int count_elements(int *begin, int *end) {
    return (int)(end - begin);
}

int main(void) {
    {
        int arr[] = {1, 2, 3};
        printf("%d\n", (int)(count_elements(arr, arr)));
    }
    {
        int arr[] = {42};
        printf("%d\n", (int)(count_elements(arr, arr + 1)));
    }
    {
        int arr[] = {10, 20, 30, 40, 50};
        printf("%d\n", (int)(count_elements(arr, arr + 5)));
    }
    {
        int arr[] = {1, 2, 3, 4, 5, 6, 7};
        printf("%d\n", (int)(count_elements(arr + 2, arr + 5)));
    }
    return 0;
}
'''
