#include <stdio.h>

/* == EXEMPLE ================================================
 * Parcours de tableau via pointeur qui avance (p++)
 * La distance end - begin donne le nombre d'elements.
 * =========================================================== */
void example_print(const int *arr, int n) {
    const int *p = arr;
    const int *end = arr + n;
    while (p < end) { printf("%d ", *p); p++; }
    printf("\n");
}
void example_demo(void) {
    int data[] = {1, 2, 3};
    example_print(data, 3);
    /* Distance : end - begin donne le nombre d'elements */
    printf("distance : %d\n", (int)(data + 3 - data));
