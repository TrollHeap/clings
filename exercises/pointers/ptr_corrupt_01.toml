common_mistake = "Oublier d'ajouter sizeof(uint32_t) pour la sentinelle arrière dans le malloc"
description = """
NSY103 — Les sentinelles (canary values) sont des valeurs magiques placées avant et après un bloc mémoire alloué. Après utilisation, on vérifie que les sentinelles sont intactes — si elles sont modifiées, il y a eu un buffer overflow.

Implémentez un allocateur avec sentinelles qui détecte les corruptions mémoire."""
difficulty = 5
exercise_type = "complete"
hints = [
    "`offsetof(GuardedBlock, data)` donne le décalage en octets du champ data dans la struct",
    "La sentinelle arrière est placée à `blk->data + size` — juste après les données utilisateur",
    "Pour revenir de data vers le bloc : `(char *)ptr - offsetof(GuardedBlock, data)`",
]
id = "ptr-corrupt-01"
kc_ids = ["KC-C01"]
key_concept = "Les sentinelles (canary) détectent les buffer overflows en vérifiant des valeurs magiques aux bornes"
lang = "c"
prerequisites = ["ptr-restrict-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <stdint.h>
#include <stddef.h>

#define CANARY 0xDEADBEEF

typedef struct {
    uint32_t front_canary;
    size_t size;
    char data[];
} GuardedBlock;

void *guarded_alloc(size_t size) {
    GuardedBlock *blk = malloc(sizeof(GuardedBlock) + size + sizeof(uint32_t));
    if (!blk) return NULL;
    blk->front_canary = CANARY;
    blk->size = size;
    uint32_t *back = (uint32_t *)(blk->data + size);
    *back = CANARY;
    return blk->data;
}

int guarded_check(void *ptr) {
    GuardedBlock *blk = (GuardedBlock *)((char *)ptr - offsetof(GuardedBlock, data));
    if (blk->front_canary != CANARY) return -1;
    uint32_t *back = (uint32_t *)(blk->data + blk->size);
    if (*back != CANARY) return -2;
    return 0;
}

void guarded_free(void *ptr) {
    GuardedBlock *blk = (GuardedBlock *)((char *)ptr - offsetof(GuardedBlock, data));
    free(blk);
}

int main(void) {
    char *buf = guarded_alloc(8);
    if (!buf) return 1;
    strcpy(buf, "OK");
    printf("Check apres ecriture normale : %d\n", guarded_check(buf));
    char *buf2 = guarded_alloc(4);
    if (!buf2) { guarded_free(buf); return 1; }
    strcpy(buf2, "ABCDEFGH");
    printf("Check apres overflow : %d\n", guarded_check(buf2));
    guarded_free(buf);
    guarded_free(buf2);
    printf("Canary : 0x%X\n", CANARY);
    return 0;
}
'''
