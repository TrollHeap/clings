[validation]
mode = "test"
test_code = """
void test_swap_basic(void) {
    int a = 10, b = 20;
    swap(&a, &b);
    TEST_ASSERT_EQUAL_INT(20, a);
    TEST_ASSERT_EQUAL_INT(10, b);
}

void test_swap_negative(void) {
    int a = -5, b = 15;
    swap(&a, &b);
    TEST_ASSERT_EQUAL_INT(15, a);
    TEST_ASSERT_EQUAL_INT(-5, b);
}

void test_swap_zeros(void) {
    int a = 0, b = 0;
    swap(&a, &b);
    TEST_ASSERT_EQUAL_INT(0, a);
    TEST_ASSERT_EQUAL_INT(0, b);
}

void test_swap_same_value(void) {
    int a = 42, b = 42;
    swap(&a, &b);
    TEST_ASSERT_EQUAL_INT(42, a);
    TEST_ASSERT_EQUAL_INT(42, b);
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_swap_basic);
    RUN_TEST(test_swap_negative);
    RUN_TEST(test_swap_zeros);
    RUN_TEST(test_swap_same_value);
    return UNITY_END();
}
"""

