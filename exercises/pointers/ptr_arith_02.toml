[validation]
mode = "test"
test_code = """
void test_distance_zero(void) {
    int arr[] = {1, 2, 3};
    TEST_ASSERT_EQUAL_INT(0, array_distance(arr, arr));
}

void test_distance_simple(void) {
    int arr[] = {10, 20, 30};
    TEST_ASSERT_EQUAL_INT(3, array_distance(arr, arr + 3));
}

void test_distance_six(void) {
    int arr[] = {10, 20, 30, 40, 50, 60};
    TEST_ASSERT_EQUAL_INT(6, array_distance(arr, arr + 6));
}

void test_middle_even(void) {
    int arr[] = {1, 2, 3, 4};
    int *mid = array_middle(arr, arr + 4);
    TEST_ASSERT_EQUAL_INT(3, *mid);
}

void test_middle_odd(void) {
    int arr[] = {10, 20, 30, 40, 50};
    int *mid = array_middle(arr, arr + 5);
    TEST_ASSERT_EQUAL_INT(30, *mid);
}

int main(void) {
    UNITY_BEGIN();
    RUN_TEST(test_distance_zero);
    RUN_TEST(test_distance_simple);
    RUN_TEST(test_distance_six);
    RUN_TEST(test_middle_even);
    RUN_TEST(test_middle_odd);
    return UNITY_END();
}
"""

