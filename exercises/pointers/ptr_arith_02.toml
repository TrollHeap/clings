common_mistake = "Confondre sizeof(arr) (taille tableau) avec sizeof(ptr) (taille pointeur = 8 octets sur x86_64)"
description = """
NSY103 — La différence entre deux pointeurs du même type donne le nombre d'éléments entre eux (pas le nombre d'octets). `sizeof` donne la taille en octets d'un type ou d'une variable.

Utilisez la soustraction de pointeurs et sizeof pour calculer le nombre d'éléments et la taille en octets d'un tableau."""
difficulty = 2
exercise_type = "complete"
hints = [
    "`end - begin` donne le nombre d'éléments, pas d'octets",
    "`sizeof(arr)` donne la taille totale du tableau en octets",
    "`sizeof(arr) / sizeof(arr[0])` donne le nombre d'éléments",
]
id = "ptr-arith-02"
kc_ids = ["KC-C01"]
key_concept = "La soustraction de pointeurs donne un nombre d'éléments ; sizeof(arr)/sizeof(arr[0]) aussi"
lang = "c"
prerequisites = ["ptr-arith-01"]
solution_code = '''
#include <stdio.h>

long array_distance(int *begin, int *end) {
    return end - begin;
}

int *array_middle(int *begin, int *end) {
    return begin + (end - begin) / 2;
}

int main(void) {
    {
        int arr[] = {1, 2, 3};
        printf("%d\n", (int)(array_distance(arr, arr)));
    }
    {
        int arr[] = {10, 20, 30, 40, 50, 60};
        printf("%d\n", (int)(array_distance(arr, arr + 6)));
    }
    {
        int arr[] = {1, 2, 3, 4};
        int *mid = array_middle(arr, arr + 4);
        printf("%d\n", (int)(*mid));
    }
    {
        int arr[] = {10, 20, 30, 40, 50};
        int *mid = array_middle(arr, arr + 5);
        printf("%d\n", (int)(*mid));
    }
    return 0;
}
'''
