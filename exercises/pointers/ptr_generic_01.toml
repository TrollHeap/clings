common_mistake = "Pour trier char*[], le comparateur reçoit char** (adresse de l'élément), pas char*"
description = """
NSY103 — `void *` est un pointeur générique qui peut pointer vers n'importe quel type. Il ne peut pas être déréférencé directement — il faut le caster. La fonction standard `qsort` utilise ce mécanisme pour trier n'importe quel type.

Implémentez des fonctions de comparaison pour trier des entiers et des chaînes avec `qsort`."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Pour cmp_int : caster `const void *` en `const int *` puis déréférencer",
    "Pour cmp_str : qsort passe l'adresse de chaque élément — un élément est `char *`, donc le paramètre est `char **`",
    "Pattern safe pour comparer des entiers sans overflow : `(a > b) - (a < b)`",
]
id = "ptr-generic-01"
kc_ids = ["KC-C01"]
key_concept = "void* est le polymorphisme du C — cast explicite obligatoire pour déréférencer"
lang = "c"
prerequisites = ["ptr-ptr-03"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>

int cmp_int(const void *a, const void *b) {
    int ia = *(const int *)a;
    int ib = *(const int *)b;
    return (ia > ib) - (ia < ib);
}

int cmp_str(const void *a, const void *b) {
    const char *sa = *(const char **)a;
    const char *sb = *(const char **)b;
    return strcmp(sa, sb);
}

int main(void) {
    int nums[] = {42, 7, 99, 3, 15};
    qsort(nums, 5, sizeof(int), cmp_int);
    printf("Entiers : ");
    for (int i = 0; i < 5; i++) printf("%d ", nums[i]);
    printf("\n");
    char *mots[] = {"delta", "alpha", "charlie", "bravo"};
    qsort(mots, 4, sizeof(char *), cmp_str);
    printf("Mots : ");
    for (int i = 0; i < 4; i++) printf("%s ", mots[i]);
    printf("\n");
    return 0;
}
'''
