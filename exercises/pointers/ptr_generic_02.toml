common_mistake = "Oublier les parenthèses dans le typedef : `int (*OpFunc)(int,int)` vs `int *OpFunc(int,int)`"
description = """
NSY103 — Une dispatch table est un tableau de pointeurs de fonctions indexé par un identifiant. C'est le mécanisme qui sous-tend les vtables en C++ et les syscall tables du noyau Linux.

Implémentez une calculatrice avec une dispatch table de 4 opérations (+, -, *, /) indexées par un enum."""
difficulty = 4
exercise_type = "complete"
hints = [
    "typedef pour simplifier : `typedef int (*OpFunc)(int, int);`",
    "La dispatch table est un tableau : `OpFunc dispatch[OP_COUNT] = {op_add, op_sub, ...};`",
    "Appeler via la table : `dispatch[op](a, b)` — l'index sélectionne la fonction",
]
id = "ptr-generic-02"
kc_ids = ["KC-C01"]
key_concept = "Un tableau de pointeurs de fonctions indexé par enum forme une dispatch table — O(1) lookup"
lang = "c"
prerequisites = ["ptr-generic-01"]
solution_code = '''
#include <stdio.h>

typedef enum { OP_ADD, OP_SUB, OP_MUL, OP_DIV, OP_COUNT } Op;

int op_add(int a, int b) { return a + b; }
int op_sub(int a, int b) { return a - b; }
int op_mul(int a, int b) { return a * b; }
int op_div(int a, int b) { return b != 0 ? a / b : 0; }

typedef int (*OpFunc)(int, int);

OpFunc get_dispatch_table(void) {
    static const OpFunc table[OP_COUNT] = {op_add, op_sub, op_mul, op_div};
    return *table;
}

int main(void) {
    /* Tester chaque op via pointeur de fonction direct */
    printf("%d\n", op_add(10, 3));
    printf("%d\n", op_sub(20, 4));
    printf("%d\n", op_mul(3, 5));
    printf("%d\n", op_div(10, 2));
    printf("%d\n", op_div(7, 0));
    return 0;
}
'''
