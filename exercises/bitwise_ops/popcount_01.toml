common_mistake = "Méthode naïve : boucle sur 32 bits toujours vs Kernighan : O(k) où k = nombre de bits à 1"
description = """
NSY103 — Implémenter popcount (population count) manuellement est un exercice classique de manipulation de bits. Sans utiliser `__builtin_popcount`.

Implémentez `popcount_naive(n)` (boucle avec décalage) et `popcount_kernighan(n)` (astuce n &= n-1)."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Méthode naïve : `while (n) { count += n & 1; n >>= 1; }` — teste le bit de poids faible",
    "Kernighan : `while (n) { count++; n &= n - 1; }` — n & (n-1) efface le bit le plus bas à 1",
    "0xDEADBEEF → 0xDE(6) + 0xAD(5) + 0xBE(6) + 0xEF(7) = 24 bits à 1",
]
id = "popcount-01"
kc_ids = ["KC-C04"]
key_concept = "n & (n-1) efface le bit le plus bas à 1 — chaque itération compte un bit"
lang = "c"
prerequisites = ["bitmask-flags-01"]
solution_code = '''
#include <stdio.h>
int popcount_naive(unsigned int n) {
    int count = 0;
    while (n) { count += n & 1; n >>= 1; }
    return count;
}
int popcount_kernighan(unsigned int n) {
    int count = 0;
    while (n) { count++; n &= n - 1; }
    return count;
}

int main(void) {
    {
        printf("%d\n", (int)(popcount_naive(0)));
        printf("%d\n", (int)(popcount_naive(1)));
        printf("%d\n", (int)(popcount_naive(0xFF)));
        printf("%d\n", (int)(popcount_naive(0xDEADBEEF)));
    }
    {
        printf("%d\n", (int)(popcount_kernighan(0)));
        printf("%d\n", (int)(popcount_kernighan(1)));
        printf("%d\n", (int)(popcount_kernighan(0xFF)));
        printf("%d\n", (int)(popcount_kernighan(0xDEADBEEF)));
    }
    {
        unsigned int test_vals[] = {0, 1, 0xFF, 0xDEADBEEF, 0x12345678, 0xAAAAAAAA};
        for (int i = 0; i < 6; i++) {
        }
    }
    return 0;
}
'''
