common_mistake = "Décaler un signed int à droite → extension de signe (arithmetic shift) au lieu de zero-fill"
description = """
NSY103 — Les décalages bit-à-bit multiplient (<< par 2^n) ou divisent (>> par 2^n). Fondamentaux pour l'optimisation, la manipulation de registres et l'extraction de champs.

Calculez des décalages et vérifiez l'équivalence avec la multiplication/division."""
difficulty = 1
exercise_type = "complete"
hints = [
    "<< décale les bits vers la gauche (multiplie par 2^n)",
    ">> décale les bits vers la droite (divise par 2^n)",
    "1 << n donne 2^n — utile pour créer des masques de bit",
]
id = "bit-shift-01"
kc_ids = ["KC-C04"]
key_concept = "<< multiplie par 2^n, >> divise par 2^n, 1<<n donne 2^n — base du masquage de bits"
lang = "c"
prerequisites = ["bitwise-ops-01"]
solution_code = '''
#include <stdio.h>

unsigned int shift_left(unsigned int val, int n) {
    return val << n;
}

unsigned int shift_right(unsigned int val, int n) {
    return val >> n;
}

unsigned int power_of_two(int n) {
    return 1 << n;
}

int main(void) {
    {
        printf("%d\n", (int)(shift_left(0x15, 1)));
        printf("%d\n", (int)(shift_left(0x15, 4)));
        printf("%d\n", (int)(shift_left(0x50, 1)));
        printf("%d\n", (int)(shift_left(2, 2)));
    }
    {
        printf("%d\n", (int)(shift_right(0x15, 1)));
        printf("%d\n", (int)(shift_right(0x15, 3)));
        printf("%d\n", (int)(shift_right(0xFF, 1)));
        printf("%d\n", (int)(shift_right(0x01, 2)));
    }
    {
        printf("%d\n", (int)(power_of_two(0)));
        printf("%d\n", (int)(power_of_two(3)));
        printf("%d\n", (int)(power_of_two(7)));
        printf("%d\n", (int)(power_of_two(8)));
    }
    return 0;
}
'''
