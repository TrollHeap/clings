#include <stdio.h>

/* == EXEMPLE ================================================
 * Permissions Unix: 9 bits rwx pour user/group/other
 * add = OR, remove = AND ~, umask = AND ~mask
 * =========================================================== */
#define S_IRUSR 0400
#define S_IWUSR 0200
#define S_IXUSR 0100
#define S_IRGRP 0040
#define S_IWGRP 0020
#define S_IXGRP 0010
#define S_IROTH 0004
#define S_IWOTH 0002
#define S_IXOTH 0001

void example_perms(void) {
    unsigned int mode = 0644; /* rw-r--r-- */
    printf("add exec: 0%03o\n", mode | 0111); /* 0755 */
    printf("rm write: 0%03o\n", mode & ~(unsigned int)0222); /* 0444 */
    printf("umask 022 on 0777: 0%03o\n", 0777 & ~022); /* 0755 */
}

/* == VOTRE EXERCICE ========================================= */

void print_perms(unsigned int mode) {
    char buf[10];
    buf[0] = (mode & S_IRUSR) ? 'r' : '-';
    buf[1] = (mode & S_IWUSR) ? 'w' : '-';
    buf[2] = (mode & S_IXUSR) ? 'x' : '-';
