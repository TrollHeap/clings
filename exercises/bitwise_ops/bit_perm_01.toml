common_mistake = "Confondre umask et chmod: umask RETIRE des bits (AND ~mask), chmod SET des bits"
description = """
NSY103 — Les permissions Unix utilisent 9 bits: rwx pour user, group, other. chmod manipule ces bits avec des masques octaux. umask inverse la logique (bits à 1 = permissions retirées). Comprendre ces opérations est essentiel pour la sécurité système.

Implémentez des fonctions pour afficher, ajouter, retirer et appliquer un umask sur des permissions."""
difficulty = 4
exercise_type = "complete"
hints = [
    "Ajouter une permission: OR (|) active les bits sans toucher les autres",
    "Retirer une permission: AND avec NOT (~perm) éteint les bits ciblés",
    "umask fonctionne comme remove_perm: requested & ~mask",
]
id = "bit-perm-01"
kc_ids = ["KC-C04"]
key_concept = "Les permissions Unix sont des masques de 9 bits — add=OR, remove=AND~, umask=AND~ appliqué à la création"
lang = "c"
prerequisites = ["bit-field-01"]
solution_code = '''
#include <stdio.h>

#define S_IRUSR 0400
#define S_IWUSR 0200
#define S_IXUSR 0100
#define S_IRGRP 0040
#define S_IWGRP 0020
#define S_IXGRP 0010
#define S_IROTH 0004
#define S_IWOTH 0002
#define S_IXOTH 0001

unsigned int add_perm(unsigned int mode, unsigned int perm) {
    return mode | perm;
}

unsigned int remove_perm(unsigned int mode, unsigned int perm) {
    return mode & ~perm;
}

unsigned int apply_umask(unsigned int requested, unsigned int mask) {
    return requested & ~mask;
}

int main(void) {
    {
        printf("%d\n", (int)(add_perm(0644, S_IXUSR | S_IXGRP | S_IXOTH)));
        printf("%d\n", (int)(add_perm(0644, 0)));
        printf("%d\n", (int)(add_perm(0755, 0022)));
    }
    {
        printf("%d\n", (int)(remove_perm(0755, S_IWGRP | S_IWOTH)));
        printf("%d\n", (int)(remove_perm(0777, 0022)));
        printf("%d\n", (int)(remove_perm(0755, S_IXUSR | S_IXGRP | S_IXOTH)));
    }
    {
        printf("%d\n", (int)(apply_umask(0777, 0022)));
        printf("%d\n", (int)(apply_umask(0666, 0022)));
        printf("%d\n", (int)(apply_umask(0777, 0000)));
    }
    {
        unsigned int mode = 0755;
        int has_owner_write = (mode & S_IWUSR) ? 1 : 0;
        int has_other_write = (mode & S_IWOTH) ? 1 : 0;
        printf("%d\n", (has_owner_write) ? 1 : 0);
        printf("%d\n", (has_other_write) ? 1 : 0);
    }
    return 0;
}
'''
