common_mistake = "Oublier result <<= 1 avant le OR → tous les bits s'accumulent sur le bit 0"
description = """
NSY103 — Inverser l'ordre des bits d'un octet (MSB↔LSB) est utile pour les protocoles série (LSB-first vs MSB-first). L'algorithme parcourt chaque bit source et le place à la position miroir dans le résultat.

Implémentez reverse_bits pour un octet et un entier 32 bits."""
difficulty = 3
exercise_type = "complete"
hints = [
    "result <<= 1 fait de la place pour le prochain bit",
    "b & 1 extrait le bit de poids faible de la source",
    "result |= (b & 1) ajoute ce bit au résultat",
]
id = "bit-reverse-01"
kc_ids = ["KC-C04"]
key_concept = "Reversal bit par bit: result <<= 1; result |= (val & 1); val >>= 1 — pattern applicable à toute taille"
lang = "c"
prerequisites = ["bit-count-01"]
solution_code = '''
#include <stdio.h>

unsigned char reverse_byte(unsigned char b) {
    unsigned char result = 0;
    for (int i = 0; i < 8; i++) {
        result <<= 1;
        result |= (b & 1);
        b >>= 1;
    }
    return result;
}

unsigned int reverse_32(unsigned int val) {
    unsigned int result = 0;
    for (int i = 0; i < 32; i++) {
        result <<= 1;
        result |= (val & 1);
        val >>= 1;
    }
    return result;
}

int main(void) {
    {
        printf("%d\n", (int)(reverse_byte(0xA5)));
        printf("%d\n", (int)(reverse_byte(0x0F)));
        printf("%d\n", (int)(reverse_byte(0x80)));
        printf("%d\n", (int)(reverse_byte(0x01)));
    }
    {
        printf("%d\n", (int)(reverse_32(0x12345678)));
        printf("%d\n", (int)(reverse_32(0x00000000)));
        printf("%d\n", (int)(reverse_32(0xFFFFFFFF)));
        printf("%d\n", (int)(reverse_32(0x00000001)));
    }
    return 0;
}
'''
