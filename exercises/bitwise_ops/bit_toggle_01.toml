common_mistake = "Oublier le ~ dans CLEAR: val & (1<<N) ne clear pas, ça masque tout sauf ce bit"
description = """
NSY103 — Les trois opérations de base sur un bit individuel: SET (OR avec masque), CLEAR (AND avec NOT masque), TOGGLE (XOR avec masque). Le masque est (1 << position).

Implémentez set_bit, clear_bit et toggle_bit puis montrez leurs effets."""
difficulty = 2
exercise_type = "complete"
hints = [
    "SET bit N: val | (1 << N) — force le bit à 1",
    "CLEAR bit N: val & ~(1 << N) — force le bit à 0",
    "TOGGLE bit N: val ^ (1 << N) — inverse le bit (0↔1)",
]
id = "bit-toggle-01"
kc_ids = ["KC-C04"]
key_concept = "SET=OR, CLEAR=AND+NOT, TOGGLE=XOR — les trois opérations atomiques sur un bit avec masque (1<<N)"
lang = "c"
prerequisites = ["bit-mask-apply-01"]
solution_code = '''
#include <stdio.h>

unsigned char set_bit(unsigned char val, int pos) {
    return val | (1 << pos);
}

unsigned char clear_bit(unsigned char val, int pos) {
    return val & ~(1 << pos);
}

unsigned char toggle_bit(unsigned char val, int pos) {
    return val ^ (1 << pos);
}

int test_bit(unsigned char val, int pos) {
    return (val >> pos) & 1;
}

int main(void) {
    {
        printf("%d\n", (int)(set_bit(0xA5, 3)));
        printf("%d\n", (int)(set_bit(0xA5, 5)));
        printf("%d\n", (int)(set_bit(0xFE, 0)));
        printf("%d\n", (int)(set_bit(0xFF, 7)));
    }
    {
        printf("%d\n", (int)(clear_bit(0xA5, 2)));
        printf("%d\n", (int)(clear_bit(0xA5, 5)));
        printf("%d\n", (int)(clear_bit(0xFE, 7)));
        printf("%d\n", (int)(clear_bit(0xFF, 0)));
    }
    {
        printf("%d\n", (int)(toggle_bit(0xA5, 0)));
        printf("%d\n", (int)(toggle_bit(0xA4, 0)));
        printf("%d\n", (int)(toggle_bit(0xA5, 5)));
        printf("%d\n", (int)(toggle_bit(0xA5, 7)));
    }
    {
        printf("%d\n", (int)(test_bit(0xA5, 0)));
        printf("%d\n", (int)(test_bit(0xA5, 1)));
        printf("%d\n", (int)(test_bit(0xA5, 5)));
        printf("%d\n", (int)(test_bit(0xA5, 7)));
    }
    return 0;
}
'''
