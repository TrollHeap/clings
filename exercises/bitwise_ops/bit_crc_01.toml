common_mistake = "Tester le mauvais bit: CRC-8 teste le MSB (0x80), pas le LSB (0x01)"
description = """
NSY103 — Le CRC (Cyclic Redundancy Check) détecte les erreurs de transmission en divisant les données par un polynôme via XOR. Le CRC-8 utilise un polynôme de 8 bits (ex: 0x07 pour CRC-8/CCITT). Pour chaque bit à 1 du MSB, on XOR avec le polynôme.

Implémentez un calcul CRC-8 bit par bit et avec table pré-calculée."""
difficulty = 4
exercise_type = "complete"
hints = [
    "0x80 teste le bit de poids fort (MSB) — c'est le bit qui décide si on XOR avec le polynôme",
    "Le polynôme CRC-8/CCITT est 0x07 (x^8 + x^2 + x + 1)",
    "La version table: l'index est crc ^ data[i], le lookup remplace la boucle de 8 bits",
]
id = "bit-crc-01"
kc_ids = ["KC-C04"]
key_concept = "CRC = division polynomiale par XOR — si MSB=1: shift+XOR poly, sinon shift. La table précalcule pour O(n) au lieu de O(8n)"
lang = "c"
prerequisites = ["bit-perm-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

unsigned char crc8_bitwise(const unsigned char *data, int len, unsigned char poly) {
    unsigned char crc = 0x00;
    for (int i = 0; i < len; i++) {
        crc ^= data[i];
        for (int bit = 0; bit < 8; bit++) {
            if (crc & 0x80) {
                crc = (crc << 1) ^ poly;
            } else {
                crc <<= 1;
            }
        }
    }
    return crc;
}

void build_crc8_table(unsigned char table[256], unsigned char poly) {
    for (int i = 0; i < 256; i++) {
        unsigned char crc = (unsigned char)i;
        for (int bit = 0; bit < 8; bit++) {
            if (crc & 0x80) {
                crc = (crc << 1) ^ poly;
            } else {
                crc <<= 1;
            }
        }
        table[i] = crc;
    }
}

unsigned char crc8_table(const unsigned char *data, int len, const unsigned char table[256]) {
    unsigned char crc = 0x00;
    for (int i = 0; i < len; i++) {
        crc = table[crc ^ data[i]];
    }
    return crc;
}

int main(void) {
    unsigned char poly = 0x07;
    unsigned char msg1[] = {0x00};
    unsigned char msg2[] = {0x01, 0x02, 0x03};
    const char *msg3 = "Hello";
    unsigned char msg4[] = {0xFF, 0xFF, 0xFF, 0xFF};
    printf("CRC8 bitwise:\n");
    printf("  [00]          = 0x%02X\n", crc8_bitwise(msg1, 1, poly));
    printf("  [01 02 03]    = 0x%02X\n", crc8_bitwise(msg2, 3, poly));
    printf("  \"Hello\"       = 0x%02X\n", crc8_bitwise((const unsigned char *)msg3, 5, poly));
    printf("  [FF FF FF FF] = 0x%02X\n", crc8_bitwise(msg4, 4, poly));
    unsigned char table[256];
    build_crc8_table(table, poly);
    printf("CRC8 table:\n");
    printf("  [00]          = 0x%02X\n", crc8_table(msg1, 1, table));
    printf("  [01 02 03]    = 0x%02X\n", crc8_table(msg2, 3, table));
    printf("  \"Hello\"       = 0x%02X\n", crc8_table((const unsigned char *)msg3, 5, table));
    printf("  [FF FF FF FF] = 0x%02X\n", crc8_table(msg4, 4, table));
    return 0;
}
'''
