common_mistake = "Rotation: oublier n &= 7 → undefined behavior si n >= 8 (shift >= width of type)"
description = """
NSY103 — Le chiffrement XOR est le plus simple des ciphers symétriques: chaque octet du message est XORé avec un octet de la clé (cyclique). Propriété fondamentale: A ^ K ^ K = A (encrypt = decrypt). Combiné avec rotation de bits et substitution, on obtient un mini-cipher plus résistant.

Implémentez un XOR cipher, une rotation de bits, et combinez-les en un mini-cipher multi-passes."""
difficulty = 5
exercise_type = "complete"
hints = [
    "XOR cipher: buf[i] ^= key[i % klen] — l'opérateur est ^=",
    "Rotation gauche N bits: (val << N) | (val >> (8-N)) — les bits qui sortent à gauche rentrent à droite",
    "mini_decrypt est l'inverse de mini_encrypt: même XOR mais rotate_right au lieu de rotate_left",
]
id = "bit-crypto-01"
kc_ids = ["KC-C04"]
key_concept = "XOR cipher exploite A^K^K=A pour encrypt=decrypt. La rotation de bits ajoute de la diffusion. Combiner les deux = mini-cipher à passes multiples."
lang = "c"
prerequisites = ["bit-crc-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

void xor_cipher(unsigned char *buf, int len, const unsigned char *key, int klen) {
    for (int i = 0; i < len; i++) {
        buf[i] ^= key[i % klen];
    }
}

unsigned char rotate_left(unsigned char val, int n) {
    n &= 7;
    return (val << n) | (val >> (8 - n));
}

unsigned char rotate_right(unsigned char val, int n) {
    n &= 7;
    return (val >> n) | (val << (8 - n));
}

void mini_encrypt(unsigned char *buf, int len, const unsigned char *key, int klen) {
    xor_cipher(buf, len, key, klen);
    for (int i = 0; i < len; i++)
        buf[i] = rotate_left(buf[i], 3);
    xor_cipher(buf, len, key, klen);
}

void mini_decrypt(unsigned char *buf, int len, const unsigned char *key, int klen) {
    xor_cipher(buf, len, key, klen);
    for (int i = 0; i < len; i++)
        buf[i] = rotate_right(buf[i], 3);
    xor_cipher(buf, len, key, klen);
}

int main(void) {
    unsigned char msg1[] = "Hello";
    int len1 = 5;
    unsigned char key1[] = {0xAA};
    printf("original : ");
    for (int i = 0; i < len1; i++) printf("%02X ", msg1[i]);
    printf("\n");
    xor_cipher(msg1, len1, key1, 1);
    printf("encrypted: ");
    for (int i = 0; i < len1; i++) printf("%02X ", msg1[i]);
    printf("\n");
    xor_cipher(msg1, len1, key1, 1);
    printf("decrypted: ");
    for (int i = 0; i < len1; i++) printf("%02X ", msg1[i]);
    printf("\n");
    printf("rotl(0xA5,3) = 0x%02X\n", rotate_left(0xA5, 3));
    printf("rotr(0x2D,3) = 0x%02X\n", rotate_right(0x2D, 3));
    printf("rotl(rotr(0xA5,3),3) = 0x%02X\n", rotate_left(rotate_right(0xA5, 3), 3));
    unsigned char msg2[] = "ABCDE";
    int len2 = 5;
    unsigned char key2[] = {0x13, 0x37};
    printf("mini original : ");
    for (int i = 0; i < len2; i++) printf("%02X ", msg2[i]);
    printf("\n");
    mini_encrypt(msg2, len2, key2, 2);
    printf("mini encrypted: ");
    for (int i = 0; i < len2; i++) printf("%02X ", msg2[i]);
    printf("\n");
    mini_decrypt(msg2, len2, key2, 2);
    printf("mini decrypted: ");
    for (int i = 0; i < len2; i++) printf("%02X ", msg2[i]);
    printf("\n");
    return 0;
}
'''
