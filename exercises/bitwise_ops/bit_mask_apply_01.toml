common_mistake = "Oublier le masque après le décalage → bits parasites des octets supérieurs"
description = """
NSY103 — Un masque bitwise isole des bits spécifiques. AND avec le masque extrait les bits, OR les active, XOR les inverse. Extraire les octets d'un entier 32-bit est une opération fondamentale.

Extrayez les 4 octets d'un entier 32 bits en utilisant des masques et des décalages."""
difficulty = 1
exercise_type = "complete"
hints = [
    "0xFF masque les 8 bits de poids faible (un octet)",
    "Décaler puis masquer: (val >> N) & 0xFF extrait l'octet à la position N",
    "0x0F masque les 4 bits de poids faible (un nibble)",
]
id = "bit-mask-apply-01"
kc_ids = ["KC-C04"]
key_concept = "(val >> N) & mask extrait un champ de bits — pattern fondamental pour parser des protocoles et registres"
lang = "c"
prerequisites = ["bit-shift-01"]
solution_code = '''
#include <stdio.h>

unsigned int get_byte(unsigned int val, int n) {
    return (val >> (n * 8)) & 0xFF;
}

unsigned int get_nibble_lo(unsigned int val) {
    return val & 0x0F;
}

unsigned int get_nibble_hi(unsigned int val) {
    return (val >> 4) & 0x0F;
}

int main(void) {
    {
        printf("%d\n", (int)(get_byte(0xDEADBEEF, 0)));
        printf("%d\n", (int)(get_byte(0xDEADBEEF, 1)));
        printf("%d\n", (int)(get_byte(0xDEADBEEF, 2)));
        printf("%d\n", (int)(get_byte(0xDEADBEEF, 3)));
    }
    {
        printf("%d\n", (int)(get_nibble_lo(0xDEADBEEF)));
        printf("%d\n", (int)(get_nibble_lo(0x12345670)));
        printf("%d\n", (int)(get_nibble_lo(0xFFFFFFAB)));
        printf("%d\n", (int)(get_nibble_lo(0x00000000)));
    }
    {
        printf("%d\n", (int)(get_nibble_hi(0xDEADBEEF)));
        printf("%d\n", (int)(get_nibble_hi(0x12345670)));
        printf("%d\n", (int)(get_nibble_hi(0xFFFFFFAB)));
        printf("%d\n", (int)(get_nibble_hi(0x00000000)));
    }
    return 0;
}
'''
