common_mistake = "Écrire n &= n + 1 au lieu de n &= n - 1 → boucle infinie"
description = """
NSY103 — Le popcount (population count) compte le nombre de bits à 1 dans un entier. L'algorithme naïf parcourt chaque bit. L'astuce de Brian Kernighan (n &= n-1) éteint le bit le plus bas en une itération — O(nombre de bits à 1) au lieu de O(32).

Implémentez popcount naïf et optimisé, puis comparez."""
difficulty = 2
exercise_type = "complete"
hints = [
    "Naïf: n & 1 teste le bit de poids faible, n >>= 1 décale au suivant",
    "Kernighan: n & (n-1) efface le bit le plus bas à 1",
    "0xA5 = 10100101b → 4 bits à 1",
]
id = "bit-count-01"
kc_ids = ["KC-C04"]
key_concept = "n & (n-1) éteint le bit le plus bas à 1 — trick de Kernighan pour un popcount en O(k) au lieu de O(N)"
lang = "c"
prerequisites = ["bit-toggle-01"]
solution_code = '''
#include <stdio.h>

int popcount_naive(unsigned int n) {
    int count = 0;
    while (n) {
        count += n & 1;
        n >>= 1;
    }
    return count;
}

int popcount_kernighan(unsigned int n) {
    int count = 0;
    while (n) {
        n &= n - 1;
        count++;
    }
    return count;
}

int main(void) {
    unsigned int vals[] = {0x00, 0xFF, 0xA5, 0xDEADBEEF, 0x80000000};
    int nvals = 5;
    for (int i = 0; i < nvals; i++) {
        int naive = popcount_naive(vals[i]);
        int kern = popcount_kernighan(vals[i]);
        printf("0x%08X: naive=%d kern=%d\n", vals[i], naive, kern);
    }
    return 0;
}
'''
