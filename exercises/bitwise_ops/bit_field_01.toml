common_mistake = "Supposer l'ordre des bits dans la struct — il dépend de l'endianness et du compilateur"
description = """
NSY103 — Les champs de bits (bit fields) permettent de définir des membres de struct sur un nombre précis de bits. Utilisés pour mapper des registres hardware ou des formats de protocoles compacts. Le compilateur gère l'emballage automatiquement.

Définissez une struct avec des bit fields et manipulez ses champs."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Un champ de N bits peut stocker les valeurs 0 à 2^N-1",
    "7+5+5+5+10 = 32 bits → tient dans un seul unsigned int (4 bytes)",
    "Si on assigne 0xFF (8 bits) dans un champ de 7 bits → troncature à 0x7F",
]
id = "bit-field-01"
kc_ids = ["KC-C04"]
key_concept = "Les bit fields emballent plusieurs valeurs dans un mot machine — économie mémoire pour registres et protocoles"
lang = "c"
prerequisites = ["bit-reverse-01"]
solution_code = '''
#include <stdio.h>

typedef struct {
    unsigned int opcode  : 7;
    unsigned int rd      : 5;
    unsigned int rs1     : 5;
    unsigned int rs2     : 5;
    unsigned int funct   : 10;
} Instruction;

void init_instruction(Instruction *inst, unsigned int opcode, unsigned int rd, unsigned int rs1, unsigned int rs2, unsigned int funct) {
    inst->opcode = opcode;
    inst->rd = rd;
    inst->rs1 = rs1;
    inst->rs2 = rs2;
    inst->funct = funct;
}

int get_opcode(Instruction *inst) {
    return inst->opcode;
}

int get_rd(Instruction *inst) {
    return inst->rd;
}

int get_instruction_size(void) {
    return sizeof(Instruction);
}

int main(void) {
    Instruction inst;
    inst.opcode = 0x1F; inst.rd = 10; inst.rs1 = 5; inst.rs2 = 3; inst.funct = 0x2A;
    printf("opcode = 0x%02X\n", inst.opcode);
    printf("rd     = %u\n", inst.rd);
    printf("rs1    = %u\n", inst.rs1);
    printf("rs2    = %u\n", inst.rs2);
    printf("funct  = 0x%03X\n", inst.funct);
    printf("sizeof = %zu bytes\n", sizeof(Instruction));
    inst.opcode = 0xFF;
    printf("opcode overflow = 0x%02X\n", inst.opcode);
    return 0;
}
'''
