common_mistake = "Oublier munmap — contrairement à malloc/free, la mémoire mmap n'est pas sur le tas"
description = """
NSY103 — mmap avec MAP_ANONYMOUS alloue de la mémoire sans fichier backing. C'est ce que malloc utilise pour les grandes allocations (>128KB typiquement). La mémoire est initialisée à zéro par le noyau.

Allouez de la mémoire via mmap anonyme et vérifiez l'initialisation à zéro."""
difficulty = 3
exercise_type = "complete"
hints = [
    "mmap avec MAP_ANONYMOUS n'a pas besoin de fichier (-1 pour fd, 0 pour offset)",
    "MAP_PRIVATE | MAP_ANONYMOUS = allocation privée sans fichier",
    "munmap(ptr, size) libère la mémoire — équivalent de free pour mmap",
]
id = "pmem-mmap-anon-01"
kc_ids = ["KC-C17"]
key_concept = "mmap MAP_ANONYMOUS: allocation hors tas, zéro-initialisée, libérée par munmap"
lang = "c"
prerequisites = ["pmem-brk-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <string.h>
int main(void) {
    size_t size = 4096;
    void *ptr = mmap(
        NULL, size,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS,
        -1, 0);
    if (ptr == MAP_FAILED) {
        perror("mmap");
        return 1;
    }
    int *arr = (int *)ptr;
    int all_zero = 1;
    for (int i = 0; i < 10; i++) {
        if (arr[i] != 0) all_zero = 0;
    }
    printf("Zero-initialized: %s\n", all_zero ? "yes" : "no");
    arr[0] = 42; arr[1] = 99;
    printf("arr[0]=%d arr[1]=%d\n", arr[0], arr[1]);
    printf("size: %zu\n", size);
    munmap(ptr, size);
    printf("Unmapped OK\n");
    return 0;
}'''
