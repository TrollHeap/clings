common_mistake = "Passer une adresse non alignée sur page à mprotect — retourne EINVAL"
description = """
NSY103 — mprotect() modifie les permissions (lecture/écriture/exécution) d'une zone mémoire alignée sur les pages. On peut rendre une zone en lecture seule après écriture, ou la protéger complètement.

Allouez une page via mmap, écrivez dedans, puis passez en lecture seule et vérifiez les permissions."""
difficulty = 3
exercise_type = "complete"
hints = [
    "mprotect(ptr, len, prot) change les permissions — ptr doit être aligné sur page",
    "PROT_READ seul permet la lecture mais interdit l'écriture → SIGSEGV",
    "setjmp/longjmp permet de capturer le SIGSEGV sans terminer le programme",
]
id = "pmem-mprotect-01"
kc_ids = ["KC-C17"]
key_concept = "mprotect change les permissions RWX d'une page — violation → SIGSEGV"
lang = "c"
prerequisites = ["pmem-mmap-anon-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>
#include <signal.h>
#include <setjmp.h>
static jmp_buf jump_buf;
static void handler(int sig) {
    (void)sig;
    longjmp(jump_buf, 1);
}
int main(void) {
    long page = sysconf(_SC_PAGESIZE);
    printf("Page size: %ld\n", page);
    void *ptr = mmap(NULL, (size_t)page,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    if (ptr == MAP_FAILED) { perror("mmap"); return 1; }
    strcpy((char *)ptr, "protected data");
    printf("Before protect: %s\n", (char *)ptr);
    int rc = mprotect(ptr, (size_t)page, PROT_READ);
    printf("mprotect result: %d\n", rc);
    signal(SIGSEGV, handler);
    if (setjmp(jump_buf) == 0) {
        ((char *)ptr)[0] = 'X';
        printf("Write succeeded (unexpected)\n");
    } else {
        printf("SIGSEGV caught: write blocked\n");
    }
    printf("Read after protect: %s\n", (char *)ptr);
    munmap(ptr, (size_t)page);
    return 0;
}'''
