    int local1 = 1;
    printf("level1: %p\n", (void *)&local1);
    printf("Stack grows down: %s\n", (char *)&local1 < (char *)prev ? "yes" : "no");
    level2((char *)&____);
}

int main(void) {
    int local0 = 0;
    printf("main:   %p\n", (void *)&local0);
    level1((char *)&____);
    return 0;
}'''
