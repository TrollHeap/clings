common_mistake = "Confondre data (initialisé) et bss (non-initialisé) — les deux sont globaux"
description = """
NSY103 — Un processus C a 5 segments : text (code), data (globals init), bss (globals non-init), heap (malloc), stack (variables locales). Leur ordre en mémoire est déterministe.

Affichez les adresses relatives de chaque segment pour vérifier l'ordre text < data < bss < heap < stack."""
difficulty = 1
exercise_type = "complete"
hints = [
    "malloc() alloue sur le heap",
    "g_init est dans le segment data (initialisé), g_bss dans bss (non-initialisé)",
    "L'ordre classique est: text < data < bss < heap ... stack",
]
id = "pmem-layout-01"
kc_ids = ["KC-C17"]
key_concept = "Les 5 segments mémoire d'un processus C: text, data, bss, heap, stack"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
int g_init = 42;
int g_bss;
void show_text(void) {
    printf("text:  %p\n", (void *)show_text);
}
int main(void) {
    int local = 1;
    int *heap = malloc(sizeof(int));
    show_text();
    printf("data:  %p\n", (void *)&g_init);
    printf("bss:   %p\n", (void *)&g_bss);
    printf("heap:  %p\n", (void *)heap);
    printf("stack: %p\n", (void *)&local);
    int order_ok = ((char *)show_text < (char *)&g_init)
                && ((char *)&g_init < (char *)&g_bss)
                && ((char *)&g_bss  < (char *)heap);
    printf("Order text<data<bss<heap: %s\n", order_ok ? "yes" : "no");
    free(heap);
    return 0;
}'''
