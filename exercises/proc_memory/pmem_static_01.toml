common_mistake = "Confondre static local (persistance) et static global (visibilité)"
description = """
NSY103 — Le mot-clé static a deux usages: (1) dans une fonction, la variable persiste entre appels; (2) au niveau fichier, la variable est invisible depuis les autres unités de compilation. sizeof permet de vérifier les tailles.

Démontrez la persistance des variables statiques et les différences de stockage."""
difficulty = 2
exercise_type = "complete"
hints = [
    "static dans une fonction: la variable garde sa valeur entre les appels",
    "sizeof retourne la taille en octets d'un type ou d'une variable",
    "static au niveau fichier: visible uniquement dans cette unité de compilation",
]
id = "pmem-static-01"
kc_ids = ["KC-C17"]
key_concept = "static = persistance locale + portée fichier, stocké dans data/bss"
lang = "c"
prerequisites = ["pmem-bss-01"]
solution_code = '''
#include <stdio.h>
static int file_scope = 100;
int accumulate(int val) {
    static int total = 0;
    total += val;
    return total;
}
int main(void) {
    printf("file_scope: %d\n", file_scope);
    printf("sizeof(file_scope): %zu\n", sizeof(file_scope));
    printf("acc(10): %d\n", accumulate(10));
    printf("acc(20): %d\n", accumulate(20));
    printf("acc(30): %d\n", accumulate(30));
    printf("Total: 60\n");
    return 0;
}'''
starter_code = '''
#include <stdio.h>

static int file_scope = 100;

int accumulate(int val) {
    ____ int total = 0;
    total += val;
    return total;
}

int main(void) {
    printf("file_scope: %d\n", file_scope);
    printf("sizeof(file_scope): %zu\n", ____(file_scope));
    printf("acc(10): %d\n", accumulate(10));
    printf("acc(20): %d\n", accumulate(20));
    printf("acc(30): %d\n", accumulate(30));
    printf("Total: 60\n");
    return 0;
}'''
