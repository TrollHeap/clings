common_mistake = "Oublier de mettre le pointeur à NULL après free — risque de use-after-free"
description = """
NSY103 — Le tas est la zone mémoire gérée par malloc/calloc/realloc/free. calloc initialise à zéro, malloc ne garantit rien. free() libère la mémoire mais ne remet pas le pointeur à NULL.

Démontrez les différences entre malloc et calloc, et la bonne pratique de mise à NULL après free."""
difficulty = 1
exercise_type = "complete"
hints = [
    "malloc(size) alloue sans initialiser, calloc(n, size) initialise à zéro",
    "Après free(), mettre le pointeur à NULL empêche les use-after-free",
    "calloc prend deux arguments: nombre d'éléments et taille de chaque élément",
]
id = "pmem-heap-01"
kc_ids = ["KC-C17"]
key_concept = "malloc vs calloc: initialisation à zéro, et toujours NULL après free"
lang = "c"
prerequisites = ["pmem-layout-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
int main(void) {
    int *a = malloc(5 * sizeof(int));
    int *b = calloc(5, sizeof(int));
    memset(a, 0, 5 * sizeof(int));
    int all_zero_a = 1, all_zero_b = 1;
    for (int i = 0; i < 5; i++) {
        if (a[i] != 0) all_zero_a = 0;
        if (b[i] != 0) all_zero_b = 0;
    }
    printf("malloc+memset zeros: %s\n", all_zero_a ? "yes" : "no");
    printf("calloc zeros: %s\n", all_zero_b ? "yes" : "no");
    free(a); a = NULL;
    free(b); b = NULL;
    printf("a after free: %s\n", a == NULL ? "NULL" : "dangling");
    printf("b after free: %s\n", b == NULL ? "NULL" : "dangling");
    return 0;
}'''
