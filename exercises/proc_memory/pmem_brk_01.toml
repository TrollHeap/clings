common_mistake = "Ne pas vérifier le retour de sbrk (-1 indique échec)"
description = """
NSY103 — sbrk() déplace le program break (limite haute du tas). sbrk(0) retourne la position actuelle. sbrk(n) étend le tas de n octets et retourne l'ancienne position. C'est le mécanisme bas-niveau que malloc utilise en interne.

Utilisez sbrk pour allouer manuellement de la mémoire et vérifiez que le program break avance."""
difficulty = 3
exercise_type = "complete"
hints = [
    "sbrk(0) retourne le program break actuel sans le modifier",
    "sbrk(128) étend le tas de 128 octets, retourne l'ancien break",
    "sbrk retourne (void *)-1 en cas d'échec",
]
id = "pmem-brk-01"
kc_ids = ["KC-C17"]
key_concept = "sbrk déplace le program break — malloc l'utilise en interne pour le tas"
lang = "c"
prerequisites = ["pmem-heap-01"]
solution_code = '''
#include <stdio.h>
#include <unistd.h>
#include <string.h>
int main(void) {
    void *initial = sbrk(0);
    printf("initial break: %p\n", initial);
    char *block = (char *)sbrk(128);
    if (block == (void *)-1) {
        perror("sbrk");
        return 1;
    }
    strcpy(block, "hello sbrk");
    void *after = sbrk(0);
    printf("after break: %p\n", after);
    printf("data: %s\n", block);
    printf("grew: %s\n", (char *)after > (char *)initial ? "yes" : "no");
    long diff = (char *)after - (char *)initial;
    printf("diff >= 128: %s\n", diff >= 128 ? "yes" : "no");
    return 0;
}'''
