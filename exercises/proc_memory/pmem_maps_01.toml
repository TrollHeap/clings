common_mistake = "Supposer que sizeof(struct) == somme des sizeof(champs) — le padding ajoute des octets"
description = """
NSY103 — Les types C ont des tailles et des alignements spécifiques. sizeof donne la taille, offsetof donne le décalage d'un champ dans une structure. Le padding assure l'alignement naturel.

Explorez les tailles des types fondamentaux et le padding dans les structures."""
difficulty = 2
exercise_type = "complete"
hints = [
    "sizeof(type) retourne la taille en octets, y compris le padding",
    "offsetof(struct, field) retourne le décalage en octets depuis le début",
    "Le compilateur ajoute du padding pour respecter l'alignement naturel de chaque type",
]
id = "pmem-maps-01"
kc_ids = ["KC-C17"]
key_concept = "sizeof/offsetof révèlent le padding d'alignement dans les structures"
lang = "c"
prerequisites = ["pmem-layout-01"]
solution_code = '''
#include <stdio.h>
#include <stddef.h>
struct Padded {
    char a;
    int b;
    char c;
};
struct Packed {
    int x;
    int y;
};
int main(void) {
    printf("char: %zu\n", sizeof(char));
    printf("int: %zu\n", sizeof(int));
    printf("long: %zu\n", sizeof(long));
    printf("ptr: %zu\n", sizeof(void *));
    printf("Padded size: %zu\n", sizeof(struct Padded));
    printf("Packed size: %zu\n", sizeof(struct Packed));
    printf("offsetof(Padded, b): %zu\n", offsetof(struct Padded, b));
    printf("offsetof(Padded, c): %zu\n", offsetof(struct Padded, c));
    printf("Padding exists: %s\n",
        sizeof(struct Padded) > sizeof(char) + sizeof(int) + sizeof(char) ? "yes" : "no");
    return 0;
}'''
