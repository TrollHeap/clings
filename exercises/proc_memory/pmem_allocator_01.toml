common_mistake = "Ne pas soustraire sizeof(header) pour retrouver le header depuis le pointeur data"
description = """
NSY103 — Un allocateur mémoire basique utilise mmap pour obtenir des pages du noyau, puis découpe ces pages en blocs avec des headers contenant la taille et le statut (libre/occupé). C'est le principe de malloc simplifié.

Implémentez un mini-allocateur qui gère un pool mmap avec allocation et libération."""
difficulty = 5
exercise_type = "complete"
hints = [
    "mmap fournit le pool de mémoire brute — un seul appel pour POOL_SIZE octets",
    "curr->free vérifie si le bloc est disponible pour allocation",
    "sizeof(block_header_t) est le décalage entre le header et les données utiles",
]
id = "pmem-allocator-01"
kc_ids = ["KC-C17"]
key_concept = "Allocateur mémoire: mmap + liste chaînée de blocs (header + data) avec splitting"
lang = "c"
prerequisites = ["pmem-guard-01"]
solution_code = '''
#include <stdio.h>
#include <sys/mman.h>
#include <unistd.h>
#include <string.h>
#define POOL_SIZE 4096
typedef struct block_header {
    size_t size;
    int free;
    struct block_header *next;
} block_header_t;
static char *pool = NULL;
static block_header_t *free_list = NULL;
void pool_init(void) {
    pool = (char *)mmap(NULL, POOL_SIZE,
        PROT_READ | PROT_WRITE,
        MAP_PRIVATE | MAP_ANONYMOUS, -1, 0);
    free_list = (block_header_t *)pool;
    free_list->size = POOL_SIZE - sizeof(block_header_t);
    free_list->free = 1;
    free_list->next = NULL;
}
void *pool_alloc(size_t size) {
    block_header_t *curr = free_list;
    while (curr) {
        if (curr->free && curr->size >= size) {
            if (curr->size > size + sizeof(block_header_t) + 8) {
                block_header_t *new_block = (block_header_t *)((char *)curr + sizeof(block_header_t) + size);
                new_block->size = curr->size - size - sizeof(block_header_t);
                new_block->free = 1;
                new_block->next = curr->next;
                curr->next = new_block;
                curr->size = size;
            }
            curr->free = 0;
            return (char *)curr + sizeof(block_header_t);
        }
        curr = curr->next;
    }
    return NULL;
}
void pool_free(void *ptr) {
    if (!ptr) return;
    block_header_t *header = (block_header_t *)((char *)ptr - sizeof(block_header_t));
    header->free = 1;
}
void pool_destroy(void) {
    munmap(pool, POOL_SIZE);
}
int main(void) {
    pool_init();
    printf("Pool initialized\n");
    int *a = (int *)pool_alloc(sizeof(int));
    int *b = (int *)pool_alloc(sizeof(int));
    char *s = (char *)pool_alloc(32);
    if (!a || !b || !s) { printf("Alloc failed\n"); return 1; }
    *a = 42; *b = 99;
    strcpy(s, "mini-alloc");
    printf("a=%d b=%d s=%s\n", *a, *b, s);
    pool_free(a);
    printf("Freed a\n");
    int *c = (int *)pool_alloc(sizeof(int));
    *c = 77;
    printf("c=%d (reused: %s)\n", *c, (char *)c == (char *)a ? "yes" : "maybe");
    pool_free(b);
    pool_free(s);
    pool_free(c);
    pool_destroy();
    printf("Pool destroyed\n");
    return 0;
}'''
