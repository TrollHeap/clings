common_mistake = "Lancer tous les threads puis join → ordre non déterministe des printf"
description = """
NSY103 — Un pool de threads pré-crée N workers qui traitent des tâches depuis une file. Cela évite le coût de création/destruction répétée de threads.

Implémentez un pool de 3 workers qui traitent chacun une tâche numérotée."""
difficulty = 3
exercise_type = "complete"
hints = [
    "Chaque worker reçoit un pointeur vers sa Task — cast en (Task *)",
    "pthread_join après chaque create garantit l'ordre séquentiel",
    "task_id * task_id donne 1, 4, 9 pour les tâches 1, 2, 3",
]
id = "pthread-pool-01"
kc_ids = ["KC-C09"]
key_concept = "Un pool de threads distribue des tâches — chaque worker reçoit une struct avec les données de sa tâche"
lang = "c"
prerequisites = ["pthread-cond-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

typedef struct {
    int task_id;
    int result;
} Task;

void *worker(void *arg) {
    Task *t = (Task *)arg;
    t->result = t->task_id * t->task_id;
    printf("Worker task %d: result = %d\n", t->task_id, t->result);
    return NULL;
}

int main(void) {
    pthread_t threads[3];
    Task tasks[3];
    for (int i = 0; i < 3; i++) {
        tasks[i].task_id = i + 1;
        tasks[i].result = 0;
        pthread_create(&threads[i], NULL, worker, &tasks[i]);
        pthread_join(threads[i], NULL);
    }
    printf("All tasks done.\n");
    return 0;
}'''
