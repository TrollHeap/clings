common_mistake = "Utiliser if au lieu de while pour tester la condition → bug sur spurious wakeup"
description = """
NSY103 — Les variables de condition permettent à un thread d'attendre qu'une condition soit remplie. pthread_cond_wait libère le mutex et bloque; pthread_cond_signal réveille un thread en attente.

Implémentez un producteur qui signale un consommateur quand une donnée est prête."""
difficulty = 2
exercise_type = "complete"
hints = [
    "pthread_cond_wait(&cond, &mtx) libère le mutex atomiquement et attend le signal",
    "pthread_cond_signal(&cond) réveille un thread en attente sur la condition",
    "Toujours utiliser while(!ready) et non if(!ready) — réveils spurieux possibles",
]
id = "pthread-cond-01"
kc_ids = ["KC-C09"]
key_concept = "cond_wait libère le mutex et bloque; cond_signal réveille — toujours tester la condition dans un while"
lang = "c"
prerequisites = ["pthread-mutex-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

pthread_mutex_t mtx = PTHREAD_MUTEX_INITIALIZER;
pthread_cond_t cond = PTHREAD_COND_INITIALIZER;
int ready = 0;
int data = 0;

void *producer(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mtx);
    data = 42;
    ready = 1;
    printf("Producer: data = %d\n", data);
    pthread_cond_signal(&cond);
    pthread_mutex_unlock(&mtx);
    return NULL;
}

void *consumer(void *arg) {
    (void)arg;
    pthread_mutex_lock(&mtx);
    while (!ready)
        pthread_cond_wait(&cond, &mtx);
    printf("Consumer: got %d\n", data);
    pthread_mutex_unlock(&mtx);
    return NULL;
}

int main(void) {
    pthread_t tp, tc;
    pthread_create(&tc, NULL, consumer, NULL);
    pthread_create(&tp, NULL, producer, NULL);
    pthread_join(tp, NULL);
    pthread_join(tc, NULL);
    printf("Done.\n");
    return 0;
}'''
