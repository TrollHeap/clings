common_mistake = "Oublier pthread_join → le main peut se terminer avant le thread"
description = """
NSY103 — pthread_create() lance un thread d'exécution. pthread_join() attend sa terminaison et récupère sa valeur de retour. Le thread exécute une fonction de signature void *(*)(void *).

Créez un thread qui affiche un message, puis attendez-le dans le main."""
difficulty = 1
exercise_type = "complete"
hints = [
    "pthread_create prend 4 arguments : &tid, attributs (NULL), fonction, argument (NULL)",
    "La fonction thread doit avoir la signature void *(*)(void *)",
    "pthread_join(tid, NULL) bloque jusqu'à la fin du thread",
]
id = "pthread-create-01"
kc_ids = ["KC-C09"]
key_concept = "pthread_create lance un thread, pthread_join attend sa fin — le join garantit l'ordre d'exécution"
lang = "c"
prerequisites = ["pthread-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

void *thread_func(void *arg) {
    (void)arg;
    return NULL;
}

int main(void) {
    {
        void *result = thread_func(NULL);
        printf("%d\n", (result) == NULL ? 1 : 0);
    }
    {
        pthread_t tid;
        int rc = pthread_create(&tid, NULL, thread_func, NULL);
        printf("%d\n", (int)(rc));
        int join_rc = pthread_join(tid, NULL);
        printf("%d\n", (int)(join_rc));
    }
    {
        pthread_t tid;
        if (pthread_create(&tid, NULL, thread_func, NULL) == 0) {
        int result = pthread_join(tid, NULL);
        printf("%d\n", (int)(result));
        }
    }
    return 0;
}
'''
