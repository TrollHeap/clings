common_mistake = "Utiliser rdlock dans le writer → pas d'exclusion, data race"
description = """
NSY103 — Un rwlock permet plusieurs lecteurs simultanés OU un seul écrivain. pthread_rwlock_rdlock pour la lecture, pthread_rwlock_wrlock pour l'écriture.

Utilisez un rwlock pour protéger l'accès à une valeur partagée avec 2 lecteurs et 1 écrivain."""
difficulty = 3
exercise_type = "complete"
hints = [
    "pthread_rwlock_rdlock pour le lecteur — plusieurs lecteurs peuvent lire en parallèle",
    "pthread_rwlock_wrlock pour l'écrivain — accès exclusif",
    "Toujours appeler pthread_rwlock_unlock après la section critique",
]
id = "pthread-rwlock-01"
kc_ids = ["KC-C09"]
key_concept = "rwlock permet N lecteurs simultanés OU 1 écrivain exclusif — meilleure concurrence que mutex pour lectures fréquentes"
lang = "c"
prerequisites = ["pthread-pool-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

int shared_val = 10;
pthread_rwlock_t rwlock = PTHREAD_RWLOCK_INITIALIZER;

void *reader(void *arg) {
    int id = *(int *)arg;
    pthread_rwlock_rdlock(&rwlock);
    printf("Reader %d: value = %d\n", id, shared_val);
    pthread_rwlock_unlock(&rwlock);
    return NULL;
}

void *writer(void *arg) {
    (void)arg;
    pthread_rwlock_wrlock(&rwlock);
    shared_val = 99;
    printf("Writer: set value = %d\n", shared_val);
    pthread_rwlock_unlock(&rwlock);
    return NULL;
}

int main(void) {
    pthread_t r1, r2, w;
    int id1 = 1, id2 = 2;
    pthread_create(&r1, NULL, reader, &id1);
    pthread_join(r1, NULL);
    pthread_create(&w, NULL, writer, NULL);
    pthread_join(w, NULL);
    pthread_create(&r2, NULL, reader, &id2);
    pthread_join(r2, NULL);
    pthread_rwlock_destroy(&rwlock);
    return 0;
}'''
