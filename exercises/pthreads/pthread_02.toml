#include <stdio.h>
#include <pthread.h>

/* == EXEMPLE ===============================================
 * Mutex POSIX : proteger un drapeau partage
 * PTHREAD_MUTEX_INITIALIZER evite pthread_mutex_init().
 * ========================================================= */
int flag = 0;
pthread_mutex_t flag_mtx = PTHREAD_MUTEX_INITIALIZER;

void example_toggle_flag(void) {
    pthread_mutex_lock(&flag_mtx);
    flag = !flag;
    printf("flag toggled to %d\n", flag);
    pthread_mutex_unlock(&flag_mtx);
}
/* Resultat: flag toggled to 1 */

