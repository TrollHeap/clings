common_mistake = "Ne pas recharger old après un CAS échoué → boucle infinie (mais CAS met à jour old automatiquement)"
description = """
NSY103 — Les opérations atomiques (stdatomic.h) permettent des algorithmes lock-free sans mutex. __atomic_compare_exchange_strong (CAS) est la brique fondamentale : elle compare et échange atomiquement.

Implémentez un compteur atomique incrémenté par 3 threads sans mutex."""
difficulty = 5
exercise_type = "complete"
hints = [
    "atomic_compare_exchange_strong_explicit(&var, &expected, desired, succ, fail) — CAS",
    "Si counter == old, met counter = old+1 et retourne true ; sinon met old = counter et retourne false",
    "La boucle while(!CAS) retente jusqu'au succès — c'est le pattern lock-free standard",
]
id = "pthread-lockfree-01"
kc_ids = ["KC-C09"]
key_concept = "CAS (Compare-And-Swap) est l'opération fondamentale lock-free : compare, échange si égal, retente sinon"
lang = "c"
prerequisites = ["pthread-cancel-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>
#include <stdatomic.h>

atomic_int counter = 0;

void *increment(void *arg) {
    int id = *(int *)arg;
    for (int i = 0; i < 3; i++) {
        int old = atomic_load(&counter);
        while (!atomic_compare_exchange_strong_explicit(&counter, &old, old + 1,
                     memory_order_seq_cst, memory_order_seq_cst));
        printf("Thread %d: counter = %d\n", id, old + 1);
    }
    return NULL;
}

int main(void) {
    pthread_t t[3];
    int ids[3] = {0, 1, 2};
    for (int i = 0; i < 3; i++) {
        pthread_create(&t[i], NULL, increment, &ids[i]);
        pthread_join(t[i], NULL);
    }
    printf("Final: %d\n", atomic_load(&counter));
    return 0;
}'''
