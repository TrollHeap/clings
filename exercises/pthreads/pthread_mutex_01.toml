common_mistake = "Oublier unlock → deadlock, ou ne pas protéger du tout → race condition sur counter"
description = """
NSY103 — Un mutex (mutual exclusion) empêche deux threads d'accéder simultanément à une ressource partagée. pthread_mutex_lock/unlock encadrent la section critique.

Utilisez un mutex pour protéger l'incrémentation d'un compteur partagé par 3 threads."""
difficulty = 2
exercise_type = "complete"
hints = [
    "pthread_mutex_lock(&lock) verrouille le mutex avant la section critique",
    "pthread_mutex_unlock(&lock) le déverrouille après",
    "PTHREAD_MUTEX_INITIALIZER initialise statiquement un mutex",
]
id = "pthread-mutex-01"
kc_ids = ["KC-C09"]
key_concept = "pthread_mutex_lock/unlock protège une section critique — garantit qu'un seul thread modifie la ressource à la fois"
lang = "c"
prerequisites = ["pthread-args-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>

static pthread_mutex_t lock = PTHREAD_MUTEX_INITIALIZER;
static int counter = 0;

void *increment_worker(void *arg) {
    (void)arg;
    pthread_mutex_lock(&lock);
    counter++;
    pthread_mutex_unlock(&lock);
    return NULL;
}

int main(void) {
    /* Tester mutex lock/unlock */
    pthread_mutex_t m = PTHREAD_MUTEX_INITIALIZER;
    int r1 = pthread_mutex_lock(&m);
    int r2 = pthread_mutex_unlock(&m);
    printf("lock=%d unlock=%d\n", r1, r2);
    pthread_mutex_destroy(&m);

    /* Tester compteur protégé par mutex */
    pthread_t t1, t2;
    counter = 0;
    pthread_create(&t1, NULL, increment_worker, NULL);
    pthread_create(&t2, NULL, increment_worker, NULL);
    pthread_join(t1, NULL);
    pthread_join(t2, NULL);
    printf("counter=%d\n", counter);
    return 0;
}
'''
