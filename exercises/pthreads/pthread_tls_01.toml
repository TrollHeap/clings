common_mistake = "Ne pas free() dans le destructeur → fuite mémoire par thread"
description = """
NSY103 — pthread_key_create crée une clé TLS. Chaque thread a sa propre valeur associée à cette clé via pthread_setspecific/getspecific. Un destructeur optionnel est appelé à la fin du thread.

Créez une clé TLS et donnez à chaque thread sa propre valeur."""
difficulty = 4
exercise_type = "complete"
hints = [
    "pthread_setspecific(key, val) associe val au thread courant pour cette clé",
    "pthread_getspecific(key) retourne la valeur associée au thread courant",
    "Le destructeur est appelé automatiquement quand le thread se termine",
]
id = "pthread-tls-01"
kc_ids = ["KC-C09"]
key_concept = "pthread_key_create + setspecific/getspecific donne à chaque thread son propre stockage privé pour une clé donnée"
lang = "c"
prerequisites = ["pthread-barrier-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <pthread.h>

pthread_key_t key;

void destructor(void *val) {
    printf("Destructor: freeing %d\n", *(int *)val);
    free(val);
}

void *worker(void *arg) {
    int id = *(int *)arg;
    int *val = malloc(sizeof(int));
    *val = id * 100;
    pthread_setspecific(key, val);
    int *got = (int *)pthread_getspecific(key);
    printf("Thread %d: TLS value = %d\n", id, *got);
    return NULL;
}

int main(void) {
    pthread_key_create(&key, destructor);
    pthread_t t[3];
    int ids[3] = {1, 2, 3};
    for (int i = 0; i < 3; i++) {
        pthread_create(&t[i], NULL, worker, &ids[i]);
        pthread_join(t[i], NULL);
    }
    pthread_key_delete(key);
    return 0;
}'''
