common_mistake = "Oublier cleanup_pop → erreur de compilation (push/pop sont des macros avec accolades)"
description = """
NSY103 — pthread_cancel envoie une demande d'annulation à un thread. pthread_cleanup_push/pop enregistrent des handlers de nettoyage exécutés à l'annulation ou à la fin du thread.

Créez un thread avec un cleanup handler, annulez-le, et vérifiez que le cleanup s'exécute."""
difficulty = 5
exercise_type = "complete"
hints = [
    "pthread_cleanup_push(cleanup, arg) enregistre le handler — attention c'est une macro avec { implicite",
    "pthread_cancel(t) envoie la demande d'annulation",
    "usleep est un point d'annulation — le thread y sera annulé si cancel est pending",
]
id = "pthread-cancel-01"
kc_ids = ["KC-C09"]
key_concept = "pthread_cancel + cleanup_push/pop garantissent le nettoyage des ressources même en cas d'annulation"
lang = "c"
prerequisites = ["pthread-tls-01"]
solution_code = '''
#include <stdio.h>
#include <pthread.h>
#include <unistd.h>

void cleanup(void *arg) {
    printf("Cleanup: %s\n", (char *)arg);
}

void *worker(void *arg) {
    (void)arg;
    pthread_cleanup_push(cleanup, "resource freed");
    printf("Worker: running\n");
    pthread_setcancelstate(PTHREAD_CANCEL_ENABLE, NULL);
    pthread_setcanceltype(PTHREAD_CANCEL_DEFERRED, NULL);
    usleep(200000);
    printf("Worker: finished normally\n");
    pthread_cleanup_pop(0);
    return NULL;
}

int main(void) {
    pthread_t t;
    pthread_create(&t, NULL, worker, NULL);
    usleep(50000);
    pthread_cancel(t);
    void *res;
    pthread_join(t, &res);
    printf("Main: thread %s\n", res == PTHREAD_CANCELED ? "cancelled" : "finished");
    return 0;
}'''
