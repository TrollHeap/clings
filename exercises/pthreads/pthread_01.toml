#include <stdio.h>
#include <pthread.h>

/* == EXEMPLE ===============================================
 * Attribut de thread : stack size
 * pthread_attr_t permet aussi de configurer la taille de pile.
 * ========================================================= */
void example_show_stacksize(void) {
    pthread_attr_t attr;
    pthread_attr_init(&attr);
    size_t stacksz;
    pthread_attr_getstacksize(&attr, &stacksz);
    printf("Default stack: %zu bytes\n", stacksz);
    pthread_attr_setstacksize(&attr, 2 * 1024 * 1024);
    pthread_attr_getstacksize(&attr, &stacksz);
    printf("Custom stack: %zu bytes\n", stacksz);
    pthread_attr_destroy(&attr);
}
/* Resultat: affiche la stack par defaut puis 2097152 */

/* == VOTRE EXERCICE ========================================
