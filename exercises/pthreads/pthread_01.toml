common_mistake = "Créer un thread DETACHED puis appeler pthread_join → comportement indéfini"
description = """
NSY103 — Un thread peut être créé en mode JOINABLE (le parent attend sa fin avec pthread_join) ou DETACHED (libère ses ressources seul). pthread_attr_t configure ces options avant création.

Initialisez des attributs, lisez le detachstate par défaut, puis changez-le en DETACHED."""
difficulty = 1
exercise_type = "complete"
hints = [
    "La constante pour mode joinable est PTHREAD_CREATE_JOINABLE",
    "Pour passer en mode détaché : PTHREAD_CREATE_DETACHED",
    "pthread_attr_setdetachstate(&attr, PTHREAD_CREATE_DETACHED) modifie l'attribut",
]
id = "pthread-01"
kc_ids = ["KC-C09"]
key_concept = "JOINABLE = parent attend avec pthread_join ; DETACHED = thread libère lui-même sa pile"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <pthread.h>
int main(void) {
    pthread_attr_t attr;
    pthread_attr_init(&attr);
    int state;
    pthread_attr_getdetachstate(&attr, &state);
    printf("Default: %s\n", state == PTHREAD_CREATE_JOINABLE ? "JOINABLE" : "DETACHED");
    pthread_attr_setdetachstate(&attr, PTHREAD_CREATE_DETACHED);
    pthread_attr_getdetachstate(&attr, &state);
    printf("After set: %s\n", state == PTHREAD_CREATE_JOINABLE ? "JOINABLE" : "DETACHED");
    pthread_attr_destroy(&attr);
    return 0;
}'''
