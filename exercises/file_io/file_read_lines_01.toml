common_mistake = 'Oublier que fgets ajoute \0 mais garde \n — comparaisons de chaînes échouent'
description = '''
NSY103 — fgets(buf, size, f) lit une ligne depuis un FILE* (s'arrête à \n ou EOF). Idéal pour parser des fichiers ligne par ligne.

Parsez un fichier /etc/passwd simulé (via fmemopen), extrayez login et UID.'''
difficulty = 2
exercise_type = "complete"
hints = [
    "while (fgets(line, sizeof(line), f)) { /* traite line */ }",
    'Retire le \n : line[strcspn(line, "\n")] = 0;',
    'Parser avec sscanf(line, "%63[^:]:%*[^:]:%d", login, &uid);',
]
id = "file-read-lines-01"
kc_ids = ["KC-C06"]
key_concept = 'fgets inclut le \n dans buf — souvent on le retire avec buf[strcspn(buf,"\n")]=0'
lang = "c"
prerequisites = ["file-write-mem-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
int main(void) {
    const char *data =
        "root:x:0:0:root:/root:/bin/bash\n"
        "daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin\n"
        "alice:x:1000:1000:Alice:/home/alice:/bin/bash\n";
    FILE *f = fmemopen((void *)data, strlen(data), "r");
    if (!f) return 1;
    char line[256], login[64];
    int uid;
    printf("login,uid\n");
    while (fgets(line, sizeof(line), f)) {
        line[strcspn(line, "\n")] = 0;
        if (sscanf(line, "%63[^:]:%*[^:]:%d", login, &uid) == 2)
            printf("%s,%d\n", login, uid);
    }
    fclose(f);
    return 0;
}'''
