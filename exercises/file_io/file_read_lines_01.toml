    '''
#include <stdio.h>
#include <string.h>

/* == EXEMPLE ================================================
 * Lire un fichier de config key=value avec fgets + sscanf
 * fgets lit jusqu'a \n, strcspn retire le saut de ligne
 * =========================================================== */
void example_parse_config(void) {
    const char *cfg =
        "host=localhost\n"
        "port=8080\n"
        "debug=true\n";
    FILE *cf = fmemopen((void *)cfg, strlen(cfg), "r");
    if (!cf) return;
    char cline[256], key[64], val[64];
    while (fgets(cline, sizeof(cline), cf)) {
        cline[strcspn(cline, "\n")] = 0;
        if (sscanf(cline, "%63[^=]=%63s", key, val) == 2)
            printf("%s -> %s\n", key, val);
    }
    fclose(cf);
}
/* Resultat: host -> localhost, port -> 8080, debug -> true */

