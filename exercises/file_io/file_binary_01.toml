common_mistake = 'Mélanger mode texte ("w") et binaire : sur Windows crée des problèmes de \r\n. Utiliser "wb"/"rb" en binaire.'
description = """
NSY103 — fwrite() et fread() opèrent en binaire : ils copient directement les octets d'une struct. Plus rapide que le texte, mais non-portable entre architectures.

Écrivez 3 structs ProcessRecord dans un buffer binaire via fwrite, puis relisez-les avec fread."""
difficulty = 3
exercise_type = "complete"
hints = [
    'char buf[1024] = {0}; FILE *fw = fmemopen(buf, sizeof(buf), "w+");',
    "fwrite(&record, sizeof(record), 1, fw);",
    "Rembobiner : rewind(fw); ou fseek(fw, 0, SEEK_SET);",
]
id = "file-binary-01"
kc_ids = ["KC-C06"]
key_concept = "fwrite(&s, sizeof(s), 1, f) écrit sizeof(s) octets bruts"
lang = "c"
prerequisites = ["file-read-lines-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
typedef struct { int pid; int uid; char cmd[32]; } ProcessRecord;
int main(void) {
    char buf[1024];
    memset(buf, 0, sizeof(buf));
    FILE *f = fmemopen(buf, sizeof(buf), "w+");
    if (!f) return 1;
    ProcessRecord procs[] = {
        {1,    0, "init"},
        {42,   1000, "bash"},
        {1337, 1000, "clings"}
    };
    for (int i = 0; i < 3; i++)
        fwrite(&procs[i], sizeof(ProcessRecord), 1, f);
    rewind(f);
    ProcessRecord r;
    printf("pid  uid  cmd\n");
    while (fread(&r, sizeof(ProcessRecord), 1, f) == 1)
        printf("%-4d %-4d %s\n", r.pid, r.uid, r.cmd);
    fclose(f);
    return 0;
}'''
