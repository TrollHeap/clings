common_mistake = 'Oublier de retirer le \n de fgets — les comparaisons de chaînes échouent silencieusement'
description = '''
NSY103 — fgets(buf, n, stream) lit au plus n-1 caractères jusqu'à \n ou EOF. C'est la méthode standard pour lire un fichier texte ligne par ligne.

Comptez les lignes et les mots d'un texte simulé avec fmemopen.'''
difficulty = 1
exercise_type = "complete"
hints = [
    'fgets(line, sizeof(line), f) lit une ligne entière (avec \n)',
    'line[strcspn(line, "\n")] = 0 retire le saut de ligne',
    "Incrémentez total_lines à chaque tour de boucle",
]
id = "file-getline-01"
kc_ids = ["KC-C06"]
key_concept = 'fgets lit au plus n-1 chars et ajoute \0, mais conserve le \n dans le buffer'
lang = "c"
prerequisites = ["file-open-modes-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <ctype.h>

int count_words(const char *s) {
    int words = 0, in_word = 0;
    for (; *s; s++) {
        if (isspace((unsigned char)*s)) {
            in_word = 0;
        } else if (!in_word) {
            in_word = 1;
            words++;
        }
    }
    return words;
}

int main(void) {
    const char *text =
        "Le noyau Linux\n"
        "gere les processus\n"
        "et la memoire\n";
    FILE *f = fmemopen((void *)text, strlen(text), "r");
    if (!f) return 1;
    char line[256];
    int total_lines = 0, total_words = 0;
    while (fgets(line, sizeof(line), f)) {
        line[strcspn(line, "\n")] = 0;
        total_lines++;
        total_words += count_words(line);
    }
    fclose(f);
    printf("Lines: %d\n", total_lines);
    printf("Words: %d\n", total_words);
    return 0;
}'''
