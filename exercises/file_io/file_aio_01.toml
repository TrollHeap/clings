common_mistake = "Appeler aio_return avant que aio_error ne retourne 0 — comportement indéfini"
description = """
NSY103 — Les E/S asynchrones POSIX (aio_read, aio_write) permettent de lancer une opération d'E/S sans bloquer le thread appelant. On soumet une requête via struct aiocb et on vérifie sa complétion avec aio_error/aio_return.

Simulez des opérations asynchrones en écrivant puis relisant un fichier temporaire avec les API AIO."""
difficulty = 5
exercise_type = "complete"
hints = [
    "struct aiocb contient aio_fildes (fd), aio_buf (buffer), aio_nbytes (taille), aio_offset",
    "aio_error retourne EINPROGRESS tant que l'opération est en cours, 0 si terminée",
    "aio_return récupère le résultat (nombre d'octets) — ne l'appeler qu'après complétion",
]
id = "file-aio-01"
kc_ids = ["KC-C06"]
key_concept = "AIO POSIX : soumettre (aio_write/aio_read), vérifier (aio_error), récupérer (aio_return)"
lang = "c"
prerequisites = ["file-scatter-01"]
solution_code = '''
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <aio.h>
#include <fcntl.h>
#include <unistd.h>
#include <errno.h>

int main(void) {
    char path[] = "/tmp/kf_aio_XXXXXX";
    int fd = mkstemp(path);
    if (fd == -1) { perror("mkstemp"); return 1; }
    unlink(path);

    /* Ecriture asynchrone */
    char wbuf[] = "Async I/O works!";
    struct aiocb wcb;
    memset(&wcb, 0, sizeof(wcb));
    wcb.aio_fildes = fd;
    wcb.aio_buf    = wbuf;
    wcb.aio_nbytes = strlen(wbuf);
    wcb.aio_offset = 0;

    if (aio_write(&wcb) == -1) {
        perror("aio_write");
        close(fd);
        return 1;
    }

    /* Attendre la completion */
    while (aio_error(&wcb) == EINPROGRESS)
        ; /* busy wait (simplifié) */

    ssize_t nw = aio_return(&wcb);
    printf("Async write: %zd bytes\n", nw);

    /* Lecture asynchrone */
    char rbuf[64] = {0};
    struct aiocb rcb;
    memset(&rcb, 0, sizeof(rcb));
    rcb.aio_fildes = fd;
    rcb.aio_buf    = rbuf;
    rcb.aio_nbytes = sizeof(rbuf) - 1;
    rcb.aio_offset = 0;

    if (aio_read(&rcb) == -1) {
        perror("aio_read");
        close(fd);
        return 1;
    }

    while (aio_error(&rcb) == EINPROGRESS)
        ;

    ssize_t nr = aio_return(&rcb);
    printf("Async read: %zd bytes\n", nr);
    printf("Content: %s\n", rbuf);

    close(fd);
    return 0;
}'''
