#include <stdio.h>

/* == EXEMPLE =======================================
 * Utiliser tmpfile pour trier des données
 * tmpfile() + fprintf + rewind + fscanf
 * ================================================= */
void example_tmpfile(void) {
    FILE *t = tmpfile();
    if (!t) return;
    fprintf(t, "alpha\nbeta\ngamma\n");
    rewind(t);
    char buf[64];
    while (fgets(buf, sizeof(buf), t)) {
        buf[strcspn(buf, "\n")] = 0;
        printf("Read: %s\n", buf);
    }
    fclose(t); /* fichier supprimé automatiquement */
