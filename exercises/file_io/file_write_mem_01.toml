common_mistake = "Ne pas appeler fflush() ou fclose() avant de lire le buffer : les données peuvent être encore dans le tampon interne"
description = """
NSY103 — fprintf(f, fmt, ...) écrit dans n'importe quel FILE* : stdout, un fichier, ou un buffer mémoire. fmemopen() crée un FILE* depuis un tableau en RAM.

Écrivez des enregistrements CSV dans un buffer via fprintf, puis affichez le résultat."""
difficulty = 1
exercise_type = "complete"
hints = [
    'char buf[512] = {0}; FILE *f = fmemopen(buf, sizeof(buf), "w");',
    'fprintf(f, "nom,age\n"); etc.',
    'fclose(f); ensuite printf("%s", buf);',
]
id = "file-write-mem-01"
kc_ids = ["KC-C06"]
key_concept = "FILE* est une abstraction : même API pour stdout, fichier disque, ou buffer mémoire"
lang = "c"
prerequisites = []
solution_code = '''
#include <stdio.h>
#include <string.h>
int main(void) {
    char buf[512];
    memset(buf, 0, sizeof(buf));
    FILE *f = fmemopen(buf, sizeof(buf), "w");
    if (!f) { printf("fmemopen failed\n"); return 1; }
    fprintf(f, "nom,age,role\n");
    fprintf(f, "Alice,30,admin\n");
    fprintf(f, "Bob,25,user\n");
    fprintf(f, "Carol,35,moderator\n");
    fclose(f);
    printf("%s", buf);
    return 0;
}'''
