common_mistake = "Oublier munmap — fuite de mémoire virtuelle, la mémoire n'est pas libérée par free"
description = """
NSY103 — mmap() projette un fichier (ou une région anonyme) dans l'espace d'adressage du processus. Les accès mémoire sont traduits en E/S fichier par le noyau. C'est plus efficace que read/write pour les accès aléatoires.

Utilisez mmap MAP_ANONYMOUS pour simuler un fichier mappé, écrivez des données et relisez-les."""
difficulty = 4
exercise_type = "complete"
hints = [
    "PROT_WRITE permet l'écriture dans la zone mappée",
    "MAP_ANONYMOUS crée un mapping sans fichier (fd = -1)",
    "munmap(addr, size) libère le mapping — équivalent de free pour mmap",
]
id = "file-mmap-01"
kc_ids = ["KC-C06"]
key_concept = "mmap transforme un fichier en tableau mémoire — le noyau gère la pagination transparente"
lang = "c"
prerequisites = ["file-record-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <sys/mman.h>
#include <unistd.h>

typedef struct { int id; char name[16]; } Record;

int main(void) {
    size_t page = (size_t)sysconf(_SC_PAGESIZE);
    size_t map_size = page; /* au moins 1 page */

    /* mmap anonyme : pas de fichier, memoire privee */
    void *addr = mmap(NULL, map_size,
                      PROT_READ | PROT_WRITE,
                      MAP_PRIVATE | MAP_ANONYMOUS,
                      -1, 0);
    if (addr == MAP_FAILED) {
        perror("mmap");
        return 1;
    }

    printf("Mapped %zu bytes at %p\n", map_size, addr);

    /* Ecrire des records directement en memoire */
    Record *records = (Record *)addr;
    records[0] = (Record){1, "Alice"};
    records[1] = (Record){2, "Bob"};
    records[2] = (Record){3, "Charlie"};

    /* Relire */
    for (int i = 0; i < 3; i++)
        printf("Record %d: %s\n", records[i].id, records[i].name);

    /* Nombre de records possibles dans la page */
    printf("Max records per page: %zu\n", page / sizeof(Record));

    munmap(addr, map_size);
    return 0;
}'''
