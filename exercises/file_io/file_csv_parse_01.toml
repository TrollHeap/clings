common_mistake = "Oublier de limiter la taille dans %[^,] — buffer overflow si le champ est trop long"
description = """
NSY103 — Le parsing de fichiers CSV est une opération courante en programmation système. On utilise fgets pour lire ligne par ligne, puis strtok ou sscanf pour extraire les champs.

Parsez un fichier CSV simulé (nom,age,ville) et affichez un résumé formaté."""
difficulty = 2
exercise_type = "complete"
hints = [
    "sscanf avec %[^,] lit jusqu'à la virgule suivante",
    "people[count].name accède au champ name de l'élément courant",
    "N'oubliez pas le & devant people[count].age pour sscanf",
]
id = "file-csv-parse-01"
kc_ids = ["KC-C06"]
key_concept = "sscanf avec %[^,] est un moyen simple de parser des champs CSV sans bibliothèque externe"
lang = "c"
prerequisites = ["file-getline-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>
#include <stdlib.h>

typedef struct { char name[32]; int age; char city[32]; } Person;

int main(void) {
    const char *csv =
        "nom,age,ville\n"
        "Alice,30,Paris\n"
        "Bob,25,Lyon\n"
        "Charlie,35,Marseille\n";
    FILE *f = fmemopen((void *)csv, strlen(csv), "r");
    if (!f) return 1;

    char line[256];
    Person people[10];
    int count = 0;

    /* Skip header */
    fgets(line, sizeof(line), f);

    while (fgets(line, sizeof(line), f) && count < 10) {
        line[strcspn(line, "\n")] = 0;
        if (sscanf(line, "%31[^,],%d,%31[^,]", people[count].name, &people[count].age, people[count].city) == 3)
            count++;
    }
    fclose(f);

    printf("Personnes: %d\n", count);
    for (int i = 0; i < count; i++)
        printf("  %s (%d) - %s\n", people[i].name, people[i].age, people[i].city);
    return 0;
}'''
