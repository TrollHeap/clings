common_mistake = 'Confondre "w" et "a" : "w" écrase le contenu existant, "a" le préserve'
description = """
NSY103 — fopen() ouvre un fichier avec un mode : "r" (lecture), "w" (écriture, tronque), "a" (ajout), "r+" (lecture+écriture). Le mode détermine le comportement initial du curseur et l'accès.

Démontrez les différents modes en écrivant et lisant un buffer mémoire via fmemopen."""
difficulty = 1
exercise_type = "complete"
hints = [
    '"w" ouvre en écriture et tronque le contenu existant',
    '"a" ouvre en ajout : le curseur se place à la fin du contenu',
    '"r" ouvre en lecture seule, le fichier doit exister',
]
id = "file-open-modes-01"
kc_ids = ["KC-C06"]
key_concept = '"w" tronque, "a" ajoute à la fin, "r" lit depuis le début — le mode détermine tout'
lang = "c"
prerequisites = ["file-read-lines-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

int main(void) {
    char buf[256];
    memset(buf, 0, sizeof(buf));

    /* Mode "w" : ecriture, tronque */
    FILE *f = fmemopen(buf, sizeof(buf), "w");
    if (!f) return 1;
    fprintf(f, "Hello");
    fclose(f);
    printf("After w: \"%s\"\n", buf);

    /* Mode "a" : ajout a la fin */
    f = fmemopen(buf, sizeof(buf), "a");
    if (!f) return 1;
    fprintf(f, " World");
    fclose(f);
    printf("After a: \"%s\"\n", buf);

    /* Mode "r" : lecture seule */
    f = fmemopen(buf, strlen(buf), "r");
    if (!f) return 1;
    char read_buf[256];
    if (fgets(read_buf, sizeof(read_buf), f))
        printf("After r: \"%s\"\n", read_buf);
    fclose(f);

    return 0;
}'''
