common_mistake = "Tailles iov_len incohérentes entre écriture et lecture — données décalées"
description = """
NSY103 — writev() et readv() permettent d'écrire/lire plusieurs buffers non-contigus en un seul appel système (scatter-gather I/O). Plus efficace que plusieurs write() pour les protocoles réseau ou les logs structurés.

Utilisez writev pour écrire un header + body + footer en un seul appel, puis readv pour les relire séparément."""
difficulty = 5
exercise_type = "complete"
hints = [
    "struct iovec { void *iov_base; size_t iov_len; } décrit un buffer",
    "writev(fd, iov, count) écrit count buffers en un seul appel atomique",
    "readv(fd, iov, count) remplit les buffers séquentiellement depuis le fichier",
]
id = "file-scatter-01"
kc_ids = ["KC-C06"]
key_concept = "readv/writev = scatter-gather I/O : un seul syscall pour plusieurs buffers non-contigus"
lang = "c"
prerequisites = ["file-lock-01"]
solution_code = '''
#include <stdlib.h>
#include <stdio.h>
#include <string.h>
#include <unistd.h>
#include <sys/uio.h>
#include <fcntl.h>

int main(void) {
    char path[] = "/tmp/kf_iov_XXXXXX";
    int fd = mkstemp(path);
    if (fd == -1) { perror("mkstemp"); return 1; }
    unlink(path);

    /* Trois buffers non-contigus */
    char header[] = "HDR:";
    char body[]   = "Hello World";
    char footer[] = ":END";

    struct iovec wv[3];
    wv[0].iov_base = header;
    wv[0].iov_len  = strlen(header);
    wv[1].iov_base = body;
    wv[1].iov_len  = strlen(body);
    wv[2].iov_base = footer;
    wv[2].iov_len  = strlen(footer);

    ssize_t nw = writev(fd, wv, 3);
    printf("Wrote %zd bytes\n", nw);

    /* Relire avec readv en 3 buffers separés */
    lseek(fd, 0, SEEK_SET);

    char rh[5] = {0}, rb[12] = {0}, rf[5] = {0};
    struct iovec rv[3];
    rv[0].iov_base = rh;
    rv[0].iov_len  = 4;
    rv[1].iov_base = rb;
    rv[1].iov_len  = 11;
    rv[2].iov_base = rf;
    rv[2].iov_len  = 4;

    ssize_t nr = readv(fd, rv, 3);
    printf("Read %zd bytes\n", nr);
    printf("Header: %s\n", rh);
    printf("Body: %s\n", rb);
    printf("Footer: %s\n", rf);

    close(fd);
    return 0;
}'''
