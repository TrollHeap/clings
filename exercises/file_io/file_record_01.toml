common_mistake = "Oublier le cast (long) dans index * sizeof — overflow sur grands fichiers avec int"
description = """
NSY103 — Les fichiers à enregistrements fixes (fixed-size records) permettent un accès direct par index : offset = index * sizeof(record). On utilise fwrite/fread pour sérialiser des structs binaires.

Créez une mini base de données d'étudiants avec accès direct par numéro."""
difficulty = 3
exercise_type = "complete"
hints = [
    "SEEK_SET pour un accès absolu : index * sizeof(Student) donne l'offset",
    "fwrite(&s, sizeof(Student), 1, f) écrit une struct entière en binaire",
    "fread(&s, sizeof(Student), 1, f) retourne 1 si lecture réussie",
]
id = "file-record-01"
kc_ids = ["KC-C06"]
key_concept = "L'accès direct par index dans un fichier à enregistrements fixes : offset = index * sizeof(record)"
lang = "c"
prerequisites = ["file-seek-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

typedef struct {
    int id;
    char name[20];
    float grade;
} Student;

void write_student(FILE *f, int index, const Student *s) {
    fseek(f, index * (long)sizeof(Student), SEEK_SET);
    fwrite(s, sizeof(Student), 1, f);
}

int read_student(FILE *f, int index, Student *s) {
    fseek(f, index * (long)sizeof(Student), SEEK_SET);
    return fread(s, sizeof(Student), 1, f) == 1;
}

int main(void) {
    FILE *db = tmpfile();
    if (!db) return 1;

    Student students[] = {
        {101, "Alice",   15.5f},
        {102, "Bob",     12.0f},
        {103, "Charlie", 17.5f},
    };

    for (int i = 0; i < 3; i++)
        write_student(db, i, &students[i]);

    /* Lecture dans l'ordre inverse */
    Student s;
    for (int i = 2; i >= 0; i--) {
        if (read_student(db, i, &s))
            printf("[%d] %s: %.1f\n", s.id, s.name, s.grade);
    }

    fclose(db);
    return 0;
}'''
