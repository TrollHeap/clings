    FILE *f = tmpfile();
    if (!f) return;
    Product prods[] = {{1, "Clavier", 29.99}, {2, "Souris", 15.50}};
    for (int i = 0; i < 2; i++) {
        fseek(f, i * (long)sizeof(Product), SEEK_SET);
        fwrite(&prods[i], sizeof(Product), 1, f);
