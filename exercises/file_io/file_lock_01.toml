common_mistake = "Les advisory locks ne sont pas obligatoires — un autre processus peut ignorer le verrou"
description = """
NSY103 — Le verrouillage de fichiers empêche les accès concurrents. fcntl() avec struct flock permet un verrouillage par région (advisory locking). F_SETLK tente sans bloquer, F_SETLKW bloque.

Simulez un verrou sur un fichier temporaire et affichez les transitions de verrouillage."""
difficulty = 4
exercise_type = "complete"
hints = [
    "fl.l_type prend F_RDLCK (lecture), F_WRLCK (écriture), ou F_UNLCK (libérer)",
    "F_SETLK tente le verrou sans bloquer, F_SETLKW bloque jusqu'à obtention",
    "F_GETLK teste si un verrou serait possible — remplace l_type par F_UNLCK si oui",
]
id = "file-lock-01"
kc_ids = ["KC-C06"]
key_concept = "fcntl advisory locking : F_RDLCK partagé, F_WRLCK exclusif, F_UNLCK libère"
lang = "c"
prerequisites = ["file-mmap-01"]
solution_code = '''
#include <stdlib.h>
#include <stdio.h>
#include <fcntl.h>
#include <unistd.h>
#include <string.h>

void show_lock(int fd, const char *label) {
    struct flock fl;
    memset(&fl, 0, sizeof(fl));
    fl.l_type = F_WRLCK;
    fl.l_whence = SEEK_SET;
    fl.l_start = 0;
    fl.l_len = 0; /* fichier entier */
    if (fcntl(fd, F_GETLK, &fl) == -1) {
        perror("fcntl F_GETLK");
        return;
    }
    if (fl.l_type == F_UNLCK)
        printf("%s: unlocked\n", label);
    else
        printf("%s: locked by PID %d (type=%s)\n", label, fl.l_pid,
               fl.l_type == F_RDLCK ? "READ" : "WRITE");
}

int set_lock(int fd, short type) {
    struct flock fl;
    memset(&fl, 0, sizeof(fl));
    fl.l_type = type;
    fl.l_whence = SEEK_SET;
    fl.l_start = 0;
    fl.l_len = 0;
    return fcntl(fd, F_SETLK, &fl);
}

int main(void) {
    char path[] = "/tmp/kf_lock_XXXXXX";
    int fd = mkstemp(path);
    if (fd == -1) { perror("mkstemp"); return 1; }
    unlink(path); /* supprime le nom, fd reste valide */

    show_lock(fd, "Initial");

    /* Poser un verrou lecture */
    if (set_lock(fd, F_RDLCK) == 0)
        printf("Read lock acquired\n");

    /* Liberer le verrou */
    if (set_lock(fd, F_UNLCK) == 0)
        printf("Lock released\n");

    show_lock(fd, "After release");

    /* Poser un verrou ecriture */
    if (set_lock(fd, F_WRLCK) == 0)
        printf("Write lock acquired\n");

    if (set_lock(fd, F_UNLCK) == 0)
        printf("Lock released\n");

    close(fd);
    printf("Done\n");
    return 0;
}'''
