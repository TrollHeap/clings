/* == EXEMPLE =======================================
 * Verrou simple avec flock (BSD-style)
 * flock est plus simple que fcntl mais moins précis
 * ================================================= */
#include <sys/file.h>
void example_flock(void) {
    char p[] = "/tmp/kf_ex_XXXXXX";
    int fd = mkstemp(p);
    if (fd == -1) return;
    unlink(p);
    if (flock(fd, LOCK_EX | LOCK_NB) == 0)
        printf("flock: exclusive lock acquired\n");
    if (flock(fd, LOCK_UN) == 0)
