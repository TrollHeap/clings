common_mistake = "Oublier que ftell retourne long, pas int — problème pour fichiers > 2 Go"
description = """
NSY103 — fseek(f, offset, whence) déplace le curseur de lecture/écriture. whence peut être SEEK_SET (début), SEEK_CUR (position courante), SEEK_END (fin). ftell(f) retourne la position courante.

Naviguez dans un buffer mémoire pour lire des enregistrements à des positions spécifiques."""
difficulty = 3
exercise_type = "complete"
hints = [
    "SEEK_END positionne le curseur à la fin — utile pour connaître la taille du fichier",
    "SEEK_SET positionne depuis le début du fichier (offset absolu)",
    "SEEK_CUR est relatif à la position courante — offset négatif = reculer",
]
id = "file-seek-01"
kc_ids = ["KC-C06"]
key_concept = "fseek(SEEK_SET) = absolu, fseek(SEEK_CUR) = relatif, fseek(SEEK_END) = depuis la fin"
lang = "c"
prerequisites = ["file-tmpfile-01"]
solution_code = '''
#include <stdio.h>
#include <string.h>

int main(void) {
    /* Chaque enregistrement fait exactement 10 chars */
    const char *records = "AAAAAAAAAA" "BBBBBBBBBB" "CCCCCCCCCC" "DDDDDDDDDD" "EEEEEEEEEE";
    FILE *f = fmemopen((void *)records, strlen(records), "r");
    if (!f) return 1;

    char buf[11];
    long size;

    /* Taille totale */
    fseek(f, 0, SEEK_END);
    size = ftell(f);
    printf("Size: %ld bytes\n", size);
    printf("Records: %ld\n", size / 10);

    /* Lire enregistrement 3 (index 2, offset 20) */
    fseek(f, 2 * 10, SEEK_SET);
    fread(buf, 1, 10, f);
    buf[10] = 0;
    printf("Record 3: %s\n", buf);

    /* Position courante */
    printf("Position: %ld\n", ftell(f));

    /* Reculer de 10 pour relire le meme */
    fseek(f, -10, SEEK_CUR);
    fread(buf, 1, 10, f);
    buf[10] = 0;
    printf("Re-read: %s\n", buf);

    fclose(f);
    return 0;
}'''
