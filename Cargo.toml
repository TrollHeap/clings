[package]
name = "kernelforge-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "kf"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.38", features = ["bundled"] }
notify = "8"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
colored = "3"
libc = "0.2"
ctrlc = "3"
thiserror = "2"
regex = "1"
